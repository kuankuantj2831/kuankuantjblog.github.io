    <script type="module">
        import { API_BASE_URL } from './js/api-config.js?v=20260418a';
        
        // 稿繈鍔岄惇勬偐哥?
        let collections = [];
        let currentCollectionId = null;
        let selectedArticles = new Set();
        let editingCollectionId = null;
        let currentUser = null;

        // 告帗绻傞～鎰板礌?
        async function init() {
            const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
            if (!user) {
                window.location.href = '/?login=1';
                return;
            }
            currentUser = user;
            await loadCollections();
            setupEventListeners();
        }

        // 告梻ù鍥绩増顥戝鍓佹嚀鎮?
        async function loadCollections() {
            try {
                const response = await fetch(`${API_BASE_URL}/collections`, {
                    headers: {
                        'Authorization': `Bearer ${currentUser.token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    collections = data.collections || [];
                    renderCollectionsList();
                    
                    // 掓稒顭堥濠氭焻跺顏ョ婂厸斿瓨绋夐鍛毆芥ê绻愰妵娆箣?稿繈鍔戦崕?
                    if (collections.length > 0 && !currentCollectionId) {
                        selectCollection(collections[0].id);
                    } else if (currentCollectionId) {
                        loadArticles(currentCollectionId);
                    }
                }
            } catch (error) {
                console.error('Error loading collections:', error);
                showToast('告梻ù鍥緞堫袝挎稑鐭侀礆垮鐓闂佹彃绉烽惁?);
            }
        }

        // 炴挸堕悡瀣绩増顥戝鍓佹嚀鎮?
        function renderCollectionsList() {
            const container = document.getElementById('collectionsList');
            
            let html = '';
            
            // "稿繈鍔戦崕?闂顦妴?
            html += `
                <div class="collection-item ${!currentCollectionId ? 'active' : ''}" onclick="selectCollection(null)">
                    <div class="collection-icon" style="background: linear-gradient(135deg, #667eea, #764ba2);">妫啯鎲?/div>
                    <div class="collection-info">
                        <div class="collection-name">稿繈鍔戦崕鎾绩増顥?/div>
                        <div class="collection-count">${collections.reduce((sum, c) => sum + (c.article_count || 0), 0)} 佲虫处閺啰绮?/div>
                    </div>
                </div>
            `;
            
            collections.forEach(collection => {
                html += `
                    <div class="collection-item ${currentCollectionId === collection.id ? 'active' : ''}" 
                         onclick="selectCollection(${collection.id})">
                        <div class="collection-icon" style="background: ${collection.color || 'linear-gradient(135deg, #667eea, #764ba2)'};">
                            ${collection.icon || '妫啯鎯?}
                        </div>
                        <div class="collection-info">
                            <div class="collection-name">
                                ${collection.name}
                                ${collection.is_public ? '<span>妫啫?/span>' : '<span>妫啯鏅?/span>'}
                            </div>
                            <div class="collection-count">${collection.article_count || 0} 佲虫处閺啰绮?/div>
                        </div>
                        <div class="collection-actions">
                            <button class="btn-icon" onclick="event.stopPropagation(); editCollection(${collection.id})">翠礁楠忕?/button>
                            <button class="btn-icon" onclick="event.stopPropagation(); deleteCollection(${collection.id})">妫啯顥旈柨?/button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // 闂顦扮氥劑ㄩ幆鐗堫棏濠?
        async function selectCollection(id) {
            currentCollectionId = id;
            selectedArticles.clear();
            updateBatchActions();
            renderCollectionsList();
            
            if (id) {
                const collection = collections.find(c => c.id === id);
                if (collection) {
                    document.getElementById('currentIcon').textContent = collection.icon || '妫啯鎯?;
                    document.getElementById('currentIcon').style.background = collection.color || 'linear-gradient(135deg, #667eea, #764ba2)';
                    document.getElementById('currentCollectionName').textContent = collection.name;
                    document.getElementById('currentCollectionDesc').textContent = collection.description || '哄棗瑰Λ夊箵韫艾鐗?;
                }
            } else {
                document.getElementById('currentIcon').textContent = '妫啯鎲?;
                document.getElementById('currentIcon').style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
                document.getElementById('currentCollectionName').textContent = '稿繈鍔戦崕鎾绩増顥?;
                document.getElementById('currentCollectionDesc').textContent = '圭撻柡濐槹閺佸婅箛鏇熺暠哄倸娲ㄩ悵?;
            }
            
            await loadArticles(id);
        }

        // 告梻ù鍥棘モ晝褰块柛鎺擃殙閵?
        async function loadArticles(collectionId) {
            const container = document.getElementById('articlesList');
            container.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.6);">告梻ù鍥ㄧ▔?..</div>';
            
            try {
                let url = `${API_BASE_URL}/collections`;
                if (collectionId) {
                    url = `${API_BASE_URL}/collections/${collectionId}/articles`;
                }
                
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${currentUser.token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const articles = data.articles || [];
                    
                    if (articles.length === 0) {
                        document.getElementById('emptyState').style.display = 'block';
                        container.innerHTML = '';
                        return;
                    }
                    
                    document.getElementById('emptyState').style.display = 'none';
                    renderArticles(articles);
                }
            } catch (error) {
                console.error('Error loading articles:', error);
                container.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.6);">告梻ù鍥緞堫袝</div>';
            }
        }

        // 炴挸堕悡瀣棘モ晝褰块柛鎺擃殙閵?
        function renderArticles(articles) {
            const container = document.getElementById('articlesList');
            
            container.innerHTML = articles.map(article => `
                <div class="article-card">
                    <div class="article-checkbox">
                        <input type="checkbox" 
                               ${selectedArticles.has(article.id) ? 'checked' : ''} 
                               onchange="toggleArticle('${article.id}')">
                    </div>
                    <div class="article-content">
                        <a href="/article.html?id=${article.id}" class="article-title">${article.title}</a>
                        <div class="article-meta">
                            <span>妫啯鍣?${article.author_name || '告牕鐏濋幃?}</span>
                            <span>妫啯鎯?${formatDate(article.created_at)}</span>
                            <span>妫啯戦柨?${article.view_count || 0} 闂傚啫鎳撻?/span>
                        </div>
                    </div>
                    <div class="article-actions">
                        <button class="btn-icon" onclick="moveArticle('${article.id}')" title="佸ф慨?>妫啯鎯?/button>
                        <button class="btn-icon" onclick="removeArticle('${article.id}')" title="佸顭▍?>妫啯顥旈柨?/button>
                    </div>
                </div>
            `).join('');
        }

        // 闂顦扮?告瑦鐗楃粔鐑芥焻跺顏柡鍌氭川?
        function toggleArticle(articleId) {
            if (selectedArticles.has(articleId)) {
                selectedArticles.delete(articleId);
            } else {
                selectedArticles.add(articleId);
            }
            updateBatchActions();
        }

        // 哄洤鐡ㄩ弻濠囧箥瑜版帒娅ら鍨С嶆棃?
        function updateBatchActions() {
            const batchActions = document.getElementById('batchActions');
            const selectedCount = document.getElementById('selectedCount');
            
            selectedCount.textContent = selectedArticles.size;
            
            if (selectedArticles.size > 0) {
                batchActions.classList.add('show');
            } else {
                batchActions.classList.remove('show');
            }
        }

        // 炴挸鎳樺▍ㄦ焻跺顏?
        function clearSelection() {
            selectedArticles.clear();
            document.querySelectorAll('.article-checkbox input').forEach(cb => cb.checked = false);
            updateBatchActions();
        }

        // 犱礁澧介悿鍡樼ｂ晜顐介鈺傚灥?
        function setupEventListeners() {
            // 搞儳埇鏋讹綁鏌呮径瀣仴
            document.querySelectorAll('#iconSelector .icon-option').forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('#iconSelector .icon-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
            
            // 濡増绮忔竟濠焻跺顏?
            document.querySelectorAll('#colorSelector .color-option').forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('#colorSelector .color-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
            
            // 炴稏鍔屽畷鐔煎箵亝鍞?
            document.getElementById('collectionForm').addEventListener('submit', handleFormSubmit);
        }

        // 濠㈣泛瀚幃濠勬偘閵娿儱樺姃?
        async function handleFormSubmit(e) {
            e.preventDefault();
            
            const name = document.getElementById('collectionName').value;
            const description = document.getElementById('collectionDesc').value;
            const icon = document.querySelector('#iconSelector .icon-option.selected')?.dataset.icon || '妫啯鎯?;
            const color = document.querySelector('#colorSelector .color-option.selected')?.dataset.color || '#667eea';
            
            const data = {
                name,
                description,
                icon,
                color: `linear-gradient(135deg, ${color}, ${adjustColor(color, -20)})`
            };
            
            try {
                const url = editingCollectionId 
                    ? `${API_BASE_URL}/collections/${editingCollectionId}`
                    : `${API_BASE_URL}/collections`;
                
                const response = await fetch(url, {
                    method: editingCollectionId ? 'PUT' : 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentUser.token}`
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showToast(editingCollectionId ? '衡偓増顥戝鍓佹嚀戯寸涙ɑ鐓' : '衡偓増顥戝鍓佹嚀崬欓悜虹亣?);
                    closeModal();
                    await loadCollections();
                } else {
                    const error = await response.json();
                    showToast(error.message || '瑰灝绉紞鏃勬潏顐バ?);
                }
            } catch (error) {
                console.error('Error saving collection:', error);
                showToast('洦绻傞悺銊緞堫袝挎稑鐭侀勬煂瀹ュ牏妲?);
            }
        }

        // 傚倹鐗炵欢顐绩増顥戝?
        function editCollection(id) {
            const collection = collections.find(c => c.id === id);
            if (!collection) return;
            
            editingCollectionId = id;
            document.getElementById('modalTitle').textContent = '傚倹鐗炵欢顐绩増顥戝?;
            document.getElementById('collectionName').value = collection.name;
            document.getElementById('collectionDesc').value = collection.description || '';
            
            // 犱礁澧介悿鍡涘炊愵剛鍨?
            document.querySelectorAll('#iconSelector .icon-option').forEach(o => {
                o.classList.toggle('selected', o.dataset.icon === collection.icon);
            });
            
            document.getElementById('collectionModal').classList.add('show');
        }

        // 傚倹鐗炵欢顐ャ啿顤呴柡鈧幆鐗堫棏濠?
        function editCurrentCollection() {
            if (!currentCollectionId) {
                showToast('哄啰电涵鍓磽閺嶎剛甯?稿繈鍔戦崕鎾绩増顥?');
                return;
            }
            editCollection(currentCollectionId);
        }

        // 告帞呭酣ㄩ幆鐗堫棏濠?
        async function deleteCollection(id) {
            if (!confirm('绢収鍠栭悾鍓ф啺鐏╅梻鍕╁涚换鏍ㄧ▔懏鏆柦虹箰閵瑩宕ュΔ瀣惞稿繑婀归懙鎴︽儍曨剚鏃傚Тㄣ垻鎮銇扳晠宕?稿繈鍔戦崕鎾绩増顥??)) return;
            
            try {
                const response = await fetch(`${API_BASE_URL}/collections/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${currentUser.token}`
                    }
                });
                
                if (response.ok) {
                    showToast('衡偓増顥戝鍓佹嚀戯宕氶悩樼彑');
                    if (currentCollectionId === id) {
                        currentCollectionId = null;
                    }
                    await loadCollections();
                } else {
                    showToast('告帞呭勬潏顐バ?);
                }
            } catch (error) {
                console.error('Error deleting collection:', error);
                showToast('告帞呭勬潏顐バ?);
            }
        }

        // 告帞呭氦銇愰幘鍐差枀衡偓増顥戝?
        function deleteCurrentCollection() {
            if (!currentCollectionId) {
                showToast('哄啰电涵曞礆樼粯鐝?稿繈鍔戦崕鎾绩増顥?');
                return;
            }
            deleteCollection(currentCollectionId);
        }

        // 佸ф慨鈺呭棘モ晝褰?
        async function moveArticle(articleId) {
            selectedArticles.clear();
            selectedArticles.add(articleId);
            openMoveModal();
        }

        // 归潧缍婇崳铏圭矓彃袟
        function moveSelected() {
            if (selectedArticles.size === 0) return;
            openMoveModal();
        }

        // 瑰灚哥鎴犵矓彃袟☆垪鍓濋埀跨劍?
        function openMoveModal() {
            const list = document.getElementById('moveCollectionList');
            list.innerHTML = collections.map(c => `
                <div class="collection-item" onclick="confirmMove(${c.id})">
                    <div class="collection-icon" style="background: ${c.color || 'linear-gradient(135deg, #667eea, #764ba2)'};">
                        ${c.icon || '妫啯鎯?}
                    </div>
                    <div class="collection-info">
                        <div class="collection-name">${c.name}</div>
                        <div class="collection-count">${c.article_count || 0} 佲虫处閺啰绮?/div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('moveModal').classList.add('show');
        }

        // 绢収鍠涢鑽ょ矓彃袟
        async function confirmMove(targetCollectionId) {
            const articleIds = Array.from(selectedArticles);
            
            try {
                for (const articleId of articleIds) {
                    // 稿繐鐗呯划鐘恒啿顤呴柡鈧幆鐗堫棏濠㈣泛婀变簺闂?
                    if (currentCollectionId) {
                        await fetch(`${API_BASE_URL}/collections/${currentCollectionId}/articles/${articleId}`, {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `Bearer ${currentUser.token}`
                            }
                        });
                    }
                    
                    // 烇綀ф慨鐐哄礆殿喗绐柡宥呮处閺佸婅箛鎾变粴
                    await fetch(`${API_BASE_URL}/collections/${targetCollectionId}/articles`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${currentUser.token}`
                        },
                        body: JSON.stringify({ article_id: articleId })
                    });
                }
                
                showToast(`瑰瓨鍔曟慨氱矓彃袟 ${articleIds.length} 佲虫处閺啰绮╅悤?;
                closeMoveModal();
                clearSelection();
                await loadCollections();
                await loadArticles(currentCollectionId);
            } catch (error) {
                console.error('Error moving articles:', error);
                showToast('佸ф慨鈺傚緞堫袝');
            }
        }

        // 佸顭▍棘モ晝褰?
        async function removeArticle(articleId) {
            if (!confirm('绢収鍠栭悾鍓ф啺洅鈺呮⒔閵堝牏绠圭鈥虫处閺啰绮╅悩鍙夊亱?)) return;
            
            try {
                const url = currentCollectionId
                    ? `${API_BASE_URL}/collections/${currentCollectionId}/articles/${articleId}`
                    : `${API_BASE_URL}/collections/articles/${articleId}`;
                
                const response = await fetch(url, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${currentUser.token}`
                    }
                });
                
                if (response.ok) {
                    showToast('哄倸娲ㄩ悵宄啅碱儷鈺呮⒔?);
                    await loadCollections();
                    await loadArticles(currentCollectionId);
                } else {
                    showToast('佸顭▍㈠緞堫袝');
                }
            } catch (error) {
                console.error('Error removing article:', error);
                showToast('佸顭▍㈠緞堫袝');
            }
        }

        // 归潧缍婇崳铏圭矓犳碍鐝?
        async function deleteSelected() {
            if (selectedArticles.size === 0) return;
            if (!confirm(`绢収鍠栭悾鍓ф啺洅鈺呮⒔閵堝撴径庡幀?${selectedArticles.size} 佲虫处閺啰绮╅悩鍙夊亱挎稓鍓?) return;
            
            const articleIds = Array.from(selectedArticles);
            for (const articleId of articleIds) {
                await removeArticle(articleId);
            }
            clearSelection();
        }

        // 规悶遍崣鍧楀礄恒儲娈?
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN');
        }

        function adjustColor(color, amount) {
            const num = parseInt(color.replace('#', ''), 16);
            const r = Math.max(0, Math.min(255, (num >> 16) + amount));
            const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amount));
            const b = Math.max(0, Math.min(255, (num & 0x0000FF) + amount));
            return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
        }

        // 哄棙冲﹢曞礂閵娿儳婀伴柛鎴Г閺?
        window.selectCollection = selectCollection;
        window.openCreateModal = function() {
            editingCollectionId = null;
            document.getElementById('modalTitle').textContent = '哄倹樼紓鎾诲绩増顥戝?;
            document.getElementById('collectionForm').reset();
            document.querySelectorAll('#iconSelector .icon-option').forEach((o, i) => o.classList.toggle('selected', i === 0));
            document.querySelectorAll('#colorSelector .color-option').forEach((o, i) => o.classList.toggle('selected', i === 0));
            document.getElementById('collectionModal').classList.add('show');
        };
        window.closeModal = function() {
            document.getElementById('collectionModal').classList.remove('show');
        };
        window.editCollection = editCollection;
        window.editCurrentCollection = editCurrentCollection;
        window.deleteCollection = deleteCollection;
        window.deleteCurrentCollection = deleteCurrentCollection;
        window.toggleArticle = toggleArticle;
        window.clearSelection = clearSelection;
        window.moveSelected = moveSelected;
        window.moveArticle = moveArticle;
        window.removeArticle = removeArticle;
        window.deleteSelected = deleteSelected;
        window.openMoveModal = openMoveModal;
        window.closeMoveModal = function() {
            document.getElementById('moveModal').classList.remove('show');
        };
        window.confirmMove = confirmMove;

        // Toast
        window.showToast = function(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        // 告凹鍨版慨?
        init();
    </script>
</body>
</html>
