<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>иҜқйўҳеңҲеӯҗ - Hakimiзҡ„зҢ«зҲ¬жһ¶</title>
    <link rel="stylesheet" href="css/chinese-style.css">
    <style>
        .groups-page { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .groups-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            color: white;
            text-align: center;
        }
        .groups-header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .groups-filters {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
        }
        .group-filter-btn {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .group-filter-btn:hover, .group-filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        .groups-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .group-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            transition: transform 0.3s;
        }
        .group-card:hover { transform: translateY(-3px); }
        .group-avatar {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: white;
            flex-shrink: 0;
        }
        .group-avatar img { width: 100%; height: 100%; border-radius: 12px; object-fit: cover; }
        .group-info { flex: 1; min-width: 0; }
        .group-name { margin-bottom: 5px; }
        .group-name a { color: #333; text-decoration: none; font-size: 1.1em; font-weight: 600; }
        .group-name a:hover { color: #667eea; }
        .group-desc { color: #666; font-size: 0.9em; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .group-meta { display: flex; gap: 15px; font-size: 0.85em; color: #888; }
        .join-btn, .joined-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            border: none;
        }
        .join-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .joined-badge { background: #e8f5e9; color: #4caf50; }
        .groups-empty { text-align: center; padding: 60px; background: white; border-radius: 16px; grid-column: 1 / -1; }
        .empty-icon { font-size: 4em; margin-bottom: 20px; }
        .btn-create { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 12px 24px; border: none; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chinese-style-wrapper">
        <nav class="top-nav">
            <div class="nav-links">
                <a href="index.html" class="nav-link">йҰ–йЎө</a>
                <a href="qna.html" class="nav-link">й—®зӯ”</a>
                <a href="groups.html" class="nav-link active">еңҲеӯҗ</a>
            </div>
        </nav>

        <div class="groups-page">
            <div class="groups-header">
                <h1>рҹҸҳпё?иҜқйўҳеңҲеӯҗ</h1>
                <p>жүҫеҲ°еҝ—еҗҢйҒ“еҗҲзҡ„жңӢеҸӢпјҢдёҖиө·дәӨжөҒеҲҶдә?/p>
            </div>

            <div class="groups-filters">
                <div class="filter-group">
                    <span>еҲҶзұ»пј?/span>
                    <button class="group-filter-btn active" data-filter="category" data-value="all">е…ЁйғЁ</button>
                    <button class="group-filter-btn" data-filter="category" data-value="жҠҖжң?>рҹ’» жҠҖжң?/button>
                    <button class="group-filter-btn" data-filter="category" data-value="з”ҹжҙ»">рҹҢҹ з”ҹжҙ»</button>
                    <button class="group-filter-btn" data-filter="category" data-value="еЁұд№җ">рҹҺ® еЁұд№җ</button>
                    <button class="group-filter-btn" data-filter="category" data-value="еӯҰд№ ">рҹ“ҡ еӯҰд№ </button>
                </div>
                <button class="btn-create" id="createGroupBtn">+ еҲӣе»әеңҲеӯҗ</button>
            </div>

            <div class="groups-list" id="groupsList">
                <div class="groups-empty">
                    <div class="empty-icon">вҸ?/div>
                    <p>жӯЈеңЁеҠ иҪҪеңҲеӯҗ...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/groups-system.js"></script>
</body>
</html>
