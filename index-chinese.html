    <script>
        // 汉堡菜单切换
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const navLinks = document.getElementById('navLinks');
        if (hamburgerBtn && navLinks) {
            hamburgerBtn.addEventListener('click', function () {
                this.classList.toggle('active');
                navLinks.classList.toggle('mobile-open');
            });
            // 点击导航链接后自动关闭菜单
            navLinks.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', () => {
                    hamburgerBtn.classList.remove('active');
                    navLinks.classList.remove('mobile-open');
                });
            });
        }

        // 标签切换（只对未禁用的按钮生效）
        document.querySelectorAll('.tab-btn:not([disabled])').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 加载在线人数
        (async function loadOnlineCount() {
            try {
                const apiBase = window.API_BASE_URL || 'https://1321178544-65fvlfs2za.ap-beijing.tencentscf.com';
                const res = await fetch(apiBase + '/online/count');
                if (res.ok) {
                    const data = await res.json();
                    const el = document.getElementById('onlineCount');
                    const num = document.getElementById('onlineNum');
                    if (el && num) {
                        num.textContent = data.count;
                        el.style.display = '';
                    }
                }
            } catch (e) { /* ignore */ }
        })();
    </script>
