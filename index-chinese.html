                    <div class="tianjg-input-group">
                        <input type="text" class="tianjg-input" id="registerUsername" placeholder="用户名（至少3个字符）"

                    </div>

                    <div class="tianjg-input-group">
                        <input type="email" class="tianjg-input" id="registerEmail" placeholder="邮箱地址" required>
                    </div>

                    <div class="tianjg-input-group">
                        <input type="password" class="tianjg-input" id="registerPassword" placeholder="密码（至少6个字符）"
                            required>
                    </div>

                    <div class="tianjg-input-group">
                        <input type="password" class="tianjg-input" id="registerConfirmPassword" placeholder="确认密码"
                            required>
                    </div>

                    <button type="submit" class="tianjg-btn">➔ 立即注册</button>
                </form>

    <script>
        // Debugging script
        window.addEventListener('load', () => {
            console.log('Debug: Window loaded');

            console.log('Debug: AuthSystem status:', window.supabaseAuthSystem ? 'initialized' : 'not initialized');
        });
    </script>
    <script>
        // 标签切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 平滑滚动
        document.querySelectorAll('.resource-scroll').forEach(container => {
            let isDown = false;
            let startX;
            let scrollLeft;

            container.addEventListener('mousedown', (e) => {
                isDown = true;
                startX = e.pageX - container.offsetLeft;
                scrollLeft = container.scrollLeft;
            });

            container.addEventListener('mouseleave', () => {
                isDown = false;
            });

            container.addEventListener('mouseup', () => {
                isDown = false;
            });

            container.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - container.offsetLeft;
                const walk = (x - startX) * 2;
                container.scrollLeft = scrollLeft - walk;
            });
        });
    </script>
