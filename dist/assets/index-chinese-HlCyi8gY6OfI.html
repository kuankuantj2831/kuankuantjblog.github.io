        </h2>
        <button class="auth-modal-close" type="button" aria-label="关闭注册窗口">&times;</button>
      </div>
      <div class="auth-modal-body">
        <div class="auth-error" id="registerError" role="alert" aria-live="assertive"></div>
        <div class="auth-success" id="registerSuccess" role="status" aria-live="polite"></div>
        <form id="registerForm" novalidate>
          <div class="auth-form-group">
            <label class="auth-form-label" for="registerUsername">用户名</label>
            <input type="text" class="auth-form-input" id="registerUsername" placeholder="请输入用户名（至少3个字符）" required autocomplete="username" minlength="3" maxlength="20" aria-required="true">
          </div>
          <div class="auth-form-group">
            <label class="auth-form-label" for="registerEmail">邮箱</label>
            <input type="email" class="auth-form-input" id="registerEmail" placeholder="请输入邮箱地址" required autocomplete="email" maxlength="254" aria-required="true">
          </div>
          <div class="auth-form-group">
            <label class="auth-form-label" for="registerPassword">密码</label>
            <input type="password" class="auth-form-input" id="registerPassword" placeholder="请输入密码（至少6个字符）" required autocomplete="new-password" minlength="6" maxlength="128" aria-required="true">
          </div>
          <div class="auth-form-group">
            <label class="auth-form-label" for="registerConfirmPassword">确认密码</label>
            <input type="password" class="auth-form-input" id="registerConfirmPassword" placeholder="请再次输入密码" required autocomplete="new-password" maxlength="128" aria-required="true">
          </div>
          <button type="submit" class="auth-btn auth-btn-primary" id="registerSubmitBtn">注册</button>
        </form>
        <div class="auth-switch">
          已有账号？<a href="#" class="auth-switch-link" id="switchToLogin">立即登录</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts: async loading for non-critical -->
  <script src="/js/supabase.js" defer></script>
  <script type="module" src="/js/supabase-auth.js" defer></script>
  <script type="module" src="/js/load-articles.js" defer></script>
  <script src="/js/theme-enhancements.js" defer></script>

  <script>
    // Inline critical script: tab switching with keyboard support
    (function() {
      'use strict';
      var tabs = document.querySelectorAll('.tab-btn[role="tab"]');
      var tabList = document.querySelector('[role="tablist"]');

      tabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
          tabs.forEach(function(t) { t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); });
          this.classList.add('active');
          this.setAttribute('aria-selected', 'true');
        });
      });

      // Keyboard navigation for tabs
      if (tabList) {
        tabList.addEventListener('keydown', function(e) {
          var active = document.activeElement;
          if (!active.classList.contains('tab-btn')) return;
          var index = Array.prototype.indexOf.call(tabs, active);
          var nextIndex;
          if (e.key === 'ArrowRight') {
            e.preventDefault();
            nextIndex = (index + 1) % tabs.length;
            tabs[nextIndex].focus();
            tabs[nextIndex].click();
          } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            nextIndex = (index - 1 + tabs.length) % tabs.length;
            tabs[nextIndex].focus();
            tabs[nextIndex].click();
          } else if (e.key === 'Home') {
            e.preventDefault();
            tabs[0].focus();
            tabs[0].click();
          } else if (e.key === 'End') {
            e.preventDefault();
            tabs[tabs.length - 1].focus();
            tabs[tabs.length - 1].click();
          }
        });
      }

      // Horizontal drag scroll for resource containers
      document.querySelectorAll('.resource-scroll').forEach(function(container) {
        var isDown = false, startX, scrollLeft;
        container.addEventListener('mousedown', function(e) {
          if(e.button!==0)return;
          isDown = true;
          startX = e.pageX - container.offsetLeft;
          scrollLeft = container.scrollLeft;
          container.style.cursor = 'grabbing';
          container.style.userSelect = 'none';
        });
        container.addEventListener('mouseleave', function() {
          isDown = false;
          container.style.cursor = '';
          container.style.userSelect = '';
        });
        container.addEventListener('mouseup', function() {
          isDown = false;
          container.style.cursor = '';
          container.style.userSelect = '';
        });
        container.addEventListener('mousemove', function(e) {
          if (!isDown) return;
          e.preventDefault();
          var x = e.pageX - container.offsetLeft;
          var walk = (x - startX) * 2;
          container.scrollLeft = scrollLeft - walk;
        });
        // Touch support
        var touchStartX, touchScrollLeft;
        container.addEventListener('touchstart', function(e) {
          touchStartX = e.touches[0].pageX - container.offsetLeft;
          touchScrollLeft = container.scrollLeft;
        }, { passive: true });
        container.addEventListener('touchmove', function(e) {
          var x = e.touches[0].pageX - container.offsetLeft;
          var walk = (x - touchStartX) * 2;
          container.scrollLeft = touchScrollLeft - walk;
        }, { passive: true });
      });

      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(function(reg) {
            console.log('SW registered:', reg.scope);
          }).catch(function(err) {
            // Silently ignore SW registration errors
          });
        });
      }
    })();
  </script>

  <style>
    .skip-link{position:absolute;top:-40px;left:0;background:var(--accent);color:#fff;padding:8px 16px;z-index:10000;text-decoration:none;border-radius:0 0 4px 0;font-size:14px;transition:top .2s}
    .skip-link:focus{top:0;outline:3px solid #fff;outline-offset:-2px}
    .visually-hidden{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    .auth-modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .3s ease,visibility .3s ease}
    .auth-modal-overlay.active{opacity:1;visibility:visible}
    .auth-modal{background:#fff;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.1);width:90%;max-width:400px;padding:0;position:relative;overflow:hidden;transform:scale(.95);transition:transform .3s cubic-bezier(.4,0,.2,1)}
    .auth-modal-overlay.active .auth-modal{transform:scale(1)}
    .auth-modal-close{position:absolute;top:15px;right:15px;background:transparent;border:none;font-size:24px;color:#ccc;cursor:pointer;z-index:10;transition:color .3s;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
    .auth-modal-close:hover,.auth-modal-close:focus-visible{color:#333;background:rgba(0,0,0,.05);outline:none}
    .auth-modal-header{padding:20px 24px 0}
    .auth-modal-title{font-size:1.25em;font-weight:600;color:#333;margin:0}
    .auth-modal-body{padding:20px 24px 24px}
    .auth-error,.auth-success{padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:.9em;display:none}
    .auth-error.show{display:block;background:#fff2f0;color:#ff4d4f;border:1px solid #ffccc7}
    .auth-success.show{display:block;background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
    .auth-form-group{margin-bottom:16px}
    .auth-form-label{display:block;margin-bottom:6px;font-size:.85em;color:#666;font-weight:500}
    .auth-form-input{width:100%;padding:10px 14px;border:1px solid #e8e8e8;border-radius:8px;font-size:1em;color:#333;background:#fff;transition:border-color .2s,box-shadow .2s;outline:none}
    .auth-form-input:focus{border-color:#00bfa5;box-shadow:0 0 0 3px rgba(0,191,165,.15)}
    .auth-remember{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:.9em;color:#666}
    .auth-remember input{width:16px;height:16px;accent-color:#00bfa5;cursor:pointer}
    .auth-btn{width:100%;padding:12px;border:none;border-radius:25px;background:linear-gradient(90deg,#4facfe 0%,#00f2fe 100%);color:#fff;font-size:1em;font-weight:600;cursor:pointer;transition:transform .2s,box-shadow .2s;outline:none}
    .auth-btn:hover,.auth-btn:focus-visible{transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,172,254,.4)}
    .auth-btn:focus-visible{outline:2px solid #4facfe;outline-offset:2px}
    .auth-btn:active{transform:translateY(0)}
    .auth-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
    .auth-switch{text-align:center;margin-top:16px;font-size:.9em;color:#666}
    .auth-switch-link{color:#4facfe;text-decoration:none;font-weight:500;transition:color .2s}
    .auth-switch-link:hover,.auth-switch-link:focus-visible{text-decoration:underline;outline:none}
    .auth-switch-link:focus-visible{outline:2px solid #4facfe;outline-offset:2px;border-radius:2px}
    [data-theme="dark"] .auth-modal{background:#1e2a45;color:var(--text-primary)}
    [data-theme="dark"] .auth-modal-title{color:var(--text-primary)}
    [data-theme="dark"] .auth-form-input{background:#16213e;color:var(--text-primary);border-color:#2a3a5c}
    [data-theme="dark"] .auth-form-input:focus{border-color:#69b4ff;box-shadow:0 0 0 3px rgba(105,180,255,.15)}
    [data-theme="dark"] .auth-form-label{color:var(--text-secondary)}
    [data-theme="dark"] .auth-remember{color:var(--text-secondary)}
    [data-theme="dark"] .auth-switch{color:var(--text-secondary)}
    [data-theme="dark"] .auth-modal-close{color:var(--text-muted)}
    [data-theme="dark"] .auth-modal-close:hover{color:var(--text-primary)}
    [data-theme="dark"] .auth-error.show{background:#2e1a1a;border-color:#5c2a2a}
    [data-theme="dark"] .auth-success.show{background:#1a2e1a;border-color:#2a5c2a}
    @media (max-width:480px){.auth-modal{width:95%;max-width:none;margin:16px}.auth-modal-body{padding:16px 20px 20px}.auth-modal-header{padding:16px 20px 0}}
  </style>
</body>
