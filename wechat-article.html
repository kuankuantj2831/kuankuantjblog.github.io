<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>加载中...</title>
    
    <!-- 动态元数据 -->
    <meta name="description" content="">
    <meta property="og:title" content="">
    <meta property="og:description" content="">
    <meta property="og:image" content="">
    <meta property="og:url" content="">
    
    <link rel="stylesheet" href="css/wechat-article.css">
    <link rel="stylesheet" href="css/tianjg-theme.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="wechat-header">
        <div class="header-left">
            <button class="back-btn">‹</button>
        </div>
        <div class="header-center">
            <span class="account-name">文章阅读</span>
        </div>
        <div class="header-right">
            <button class="more-btn">···</button>
        </div>
    </header>

    <!-- 加载中 -->
    <div id="loading-state" class="loading-state">
        <div class="loading-spinner"></div>
        <p>正在加载文章...</p>
    </div>

    <!-- 文章主容器 -->
    <main class="article-container" id="article-content" style="display:none;">
        <!-- 文章标题 -->
        <h1 class="article-title" id="article-title"></h1>

        <!-- 文章元信息 -->
        <div class="article-meta" id="article-meta">
            <span class="author" id="article-author"></span>
            <span class="publish-time" id="article-date"></span>
            <span class="read-count" id="article-views"></span>
        </div>

        <!-- 文章封面图 -->
        <div class="article-cover" id="article-cover" style="display:none;">
            <img id="article-cover-img" alt="文章封面">
        </div>

        <!-- 文章正文 -->
        <article class="article-content" id="article-body">
        </article>

        <!-- 文章标签 -->
        <div class="article-tags" id="article-tags" style="display:none;">
        </div>

        <!-- 文章底部操作栏 -->
        <div class="article-footer">
            <div class="footer-left">
                <div class="vote-buttons">
                    <button class="vote-btn like" data-action="like">
                        <span class="vote-icon">👍</span>
                        <span class="vote-count" id="like-count">0</span>
                    </button>
                    <button class="vote-btn dislike" data-action="dislike">
                        <span class="vote-icon">👎</span>
                        <span class="vote-count" id="dislike-count">0</span>
                    </button>
                </div>
            </div>
            <div class="footer-right">
                <button class="share-btn">分享</button>
                <button class="more-footer-btn">···</button>
            </div>
        </div>

        <!-- 相关推荐 -->
        <div class="related-articles" id="related-articles" style="display:none;">
            <h3 class="related-title">相关推荐</h3>
            <div class="related-list" id="related-list">
            </div>
        </div>
    </main>

    <!-- 错误提示 -->
    <div id="error-state" class="error-state" style="display:none;">
        <div class="error-icon">⚠️</div>
        <h3>加载失败</h3>
        <p id="error-message">文章不存在或已被删除</p>
        <button class="retry-btn" onclick="location.reload()">重试</button>
    </div>

    <!-- 底部导航栏 -->
    <nav class="wechat-footer-nav">
        <div class="nav-left">
            <button class="nav-icon-btn" data-action="comment">
                <span class="nav-icon">💬</span>
                <span class="nav-text">留言</span>
            </button>
            <button class="nav-icon-btn" data-action="like">
                <span class="nav-icon">👍</span>
                <span class="nav-text">点赞</span>
            </button>
        </div>
        <div class="nav-right">
            <button class="nav-action-btn">写留言</button>
        </div>
    </nav>

    <!-- 阅读设置弹窗 -->
    <div class="reading-settings modal hidden">
        <div class="modal-header">
            <h3>阅读设置</h3>
            <button class="close-btn">✕</button>
        </div>
        <div class="modal-body">
            <div class="setting-group">
                <label>字体大小</label>
                <div class="font-size-controls">
                    <button class="font-btn" data-size="small">小</button>
                    <button class="font-btn active" data-size="medium">中</button>
                    <button class="font-btn" data-size="large">大</button>
                </div>
            </div>
            <div class="setting-group">
                <label>夜间模式</label>
                <button class="toggle-btn" data-toggle="night-mode">
                    <span class="toggle-icon">🌙</span>
                    <span class="toggle-text">关闭</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 留言输入框 -->
    <div class="comment-input-box hidden">
        <textarea class="comment-textarea" placeholder="说点什么..."></textarea>
        <div class="comment-actions">
            <button class="cancel-comment">取消</button>
            <button class="submit-comment">发送</button>
        </div>
    </div>

    <script src="js/wechat-article.js"></script>
</body>
</html>
