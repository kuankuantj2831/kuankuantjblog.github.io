<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>稿﹥甯熼鎼佸籍哄搫顫犻柤?- 哄洦娼欓ˇ鍧楀礉旇鍘?/title>
    <link rel="stylesheet" href="css/chinese-style.css">
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
        }
        
        .countdown-container {
            max-width: 800px;
            margin: 50px auto;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .countdown-input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .countdown-input {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #e9ecef;
            border-radius: 5px;
            outline: none;
        }
        
        .countdown-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .countdown-duration-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .countdown-duration-btn {
            padding: 10px 20px;
            background-color: #e9ecef;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .countdown-duration-btn:hover {
            background-color: #dee2e6;
        }
        
        .countdown-duration-btn.active {
            background-color: #667eea;
            color: white;
        }
        
        .countdown-display {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }
        
        .countdown-timer {
            font-size: 72px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .countdown-status {
            font-size: 18px;
            color: #6c757d;
        }
        
        .countdown-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .countdown-control-btn {
            padding: 10px 20px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .countdown-control-btn:hover {
            background-color: #5a6fd6;
            transform: translateY(-2px);
        }
        
        .countdown-control-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .countdown-control-btn.secondary {
            background-color: #e9ecef;
            color: #333;
        }
        
        .countdown-control-btn.secondary:hover {
            background-color: #dee2e6;
        }
        
        .countdown-history {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }
        
        .countdown-history-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        
        .countdown-history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .countdown-history-item {
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 5px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .countdown-history-item:hover {
            background-color: #e9ecef;
        }
        
        .countdown-history-text {
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .countdown-history-time {
            font-size: 14px;
            color: #6c757d;
        }
        
        .back-btn {
            display: block;
            width: 200px;
            margin: 20px auto;
            padding: 10px;
            text-align: center;
            background-color: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background-color: #5a6fd6;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .countdown-timer {
                font-size: 48px;
            }
            
            .countdown-input-section {
                flex-direction: column;
            }
            
            .countdown-duration-section {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="countdown-container">
        <h1>冲瓨鍞?稿﹥甯熼鎼佸籍哄搫顫犻柤?/h1>
        
        <div class="countdown-input-section">
            <input type="text" id="countdownTitleInput" class="countdown-input" placeholder="閺夊牊崣鍡涘磹烘洦鍚哄栫埇鏋讹锛?..">
            <input type="datetime-local" id="countdownDateTimeInput" class="countdown-input">
        </div>
        
        <div class="countdown-duration-section">
            <button class="countdown-duration-btn" data-duration="300">5告帒妫濋幐?/button>
            <button class="countdown-duration-btn" data-duration="600">10告帒妫濋幐?/button>
            <button class="countdown-duration-btn" data-duration="900">15告帒妫濋幐?/button>
            <button class="countdown-duration-btn" data-duration="1800">30告帒妫濋幐?/button>
            <button class="countdown-duration-btn" data-duration="3600">1繐绻戝?/button>
        </div>
        
        <div class="countdown-display">
            <div id="countdownTimer" class="countdown-timer">00:00:00</div>
            <div id="countdownStatus" class="countdown-status">告垵妫ˇ▔?/div>
        </div>
        
        <div class="countdown-controls">
            <button id="countdownStartBtn" class="countdown-control-btn">殿喒┑?/button>
            <button id="countdownPauseBtn" class="countdown-control-btn secondary" disabled>哄棗告禒?/button>
            <button id="countdownResetBtn" class="countdown-control-btn secondary" disabled>闂佹彃绉堕悿?/button>
            <button id="countdownClearBtn" class="countdown-control-btn secondary">炴挸鎳樺▍?/button>
        </div>
        
        <div class="countdown-history">
            <div class="countdown-history-title">稿﹥甯熼鎼佸籍哄搫鍧婇柛?/div>
            <ul id="countdownHistoryList" class="countdown-history-list"></ul>
        </div>
    </div>
    
    <a href="features.html" class="back-btn">閺夆晜鏌ú鏍即閺夋埈柛鏃傚?/a>
    
    <script src="js/countdown.js"></script>
</body>
</html>
