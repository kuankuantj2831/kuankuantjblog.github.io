<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绘柨瀚导鍛掗崨濠傜 - Lights Out</title>
    <script src="../js/polyfill.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #0c0c1d 100%);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: #fff;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px 0;
        }

        /* 煎啿鏈▍娆及斿憡袝轰礁鐗婇悘?*/
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: var(--max-opacity); }
        }

        .game-container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 200, 50, 0.5);
            background: linear-gradient(to right, #ffd700, #ff8c00, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #8888aa;
            margin-bottom: 25px;
        }

        .info-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            color: #aab;
        }

        .info-item .icon {
            font-size: 1.3rem;
        }

        .info-item .value {
            font-weight: bold;
            color: #ffd700;
            font-size: 1.2rem;
            min-width: 30px;
        }

        .board {
            display: inline-grid;
            gap: 6px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
        }

        .cell {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .cell.on {
            background: radial-gradient(circle at 40% 35%, #ffe066, #ffb300 60%, #ff8f00);
            border-color: rgba(255, 200, 50, 0.6);
            box-shadow: 
                0 0 15px rgba(255, 180, 0, 0.5),
                0 0 40px rgba(255, 150, 0, 0.2),
                inset 0 -3px 6px rgba(0, 0, 0, 0.15);
        }

        .cell.on::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 25%;
            width: 30%;
            height: 20%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(3px);
        }

        .cell.off {
            background: linear-gradient(145deg, #2a2a4a, #1e1e38);
            border-color: rgba(255, 255, 255, 0.06);
            box-shadow: 
                inset 0 2px 4px rgba(0, 0, 0, 0.3),
                0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .cell:hover {
            transform: scale(1.05);
            filter: brightness(1.15);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.flash {
            animation: cellFlash 0.3s ease;
        }

        @keyframes cellFlash {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.8); }
            100% { filter: brightness(1); }
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(255, 180, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 180, 0, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            transform: translateY(-2px);
        }

        .btn-secondary.active {
            background: rgba(255, 200, 50, 0.2);
            color: #ffd700;
            border-color: rgba(255, 200, 50, 0.4);
        }

        .size-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .size-btn {
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #aab;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .size-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .size-btn.active {
            background: rgba(255, 200, 50, 0.2);
            color: #ffd700;
            border-color: rgba(255, 200, 50, 0.4);
        }

        /* 艰櫕绮岄崺鍕嚕︻厾宕?*/
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: linear-gradient(145deg, #1e1e3a, #2a2a50);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255, 200, 50, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90vw;
        }

        @keyframes modalPop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal .trophy {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .modal h2 {
            font-size: 1.8rem;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .modal p {
            color: #aab;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .modal .stats {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .modal .stat {
            text-align: center;
        }

        .modal .stat .num {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
        }

        .modal .stat .label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }

        .modal .btn {
            margin-top: 15px;
        }

        /* 稿繐垮畷閬嶆焻跺顏?*/
        .level-info {
            font-size: 0.85rem;
            color: #8888aa;
            margin-bottom: 5px;
        }

        /* 告繂绉寸花鎻掝嚕?*/
        @media (max-width: 500px) {
            h1 { font-size: 1.8rem; }
            .cell { width: 55px; height: 55px; }
            .board { gap: 4px; padding: 10px; }
            .info-bar { gap: 15px; }
            .modal { padding: 25px; }
        }

        @media (max-width: 380px) {
            .cell { width: 48px; height: 48px; }
        }
    </style>
</head>
<body>
    <!-- 哄鍠愬Σ锕傛嚄鐏炵偓鐝?-->
    <div class="stars" id="stars"></div>

    <div class="game-container">
        <h1>?绘柨瀚导鍛掗崨濠傜</h1>
        <p class="subtitle">绘劗鎳撻崵介悡ｆ憤告帒娲畷鑼偓板暙蜂即鎯勯幖浣镐桓哄秶鍘悺娆撴儍曨厼诡兛绶ょ堜焊ê顣查柡濐槺煎懘鎮顓濈磾告胯ぐ鍙夋交パ冨綘?/p>

        <div class="info-bar">
            <div class="info-item">
                <span class="icon">妫啫绠?/span>
                <span>稿繐垮畷?/span>
                <span class="value" id="levelDisplay">1</span>
            </div>
            <div class="info-item">
                <span class="icon">妫啯?/span>
                <span>縿查弳?/span>
                <span class="value" id="movesDisplay">0</span>
            </div>
            <div class="info-item">
                <span class="icon">冲瓨鍞?/span>
                <span>哄啫鐖煎Λ?/span>
                <span class="value" id="timeDisplay">0s</span>
            </div>
        </div>

        <div class="size-selector">
            <button class="size-btn active" data-size="3">3?</button>
            <button class="size-btn" data-size="4">4?</button>
            <button class="size-btn" data-size="5">5?</button>
            <button class="size-btn" data-size="6">6?</button>
            <button class="size-btn" data-size="7">7?</button>
        </div>

        <div class="board" id="board"></div>

        <div class="controls">
            <button class="btn btn-primary" onclick="newGame()">妫啯鏁?哄倻澧楃埇鏋跺爼骞?/button>
            <button class="btn btn-secondary" onclick="resetGame()">愁偀鏅?闂佹彃绉堕悿?/button>
            <button class="btn btn-secondary" id="hintBtn" onclick="showHint()">妫啯?圭粯鍔妵?/button>
        </div>

        <p class="level-info" id="levelInfo"></p>
    </div>

    <!-- 艰櫕绮岄崺鍕嚕︻厾宕?-->
    <div class="modal-overlay" id="winModal">
        <div class="modal">
            <div class="trophy">妫啫姹?/div>
            <h2>诡収鍘奸弸鈺傛交パ冨綘?/h2>
            <p id="winMessage">达絿跺礉斿搫鏁抽蹇幒骞埀嫉跺本鐣遍蹇灲?/p>
            <div class="stats">
                <div class="stat">
                    <div class="num" id="winMoves">0</div>
                    <div class="label">縿查弳?/div>
                </div>
                <div class="stat">
                    <div class="num" id="winTime">0s</div>
                    <div class="label">活潿鍔嶅?/div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="nextLevel()">虫槒顔愮?挸粩鎾礂?/button>
        </div>
    </div>

    <script>
        // ============ 游戏开发撴偐哥?============
        let boardSize = 3;
        let board = [];
        let initialBoard = [];
        let moves = 0;
        let level = 1;
        let timer = null;
        let seconds = 0;
        let gameWon = false;
        let solution = [];

        // ============ 告帗绻傞～鎰板礌?============
        function init() {
            createStars();
            setupSizeButtons();
            newGame();
        }

        // 告帗绋紓鎾诲及斿憡袝煎啿鏈▍?
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
                star.style.setProperty('--max-opacity', (0.3 + Math.random() * 0.7));
                star.style.animationDelay = Math.random() * 4 + 's';
                container.appendChild(star);
            }
        }

        // 犱礁澧介悿鍡欎焊嫷鍤熼绋款樀?
        function setupSizeButtons() {
            document.querySelectorAll('.size-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    boardSize = parseInt(btn.dataset.size);
                    level = 1;
                    newGame();
                });
            });
        }

        // ============ 游戏开发撴焻閺繒甯?============

        // 汇垻鍠愰跺栨粳鎺楁儍曨喚姣ュΛ?
        function generateSolvablePuzzle() {
            // 寸姴楠崣蹇涙倶姴诡兛鎴炴叏墎夐梻鍛箲濠р偓绘劗鎳撻崵鎳熼妷銉ュ彙哄秶鍘悺娆閵壯勬櫢瑰瓨鍔橀惃鑺ワ紣?
            // 閺夆晜悧杈ㄧ┍濠靛﹦妲堝鎾庤纰嶅﹢浣烘喆?
            board = Array.from({ length: boardSize }, () => Array(boardSize).fill(false));
            
            // 哄秷顫夊畵宕崘鎻掑耿告粌鏈ˉ鎰版儎濡亽浜ｉ悘蹇箰犲懐鈧ㄩ崑锝夊礄佹﹩柡?
            const minClicks = Math.min(level + 1, Math.floor(boardSize * boardSize * 0.6));
            const maxClicks = Math.min(level + 3, boardSize * boardSize);
            const numClicks = Math.min(minClicks + Math.floor(Math.random() * 3), maxClicks);
            
            // 犱焦樼紞宥喆閿棛銆婇柨樼墣箓鎮欓悷挎瘖汇瀚悧鍝モ偓欏姧?
            const clicked = Array.from({ length: boardSize }, () => Array(boardSize).fill(false));
            
            for (let i = 0; i < numClicks; i++) {
                let r, c;
                // 繑绻嗛惁顖炲箥欍儳顏卞海绘洖鈻介敍鍕化閺夆晛娲▓鎴冀海鎽?
                let attempts = 0;
                do {
                    r = Math.floor(Math.random() * boardSize);
                    c = Math.floor(Math.random() * boardSize);
                    attempts++;
                } while (clicked[r][c] && attempts < 50);
                
                if (!clicked[r][c]) {
                    clicked[r][c] = true;
                    toggleCell(r, c, true); // silent toggle
                }
            }
            
            // 绢収鍠曠换▔瀹ュ棙稿繈鍔庢导鍐偐哥?
            const hasOn = board.some(row => row.some(cell => cell));
            if (!hasOn) {
                // 濠碘冲归悘愬礂閵娧傜磾存粌妫寸嬫⒕韫梹绨氶鎰扳偓氼伇?
                const r = Math.floor(Math.random() * boardSize);
                const c = Math.floor(Math.random() * boardSize);
                clicked[r][c] = !clicked[r][c];
                toggleCell(r, c, true);
            }
            
            // 洦绻傞悺銊ф喆閿棛銆?
            solution = [];
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (clicked[r][c]) {
                        solution.push([r, c]);
                    }
                }
            }
            
            // 洦绻傞悺銊╁礆濠靛棭娼垮煐?
            initialBoard = board.map(row => [...row]);
        }

        // 告帒娲畷鏌ュ冀海鎽柨樼墕鎯勯幖浣镐桓哄秶鍘悺娆撴晬?
        function toggleCell(row, col, silent = false) {
            const directions = [[0, 0], [-1, 0], [1, 0], [0, -1], [0, 1]];
            directions.forEach(([dr, dc]) => {
                const nr = row + dr;
                const nc = col + dc;
                if (nr >= 0 && nr < boardSize && nc >= 0 && nc < boardSize) {
                    board[nr][nc] = !board[nr][nc];
                }
            });
        }

        // 绘劗鎳撻崵顔藉緞曨厽?
        function handleClick(row, col) {
            if (gameWon) return;
            
            // 殿喒┑顔碱儓撴悂?
            if (moves === 0 && !timer) {
                startTimer();
            }
            
            toggleCell(row, col);
            moves++;
            
            // 烇綀ф慨鐐哄礉閵娧勬毎
            const directions = [[0, 0], [-1, 0], [1, 0], [0, -1], [0, 1]];
            directions.forEach(([dr, dc]) => {
                const nr = row + dr;
                const nc = col + dc;
                if (nr >= 0 && nr < boardSize && nc >= 0 && nc < boardSize) {
                    const cell = document.querySelector(`[data-row="${nr}"][data-col="${nc}"]`);
                    if (cell) {
                        cell.classList.add('flash');
                        setTimeout(() => cell.classList.remove('flash'), 300);
                    }
                }
            });
            
            renderBoard();
            updateInfo();
            checkWin();
        }

        // ☆偀撻柡灞诲劜濡叉悂宕敃浣稿姀?
        function checkWin() {
            const allOff = board.every(row => row.every(cell => !cell));
            if (allOff) {
                gameWon = true;
                stopTimer();
                setTimeout(showWinModal, 500);
            }
        }

        // ============ 炴挸堕悡?============

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.style.gridTemplateColumns = `repeat(${boardSize}, 1fr)`;
            
            // 濠碘冲归悘愬冀海鎽柡浣嵆儤绋夊鍜佸殸挎稑鐭傞崳鎼佸棘閺夊灝鐏＄?
            if (boardEl.children.length !== boardSize * boardSize) {
                boardEl.innerHTML = '';
                for (let r = 0; r < boardSize; r++) {
                    for (let c = 0; c < boardSize; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        cell.addEventListener('click', () => handleClick(r, c));
                        boardEl.appendChild(cell);
                    }
                }
            }
            
            // 哄洤鐡ㄩ弻濠偐哥?
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    const cell = document.querySelector(`[data-row="${r}"][data-col="${c}"]`);
                    if (cell) {
                        cell.classList.toggle('on', board[r][c]);
                        cell.classList.toggle('off', !board[r][c]);
                    }
                }
            }
        }

        function updateInfo() {
            document.getElementById('movesDisplay').textContent = moves;
            document.getElementById('levelDisplay').textContent = level;
        }

        // ============ 犱讲鍓鍌炲闯?============

        function startTimer() {
            seconds = 0;
            timer = setInterval(() => {
                seconds++;
                document.getElementById('timeDisplay').textContent = formatTime(seconds);
            }, 1000);
        }

        function stopTimer() {
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
        }

        function formatTime(s) {
            if (s < 60) return s + 's';
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return m + 'm' + (sec > 0 ? sec + 's' : '');
        }

        // ============ 游戏开发箳瑜崺?============

        function newGame() {
            gameWon = false;
            moves = 0;
            stopTimer();
            seconds = 0;
            document.getElementById('timeDisplay').textContent = '0s';
            
            generateSolvablePuzzle();
            renderBoard();
            updateInfo();
            
            const onCount = board.flat().filter(c => c).length;
            document.getElementById('levelInfo').textContent = 
                `☆囧ú?${boardSize}?{boardSize} | 存粠鍠氭导鍛村极?${onCount} | 哄牃撻悘?${solution.length} 縿辫ぐ鑼喆?
        }

        function resetGame() {
            if (gameWon) return;
            board = initialBoard.map(row => [...row]);
            moves = 0;
            stopTimer();
            seconds = 0;
            document.getElementById('timeDisplay').textContent = '0s';
            renderBoard();
            updateInfo();
        }

        function nextLevel() {
            hideWinModal();
            level++;
            newGame();
        }

        // ============ 圭粯鍔妵卞寲姐倗?============

        function showHint() {
            if (gameWon || solution.length === 0) return;
            
            // 达綀娉曢弫嗩殗濡粯鐒挎繛鎴濈墕樻挸鈻旈弴鐔烘勾熸瑱绲界紞瀣礈瀹ュ棭妫鈺傤焽悂骞?
            const currentSolution = solveBoard();
            
            if (currentSolution.length === 0) {
                document.getElementById('levelInfo').textContent = '滅増告晶鐘绘偐哥撴担勶骏熸瑱缍堟嫚戣棄娅紓鍐枟爬架曞箣?;
                return;
            }
            
            // 濡ゅ倹眉垫帞绮璺伇搩浜〒鍓佹啺搫柛鎴吹堟垿介悡ｆ憤
            const [r, c] = currentSolution[0];
            const cell = document.querySelector(`[data-row="${r}"][data-col="${c}"]`);
            if (cell) {
                cell.style.outline = '3px solid #00ff88';
                cell.style.outlineOffset = '-3px';
                setTimeout(() => {
                    cell.style.outline = '';
                    cell.style.outlineOffset = '';
                }, 1500);
            }
            
            document.getElementById('levelInfo').textContent = 
                `妫啯?圭粯鍔妵舵晬樺磭绠烽梻鍥?${currentSolution.length} 繍娅?
        }

        // 濡ゅ倹蓱閺屽鈽夐崼笚炲娲橀惇鎵喆閿繒凣F(2)挸顭?
        function solveBoard() {
            const n = boardSize;
            const total = n * n;
            
            // 哄瀚紓鎾存櫠愯尙鐣顓涙櫊濡偓
            // 絽绻堝椻偓ｈ櫣鈧數鎳花鍙夌▔剚绋夐鍛庢稒鍔х棘︻厸鏌ら悶栧妿閵艾袙韫囧酣鍤柡宥囧帶瑩埀傜磼垹诡兛妞掔拹?
            const matrix = [];
            
            for (let i = 0; i < total; i++) {
                const row = new Array(total + 1).fill(0);
                const r = Math.floor(i / n);
                const c = i % n;
                
                // 绘劗鎳撻崵宕鍐槀哄秶鍘悺娆愬橆顨涢柛嗙У楀摜鈧?r,c)
                const directions = [[0, 0], [-1, 0], [1, 0], [0, -1], [0, 1]];
                directions.forEach(([dr, dc]) => {
                    const nr = r + dr;
                    const nc = c + dc;
                    if (nr >= 0 && nr < n && nc >= 0 && nc < n) {
                        row[nr * n + nc] = 1;
                    }
                });
                
                // 告瑥鍘栭弲鑸电▔绉奸柛鎾悂骞娓氬﹦勯梻鍥熸洑鑳堕悙鏇熸姜掑倹鐣遍柨?
                row[total] = board[r][c] ? 1 : 0;
                matrix.push(row);
            }
            
            // 濡ゅ倹蓱閺屽鈽夐崼笚
            const pivotCol = new Array(total).fill(-1);
            let col = 0;
            for (let row = 0; row < total && col < total; col++) {
                // 归潧褰炵靛矂宕?
                let pivotRow = -1;
                for (let i = row; i < total; i++) {
                    if (matrix[i][col] === 1) {
                        pivotRow = i;
                        break;
                    }
                }
                if (pivotRow === -1) continue;
                
                // 存嚎栧畷鑼偘?
                [matrix[row], matrix[pivotRow]] = [matrix[pivotRow], matrix[row]];
                pivotCol[row] = col;
                
                // 炴垵鐗嗛崢?
                for (let i = 0; i < total; i++) {
                    if (i !== row && matrix[i][col] === 1) {
                        for (let j = col; j <= total; j++) {
                            matrix[i][j] ^= matrix[row][j];
                        }
                    }
                }
                row++;
            }
            
            // 搞儳橀崬效屾粳?
            const result = new Array(total).fill(0);
            for (let i = 0; i < total; i++) {
                if (pivotCol[i] !== -1) {
                    result[pivotCol[i]] = matrix[i][total];
                }
            }
            
            // 衡偓洘鑲犻梻鍥熸洑鑳堕崑锝夊礄姐倖鐣遍柡宥囧帶?
            const clicks = [];
            for (let i = 0; i < total; i++) {
                if (result[i] === 1) {
                    clicks.push([Math.floor(i / n), i % n]);
                }
            }
            
            return clicks;
        }

        // ============ 殿喖婀遍悰?============

        function showWinModal() {
            document.getElementById('winMoves').textContent = moves;
            document.getElementById('winTime').textContent = formatTime(seconds);
            
            let msg = '达絿跺礉斿搫鏁抽蹇幒骞埀嫉跺本鐣遍蹇灲?;
            if (moves <= solution.length) {
                msg = '妫啫鐨?鐬肩欢銊╂晬ｉ绋戦顫妺埀備焊寸儐鍔勯柡浣规緲ｎ剟骞鍓＜';
            } else if (moves <= solution.length * 1.5) {
                msg = '妫啯?闂傚牏涚埇鏋惰泛螞虹偟纾奸鎭掑劥诲酣埀佸濡晝鎺楁晬?;
            }
            document.getElementById('winMessage').textContent = msg;
            
            document.getElementById('winModal').classList.add('show');
        }

        function hideWinModal() {
            document.getElementById('winModal').classList.remove('show');
        }

        // 绘劗鎳撻崵顔碱嚕︻厾宕跺鑸电墵庢挳宕幎鑺ワ紨
        document.getElementById('winModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) hideWinModal();
        });

        // ============ 告凹鍨版慨?============
        init();
    </script>
