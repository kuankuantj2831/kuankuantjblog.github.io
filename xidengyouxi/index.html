<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>зҶ„зҒҜжёёжҲҸ - Lights Out</title>
    <script src="../js/polyfill.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #0c0c1d 100%);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: #fff;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px 0;
        }

        /* иғҢжҷҜжҳҹжҳҹж•Ҳжһң */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: var(--max-opacity); }
        }

        .game-container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 200, 50, 0.5);
            background: linear-gradient(to right, #ffd700, #ff8c00, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #8888aa;
            margin-bottom: 25px;
        }

        .info-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            color: #aab;
        }

        .info-item .icon {
            font-size: 1.3rem;
        }

        .info-item .value {
            font-weight: bold;
            color: #ffd700;
            font-size: 1.2rem;
            min-width: 30px;
        }

        .board {
            display: inline-grid;
            gap: 6px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
        }

        .cell {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .cell.on {
            background: radial-gradient(circle at 40% 35%, #ffe066, #ffb300 60%, #ff8f00);
            border-color: rgba(255, 200, 50, 0.6);
            box-shadow: 
                0 0 15px rgba(255, 180, 0, 0.5),
                0 0 40px rgba(255, 150, 0, 0.2),
                inset 0 -3px 6px rgba(0, 0, 0, 0.15);
        }

        .cell.on::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 25%;
            width: 30%;
            height: 20%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(3px);
        }

        .cell.off {
            background: linear-gradient(145deg, #2a2a4a, #1e1e38);
            border-color: rgba(255, 255, 255, 0.06);
            box-shadow: 
                inset 0 2px 4px rgba(0, 0, 0, 0.3),
                0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .cell:hover {
            transform: scale(1.05);
            filter: brightness(1.15);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.flash {
            animation: cellFlash 0.3s ease;
        }

        @keyframes cellFlash {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.8); }
            100% { filter: brightness(1); }
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(255, 180, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 180, 0, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            transform: translateY(-2px);
        }

        .btn-secondary.active {
            background: rgba(255, 200, 50, 0.2);
            color: #ffd700;
            border-color: rgba(255, 200, 50, 0.4);
        }

        .size-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .size-btn {
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #aab;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .size-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .size-btn.active {
            background: rgba(255, 200, 50, 0.2);
            color: #ffd700;
            border-color: rgba(255, 200, 50, 0.4);
        }

        /* иғңеҲ©еј№зӘ— */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: linear-gradient(145deg, #1e1e3a, #2a2a50);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255, 200, 50, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90vw;
        }

        @keyframes modalPop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal .trophy {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .modal h2 {
            font-size: 1.8rem;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .modal p {
            color: #aab;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .modal .stats {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .modal .stat {
            text-align: center;
        }

        .modal .stat .num {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
        }

        .modal .stat .label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }

        .modal .btn {
            margin-top: 15px;
        }

        /* е…іеҚЎйҖүжӢ© */
        .level-info {
            font-size: 0.85rem;
            color: #8888aa;
            margin-bottom: 5px;
        }

        /* е“Қеә”еј?*/
        @media (max-width: 500px) {
            h1 { font-size: 1.8rem; }
            .cell { width: 55px; height: 55px; }
            .board { gap: 4px; padding: 10px; }
            .info-bar { gap: 15px; }
            .modal { padding: 25px; }
        }

        @media (max-width: 380px) {
            .cell { width: 48px; height: 48px; }
        }
    </style>
</head>
<body>
    <!-- жҳҹжҳҹиғҢжҷҜ -->
    <div class="stars" id="stars"></div>

    <div class="game-container">
        <h1>вң?зҶ„зҒҜжёёжҲҸ</h1>
        <p class="subtitle">зӮ№еҮ»ж јеӯҗеҲҮжҚўе®ғе’ҢзӣёйӮ»ж јеӯҗзҡ„зҠ¶жҖҒпјҢе°ҶжүҖжңүзҒҜзҶ„зҒӯеҚіеҸҜиҝҮе…іпј?/p>

        <div class="info-bar">
            <div class="info-item">
                <span class="icon">рҹҺҜ</span>
                <span>е…іеҚЎ</span>
                <span class="value" id="levelDisplay">1</span>
            </div>
            <div class="info-item">
                <span class="icon">рҹ‘Ҷ</span>
                <span>жӯҘж•°</span>
                <span class="value" id="movesDisplay">0</span>
            </div>
            <div class="info-item">
                <span class="icon">вҸұпёҸ</span>
                <span>ж—¶й—ҙ</span>
                <span class="value" id="timeDisplay">0s</span>
            </div>
        </div>

        <div class="size-selector">
            <button class="size-btn active" data-size="3">3Г—3</button>
            <button class="size-btn" data-size="4">4Г—4</button>
            <button class="size-btn" data-size="5">5Г—5</button>
            <button class="size-btn" data-size="6">6Г—6</button>
            <button class="size-btn" data-size="7">7Г—7</button>
        </div>

        <div class="board" id="board"></div>

        <div class="controls">
            <button class="btn btn-primary" onclick="newGame()">рҹ”„ ж–°жёёжҲ?/button>
            <button class="btn btn-secondary" onclick="resetGame()">вҶ©пёҸ йҮҚзҪ®</button>
            <button class="btn btn-secondary" id="hintBtn" onclick="showHint()">рҹ’Ў жҸҗзӨә</button>
        </div>

        <p class="level-info" id="levelInfo"></p>
    </div>

    <!-- иғңеҲ©еј№зӘ— -->
    <div class="modal-overlay" id="winModal">
        <div class="modal">
            <div class="trophy">рҹҸҶ</div>
            <h2>жҒӯе–ңиҝҮе…іпј?/h2>
            <p id="winMessage">дҪ жҲҗеҠҹзҶ„зҒӯдәҶжүҖжңүзҡ„зҒҜпјҒ</p>
            <div class="stats">
                <div class="stat">
                    <div class="num" id="winMoves">0</div>
                    <div class="label">жӯҘж•°</div>
                </div>
                <div class="stat">
                    <div class="num" id="winTime">0s</div>
                    <div class="label">з”Ёж—¶</div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="nextLevel()">в–¶пёҸ дёӢдёҖе…?/button>
        </div>
    </div>

    <script>
        // ============ жёёжҲҸзҠ¶жҖ?============
        let boardSize = 3;
        let board = [];
        let initialBoard = [];
        let moves = 0;
        let level = 1;
        let timer = null;
        let seconds = 0;
        let gameWon = false;
        let solution = [];

        // ============ еҲқе§ӢеҢ?============
        function init() {
            createStars();
            setupSizeButtons();
            newGame();
        }

        // еҲӣе»әжҳҹжҳҹиғҢжҷҜ
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
                star.style.setProperty('--max-opacity', (0.3 + Math.random() * 0.7));
                star.style.animationDelay = Math.random() * 4 + 's';
                container.appendChild(star);
            }
        }

        // и®ҫзҪ®е°әеҜёжҢүй’®
        function setupSizeButtons() {
            document.querySelectorAll('.size-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    boardSize = parseInt(btn.dataset.size);
                    level = 1;
                    newGame();
                });
            });
        }

        // ============ жёёжҲҸйҖ»иҫ‘ ============

        // з”ҹжҲҗеҸҜи§Јзҡ„и°ңйў?
        function generateSolvablePuzzle() {
            // д»Һе…ЁзҒӯзҠ¶жҖҒејҖе§ӢпјҢйҡҸжңәзӮ№еҮ»иӢҘе№Іж јеӯҗжқҘз”ҹжҲҗи°ңйў?
            // иҝҷж ·дҝқиҜҒдёҖе®ҡжңүи§?
            board = Array.from({ length: boardSize }, () => Array(boardSize).fill(false));
            
            // ж №жҚ®е…іеҚЎе’ҢжЈӢзӣҳеӨ§е°ҸеҶіе®ҡзӮ№еҮ»ж¬Ўж•?
            const minClicks = Math.min(level + 1, Math.floor(boardSize * boardSize * 0.6));
            const maxClicks = Math.min(level + 3, boardSize * boardSize);
            const numClicks = Math.min(minClicks + Math.floor(Math.random() * 3), maxClicks);
            
            // и®°еҪ•и§Јжі•пјҲиў«зӮ№еҮ»зҡ„ж јеӯҗпјү
            const clicked = Array.from({ length: boardSize }, () => Array(boardSize).fill(false));
            
            for (let i = 0; i < numClicks; i++) {
                let r, c;
                // е°қиҜ•жүҫдёҖдёӘиҝҳжІЎзӮ№иҝҮзҡ„ж јеӯҗ
                let attempts = 0;
                do {
                    r = Math.floor(Math.random() * boardSize);
                    c = Math.floor(Math.random() * boardSize);
                    attempts++;
                } while (clicked[r][c] && attempts < 50);
                
                if (!clicked[r][c]) {
                    clicked[r][c] = true;
                    toggleCell(r, c, true); // silent toggle
                }
            }
            
            // зЎ®дҝқдёҚжҳҜе…ЁзҒӯзҠ¶жҖ?
            const hasOn = board.some(row => row.some(cell => cell));
            if (!hasOn) {
                // еҰӮжһңе…ЁзҒӯдәҶпјҢйҡҸжңәзӮ№дёҖдё?
                const r = Math.floor(Math.random() * boardSize);
                const c = Math.floor(Math.random() * boardSize);
                clicked[r][c] = !clicked[r][c];
                toggleCell(r, c, true);
            }
            
            // дҝқеӯҳи§Јжі•
            solution = [];
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (clicked[r][c]) {
                        solution.push([r, c]);
                    }
                }
            }
            
            // дҝқеӯҳеҲқе§ӢзҠ¶жҖ?
            initialBoard = board.map(row => [...row]);
        }

        // еҲҮжҚўж јеӯҗпјҲеҸҠзӣёйӮ»ж јеӯҗпј?
        function toggleCell(row, col, silent = false) {
            const directions = [[0, 0], [-1, 0], [1, 0], [0, -1], [0, 1]];
            directions.forEach(([dr, dc]) => {
                const nr = row + dr;
                const nc = col + dc;
                if (nr >= 0 && nr < boardSize && nc >= 0 && nc < boardSize) {
                    board[nr][nc] = !board[nr][nc];
                }
            });
        }

        // зӮ№еҮ»еӨ„зҗҶ
        function handleClick(row, col) {
            if (gameWon) return;
            
            // ејҖе§Ӣи®Ўж—?
            if (moves === 0 && !timer) {
                startTimer();
            }
            
            toggleCell(row, col);
            moves++;
            
            // ж·»еҠ еҠЁз”»
            const directions = [[0, 0], [-1, 0], [1, 0], [0, -1], [0, 1]];
            directions.forEach(([dr, dc]) => {
                const nr = row + dr;
                const nc = col + dc;
                if (nr >= 0 && nr < boardSize && nc >= 0 && nc < boardSize) {
                    const cell = document.querySelector(`[data-row="${nr}"][data-col="${nc}"]`);
                    if (cell) {
                        cell.classList.add('flash');
                        setTimeout(() => cell.classList.remove('flash'), 300);
                    }
                }
            });
            
            renderBoard();
            updateInfo();
            checkWin();
        }

        // жЈҖжҹҘжҳҜеҗҰиғңеҲ?
        function checkWin() {
            const allOff = board.every(row => row.every(cell => !cell));
            if (allOff) {
                gameWon = true;
                stopTimer();
                setTimeout(showWinModal, 500);
            }
        }

        // ============ жёІжҹ“ ============

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.style.gridTemplateColumns = `repeat(${boardSize}, 1fr)`;
            
            // еҰӮжһңж јеӯҗж•°йҮҸдёҚеҜ№пјҢйҮҚж–°еҲӣе»?
            if (boardEl.children.length !== boardSize * boardSize) {
                boardEl.innerHTML = '';
                for (let r = 0; r < boardSize; r++) {
                    for (let c = 0; c < boardSize; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        cell.addEventListener('click', () => handleClick(r, c));
                        boardEl.appendChild(cell);
                    }
                }
            }
            
            // жӣҙж–°зҠ¶жҖ?
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    const cell = document.querySelector(`[data-row="${r}"][data-col="${c}"]`);
                    if (cell) {
                        cell.classList.toggle('on', board[r][c]);
                        cell.classList.toggle('off', !board[r][c]);
                    }
                }
            }
        }

        function updateInfo() {
            document.getElementById('movesDisplay').textContent = moves;
            document.getElementById('levelDisplay').textContent = level;
        }

        // ============ и®Ўж—¶еҷ?============

        function startTimer() {
            seconds = 0;
            timer = setInterval(() => {
                seconds++;
                document.getElementById('timeDisplay').textContent = formatTime(seconds);
            }, 1000);
        }

        function stopTimer() {
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
        }

        function formatTime(s) {
            if (s < 60) return s + 's';
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return m + 'm' + (sec > 0 ? sec + 's' : '');
        }

        // ============ жёёжҲҸжҺ§еҲ¶ ============

        function newGame() {
            gameWon = false;
            moves = 0;
            stopTimer();
            seconds = 0;
            document.getElementById('timeDisplay').textContent = '0s';
            
            generateSolvablePuzzle();
            renderBoard();
            updateInfo();
            
            const onCount = board.flat().filter(c => c).length;
            document.getElementById('levelInfo').textContent = 
                `жЈӢзӣҳ ${boardSize}Г—${boardSize} | дә®зҒҜж•?${onCount} | жңҖе°?${solution.length} жӯҘеҸҜи§Ј`;
        }

        function resetGame() {
            if (gameWon) return;
            board = initialBoard.map(row => [...row]);
            moves = 0;
            stopTimer();
            seconds = 0;
            document.getElementById('timeDisplay').textContent = '0s';
            renderBoard();
            updateInfo();
        }

        function nextLevel() {
            hideWinModal();
            level++;
            newGame();
        }

        // ============ жҸҗзӨәзі»з»ҹ ============

        function showHint() {
            if (gameWon || solution.length === 0) return;
            
            // дҪҝз”Ёй«ҳж–Ҝж¶Ҳе…ғжі•жұӮи§ЈеҪ“еүҚжЈӢзӣҳзҠ¶жҖ?
            const currentSolution = solveBoard();
            
            if (currentSolution.length === 0) {
                document.getElementById('levelInfo').textContent = 'еҪ“еүҚзҠ¶жҖҒж— и§ЈпјҢиҜ·йҮҚзҪ®жёёжҲ?;
                return;
            }
            
            // й«ҳдә®з¬¬дёҖдёӘйңҖиҰҒзӮ№еҮ»зҡ„ж јеӯҗ
            const [r, c] = currentSolution[0];
            const cell = document.querySelector(`[data-row="${r}"][data-col="${c}"]`);
            if (cell) {
                cell.style.outline = '3px solid #00ff88';
                cell.style.outlineOffset = '-3px';
                setTimeout(() => {
                    cell.style.outline = '';
                    cell.style.outlineOffset = '';
                }, 1500);
            }
            
            document.getElementById('levelInfo').textContent = 
                `рҹ’Ў жҸҗзӨәпјҡиҝҳйңҖиҰ?${currentSolution.length} жӯҘ`;
        }

        // й«ҳж–Ҝж¶Ҳе…ғжі•жұӮи§ЈпјҲGF(2)дёҠпјү
        function solveBoard() {
            const n = boardSize;
            const total = n * n;
            
            // жһ„е»әеўһе№ҝзҹ©йҳө
            // жҜҸдёӘеҸҳйҮҸеҜ№еә”дёҖдёӘж јеӯҗпјҢж–№зЁӢиЎЁзӨәжҜҸдёӘж јеӯҗжңҖз»ҲзҠ¶жҖҒдёә0
            const matrix = [];
            
            for (let i = 0; i < total; i++) {
                const row = new Array(total + 1).fill(0);
                const r = Math.floor(i / n);
                const c = i % n;
                
                // зӮ№еҮ»е“Әдәӣж јеӯҗдјҡеҪұе“Қж јеӯ?r,c)
                const directions = [[0, 0], [-1, 0], [1, 0], [0, -1], [0, 1]];
                directions.forEach(([dr, dc]) => {
                    const nr = r + dr;
                    const nc = c + dc;
                    if (nr >= 0 && nr < n && nc >= 0 && nc < n) {
                        row[nr * n + nc] = 1;
                    }
                });
                
                // еҸідҫ§дёәеҪ“еүҚзҠ¶жҖҒпјҲйңҖиҰҒзҝ»иҪ¬зҡ„пј?
                row[total] = board[r][c] ? 1 : 0;
                matrix.push(row);
            }
            
            // й«ҳж–Ҝж¶Ҳе…ғ
            const pivotCol = new Array(total).fill(-1);
            let col = 0;
            for (let row = 0; row < total && col < total; col++) {
                // жүҫдё»е…?
                let pivotRow = -1;
                for (let i = row; i < total; i++) {
                    if (matrix[i][col] === 1) {
                        pivotRow = i;
                        break;
                    }
                }
                if (pivotRow === -1) continue;
                
                // дәӨжҚўиЎ?
                [matrix[row], matrix[pivotRow]] = [matrix[pivotRow], matrix[row]];
                pivotCol[row] = col;
                
                // ж¶Ҳе…ғ
                for (let i = 0; i < total; i++) {
                    if (i !== row && matrix[i][col] === 1) {
                        for (let j = col; j <= total; j++) {
                            matrix[i][j] ^= matrix[row][j];
                        }
                    }
                }
                row++;
            }
            
            // еӣһд»ЈжұӮи§Ј
            const result = new Array(total).fill(0);
            for (let i = 0; i < total; i++) {
                if (pivotCol[i] !== -1) {
                    result[pivotCol[i]] = matrix[i][total];
                }
            }
            
            // ж”¶йӣҶйңҖиҰҒзӮ№еҮ»зҡ„ж јеӯҗ
            const clicks = [];
            for (let i = 0; i < total; i++) {
                if (result[i] === 1) {
                    clicks.push([Math.floor(i / n), i % n]);
                }
            }
            
            return clicks;
        }

        // ============ еј№зӘ— ============

        function showWinModal() {
            document.getElementById('winMoves').textContent = moves;
            document.getElementById('winTime').textContent = formatTime(seconds);
            
            let msg = 'дҪ жҲҗеҠҹзҶ„зҒӯдәҶжүҖжңүзҡ„зҒҜпјҒ';
            if (moves <= solution.length) {
                msg = 'рҹҢҹ е®ҢзҫҺпјҒдҪ з”ЁдәҶжңҖе°‘жӯҘж•°е®ҢжҲҗпјҒ';
            } else if (moves <= solution.length * 1.5) {
                msg = 'рҹ‘Ҹ йқһеёёжЈ’пјҒжҺҘиҝ‘жңҖдјҳи§Јпј?;
            }
            document.getElementById('winMessage').textContent = msg;
            
            document.getElementById('winModal').classList.add('show');
        }

        function hideWinModal() {
            document.getElementById('winModal').classList.remove('show');
        }

        // зӮ№еҮ»еј№зӘ—еӨ–йғЁе…ій—ӯ
        document.getElementById('winModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) hideWinModal();
        });

        // ============ еҗҜеҠЁ ============
        init();
    </script>

    function replaceEmojis() {
        if (!isWindows7()) return;
        
        // жӣҝжҚўж–Үжң¬иҠӮзӮ№
        var walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );
        
        var node;
        while (node = walker.nextNode()) {
            var text = node.textContent;
            var hasEmoji = false;
            for (var emoji in emojiMap) {
                if (text.indexOf(emoji) !== -1) {
                    text = text.split(emoji).join(emojiMap[emoji]);
                    hasEmoji = true;
                }
            }
            if (hasEmoji) {
                node.textContent = text;
            }
        }
        
        // жӣҝжҚўеұһжҖ§дёӯзҡ?emojiпјҲеҰӮ title, alt зӯүпјү
        var elements = document.querySelectorAll('*');
        var attrs = ['title', 'alt', 'placeholder', 'value'];
        for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            for (var j = 0; j < attrs.length; j++) {
                var attr = attrs[j];
                if (el.hasAttribute(attr)) {
                    var val = el.getAttribute(attr);
                    var hasEmoji = false;
                    for (var emoji in emojiMap) {
                        if (val.indexOf(emoji) !== -1) {
                            val = val.split(emoji).join(emojiMap[emoji]);
                            hasEmoji = true;
                        }
                    }
                    if (hasEmoji) {
                        el.setAttribute(attr, val);
                    }
                }
            }
        }
    }
    
    // DOM еҠ иҪҪе®ҢжҲҗеҗҺжү§иЎҢжӣҝжҚ?
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', replaceEmojis);
    } else {
        replaceEmojis();
    }
