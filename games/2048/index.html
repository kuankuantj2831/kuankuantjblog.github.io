<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 返回按钮 -->
    <a href="/games.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> 返回游戏中心
    </a>
    <div class="container">
        <header>
            <h1><i class="fas fa-th-large"></i> 2048</h1>
            <div class="scores">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best">0</div>
                </div>
            </div>
        </header>

        <div class="game-info">
            <p>合并数字，拼出<strong>2048方块！</strong></p>
            <div class="controls">
                <button id="new-game">🔄 新游戏</button>
                <button id="undo">↩️ 撤销</button>
                <button id="how-to-play">❓ 游戏规则</button>
            </div>
        </div>

        <div class="grid-container">
            <div class="grid" id="grid">
                <!-- 4x4 grid cells -->
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            </div>
            <div class="game-over" id="game-over">
                <h2>游戏结束！</h2>
                <p>你的分数：<span id="final-score">0</span></p>
                <button id="try-again">再试一次</button>
            </div>
            <div class="win" id="win">
                <h2>你赢了！</h2>
                <p>你成功合出了2048！</p>
                <button id="continue">继续游戏</button>
            </div>
        </div>

        <footer>
            <p>用 <i class="fas fa-heart"></i> 制作的 2048 游戏 |
                <a href="https://github.com" target="_blank"><i class="fab fa-github"></i> GitHub</a> |
                <a href="https://en.wikipedia.org/wiki/2048_(video_game)" target="_blank"><i class="fas fa-external-link-alt"></i> 关于 2048</a>
            </p>
        </footer>
    </div>

    <!-- 游戏规则面板（放在 body 中，作为独立元素） -->
    <div class="instructions" id="instructions">
        <h3>📖 游戏规则</h3>
        <ul>
            <li>使用<strong>方向键</strong>或<strong>滑动</strong>移动方块。</li>
            <li>当两个相同数字的方块相触，它们会<strong>合并为一个</strong>，数字相加。</li>
            <li>每次移动后，一个随机空单元格中会出现新方块（2或4）。</li>
            <li>尝试合成<strong>2048</strong>方块来获胜！</li>
            <li>当无法继续移动时，游戏结束。</li>
        </ul>
        <button id="close-instructions">明白了！</button>
    </div>

    <script src="script.js"></script>

<!-- Win7 Emoji 兼容性处理 -->
<script>
(function() {
    // 检测是否为 Windows 7
    function isWindows7() {
        var ua = navigator.userAgent;
        return ua.indexOf('Windows NT 6.1') !== -1 || 
               ua.indexOf('Windows 7') !== -1;
    }
    
    // Emoji 替换映射表
    var emojiMap = {
        "🐱": "猫",
        "🏠": "首页",
        "🎮": "游戏",
        "☁️": "云",
        "☀️": "太阳",
        "❤️": "爱心",
        "🎯": "关于",
        "💬": "消息",
        "🔔": "通知",
        "👤": "用户",
        "📝": "编辑",
        "⬆️": "升级",
        "🖼️": "图片",
        "✍️": "写作",
        "⚙️": "设置",
        "🚪": "退出",
        "💡": "提示",
        "⚡": "经验",
        "🚀": "发布",
        "🎖️": "等级",
        "💪": "加油",
        "🔒": "锁定",
        "📜": "协议",
        "↑": "上",
        "↓": "下",
        "↩️": "撤销",
        "❓": "帮助",
        "🔄": "刷新",
        "▶️": "开始",
        "⏱️": "时间",
        "🎨": "创意",
        "💻": "电脑",
        "📚": "学习",
        "🛡️": "盾牌",
        "✈️": "飞机",
        "⭐": "星星",
        "🕹️": "手柄",
        "📧": "邮箱",
        "📱": "手机",
        "📑": "目录",
        "📦": "压缩",
        "📄": "文件",
        "📙": "PPT",
        "🔧": "工具",
        "🪙": "硬币",
        "💰": "金币",
        "✅": "完成",
        "🛠️": "工具",
        "💫": "星光",
        "🔍": "搜索",
        "📖": "书籍",
        "🏷️": "标签",
        "🗑️": "删除"
    };
    
    // 替换页面中的 emoji
    function replaceEmojis() {
        if (!isWindows7()) return;
        
        // 替换文本节点
        var walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );
        
        var node;
        while (node = walker.nextNode()) {
            var text = node.textContent;
            var hasEmoji = false;
            for (var emoji in emojiMap) {
                if (text.indexOf(emoji) !== -1) {
                    text = text.split(emoji).join(emojiMap[emoji]);
                    hasEmoji = true;
                }
            }
            if (hasEmoji) {
                node.textContent = text;
            }
        }
        
        // 替换属性中的 emoji（如 title, alt 等）
        var elements = document.querySelectorAll('*');
        var attrs = ['title', 'alt', 'placeholder', 'value'];
        for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            for (var j = 0; j < attrs.length; j++) {
                var attr = attrs[j];
                if (el.hasAttribute(attr)) {
                    var val = el.getAttribute(attr);
                    var hasEmoji = false;
                    for (var emoji in emojiMap) {
                        if (val.indexOf(emoji) !== -1) {
                            val = val.split(emoji).join(emojiMap[emoji]);
                            hasEmoji = true;
                        }
                    }
                    if (hasEmoji) {
                        el.setAttribute(attr, val);
                    }
                }
            }
        }
    }
    
    // DOM 加载完成后执行替换
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', replaceEmojis);
    } else {
        replaceEmojis();
    }
})();
</script>

</body>
</html>
