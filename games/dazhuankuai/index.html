<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鎵撶爾鍧楁父鎴?/title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <button onclick="window.location.href='../../games.html'" class="btn btn-small" style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px;">
                    <i class="fas fa-home"></i> 杩斿洖涓婚〉
                </button>
                <button onclick="window.location.href='../../games.html#leaderboard'" class="btn btn-small" style="background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px;">
                    <i class="fas fa-trophy"></i> 鎺掕姒?
                </button>
            </div>
            <h1><i class="fas fa-gamepad"></i> 鎵撶爾鍧?/h1>
            <p class="subtitle">浣跨敤 HTML5 Canvas 鍜?JavaScript 鏋勫缓鐨勭粡鍏歌鏈烘父鎴?/p>
        </header>

        <div class="game-area">
            <div class="stats-panel">
                <div class="stat">
                    <span class="stat-label"><i class="fas fa-heart"></i> 鐢熷懡:</span>
                    <span id="lives" class="stat-value">3</span>
                </div>
                <div class="stat">
                    <span class="stat-label"><i class="fas fa-star"></i> 鍒嗘暟:</span>
                    <span id="score" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label"><i class="fas fa-layer-group"></i> 鍏冲崱:</span>
                    <span id="level" class="stat-value">1</span>
                </div>
                <div class="stat">
                    <span class="stat-label"><i class="fas fa-tachometer-alt"></i> 閫熷害:</span>
                    <span id="speed" class="stat-value">鏅€?/span>
                </div>
            </div>

            <div class="canvas-container">
                <canvas id="gameCanvas" width="800" height="500"></canvas>
                <div id="gameOverlay" class="overlay">
                    <div class="overlay-content">
                        <h2 id="overlayTitle">鍑嗗濂戒簡鍚楋紵</h2>
                        <p id="overlayText">鐐瑰嚮寮€濮嬫父鎴忥紒</p>
                        <button id="startButton" class="btn btn-start"><i class="fas fa-play"></i> 寮€濮嬫父鎴?/button>
                        <button id="pauseButton" class="btn btn-pause hidden"><i class="fas fa-pause"></i> 鏆傚仠</button>
                        <button id="restartButton" class="btn btn-restart"><i class="fas fa-redo"></i> 閲嶆柊寮€濮?/button>
                    </div>
                </div>
            </div>

            <div class="controls">
                <div class="control-group">
                    <h3><i class="fas fa-keyboard"></i> 鎺у埗鏂瑰紡</h3>
                    <p><strong>榧犳爣绉诲姩</strong> 鈥?鎺у埗鎸℃澘宸﹀彸绉诲姩</p>
                    <p><strong>榧犳爣宸﹂敭</strong> 鈥?鍙戝皠灏忕悆</p>
                    <p><strong>Enter閿?/strong> 鈥?鏆傚仠 / 缁х画娓告垙</p>
                </div>
                <div class="control-group">
                    <h3><i class="fas fa-sliders-h"></i> 娓告垙璁剧疆</h3>
                    <div class="slider-container">
                        <label for="volumeSlider">闊抽噺 <i class="fas fa-volume-up"></i></label>
                        <input type="range" id="volumeSlider" min="0" max="100" value="80">
                    </div>
                    <div class="slider-container">
                        <label for="difficultySlider">闅惧害 <i class="fas fa-cogs"></i></label>
                        <input type="range" id="difficultySlider" min="1" max="5" value="3">
                    </div>
                    <button id="muteButton" class="btn btn-small"><i class="fas fa-volume-mute"></i> 闈欓煶</button>
                </div>
            </div>
        </div>

        <div class="instructions">
            <h3><i class="fas fa-info-circle"></i> 娓告垙璇存槑</h3>
            <ul>
                <li>浣跨敤鎸℃澘鍙嶅脊灏忕悆锛屽嚮纰庢墍鏈夌爾鍧椼€?/li>
                <li>姣忓嚮纰庝竴涓爾鍧楄幏寰楀垎鏁般€?/li>
                <li>涓嶈璁╁皬鐞冩帀钀藉埌鎸℃澘涓嬫柟锛屽惁鍒欎細鎹熷け涓€鏉＄敓鍛姐€?/li>
                <li>娓呴櫎鎵€鏈夌爾鍧楄繘鍏ヤ笅涓€鍏炽€?/li>
                <li>鐗规畩鐮栧潡鍏锋湁鐗规畩鏁堟灉锛堝姞閫熴€侀澶栫敓鍛界瓑锛夈€?/li>
            </ul>
        </div>

        <footer>
            <p>浣跨敤 <i class="fas fa-heart" style="color:#e74c3c;"></i> 鍒朵綔 | &copy; 2023 鎵撶爾鍧楁父鎴?/p>
        </footer>
    </div>

    <!-- 闊虫晥鍏冪礌 -->
    <audio id="bounceSound" src="assets/sounds/bounce.wav" preload="auto"></audio>
    <audio id="breakSound" src="assets/sounds/break.wav" preload="auto"></audio>
    <audio id="gameOverSound" src="assets/sounds/gameover.wav" preload="auto"></audio>
    <audio id="levelUpSound" src="assets/sounds/levelup.wav" preload="auto"></audio>

    <script src="game.js"></script>
</body>
</html>
