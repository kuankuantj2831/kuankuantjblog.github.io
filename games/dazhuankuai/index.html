</head>

    <div class="container">
        <header>

                </button>
                <button onclick="window.location.href='../../games.html#leaderboard'" class="btn btn-small" style="background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px;">

            </div>
            <h1><i class="fas fa-gamepad"></i> 瑰灚剧埇鏋堕箖宕?/h1>

        <div class="game-area">
            <div class="stats-panel">
                <div class="stat">
                    <span class="stat-label"><i class="fas fa-heart"></i> 汇垻鍠幊?</span>
                    <span id="lives" class="stat-value">3</span>
                </div>
                <div class="stat">
                    <span class="stat-label"><i class="fas fa-star"></i> 告帒妫欓弳?</span>
                    <span id="score" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label"><i class="fas fa-layer-group"></i> 稿繐垮畷?</span>
                    <span id="level" class="stat-value">1</span>
                </div>
                <div class="stat">
                    <span class="stat-label"><i class="fas fa-tachometer-alt"></i> 闂偆鍠?</span>
                    <span id="speed" class="stat-value">哄拋鍣ｉ埀?/span>
                </div>
            </div>

            <div class="canvas-container">
                <canvas id="gameCanvas" width="800" height="500"></canvas>
                <div id="gameOverlay" class="overlay">
                    <div class="overlay-content">
                        <h2 id="overlayTitle">告垵妫ˇ附存帞婇柛殣?/h2>

                        <button id="pauseButton" class="btn btn-pause hidden"><i class="fas fa-pause"></i> 哄棗告禒?/button>
                        <button id="restartButton" class="btn btn-restart"><i class="fas fa-redo"></i> 闂佹彃绉弻濠傤嚕剚鎱?/button>
                    </div>
                </div>
            </div>

            <div class="controls">
                <div class="control-group">
                    <h3><i class="fas fa-keyboard"></i> 矇鍐ㄧ厬哄倻鎳?/h3>
                    <p><strong>捬呭У爬架锝矓彃袟</strong> ?矇鍐ㄧ厬圭硶鍓侯啅閿曗偓瑜板摜绮旂拠鎻捫?/p>
                    <p><strong>捬呭У爬架锝咁啅閿曞倹鏆?/strong> ?告瑦鍨惃鐘典焊韫洘?/p>
                    <p><strong>Enter闂?/strong> ?哄棗告禒?/ 備綀鍛暰炴挸鎲￠?/p>
                </div>
                <div class="control-group">
                    <h3><i class="fas fa-sliders-h"></i> 游戏开发媼撗呮瀭</h3>
                    <div class="slider-container">
                        <label for="volumeSlider">闂傚﹥婇崳?<i class="fas fa-volume-up"></i></label>
                        <input type="range" id="volumeSlider" min="0" max="100" value="80">
                    </div>
                    <div class="slider-container">
                        <label for="difficultySlider">闂傚懏?<i class="fas fa-cogs"></i></label>
                        <input type="range" id="difficultySlider" min="1" max="5" value="3">
                    </div>
                    <button id="muteButton" class="btn btn-small"><i class="fas fa-volume-mute"></i> 闂傚牊╅悡?/button>
                </div>
            </div>
        </div>

        <div class="instructions">
            <h3><i class="fas fa-info-circle"></i> 游戏开发嫚涙ɑ顫?/h3>
            <ul>
                <li>达綀娉曢弫夊箰╁啯绶查柛娆忕Т村﹦浜歌箛鏇熷栭柨樿嫰ゎ喚鍠婃惔銏狀暡哄牆顦辩埇鏋堕箖宕稿灏栧?/li>
                <li>絽绻愰崵顔枈鎼存繄顏卞簽爬架楣冨锤濡ゅ绠电増顨呴极割?/li>
                <li>挸绉烽々锔炬媼轰姣堥鐐插暞鐢偓解偓閽樺鐓傞绯曞墲濠㈡ɑ绋夌ｎ偅鐓欓柨樿嫰線宕氬▎獥瑰鍠妵鎴炵▔剟堕敍鍕櫢告稑顫曢埀?/li>
                <li>炴挸鎳樺▍箥剟垫径柛褎顨夌换姗宕妷憮撻柛蹇曞仺?/li>
                <li>绘顫夐悾鈺呮儘閺嵮仴稿繘鏀卞﹢鎮х憴鍕殨轰礁鐗婇悘愭晬繂顫ｉ梺顐ゅ枂兛绶氶·鍌涘緞閺嶎偅鏅柛氭櫕垿鏁嶆径氬?/li>
            </ul>
        </div>

        <footer>
            <p>达綀娉曢弫?<i class="fas fa-heart" style="color:#e74c3c;"></i> 告帗婀圭紞?| &copy; 2023 瑰灚剧埇鏋堕箖宕稿Δ浣哄煑?/p>

</html>
