<!-- Win7 Emoji 鍏煎鎬у鐞?-->
<script>
(function() {
    // 妫€娴嬫槸鍚︿负 Windows 7
    function isWindows7() {
        var ua = navigator.userAgent;
        return ua.indexOf('Windows NT 6.1') !== -1 || 
               ua.indexOf('Windows 7') !== -1;
    }
    
    // Emoji 鏇挎崲鏄犲皠琛?
    var emojiMap = {
        "馃惐": "鐚?,
        "馃彔": "棣栭〉",
        "馃幃": "娓告垙",
        "鈽侊笍": "浜?,
        "鈽€锔?: "澶槼",
        "鉂わ笍": "鐖卞績",
        "馃幆": "鍏充簬",
        "馃挰": "娑堟伅",
        "馃敂": "閫氱煡",
        "馃懁": "鐢ㄦ埛",
        "馃摑": "缂栬緫",
        "猬嗭笍": "鍗囩骇",
        "馃柤锔?: "鍥剧墖",
        "鉁嶏笍": "鍐欎綔",
        "鈿欙笍": "璁剧疆",
        "馃毆": "閫€鍑?,
        "馃挕": "鎻愮ず",
        "鈿?: "缁忛獙",
        "馃殌": "鍙戝竷",
        "馃帠锔?: "绛夌骇",
        "馃挭": "鍔犳补",
        "馃敀": "閿佸畾",
        "馃摐": "鍗忚",
        "鈫?: "涓?,
        "鈫?: "涓?,
        "鈫╋笍": "鎾ら攢",
        "鉂?: "甯姪",
        "馃攧": "鍒锋柊",
        "鈻讹笍": "寮€濮?,
        "鈴憋笍": "鏃堕棿",
        "馃帹": "鍒涙剰",
        "馃捇": "鐢佃剳",
        "馃摎": "瀛︿範",
        "馃洝锔?: "鐩剧墝",
        "鉁堬笍": "椋炴満",
        "猸?: "鏄熸槦",
        "馃暪锔?: "鎵嬫焺",
        "馃摟": "閭",
        "馃摫": "鎵嬫満",
        "馃搼": "鐩綍",
        "馃摝": "鍘嬬缉",
        "馃搫": "鏂囦欢",
        "馃摍": "PPT",
        "馃敡": "宸ュ叿",
        "馃獧": "纭竵",
        "馃挵": "閲戝竵",
        "鉁?: "瀹屾垚",
        "馃洜锔?: "宸ュ叿",
        "馃挮": "鏄熷厜",
        "馃攳": "鎼滅储",
        "馃摉": "涔︾睄",
        "馃彿锔?: "鏍囩",
        "馃棏锔?: "鍒犻櫎"
    };
    
    // 鏇挎崲椤甸潰涓殑 emoji
    function replaceEmojis() {
        if (!isWindows7()) return;
        
        // 鏇挎崲鏂囨湰鑺傜偣
        var walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );
        
        var node;
        while (node = walker.nextNode()) {
            var text = node.textContent;
            var hasEmoji = false;
            for (var emoji in emojiMap) {
                if (text.indexOf(emoji) !== -1) {
                    text = text.split(emoji).join(emojiMap[emoji]);
                    hasEmoji = true;
                }
            }
            if (hasEmoji) {
                node.textContent = text;
            }
        }
        
        // 鏇挎崲灞炴€т腑鐨?emoji锛堝 title, alt 绛夛級
        var elements = document.querySelectorAll('*');
        var attrs = ['title', 'alt', 'placeholder', 'value'];
        for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            for (var j = 0; j < attrs.length; j++) {
                var attr = attrs[j];
                if (el.hasAttribute(attr)) {
                    var val = el.getAttribute(attr);
                    var hasEmoji = false;
                    for (var emoji in emojiMap) {
                        if (val.indexOf(emoji) !== -1) {
                            val = val.split(emoji).join(emojiMap[emoji]);
                            hasEmoji = true;
                        }
                    }
                    if (hasEmoji) {
                        el.setAttribute(attr, val);
                    }
                }
            }
        }
    }
    
    // DOM 鍔犺浇瀹屾垚鍚庢墽琛屾浛鎹?
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', replaceEmojis);
    } else {
        replaceEmojis();
    }
})();
</script>
