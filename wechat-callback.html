<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>偊鍠曟穱濠儌囪尙绉垮璺哄﹥绋?..</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .loading-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #07C160;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { margin: 0 0 10px; color: #333; font-size: 18px; }
        p { color: #999; margin: 0; font-size: 14px; }
        .error { color: #f56c6c; }
    </style>
</head>
<body>
    <div class="loading-card" id="loadingCard">
        <div class="spinner"></div>
        <h2>谎嗩嚙嶅秵勯顓熷炲?..</h2>
        <p>告块惃銏⑩偓版湰ㄦ艾箚谎嗩嚙?/p>
    </div>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const error = urlParams.get('error');
            const card = document.getElementById('loadingCard');

            // 濠碘冲归悘愬捶?iframe 搩鍙忕堢不剟宕犻弽褜妲遍鐐叉４变即宕ｉ鍛枖佲偓ê绲圭鈧悮哥汇垼浜崺併亜㈠憡妗ㄦ顐熷?URL 犵偠娉涢ˇ鈺呮偠?
            if (window.top !== window.self) {
                if (error) {
                    card.innerHTML = `
                        <div style="font-size: 48px; margin-bottom: 16px;">?/div>
                        <h2 class="error">谎嗩嚙嶅秵勬潏顐バ?/h2>
                        <p>${decodeURIComponent(error)}</p>
                    `;
                } else if (token) {
                    card.innerHTML = `
                        <div style="font-size: 48px; margin-bottom: 16px;">?/div>
                        <h2>谎嗩嚙嶅秹骞顫?/h2>
                        <p>繐绲藉﹢顏呮交閺傛寧傚啯鍨归悵?..</p>
                    `;
                } else {
                    card.innerHTML = `
                        <div style="font-size: 48px; margin-bottom: 16px;">宠法濯寸?/div>
                        <h2 class="error">谎嗩嚙嶅秵绌遍埄鍐х礀傚倸鎼妵?/h2>
                        <p>哄牜浜ｉ獮蹇涘閺嵮冪厒谎嗩嚙嶅秹宕欓锛勬挎稑鐭侀勬煂瀹ュ牏妲?/p>
                    `;
                }
                return;
            }

            if (error) {
                card.innerHTML = `
                    <div style="font-size: 48px; margin-bottom: 16px;">?/div>
                    <h2 class="error">谎嗩嚙嶅秵勬潏顐バ?/h2>
                    <p>${decodeURIComponent(error)}</p>
                `;
                // 闂偅ㄩ悡锟犳撲宕堕柛娆欑悼呫儴銇愰弴鐐杭?
                if (window.opener) {
                    window.opener.postMessage({ type: 'wechat_login_error', error: decodeURIComponent(error) }, '*');
                }
                setTimeout(() => window.close(), 2000);
                return;
            }

            if (token) {
                // 闂偅ㄩ悡锟犳撲宕堕柛娆欑悼呫儴銇愰弴鐔风亣?
                if (window.opener) {
                    window.opener.postMessage({ type: 'wechat_login_success', token: token }, '*');
                }
                
                card.innerHTML = `
                    <div style="font-size: 48px; margin-bottom: 16px;">?/div>
                    <h2>谎嗩嚙嶅秹骞顫?/h2>
                    <p>繐绲藉﹢顏呮交閺傛寧傚啯鍨归悵?..</p>
                `;
                
                // 洦绻傞悺?token ?localStorage挎稑鐗嗛ˇ勬偨帞?
                localStorage.setItem('token', token);
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } else {
                card.innerHTML = `
                    <div style="font-size: 48px; margin-bottom: 16px;">宠法濯寸?/div>
                    <h2 class="error">谎嗩嚙嶅秵绌遍埄鍐х礀傚倸鎼妵?/h2>
                    <p>哄牜浜ｉ獮蹇涘閺嵮冪厒谎嗩嚙嶅秹宕欓锛勬挎稑鐭侀勬煂瀹ュ牏妲?/p>
                `;
                setTimeout(() => window.close(), 2000);
            }
        })();
    </script>
</body>
</html>
