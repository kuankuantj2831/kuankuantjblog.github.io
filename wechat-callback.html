<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>еҫ®дҝЎзҷ»еҪ•еӨ„зҗҶдё?..</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .loading-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #07C160;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { margin: 0 0 10px; color: #333; font-size: 18px; }
        p { color: #999; margin: 0; font-size: 14px; }
        .error { color: #f56c6c; }
    </style>
</head>
<body>
    <div class="loading-card" id="loadingCard">
        <div class="spinner"></div>
        <h2>зҷ»еҪ•еӨ„зҗҶдё?..</h2>
        <p>еҚіе°Ҷе®ҢжҲҗеҫ®дҝЎзҷ»еҪ•</p>
    </div>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const error = urlParams.get('error');
            const card = document.getElementById('loadingCard');

            // еҰӮжһңең?iframe дёӯпјҢз®ҖеҢ–еӨ„зҗҶпјҡеҸӘжҳҫзӨәжҸҗзӨәпјҢз”ұзҲ¶йЎөйқўжЈҖжө?URL е№¶еӨ„зҗ?
            if (window.top !== window.self) {
                if (error) {
                    card.innerHTML = `
                        <div style="font-size: 48px; margin-bottom: 16px;">вқ?/div>
                        <h2 class="error">зҷ»еҪ•еӨұиҙҘ</h2>
                        <p>${decodeURIComponent(error)}</p>
                    `;
                } else if (token) {
                    card.innerHTML = `
                        <div style="font-size: 48px; margin-bottom: 16px;">вң?/div>
                        <h2>зҷ»еҪ•жҲҗеҠҹ</h2>
                        <p>жӯЈеңЁиҝ”еӣһзҪ‘з«ҷ...</p>
                    `;
                } else {
                    card.innerHTML = `
                        <div style="font-size: 48px; margin-bottom: 16px;">вҡ пёҸ</div>
                        <h2 class="error">зҷ»еҪ•дҝЎжҒҜзјәеӨұ</h2>
                        <p>жңӘиҺ·еҸ–еҲ°зҷ»еҪ•еҮӯиҜҒпјҢиҜ·йҮҚиҜ•</p>
                    `;
                }
                return;
            }

            if (error) {
                card.innerHTML = `
                    <div style="font-size: 48px; margin-bottom: 16px;">вқ?/div>
                    <h2 class="error">зҷ»еҪ•еӨұиҙҘ</h2>
                    <p>${decodeURIComponent(error)}</p>
                `;
                // йҖҡзҹҘзҲ¶зӘ—еҸЈзҷ»еҪ•еӨұиҙ?
                if (window.opener) {
                    window.opener.postMessage({ type: 'wechat_login_error', error: decodeURIComponent(error) }, '*');
                }
                setTimeout(() => window.close(), 2000);
                return;
            }

            if (token) {
                // йҖҡзҹҘзҲ¶зӘ—еҸЈзҷ»еҪ•жҲҗеҠ?
                if (window.opener) {
                    window.opener.postMessage({ type: 'wechat_login_success', token: token }, '*');
                }
                
                card.innerHTML = `
                    <div style="font-size: 48px; margin-bottom: 16px;">вң?/div>
                    <h2>зҷ»еҪ•жҲҗеҠҹ</h2>
                    <p>жӯЈеңЁиҝ”еӣһзҪ‘з«ҷ...</p>
                `;
                
                // дҝқеӯҳ token еҲ?localStorageпјҲеӨҮз”Ёпјү
                localStorage.setItem('token', token);
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } else {
                card.innerHTML = `
                    <div style="font-size: 48px; margin-bottom: 16px;">вҡ пёҸ</div>
                    <h2 class="error">зҷ»еҪ•дҝЎжҒҜзјәеӨұ</h2>
                    <p>жңӘиҺ·еҸ–еҲ°зҷ»еҪ•еҮӯиҜҒпјҢиҜ·йҮҚиҜ•</p>
                `;
                setTimeout(() => window.close(), 2000);
            }
        })();
    </script>
</body>
</html>
