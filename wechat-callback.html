<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信登录处理中..</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .loading-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #07C160;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { margin: 0 0 10px; color: #333; font-size: 18px; }
        p { color: #999; margin: 0; font-size: 14px; }
        .error { color: #f56c6c; }
    </style>
</head>
<body>
    <div class="loading-card" id="loadingCard">
        <div class="spinner"></div>
        <h2>登录处理中..</h2>
        <p>即将完成微信登录</p>
    </div>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const error = urlParams.get('error');
            const card = document.getElementById('loadingCard');

            // 如果在iframe 中，简化处理：只显示提示，由父页面检测URL 并处理
            if (window.top !== window.self) {
                if (error) {
                    card.innerHTML = `
                        <div style="font-size: 48px; margin-bottom: 16px;">❌</div>
                        <h2 class="error">登录失败</h2>
                        <p>${decodeURIComponent(error)}</p>
                    `;
                } else if (token) {
                    card.innerHTML = `
                        <div style="font-size: 48px; margin-bottom: 16px;">✅</div>
                        <h2>登录成功</h2>
                        <p>正在返回网站...</p>
                    `;
                } else {
                    card.innerHTML = `
                        <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
                        <h2 class="error">登录信息缺失</h2>
                        <p>未获取到登录凭证，请重试</p>
                    `;
                }
                return;
            }

            if (error) {
                card.innerHTML = `
                    <div style="font-size: 48px; margin-bottom: 16px;">❌</div>
                    <h2 class="error">登录失败</h2>
                    <p>${decodeURIComponent(error)}</p>
                `;
                // 通知父窗口登录失败
                if (window.opener) {
                    window.opener.postMessage({ type: 'wechat_login_error', error: decodeURIComponent(error) }, '*');
                }
                setTimeout(() => window.close(), 2000);
                return;
            }

            if (token) {
                // 通知父窗口登录成功
                if (window.opener) {
                    window.opener.postMessage({ type: 'wechat_login_success', token: token }, '*');
                }
                
                card.innerHTML = `
                    <div style="font-size: 48px; margin-bottom: 16px;">✅</div>
                    <h2>登录成功</h2>
                    <p>正在返回网站...</p>
                `;
                
                // 保存 token 到localStorage（备用）
                localStorage.setItem('token', token);
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } else {
                card.innerHTML = `
                    <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
                    <h2 class="error">登录信息缺失</h2>
                    <p>未获取到登录凭证，请重试</p>
                `;
                setTimeout(() => window.close(), 2000);
            }
        })();
    </script>
</body>
</html>
