    <script>
        // 掓繂顫愰崠鏍ф禈閿?

        // 掓繂顫愰崠鏍ф禈閿?
        function initCharts() {
            // 鐢ㄦ埛х偤鏆辩搾瀣◢閿?
            const userCtx = document.getElementById('userChart').getContext('2d');
            charts.user = new Chart(userCtx, {

                    labels: [],
                    datasets: [{
                        label: '閺傛澘顤冪敤鎴?,

                        backgroundColor: 'rgba(102, 126, 234, 0.1)',

                        fill: true
                    }, {
                        label: '叉槒绌敤鎴?,
                        data: [],
                        borderColor: '#48bb78',
                        backgroundColor: 'rgba(72, 187, 120, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // 愬懎顔愰崣鎴濈喕顓敓?
            const contentCtx = document.getElementById('contentChart').getContext('2d');
            charts.content = new Chart(contentCtx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: '閺傚洨鐝?,
                        data: [],
                        backgroundColor: '#667eea'
                    }, {
                        label: '囧嫯顔?,
                        data: [],
                        backgroundColor: '#48bb78'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // 閽銉︽暪鐡掑敓?
            const revenueCtx = document.getElementById('revenueChart').getContext('2d');
            charts.revenue = new Chart(revenueCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '兼艾鎲拋銏ゆ',
                        data: [],
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }, {
                        label: '熷棗鎼柨鈧敓?,
                        data: [],
                        borderColor: '#48bb78',
                        backgroundColor: 'rgba(72, 187, 120, 0.1)',
                        tension: 0.4,
                        fill: true
                    }, {
                        label: '垫捁绁婚弨璺哄弳',
                        data: [],
                        borderColor: '#9f7aea',
                        backgroundColor: 'rgba(159, 122, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // 佸潡妫堕弶銉︾爱掑棗绔烽敓?
            const sourceCtx = document.getElementById('sourceChart').getContext('2d');
            charts.source = new Chart(sourceCtx, {
                type: 'doughnut',
                data: {
                    labels: ['╁瓨甯寸拋鍧楁６', '兼粎鍌鏇熸惛', '鍙ユ唉帊缍?, '舵牠撮柧鐐复', '忔湹绮?],
                    datasets: [{
                        data: [35, 30, 20, 10, 5],
                        backgroundColor: ['#667eea', '#48bb78', '#9f7aea', '#ed8936', '#a0aec0']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right' } }
                }
            });

            // 圭偞妞傞弫鐗堝祦閿?
            const realtimeCtx = document.getElementById('realtimeChart').getContext('2d');
            charts.realtime = new Chart(realtimeCtx, {
                type: 'line',
                data: {
                    labels: Array(20).fill(''),
                    datasets: [{
                        label: '︺劎鍤敤鎴?,
                        data: Array(20).fill(0),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { beginAtZero: true }

                    animation: { duration: 0 }

        // 旂姾禒顏囥惄绘殶閿?
        async function loadDashboardData() {
            try {
                const response = await fetch('/api/admin/dashboard/realtime', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                const result = await response.json();

                if (result) {
                    updateMetrics(result);
                    updateCharts(result);
                    updateGeoTable(result);
                    updateDeviceStats(result);
                }
            } catch (error) {
                console.error('旂姾囬弫鐗堝祦惰精?', error);
                // ｈ法鏁ゅΟ鈩冨珯数据?
                loadMockData();
            }
        }

        // 閺囧瓨鏌婇幐鍥ㄧ垼楋紕澧?
        function updateMetrics(data) {
