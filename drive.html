            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            min-height: 600px;
        }

        .drive-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .drive-title {
            font-size: 1.8em;
            color: #333;
            font-family: 'STKaiti', 'KaiTi', serif;
        }

        .drive-user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
            color: #666;
        }

        .drive-user-info .username {
            font-weight: 600;
            color: #00bfa5;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed #00bfa5;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #fdfdfd;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }

        .upload-area:hover {
            background: #f0fdfc;
            transform: scale(1.01);
        }

        .upload-area.dragging {
            background: #e0f2f1;

        }

        .upload-icon {
            font-size: 3em;
            color: #00bfa5;
            margin-bottom: 10px;
        }

        /* File List */
        .file-list {
            list-style: none;
            padding: 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .file-item:hover {
            background: #f9f9f9;
        }

        .file-icon {
            font-size: 1.5em;
            margin-right: 15px;
            color: #666;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            color: #333;

        }

        .file-meta {
            font-size: 0.85em;
            color: #999;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .btn-download {
            background: #e1f5fe;
            color: #0288d1;
        }

        .btn-download:hover {
            background: #b3e5fc;
        }

        .btn-delete {
            background: #ffebee;
            color: #c62828;
            opacity: 0.8;
        }

        .btn-delete:hover {
            opacity: 1;
        }

        .btn-share {
            background: #fff3e0;
            color: #e65100;
        }

        .btn-share:hover {
            background: #ffe0b2;
        }

        .share-modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .share-modal {
            background: white; border-radius: 16px; padding: 28px; max-width: 400px; width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .share-modal h3 { margin-bottom: 16px; color: #333; }
        .share-modal label { display: block; font-size: 13px; color: #666; margin: 10px 0 4px; }
        .share-modal input, .share-modal select {
            width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
        }
        .share-modal-btns { display: flex; gap: 10px; margin-top: 18px; }
        .share-modal-btns button {
            flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 14px; cursor: pointer;
        }
        .share-confirm-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .share-cancel-btn { background: #f0f0f0; color: #666; }
        .share-result { margin-top: 14px; padding: 12px; background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 8px; display: none; word-break: break-all; font-size: 13px; }

        /* Progress */
        #progressContainer {
            margin-top: 15px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #00bfa5;
            width: 0%;
            transition: width 0.3s;
        }

        /* Login Prompt */
        .login-prompt {
            text-align: center;
            padding: 80px 20px;
        }

        .login-prompt .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .login-prompt h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .login-prompt p {
            color: #999;
            margin-bottom: 30px;
        }

        .login-prompt .login-btn {
            display: inline-block;
            padding: 12px 40px;
            background: #00bfa5;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .login-prompt .login-btn:hover {
            background: #00897b;
            transform: translateY(-2px);
    </style>

<body>
    <div class="chinese-style-wrapper">
        <!-- Decoration -->
        <div class="bg-decoration"></div>

        <!-- Nav -->
        <nav class="top-nav">
            <a href="index.html" class="logo" style="text-decoration: none;">Hakimi 鐨勭尗鐖灦</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">馃彔 涓婚〉</a>
                <a href="#" class="nav-link active">鈽侊笍 缃戠洏</a>
            </div>
        </nav>

        <!-- 鏈櫥褰曟彁绀?-->
        <div class="drive-container" id="loginPrompt" style="display:none;">
            <div class="login-prompt">
                <div class="icon">馃敀</div>
                <h2>璇峰厛鐧诲綍</h2>
                <p>浜戠缃戠洏鏄偍鐨勭浜烘枃浠剁┖闂达紝鐧诲綍鍚庡嵆鍙笂浼犲拰绠＄悊鏂囦欢</p>
                <a href="index.html" class="login-btn">鍘荤櫥褰?/a>
            </div>
        </div>

        <!-- 宸茬櫥褰曠殑缃戠洏鐣岄潰 -->
        <div class="drive-container" id="driveMain" style="display:none;">
            <div class="drive-header">
                <div class="drive-title">鈽侊笍 鎴戠殑缃戠洏</div>
                <div class="drive-user-info">
                    <span>馃懁 <span class="username" id="driveUsername"></span></span>
                    <span>路</span>
                    <span><span id="fileCount">0</span> 涓枃浠?/span>
                </div>
            </div>

            <div class="upload-area" id="dropZone">
                <div class="upload-icon">馃摛</div>
                <h3>鐐瑰嚮鎴栨嫋鎷芥枃浠跺埌杩欓噷涓婁紶</h3>
                <p style="color:#999; font-size:0.9em;">鏀寔浠绘剰鏍煎紡锛屾渶澶?200MB 路 鏂囦欢浠呰嚜宸卞彲瑙?/p>
                <input type="file" id="fileInput" hidden>

                <div id="progressContainer">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:0.85em;">
                        <span id="uploadStatus">涓婁紶涓?..</span>
                        <span id="uploadPercent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>

            <ul class="file-list" id="fileList">
                <div style="text-align:center; padding:30px; color:#999;" id="loadingText">
                    姝ｅ湪杩炴帴浜戠...
                </div>
            </ul>
        </div>
    </div>

    <script type="module">
        import { API_BASE_URL } from './js/api-config.js?v=20260418a';

        // 鑾峰彇鐧诲綍淇℃伅
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        const loginPrompt = document.getElementById('loginPrompt');
        const driveMain = document.getElementById('driveMain');

        if (!token || !user) {
            // 鏈櫥褰?
            loginPrompt.style.display = 'block';
        } else {
            // 宸茬櫥褰?
            driveMain.style.display = 'block';
            document.getElementById('driveUsername').textContent = user.username || '鐢ㄦ埛';

            const fileListEl = document.getElementById('fileList');
            const fileCountEl = document.getElementById('fileCount');
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');

            // 閫氱敤璇锋眰澶?
            const authHeaders = () => ({
                'Authorization': `Bearer ${token}`
            });

            // Initial Load
            loadFiles();

            /* ========== Event Listeners ========== */
            dropZone.addEventListener('click', (e) => {
                // 閬垮厤鐐瑰嚮杩涘害鏉″尯鍩熶篃瑙﹀彂鏂囦欢閫夋嫨
                if (e.target.closest('#progressContainer')) return;
                fileInput.click();
            });
            fileInput.addEventListener('change', handleFileSelect);

            // Drag & Drop
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
            });
            function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

            dropZone.addEventListener('dragenter', () => dropZone.classList.add('dragging'));
            dropZone.addEventListener('dragover', () => dropZone.classList.add('dragging'));
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
            dropZone.addEventListener('drop', () => dropZone.classList.remove('dragging'));

            dropZone.addEventListener('drop', handleDrop);

            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                handleFiles(files);
            }

            function handleFileSelect(e) {
                const files = e.target.files;
                handleFiles(files);
            }

            function handleFiles(files) {
                if (files.length > 0) {
                    uploadFile(files[0]);
                }
            }

            /* ========== API Functions ========== */

            async function loadFiles() {
                try {
                    const res = await fetch(`${API_BASE_URL}/drive/list`, {
                        headers: authHeaders()
                    });

                    if (res.status === 401 || res.status === 403) {
                        // Token 杩囨湡鎴栨棤鏁?
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        loginPrompt.style.display = 'block';
                        driveMain.style.display = 'none';
                        return;
                    }

                    const data = await res.json();

                    if (res.ok) {
                        renderFiles(data.files || []);
                    } else {
                        fileListEl.innerHTML = `<div style="text-align:center;color:red;padding:20px;">鏃犳硶鍔犺浇鏂囦欢鍒楄〃: ${data.message}</div>`;
                    }
                } catch (e) {
                    fileListEl.innerHTML = `<div style="text-align:center;color:#999;padding:20px;">杩炴帴鏈嶅姟鍣ㄥけ璐?/div>`;
                }
            }

            const MAX_DIRECT_SIZE = 5 * 1024 * 1024; // 5MB 浠ヤ笅璧板悗绔腑杞?
            const MAX_FILE_SIZE = 200 * 1024 * 1024; // 鏈€澶?200MB

            async function uploadFile(file) {
                if (file.size > MAX_FILE_SIZE) {
                    alert('鏂囦欢澶у皬涓嶈兘瓒呰繃 200MB');
                    return;
                }

                document.getElementById('progressContainer').style.display = 'block';
                updateProgress(0);
                document.getElementById('uploadStatus').textContent = '涓婁紶涓?..';

                try {
                    if (file.size <= MAX_DIRECT_SIZE) {
                        // 灏忔枃浠讹細璧板悗绔腑杞紙鍏煎鍘熸湁閫昏緫锛?
                        await uploadViaBackend(file);
                    } else {
                        // 澶ф枃浠讹細鑾峰彇绛惧悕 URL 鍚庣洿浼?COS
                        await uploadViaCOS(file);
                    }
                } catch (e) {
                    console.error('涓婁紶鍑洪敊:', e);
                    alert('涓婁紶澶辫触锛? + (e.message || '鏈煡閿欒'));
                    document.getElementById('progressContainer').style.display = 'none';
                }
            }

            // 灏忔枃浠讹細鍚庣涓浆涓婁紶
            function uploadViaBackend(file) {
                return new Promise((resolve, reject) => {
                    const formData = new FormData();
                    formData.append('file', file);

                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', `${API_BASE_URL}/drive/upload`, true);
                    xhr.setRequestHeader('Authorization', `Bearer ${token}`);

                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            updateProgress(Math.round((e.loaded / e.total) * 100));
                        }
                    };

                    xhr.onload = function () {
                        if (xhr.status === 200) {
                            onUploadSuccess();
                            resolve();
                        } else {
                            const resp = JSON.parse(xhr.responseText || '{}');
                            reject(new Error(resp.message || '鏈嶅姟鍣ㄨ繑鍥為敊璇?));
                        }
                    };

                    xhr.onerror = function () {
                        reject(new Error('缃戠粶杩炴帴澶辫触锛岃妫€鏌ョ綉缁滃悗閲嶈瘯'));
                    };

                    xhr.ontimeout = function () {
                        reject(new Error('涓婁紶瓒呮椂锛岃閲嶈瘯'));
                    };

                    xhr.timeout = 60000; // 60 绉掕秴鏃?
                    xhr.send(formData);
                });
            }

            // 澶ф枃浠讹細COS 鐩翠紶
            async function uploadViaCOS(file) {
                // 1. 浠庡悗绔幏鍙栫鍚?URL
                document.getElementById('uploadStatus').textContent = '鍑嗗涓婁紶...';
                const signRes = await fetch(`${API_BASE_URL}/drive/sign`, {
                    method: 'POST',
                    headers: {
                        ...authHeaders(),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ fileName: file.name, fileSize: file.size })
                });

                if (!signRes.ok) {
                    const err = await signRes.json().catch(() => ({}));
                    throw new Error(err.message || '鑾峰彇涓婁紶鍑瘉澶辫触');
                }

                const { signedUrl } = await signRes.json();

                // 2. 鐢ㄧ鍚?URL 鐩翠紶鍒?COS
                document.getElementById('uploadStatus').textContent = '涓婁紶涓?..';
                await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('PUT', signedUrl, true);
                    xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');

                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            updateProgress(Math.round((e.loaded / e.total) * 100));
                        }
                    };

                    xhr.onload = function () {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            resolve();
                        } else {
                            reject(new Error(`COS 涓婁紶澶辫触 (${xhr.status})`));
                        }
                    };

                    xhr.onerror = function () {
                        reject(new Error('缃戠粶杩炴帴澶辫触锛岃妫€鏌ョ綉缁滃悗閲嶈瘯'));
                    };

                    xhr.ontimeout = function () {
                        reject(new Error('涓婁紶瓒呮椂锛屾枃浠跺彲鑳借繃澶э紝璇烽噸璇?));
                    };

                    xhr.timeout = 600000; // 澶ф枃浠?10 鍒嗛挓瓒呮椂
                    xhr.send(file);
                });

                onUploadSuccess();
            }

            function onUploadSuccess() {
                updateProgress(100);
                document.getElementById('uploadStatus').textContent = '鉁?涓婁紶鎴愬姛!';
                setTimeout(() => {
                    document.getElementById('progressContainer').style.display = 'none';
                    fileInput.value = '';
                    loadFiles();
                }, 1000);
            }

            function updateProgress(percent) {
                document.getElementById('progressFill').style.width = percent + '%';
                document.getElementById('uploadPercent').textContent = percent + '%';
            }

            async function downloadFile(key, name) {
                try {
                    const res = await fetch(`${API_BASE_URL}/drive/download?key=${encodeURIComponent(key)}`, {
                        headers: authHeaders()
                    });
                    const data = await res.json();

                    if (res.ok && data.url) {
                        const a = document.createElement('a');
                        a.href = data.url;
                        a.download = name;
                        a.target = '_blank';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    } else {
                        alert('鏃犳硶鑾峰彇涓嬭浇閾炬帴: ' + (data.message || '鏈煡閿欒'));
                    }
                } catch (e) {
                    alert('涓嬭浇鍑洪敊');
                }
            }

            async function deleteFile(key, name) {
                if (!confirm(`纭畾瑕佸垹闄ゃ€?{name}銆嶅悧锛熸鎿嶄綔涓嶅彲鎭㈠銆俙)) return;

                try {
                    const res = await fetch(`${API_BASE_URL}/drive/delete`, {
                        method: 'POST',
                        headers: {
                            ...authHeaders(),
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ key })
                    });
                    const data = await res.json();

                    if (res.ok) {
                        loadFiles(); // 鍒锋柊鍒楄〃
                    } else {
                        alert('鍒犻櫎澶辫触: ' + (data.message || '鏈煡閿欒'));
                    }
                } catch (e) {
                    alert('鍒犻櫎鍑洪敊');
                }
            }

            // Expose to window for onclick
            window.downloadFile = downloadFile;
            window.deleteFile = deleteFile;

            function renderFiles(files) {
                fileCountEl.textContent = files.length;
                fileListEl.innerHTML = '';

                if (files.length === 0) {
                    fileListEl.innerHTML = `<div style="text-align:center;padding:40px;color:#ccc;">鏆傛棤鏂囦欢锛屽揩鏉ヤ笂浼犱竴涓惂~</div>`;
                    return;
                }

                files.forEach(file => {
                    const isFolder = file.type === 'folder';
                    const icon = isFolder ? '馃搧' : getFileIcon(file.name);
                    const sizeStr = isFolder ? '-' : formatSize(file.size);
                    const dateStr = file.lastModified ? new Date(file.lastModified).toLocaleString() : '';
                    // 杞箟鏂囦欢鍚嶄腑鐨勭壒娈婂瓧绗︼紝闃叉 XSS
                    const safeName = escapeHtml(file.name);
                    const safeKey = escapeHtml(file.key);

                    const html = `
                    <li class="file-item">
                        <div class="file-icon">${icon}</div>
                        <div class="file-info">
                            <div class="file-name">${safeName}</div>
                            <div class="file-meta">${sizeStr} 路 ${dateStr}</div>
                        </div>
                        <div class="file-actions">
                            <button class="action-btn btn-download" onclick="downloadFile('${safeKey.replace(/'/g, "\\'")}', '${safeName.replace(/'/g, "\\'")}')">鈫?涓嬭浇</button>
                            <button class="action-btn btn-share" onclick="openShareModal('${safeKey.replace(/'/g, "\\'")}', '${safeName.replace(/'/g, "\\'")}')">馃敆 鍒嗕韩</button>
                            <button class="action-btn btn-delete" onclick="deleteFile('${safeKey.replace(/'/g, "\\'")}', '${safeName.replace(/'/g, "\\'")}')">馃棏锔?鍒犻櫎</button>
                        </div>
                    </li>
                    `;
                    fileListEl.innerHTML += html;
                });
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function formatSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            }

            function getFileIcon(name) {
                const ext = (name || '').split('.').pop().toLowerCase();
                if (['jpg', 'png', 'gif', 'jpeg', 'webp', 'svg'].includes(ext)) return '馃柤锔?;
                if (['zip', 'rar', '7z', 'tar', 'gz'].includes(ext)) return '馃摝';
                if (['mp3', 'wav', 'flac', 'aac'].includes(ext)) return '馃幍';
                if (['mp4', 'mov', 'avi', 'mkv'].includes(ext)) return '馃幀';
                if (['pdf'].includes(ext)) return '馃摃';
                if (['doc', 'docx'].includes(ext)) return '馃摌';
                if (['xls', 'xlsx'].includes(ext)) return '馃搳';
                if (['ppt', 'pptx'].includes(ext)) return '馃摍';
                if (['txt', 'md'].includes(ext)) return '馃摑';
                if (['js', 'py', 'java', 'cpp', 'html', 'css'].includes(ext)) return '馃捇';
                return '馃搫';
            }

            // --- 鍒嗕韩鍔熻兘 ---
            let shareFileKey = '', shareFileName = '';

            window.openShareModal = function(key, name) {
                shareFileKey = key;
                shareFileName = name;
                document.getElementById('shareModalTitle').textContent = `鍒嗕韩銆?{name}銆峘;
                document.getElementById('sharePassword').value = '';
                document.getElementById('shareExpires').value = '0';
                document.getElementById('shareMaxDownloads').value = '';
                document.getElementById('shareResult').style.display = 'none';
                const modal = document.getElementById('shareModal');
                modal.style.display = 'flex';
            };

            window.closeShareModal = function() {
                document.getElementById('shareModal').style.display = 'none';
            };

            window.confirmShare = async function() {
                const password = document.getElementById('sharePassword').value || undefined;
                const expiresHours = document.getElementById('shareExpires').value;
                const maxDownloads = document.getElementById('shareMaxDownloads').value || undefined;

                try {
                    const res = await fetch(`${API_BASE_URL}/drive/share`, {
                        method: 'POST',
                        headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fileKey: shareFileKey, fileName: shareFileName, password, expiresHours, maxDownloads })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        const fullUrl = location.origin + data.shareUrl;
                        const resultEl = document.getElementById('shareResult');
                        resultEl.innerHTML = `? 鍒嗕韩閾炬帴宸插垱寤猴紒<br><a href="${data.shareUrl}" target="_blank" style="color:#1890ff;">${fullUrl}</a><br><button onclick="navigator.clipboard.writeText('${fullUrl}');this.textContent='宸插鍒?'" style="margin-top:8px;padding:4px 12px;border:1px solid #1890ff;background:white;color:#1890ff;border-radius:6px;cursor:pointer;">澶嶅埗閾炬帴</button>`;
                        resultEl.style.display = 'block';
                    } else {
                        alert(data.message || '鍒涘缓澶辫触');
                    }
                } catch (e) {
                    alert('缃戠粶閿欒');
                }
            };
        }
    </script>

    <!-- 鍒嗕韩寮圭獥 -->
    <div class="share-modal-overlay" id="shareModal">
        <div class="share-modal">
            <h3 id="shareModalTitle">鍒嗕韩鏂囦欢</h3>
            <label>鎻愬彇瀵嗙爜锛堝彲閫夛級</label>
            <input type="text" id="sharePassword" placeholder="鐣欑┖鍒欐棤闇€瀵嗙爜" maxlength="32">
            <label>鏈夋晥鏈?/label>
            <select id="shareExpires">
                <option value="0">姘镐箙鏈夋晥</option>
                <option value="1">1灏忔椂</option>
                <option value="24">1澶?/option>
                <option value="168">7澶?/option>
                <option value="720">30澶?/option>
            </select>
            <label>鏈€澶т笅杞芥鏁帮紙鍙€夛級</label>
            <input type="number" id="shareMaxDownloads" placeholder="鐣欑┖鍒欎笉闄? min="1" max="9999">
            <div class="share-result" id="shareResult"></div>
            <div class="share-modal-btns">
                <button class="share-cancel-btn" onclick="closeShareModal()">鍙栨秷</button>
                <button class="share-confirm-btn" onclick="confirmShare()">馃敆 鍒涘缓鍒嗕韩</button>
            </div>
        </div>
    </div>
    <script src="js/theme.js?v=1"></script>

<!-- Win7 Emoji 鍏煎鎬у鐞?-->
<script>
(function() {

    function isWindows7() {
        var ua = navigator.userAgent;
        return ua.indexOf('Windows NT 6.1') !== -1 || 
               ua.indexOf('Windows 7') !== -1;
    }
    
    // Emoji 鏇挎崲鏄犲皠琛?
    var emojiMap = {
        "馃惐": "鐚?,
        "馃彔": "棣栭〉",
        "馃幃": "娓告垙",
        "鈽侊笍": "浜?,
        "鈽€锔?: "澶槼",

        "馃敂": "閫氱煡",
        "馃懁": "鐢ㄦ埛",

        "馃柤锔?: "鍥剧墖",
        "鉁嶏笍": "鍐欎綔",
        "鈿欙笍": "璁剧疆",
        "馃毆": "閫€鍑?,

        "馃攧": "鍒锋柊",
        "鈻讹笍": "寮€濮?,
        "鈴憋笍": "鏃堕棿",
        "馃帹": "鍒涙剰",
        "馃捇": "鐢佃剳",
        "馃摎": "瀛︿範",
        "馃洝锔?: "鐩剧墝",
        "鉁堬笍": "椋炴満",
        "猸?: "鏄熸槦",
        "馃暪锔?: "鎵嬫焺",

    };
    
    // 鏇挎崲椤甸潰涓殑 emoji
    function replaceEmojis() {
        if (!isWindows7()) return;
        
        // 鏇挎崲鏂囨湰鑺傜偣
        var walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );
        
        var node;
        while (node = walker.nextNode()) {
            var text = node.textContent;
            var hasEmoji = false;
            for (var emoji in emojiMap) {
                if (text.indexOf(emoji) !== -1) {
                    text = text.split(emoji).join(emojiMap[emoji]);
                    hasEmoji = true;
                }
            }
            if (hasEmoji) {
                node.textContent = text;
            }
        }
        
        // 鏇挎崲灞炴€т腑鐨?emoji锛堝 title, alt 绛夛級
        var elements = document.querySelectorAll('*');
        var attrs = ['title', 'alt', 'placeholder', 'value'];
        for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            for (var j = 0; j < attrs.length; j++) {
                var attr = attrs[j];
                if (el.hasAttribute(attr)) {
                    var val = el.getAttribute(attr);
                    var hasEmoji = false;
                    for (var emoji in emojiMap) {
                        if (val.indexOf(emoji) !== -1) {
                            val = val.split(emoji).join(emojiMap[emoji]);
                            hasEmoji = true;
                        }
                    }
                    if (hasEmoji) {
                        el.setAttribute(attr, val);
                    }
                }
            }
        }
    }
    
    // DOM 鍔犺浇瀹屾垚鍚庢墽琛屾浛鎹?
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', replaceEmojis);
    } else {
        replaceEmojis();
    }
})();
</script>
