            max-width: 1000px;

        .drive-header {
            display: flex;
            justify-content: space-between;
            align-items: center;

        .drive-title {

            align-items: center;

        .drive-user-info .username {

        /* Upload Area */
        .upload-area {

            margin-bottom: 30px;

        .upload-area:hover {
            background: #f0fdfc;

        .upload-area.dragging {
            background: #e0f2f1;
            border-color: #00897b;
        }

        .upload-icon {
            font-size: 3em;
            color: #00bfa5;
            margin-bottom: 10px;
        }

        /* File List */
        .file-list {
            list-style: none;
            padding: 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .file-item:hover {
            background: #f9f9f9;
        }

        .file-icon {
            font-size: 1.5em;
            margin-right: 15px;
            color: #666;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .file-meta {
            font-size: 0.85em;
            color: #999;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .btn-download {
            background: #e1f5fe;
            color: #0288d1;
        }

        .btn-download:hover {
            background: #b3e5fc;
        }

        .btn-delete {
            background: #ffebee;
            color: #c62828;
            opacity: 0.8;
        }

        .btn-delete:hover {
            opacity: 1;
        }

        .btn-share {
            background: #fff3e0;
            color: #e65100;
        }

        .btn-share:hover {
            background: #ffe0b2;
        }

        .share-modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .share-modal {
            background: white; border-radius: 16px; padding: 28px; max-width: 400px; width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .share-modal h3 { margin-bottom: 16px; color: #333; }
        .share-modal label { display: block; font-size: 13px; color: #666; margin: 10px 0 4px; }
        .share-modal input, .share-modal select {
            width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
        }
        .share-modal-btns { display: flex; gap: 10px; margin-top: 18px; }
        .share-modal-btns button {
            flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 14px; cursor: pointer;
        }
        .share-confirm-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .share-cancel-btn { background: #f0f0f0; color: #666; }
        .share-result { margin-top: 14px; padding: 12px; background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 8px; display: none; word-break: break-all; font-size: 13px; }

        /* Progress */
        #progressContainer {
            margin-top: 15px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #00bfa5;
            width: 0%;
            transition: width 0.3s;
        }

        /* Login Prompt */
        .login-prompt {
            text-align: center;
            padding: 80px 20px;
        }

        .login-prompt .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .login-prompt h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .login-prompt p {
            color: #999;
            margin-bottom: 30px;
        }

        .login-prompt .login-btn {
            display: inline-block;
            padding: 12px 40px;
            background: #00bfa5;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .login-prompt .login-btn:hover {
            background: #00897b;
            transform: translateY(-2px);
    </style>

<body>
    <div class="chinese-style-wrapper">
        <!-- Decoration -->
        <div class="bg-decoration"></div>

        <!-- Nav -->
        <nav class="top-nav">
            <a href="index.html" class="logo" style="text-decoration: none;">Hakimi 的猫爬架</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">🏠 主页</a>
                <a href="#" class="nav-link active">☁️ 网盘</a>
            </div>
        </nav>

        <!-- 未登录提示 -->
        <div class="drive-container" id="loginPrompt" style="display:none;">
            <div class="login-prompt">
                <div class="icon">🔒</div>
                <h2>请先登录</h2>
                <p>云端网盘是您的私人文件空间，登录后即可上传和管理文件</p>
                <a href="index.html" class="login-btn">去登录</a>
            </div>
        </div>

        <!-- 已登录的网盘界面 -->
        <div class="drive-container" id="driveMain" style="display:none;">
            <div class="drive-header">
                <div class="drive-title">☁️ 我的网盘</div>
                <div class="drive-user-info">
                    <span>👤 <span class="username" id="driveUsername"></span></span>
                    <span>·</span>
                    <span><span id="fileCount">0</span> 个文件</span>
                </div>
            </div>

            <div class="upload-area" id="dropZone">
                <div class="upload-icon">📤</div>
                <h3>点击或拖拽文件到这里上传</h3>
                <p style="color:#999; font-size:0.9em;">支持任意格式，最大 200MB · 文件仅自己可见</p>
                <input type="file" id="fileInput" hidden>

                <div id="progressContainer">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:0.85em;">
                        <span id="uploadStatus">上传中...</span>
                        <span id="uploadPercent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>

            <ul class="file-list" id="fileList">
                <div style="text-align:center; padding:30px; color:#999;" id="loadingText">
                    正在连接云端...
                </div>
            </ul>
        </div>
    </div>

    <script type="module">
        import { API_BASE_URL } from './js/api-config.js?v=20260223b';

        // 获取登录信息
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        const loginPrompt = document.getElementById('loginPrompt');
        const driveMain = document.getElementById('driveMain');

        if (!token || !user) {
            // 未登录
            loginPrompt.style.display = 'block';
        } else {
            // 已登录
            driveMain.style.display = 'block';
            document.getElementById('driveUsername').textContent = user.username || '用户';

            const fileListEl = document.getElementById('fileList');
            const fileCountEl = document.getElementById('fileCount');
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');

            // 通用请求头
            const authHeaders = () => ({
                'Authorization': `Bearer ${token}`
            });

            // Initial Load
            loadFiles();

            /* ========== Event Listeners ========== */
            dropZone.addEventListener('click', (e) => {
                // 避免点击进度条区域也触发文件选择
                if (e.target.closest('#progressContainer')) return;
                fileInput.click();
            });
            fileInput.addEventListener('change', handleFileSelect);

            // Drag & Drop
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
            });
            function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

            dropZone.addEventListener('dragenter', () => dropZone.classList.add('dragging'));
            dropZone.addEventListener('dragover', () => dropZone.classList.add('dragging'));
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
            dropZone.addEventListener('drop', () => dropZone.classList.remove('dragging'));

            dropZone.addEventListener('drop', handleDrop);

            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                handleFiles(files);
            }

            function handleFileSelect(e) {
                const files = e.target.files;
                handleFiles(files);
            }

            function handleFiles(files) {
                if (files.length > 0) {
                    uploadFile(files[0]);
                }
            }

            /* ========== API Functions ========== */

            async function loadFiles() {
                try {
                    const res = await fetch(`${API_BASE_URL}/drive/list`, {
                        headers: authHeaders()
                    });

                    if (res.status === 401 || res.status === 403) {
                        // Token 过期或无效
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        loginPrompt.style.display = 'block';
                        driveMain.style.display = 'none';
                        return;
                    }

                    const data = await res.json();

                    if (res.ok) {
                        renderFiles(data.files || []);
                    } else {
                        fileListEl.innerHTML = `<div style="text-align:center;color:red;padding:20px;">无法加载文件列表: ${data.message}</div>`;
                    }
                } catch (e) {
                    fileListEl.innerHTML = `<div style="text-align:center;color:#999;padding:20px;">连接服务器失败</div>`;
                }
            }

            const MAX_DIRECT_SIZE = 5 * 1024 * 1024; // 5MB 以下走后端中转
            const MAX_FILE_SIZE = 200 * 1024 * 1024; // 最大 200MB

            async function uploadFile(file) {
                if (file.size > MAX_FILE_SIZE) {
                    alert('文件大小不能超过 200MB');
                    return;
                }

                document.getElementById('progressContainer').style.display = 'block';
                updateProgress(0);
                document.getElementById('uploadStatus').textContent = '上传中...';

                try {
                    if (file.size <= MAX_DIRECT_SIZE) {
                        // 小文件：走后端中转（兼容原有逻辑）
                        await uploadViaBackend(file);
                    } else {
                        // 大文件：获取签名 URL 后直传 COS
                        await uploadViaCOS(file);
                    }
                } catch (e) {
                    console.error('上传出错:', e);
                    alert('上传失败：' + (e.message || '未知错误'));
                    document.getElementById('progressContainer').style.display = 'none';
                }
            }

            // 小文件：后端中转上传
            function uploadViaBackend(file) {
                return new Promise((resolve, reject) => {
                    const formData = new FormData();
                    formData.append('file', file);

                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', `${API_BASE_URL}/drive/upload`, true);
                    xhr.setRequestHeader('Authorization', `Bearer ${token}`);

                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            updateProgress(Math.round((e.loaded / e.total) * 100));
                        }
                    };

                    xhr.onload = function () {
                        if (xhr.status === 200) {
                            onUploadSuccess();
                            resolve();
                        } else {
                            const resp = JSON.parse(xhr.responseText || '{}');
                            reject(new Error(resp.message || '服务器返回错误'));
                        }
                    };

                    xhr.onerror = function () {
                        reject(new Error('网络连接失败，请检查网络后重试'));
                    };

                    xhr.ontimeout = function () {
                        reject(new Error('上传超时，请重试'));
                    };

                    xhr.timeout = 60000; // 60 秒超时
                    xhr.send(formData);
                });
            }

            // 大文件：COS 直传
            async function uploadViaCOS(file) {
                // 1. 从后端获取签名 URL
                document.getElementById('uploadStatus').textContent = '准备上传...';
                const signRes = await fetch(`${API_BASE_URL}/drive/sign`, {
                    method: 'POST',
                    headers: {
                        ...authHeaders(),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ fileName: file.name, fileSize: file.size })
                });

                if (!signRes.ok) {
                    const err = await signRes.json().catch(() => ({}));
                    throw new Error(err.message || '获取上传凭证失败');
                }

                const { signedUrl } = await signRes.json();

                // 2. 用签名 URL 直传到 COS
                document.getElementById('uploadStatus').textContent = '上传中...';
                await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('PUT', signedUrl, true);
                    xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');

                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            updateProgress(Math.round((e.loaded / e.total) * 100));
                        }
                    };

                    xhr.onload = function () {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            resolve();
                        } else {
                            reject(new Error(`COS 上传失败 (${xhr.status})`));
                        }
                    };

                    xhr.onerror = function () {
                        reject(new Error('网络连接失败，请检查网络后重试'));
                    };

                    xhr.ontimeout = function () {
                        reject(new Error('上传超时，文件可能过大，请重试'));
                    };

                    xhr.timeout = 600000; // 大文件 10 分钟超时
                    xhr.send(file);
                });

                onUploadSuccess();
            }

            function onUploadSuccess() {
                updateProgress(100);
                document.getElementById('uploadStatus').textContent = '✅ 上传成功!';
                setTimeout(() => {
                    document.getElementById('progressContainer').style.display = 'none';
                    fileInput.value = '';
                    loadFiles();
                }, 1000);
            }

            function updateProgress(percent) {
                document.getElementById('progressFill').style.width = percent + '%';
                document.getElementById('uploadPercent').textContent = percent + '%';
            }

            async function downloadFile(key, name) {
                try {
                    const res = await fetch(`${API_BASE_URL}/drive/download?key=${encodeURIComponent(key)}`, {
                        headers: authHeaders()
                    });
                    const data = await res.json();

                    if (res.ok && data.url) {
                        const a = document.createElement('a');
                        a.href = data.url;
                        a.download = name;
                        a.target = '_blank';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    } else {
                        alert('无法获取下载链接: ' + (data.message || '未知错误'));
                    }
                } catch (e) {
                    alert('下载出错');
                }
            }

            async function deleteFile(key, name) {
                if (!confirm(`确定要删除「${name}」吗？此操作不可恢复。`)) return;

                try {
                    const res = await fetch(`${API_BASE_URL}/drive/delete`, {
                        method: 'POST',
                        headers: {
                            ...authHeaders(),
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ key })
                    });
                    const data = await res.json();

                    if (res.ok) {
                        loadFiles(); // 刷新列表
                    } else {
                        alert('删除失败: ' + (data.message || '未知错误'));
                    }
                } catch (e) {
                    alert('删除出错');
                }
            }

            // Expose to window for onclick
            window.downloadFile = downloadFile;
            window.deleteFile = deleteFile;

            function renderFiles(files) {
                fileCountEl.textContent = files.length;
                fileListEl.innerHTML = '';

                if (files.length === 0) {
                    fileListEl.innerHTML = `<div style="text-align:center;padding:40px;color:#ccc;">暂无文件，快来上传一个吧~</div>`;
                    return;
                }

                files.forEach(file => {
                    const isFolder = file.type === 'folder';
                    const icon = isFolder ? '📁' : getFileIcon(file.name);
                    const sizeStr = isFolder ? '-' : formatSize(file.size);
                    const dateStr = file.lastModified ? new Date(file.lastModified).toLocaleString() : '';
                    // 转义文件名中的特殊字符，防止 XSS
                    const safeName = escapeHtml(file.name);
                    const safeKey = escapeHtml(file.key);

                    const html = `
                    <li class="file-item">
                        <div class="file-icon">${icon}</div>
                        <div class="file-info">
                            <div class="file-name">${safeName}</div>
                            <div class="file-meta">${sizeStr} · ${dateStr}</div>
                        </div>
                        <div class="file-actions">
                            <button class="action-btn btn-download" onclick="downloadFile('${safeKey.replace(/'/g, "\\'")}', '${safeName.replace(/'/g, "\\'")}')">↓ 下载</button>
                            <button class="action-btn btn-share" onclick="openShareModal('${safeKey.replace(/'/g, "\\'")}', '${safeName.replace(/'/g, "\\'")}')">🔗 分享</button>
                            <button class="action-btn btn-delete" onclick="deleteFile('${safeKey.replace(/'/g, "\\'")}', '${safeName.replace(/'/g, "\\'")}')">🗑️ 删除</button>
                        </div>
                    </li>
                    `;
                    fileListEl.innerHTML += html;
                });
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function formatSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            }

            function getFileIcon(name) {
                const ext = (name || '').split('.').pop().toLowerCase();
                if (['jpg', 'png', 'gif', 'jpeg', 'webp', 'svg'].includes(ext)) return '🖼️';
                if (['zip', 'rar', '7z', 'tar', 'gz'].includes(ext)) return '📦';
                if (['mp3', 'wav', 'flac', 'aac'].includes(ext)) return '🎵';
                if (['mp4', 'mov', 'avi', 'mkv'].includes(ext)) return '🎬';
                if (['pdf'].includes(ext)) return '📕';
                if (['doc', 'docx'].includes(ext)) return '📘';
                if (['xls', 'xlsx'].includes(ext)) return '📊';
                if (['ppt', 'pptx'].includes(ext)) return '📙';
                if (['txt', 'md'].includes(ext)) return '📝';
                if (['js', 'py', 'java', 'cpp', 'html', 'css'].includes(ext)) return '💻';
                return '📄';
            }

            // --- 分享功能 ---
            let shareFileKey = '', shareFileName = '';

            window.openShareModal = function(key, name) {
                shareFileKey = key;
                shareFileName = name;
                document.getElementById('shareModalTitle').textContent = `分享「${name}」`;
                document.getElementById('sharePassword').value = '';
                document.getElementById('shareExpires').value = '0';
                document.getElementById('shareMaxDownloads').value = '';
                document.getElementById('shareResult').style.display = 'none';
                const modal = document.getElementById('shareModal');
                modal.style.display = 'flex';
            };

            window.closeShareModal = function() {
                document.getElementById('shareModal').style.display = 'none';
            };

            window.confirmShare = async function() {
                const password = document.getElementById('sharePassword').value || undefined;
                const expiresHours = document.getElementById('shareExpires').value;
                const maxDownloads = document.getElementById('shareMaxDownloads').value || undefined;

                try {
                    const res = await fetch(`${API_BASE_URL}/drive/share`, {
                        method: 'POST',
                        headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fileKey: shareFileKey, fileName: shareFileName, password, expiresHours, maxDownloads })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        const fullUrl = location.origin + data.shareUrl;
                        const resultEl = document.getElementById('shareResult');
                        resultEl.innerHTML = `? 分享链接已创建！<br><a href="${data.shareUrl}" target="_blank" style="color:#1890ff;">${fullUrl}</a><br><button onclick="navigator.clipboard.writeText('${fullUrl}');this.textContent='已复制!'" style="margin-top:8px;padding:4px 12px;border:1px solid #1890ff;background:white;color:#1890ff;border-radius:6px;cursor:pointer;">复制链接</button>`;
                        resultEl.style.display = 'block';
                    } else {
                        alert(data.message || '创建失败');
                    }
                } catch (e) {
                    alert('网络错误');
                }
            };
        }
    </script>

    <!-- 分享弹窗 -->
    <div class="share-modal-overlay" id="shareModal">
        <div class="share-modal">
            <h3 id="shareModalTitle">分享文件</h3>
            <label>提取密码（可选）</label>
            <input type="text" id="sharePassword" placeholder="留空则无需密码" maxlength="32">
            <label>有效期</label>
            <select id="shareExpires">
                <option value="0">永久有效</option>
                <option value="1">1小时</option>
                <option value="24">1天</option>
                <option value="168">7天</option>
                <option value="720">30天</option>
            </select>
            <label>最大下载次数（可选）</label>
            <input type="number" id="shareMaxDownloads" placeholder="留空则不限" min="1" max="9999">
            <div class="share-result" id="shareResult"></div>
            <div class="share-modal-btns">
                <button class="share-cancel-btn" onclick="closeShareModal()">取消</button>
                <button class="share-confirm-btn" onclick="confirmShare()">🔗 创建分享</button>
            </div>
        </div>
    </div>

<!-- Win7 Emoji 兼容性处理 -->
<script>
(function() {
    // 检测是否为 Windows 7
    function isWindows7() {
        var ua = navigator.userAgent;
        return ua.indexOf('Windows NT 6.1') !== -1 || 
               ua.indexOf('Windows 7') !== -1;
    }
    
    // Emoji 替换映射表
    var emojiMap = {
        "🐱": "猫",
        "🏠": "首页",
        "🎮": "游戏",
        "☁️": "云",
        "☀️": "太阳",
        "❤️": "爱心",
        "🎯": "关于",
        "💬": "消息",
        "🔔": "通知",
        "👤": "用户",
        "📝": "编辑",
        "⬆️": "升级",
        "🖼️": "图片",
        "✍️": "写作",
        "⚙️": "设置",
        "🚪": "退出",
        "💡": "提示",
        "⚡": "经验",
        "🚀": "发布",
        "🎖️": "等级",
        "💪": "加油",
        "🔒": "锁定",
        "📜": "协议",
        "↑": "上",
        "↓": "下",
        "↩️": "撤销",
        "❓": "帮助",
        "🔄": "刷新",
        "▶️": "开始",
        "⏱️": "时间",
        "🎨": "创意",
        "💻": "电脑",
        "📚": "学习",
        "🛡️": "盾牌",
        "✈️": "飞机",
        "⭐": "星星",
        "🕹️": "手柄",
        "📧": "邮箱",
        "📱": "手机",
        "📑": "目录",
        "📦": "压缩",
        "📄": "文件",
        "📙": "PPT",
        "🔧": "工具",
        "🪙": "硬币",
        "💰": "金币",
        "✅": "完成",
        "🛠️": "工具",
        "💫": "星光",
        "🔍": "搜索",
        "📖": "书籍",
        "🏷️": "标签",
        "🗑️": "删除"
    };
    
    // 替换页面中的 emoji
    function replaceEmojis() {
        if (!isWindows7()) return;
        
        // 替换文本节点
        var walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );
        
        var node;
        while (node = walker.nextNode()) {
            var text = node.textContent;
            var hasEmoji = false;
            for (var emoji in emojiMap) {
                if (text.indexOf(emoji) !== -1) {
                    text = text.split(emoji).join(emojiMap[emoji]);
                    hasEmoji = true;
                }
            }
            if (hasEmoji) {
                node.textContent = text;
            }
        }
        
        // 替换属性中的 emoji（如 title, alt 等）
        var elements = document.querySelectorAll('*');
        var attrs = ['title', 'alt', 'placeholder', 'value'];
        for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            for (var j = 0; j < attrs.length; j++) {
                var attr = attrs[j];
                if (el.hasAttribute(attr)) {
                    var val = el.getAttribute(attr);
                    var hasEmoji = false;
                    for (var emoji in emojiMap) {
                        if (val.indexOf(emoji) !== -1) {
                            val = val.split(emoji).join(emojiMap[emoji]);
                            hasEmoji = true;
                        }
                    }
                    if (hasEmoji) {
                        el.setAttribute(attr, val);
                    }
                }
            }
        }
    }
    
    // DOM 加载完成后执行替换
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', replaceEmojis);
    } else {
        replaceEmojis();
    }
})();
</script>

</body>

</html>
