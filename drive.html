    <script type="module">
        import { API_BASE_URL } from './js/api-config.js?v=20260418a';

        // 兼儳鍢茶ぐ鍥儌囪尙绉垮ǎ鍥墲?
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        const loginPrompt = document.getElementById('loginPrompt');
        const driveMain = document.getElementById('driveMain');

        if (!token || !user) {
            // 哄牜浜炲▍銉ㄣ?
            loginPrompt.style.display = 'block';
        } else {
            // 规瓕灏欏▍銉ㄣ?
            driveMain.style.display = 'block';
            document.getElementById('driveUsername').textContent = user.username || '活潿鍔崺?;

            const fileListEl = document.getElementById('fileList');
            const fileCountEl = document.getElementById('fileCount');
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');

            // 闂偅ㄩ弫嫚垮婀村?
            const authHeaders = () => ({
                'Authorization': `Bearer ${token}`
            });

            // Initial Load
            loadFiles();

            /* ========== Event Listeners ========== */
            dropZone.addEventListener('click', (e) => {
                // 闂鐏濋崢夋倷熸澘姣婇弶鈺傜规娊堕垾鍐查殬糕晝鍠嶇弧鍐喆閿曗偓瑜板倿崶锔筋偨闂顦扮?
                if (e.target.closest('#progressContainer')) return;
                fileInput.click();
            });
            fileInput.addEventListener('change', handleFileSelect);

            // Drag & Drop
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
            });
            function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

            dropZone.addEventListener('dragenter', () => dropZone.classList.add('dragging'));
            dropZone.addEventListener('dragover', () => dropZone.classList.add('dragging'));
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
            dropZone.addEventListener('drop', () => dropZone.classList.remove('dragging'));

            dropZone.addEventListener('drop', handleDrop);

            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                handleFiles(files);
            }

            function handleFileSelect(e) {
                const files = e.target.files;
                handleFiles(files);
            }

            function handleFiles(files) {
                if (files.length > 0) {
                    uploadFile(files[0]);
                }
            }

            /* ========== API Functions ========== */

            async function loadFiles() {
                try {
                    const res = await fetch(`${API_BASE_URL}/drive/list`, {
                        headers: authHeaders()
                    });

                    if (res.status === 401 || res.status === 403) {
                        // Token 閺夆晛娲﹢锟犲箣閺嶃劍锟柡?
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        loginPrompt.style.display = 'block';
                        driveMain.style.display = 'none';
                        return;
                    }

                    const data = await res.json();

                    if (res.ok) {
                        renderFiles(data.files || []);
                    } else {
                        fileListEl.innerHTML = `<div style="text-align:center;color:red;padding:20px;">哄啰电涵曞礉樼儤绁伴柡鍌氭嗐垽宕氬Δ鍕┾偓? ${data.message}</div>`;
                    }
                } catch (e) {
                    fileListEl.innerHTML = `<div style="text-align:center;color:#999;padding:20px;">閺夆晝炵敮鎾嫉瀹ュ懎顫ら柛锝冨妼閵垹鎷?/div>`;
                }
            }

            const MAX_DIRECT_SIZE = 5 * 1024 * 1024; // 5MB 寸姰扮鍛導閺夋寧电鏃戝灟垫垶娼?
            const MAX_FILE_SIZE = 200 * 1024 * 1024; // 哄牃?200MB

            async function uploadFile(file) {
                if (file.size > MAX_FILE_SIZE) {
                    alert('哄倸娲▎銏緞瑜惃▔瀹ュ牆鍘撮悺鎺嚀?200MB');
                    return;
                }

                document.getElementById('progressContainer').style.display = 'block';
                updateProgress(0);
                document.getElementById('uploadStatus').textContent = '挸锕鑸电▔?..';

                try {
                    if (file.size <= MAX_DIRECT_SIZE) {
                        // 繐绻戦弸鍐佸绐褎橀幃冪博栨瑨鍘弶鐑墾辨瑩宕悡晣告鍠愬﹢鏌呴弰蹇曞竼?
                        await uploadViaBackend(file);
                    } else {
                        // 濠㈠爢鍕ù鐘侯啇变即鎳㈠畡跨悼佹稒抽幃?URL 告艾ú庡?COS
                        await uploadViaCOS(file);
                    }
                } catch (e) {
                    console.error('挸锕曞礄差亝鏅?', e);
                    alert('挸锕鑸靛緞堫袝? + (e.message || '哄牜浜為悡锟犳煥帩鍤?));
                    document.getElementById('progressContainer').style.display = 'none';
                }
            }

            // 繐绻戦弸鍐佸绐柛捣忣剚绋夐鈩冪ギ挸锕?
            function uploadViaBackend(file) {
                return new Promise((resolve, reject) => {
                    const formData = new FormData();
                    formData.append('file', file);

                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', `${API_BASE_URL}/drive/upload`, true);
                    xhr.setRequestHeader('Authorization', `Bearer ${token}`);

                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            updateProgress(Math.round((e.loaded / e.total) * 100));
                        }
                    };

                    xhr.onload = function () {
                        if (xhr.status === 200) {
                            onUploadSuccess();
                            resolve();
                        } else {
                            const resp = JSON.parse(xhr.responseText || '{}');
                            reject(new Error(resp.message || '哄牆绉存慨鐔煎闯閵娿劎绠查柛銉у仱閺佸﹦鎷?));
                        }
                    };

                    xhr.onerror = function () {
                        reject(new Error('傚啯鍨圭划鑸垫交愭潙嶅鎯扮簿欙箓鏁嶅畝鍐殲☆偀撻柡灞诲劤嶅绱掑鍐╁梺鎻掔Х?));
                    };

                    xhr.ontimeout = function () {
                        reject(new Error('挸锕鍓佹惥涱喗顦柨樼焷曨剟鏌屽㈡Ц'));
                    };

                    xhr.timeout = 60000; // 60 佸甯熺粔鎾籍?
                    xhr.send(formData);
                });
            }

            // 濠㈠爢鍕ù鐘侯啇辩檲OS 烩晝绻濈?
            async function uploadViaCOS(file) {
                // 1. 寸姴楠幃冪博栨繂绠柛娆愮墱掔宕?URL
                document.getElementById('uploadStatus').textContent = '告垵妫ˇ▔犱鐐?..';
                const signRes = await fetch(`${API_BASE_URL}/drive/sign`, {
                    method: 'POST',
                    headers: {
                        ...authHeaders(),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ fileName: file.name, fileSize: file.size })
                });

                if (!signRes.ok) {
                    const err = await signRes.json().catch(() => ({}));
                    throw new Error(err.message || '兼儳鍢茶ぐ鍥ㄧ▔犱鐐婇柛鎴弨勬潏顐バ?);
                }

                const { signedUrl } = await signRes.json();

                // 2. 活潿鍔鐑藉触?URL 烩晝绻濈曞礆?COS
                document.getElementById('uploadStatus').textContent = '挸锕鑸电▔?..';
                await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('PUT', signedUrl, true);
                    xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');

                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            updateProgress(Math.round((e.loaded / e.total) * 100));
                        }
                    };

                    xhr.onload = function () {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            resolve();
                        } else {
                            reject(new Error(`COS 挸锕鑸靛緞堫袝 (${xhr.status})`));
                        }
                    };

                    xhr.onerror = function () {
                        reject(new Error('傚啯鍨圭划鑸垫交愭潙嶅鎯扮簿欙箓鏁嶅畝鍐殲☆偀撻柡灞诲劤嶅绱掑鍐╁梺鎻掔Х?));
                    };

                    xhr.ontimeout = function () {
                        reject(new Error('挸锕鍓佹惥涱喗顦柨樻湰閺啯掔捄鍝勮煎啿鈧喓绠栧秶夐鍥╁厴摜鎷?));
                    };

                    xhr.timeout = 600000; // 濠㈠爢鍕ù?10 告帒妫濋幐鎾舵惥涱喗顦?
                    xhr.send(file);
                });

                onUploadSuccess();
            }

            function onUploadSuccess() {
                updateProgress(100);
                document.getElementById('uploadStatus').textContent = '?挸锕曞箣顫?';
                setTimeout(() => {
                    document.getElementById('progressContainer').style.display = 'none';
                    fileInput.value = '';
                    loadFiles();
                }, 1000);
            }

            function updateProgress(percent) {
                document.getElementById('progressFill').style.width = percent + '%';
                document.getElementById('uploadPercent').textContent = percent + '%';
            }

            async function downloadFile(key, name) {
                try {
                    const res = await fetch(`${API_BASE_URL}/drive/download?key=${encodeURIComponent(key)}`, {
                        headers: authHeaders()
                    });
                    const data = await res.json();

                    if (res.ok && data.url) {
                        const a = document.createElement('a');
                        a.href = data.url;
                        a.download = name;
                        a.target = '_blank';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    } else {
                        alert('哄啰电涵曟嚔瀹勬澘绲垮鎾愁儓村洭鏌悙? ' + (data.message || '哄牜浜為悡锟犳煥帩鍤?));
                    }
                } catch (e) {
                    alert('挸堝ù鍥礄差亝鏅?);
                }
            }

            async function deleteFile(key, name) {
                if (!confirm(`绢収鍠栭悾鍓ф啺鐏╅梻鍕╁戦埀?{name}靛棗绉撮幃鏁悢鍓插妰瑰灝绉紞鏃绋夊鍛诡厹鍨归ˇ鏌ュΥ娣?) return;

                try {
                    const res = await fetch(`${API_BASE_URL}/drive/delete`, {
                        method: 'POST',
                        headers: {
                            ...authHeaders(),
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ key })
                    });
                    const data = await res.json();

                    if (res.ok) {
                        loadFiles(); // 告帡鏀遍弻濠囧礆濡ゅ嫨鈧?
                    } else {
                        alert('告帞呭勬潏顐バ? ' + (data.message || '哄牜浜為悡锟犳煥帩鍤?));
                    }
                } catch (e) {
                    alert('告帞呭酣宕欏ú顏呮櫓');
                }
            }

            // Expose to window for onclick
            window.downloadFile = downloadFile;
            window.deleteFile = deleteFile;

            function renderFiles(files) {
                fileCountEl.textContent = files.length;
                fileListEl.innerHTML = '';

                if (files.length === 0) {
                    fileListEl.innerHTML = `<div style="text-align:center;padding:40px;color:#ccc;">哄棗瑰Λ夊棘ワ附顐介柨樿嫰烩晠堕妷憪磋偐粩瀛樼▔嫭寏</div>`;
                    return;
                }

                files.forEach(file => {
                    const isFolder = file.type === 'folder';
                    const icon = isFolder ? '妫啯鎯? : getFileIcon(file.name);
                    const sizeStr = isFolder ? '-' : formatSize(file.size);
                    const dateStr = file.lastModified ? new Date(file.lastModified).toLocaleString() : '';
                    // 閺夌儐鍏涚粻鐔煎棘ワ附顐介柛С垫垿鎯顓烆棗炲牆锕ら悺褏绮敂鑲闂傚啫堕?XSS
                    const safeName = escapeHtml(file.name);
                    const safeKey = escapeHtml(file.key);

                    const html = `
                    <li class="file-item">
                        <div class="file-icon">${icon}</div>
                        <div class="file-info">
                            <div class="file-name">${safeName}</div>
                            <div class="file-meta">${sizeStr} ?${dateStr}</div>
                        </div>
                        <div class="file-actions">
                            <button class="action-btn btn-download" onclick="downloadFile('${safeKey.replace(/'/g, "\\'")}', '${safeName.replace(/'/g, "\\'")}')">?挸堝ù?/button>
                            <button class="action-btn btn-share" onclick="openShareModal('${safeKey.replace(/'/g, "\\'")}', '${safeName.replace(/'/g, "\\'")}')">妫啯鏅?告帒妫旈棅?/button>
                            <button class="action-btn btn-delete" onclick="deleteFile('${safeKey.replace(/'/g, "\\'")}', '${safeName.replace(/'/g, "\\'")}')">妫啯顥旈柨?告帞?/button>
                        </div>
                    </li>
                    `;
                    fileListEl.innerHTML += html;
                });
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function formatSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            }

            function getFileIcon(name) {
                const ext = (name || '').split('.').pop().toLowerCase();
                if (['jpg', 'png', 'gif', 'jpeg', 'webp', 'svg'].includes(ext)) return '妫啯鐓犻柨?;
                if (['zip', 'rar', '7z', 'tar', 'gz'].includes(ext)) return '妫啯鎲?;
                if (['mp3', 'wav', 'flac', 'aac'].includes(ext)) return '妫啫绠?;
                if (['mp4', 'mov', 'avi', 'mkv'].includes(ext)) return '妫啫绠?;
                if (['pdf'].includes(ext)) return '妫啯鎲?;
                if (['doc', 'docx'].includes(ext)) return '妫啯鎲?;
                if (['xls', 'xlsx'].includes(ext)) return '妫啯鎯?;
                if (['ppt', 'pptx'].includes(ext)) return '妫啯鎲?;
                if (['txt', 'md'].includes(ext)) return '妫啯鎲?;
                if (['js', 'py', 'java', 'cpp', 'html', 'css'].includes(ext)) return '妫啯宕?;
                return '妫啯鎯?;
            }

            // --- 告帒妫旈棅鈺呭礉旇鍘?---
            let shareFileKey = '', shareFileName = '';

            window.openShareModal = function(key, name) {
                shareFileKey = key;
                shareFileName = name;
                document.getElementById('shareModalTitle').textContent = `告帒妫旈棅鈺呭Υ?{name}靛棗纭?
                document.getElementById('sharePassword').value = '';
                document.getElementById('shareExpires').value = '0';
                document.getElementById('shareMaxDownloads').value = '';
                document.getElementById('shareResult').style.display = 'none';
                const modal = document.getElementById('shareModal');
                modal.style.display = 'flex';
            };

            window.closeShareModal = function() {
                document.getElementById('shareModal').style.display = 'none';
            };

            window.confirmShare = async function() {
                const password = document.getElementById('sharePassword').value || undefined;
                const expiresHours = document.getElementById('shareExpires').value;
                const maxDownloads = document.getElementById('shareMaxDownloads').value || undefined;

                try {
                    const res = await fetch(`${API_BASE_URL}/drive/share`, {
                        method: 'POST',
                        headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fileKey: shareFileKey, fileName: shareFileName, password, expiresHours, maxDownloads })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        const fullUrl = location.origin + data.shareUrl;
                        const resultEl = document.getElementById('shareResult');
                        resultEl.innerHTML = `? 告帒妫旈棅鈺呮煣愵嶇瑰憡褰鍗烆嚈氬纾?br><a href="${data.shareUrl}" target="_blank" style="color:#1890ff;">${fullUrl}</a><br><button onclick="navigator.clipboard.writeText('${fullUrl}');this.textContent='瑰憡褰ˇ鏌ュ礆?'" style="margin-top:8px;padding:4px 12px;border:1px solid #1890ff;background:white;color:#1890ff;border-radius:6px;cursor:pointer;">濠㈣泛绉撮崺呮煣愵?/button>`;
                        resultEl.style.display = 'block';
                    } else {
                        alert(data.message || '告帗绋紓鎾村緞堫袝');
                    }
                } catch (e) {
                    alert('傚啯鍨圭划曟煥帩鍤?);
                }
            };
        }
    </script>

    <!-- 告帒妫旈棅鈺嚕︻厾宕?-->

    // 哄洦у畷鍙夈亜㈠憡妗冨幘?emoji
    function replaceEmojis() {
        if (!isWindows7()) return;
        
        // 哄洦у畷鏌ュ棘ャ劍鎷遍柤鍝婚崑?
        var walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );
        
        var node;
        while (node = walker.nextNode()) {
            var text = node.textContent;
            var hasEmoji = false;
            for (var emoji in emojiMap) {
                if (text.indexOf(emoji) !== -1) {
                    text = text.split(emoji).join(emojiMap[emoji]);
                    hasEmoji = true;
                }
            }
            if (hasEmoji) {
                node.textContent = text;
            }
        }
        
        // 哄洦у畷鑼沪愮补撹垫垿鎯?emoji挎稑鐗嗛々?title, alt 佹稑顧?
        var elements = document.querySelectorAll('*');
        var attrs = ['title', 'alt', 'placeholder', 'value'];
        for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            for (var j = 0; j < attrs.length; j++) {
                var attr = attrs[j];
                if (el.hasAttribute(attr)) {
                    var val = el.getAttribute(attr);
                    var hasEmoji = false;
                    for (var emoji in emojiMap) {
                        if (val.indexOf(emoji) !== -1) {
                            val = val.split(emoji).join(emojiMap[emoji]);
                            hasEmoji = true;
                        }
                    }
                    if (hasEmoji) {
                        el.setAttribute(attr, val);
                    }
                }
            }
        }
    }
    
    // DOM 告梻ù鍥┾偓版湰ㄦ岸宕ユ惔銏犫挃炴稑鏈ù㈠箲?
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', replaceEmojis);
    } else {
        replaceEmojis();
    }
})();
