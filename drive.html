    <style>
        .drive-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            min-height: 600px;
        }

        .drive-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .drive-title {
            font-size: 1.8em;
            color: #333;
            font-family: 'STKaiti', 'KaiTi', serif;
        }

        .drive-user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
            color: #666;
        }

        .drive-user-info .username {
            font-weight: 600;
            color: #00bfa5;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed #00bfa5;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #fdfdfd;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }

        .upload-area:hover {
            background: #f0fdfc;
            transform: scale(1.01);
        }

        .upload-area.dragging {
            background: #e0f2f1;
            border-color: #00897b;
        }

        .upload-icon {
            font-size: 3em;
            color: #00bfa5;
            margin-bottom: 10px;
        }

        /* File List */
        .file-list {
            list-style: none;
            padding: 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .file-item:hover {
            background: #f9f9f9;
        }

        .file-icon {
            font-size: 1.5em;
            margin-right: 15px;
            color: #666;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .file-meta {
            font-size: 0.85em;
            color: #999;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .btn-download {
            background: #e1f5fe;
            color: #0288d1;
        }

        .btn-download:hover {
            background: #b3e5fc;
        }

        .btn-delete {
            background: #ffebee;
            color: #c62828;
            opacity: 0.8;
        }

        .btn-delete:hover {
            opacity: 1;
        }

        .btn-share {
            background: #fff3e0;
            color: #e65100;
        }

        .btn-share:hover {
            background: #ffe0b2;
        }

        .share-modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .share-modal {
            background: white; border-radius: 16px; padding: 28px; max-width: 400px; width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .share-modal h3 { margin-bottom: 16px; color: #333; }
        .share-modal label { display: block; font-size: 13px; color: #666; margin: 10px 0 4px; }
        .share-modal input, .share-modal select {
            width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
        }
        .share-modal-btns { display: flex; gap: 10px; margin-top: 18px; }
        .share-modal-btns button {
            flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 14px; cursor: pointer;
        }
        .share-confirm-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .share-cancel-btn { background: #f0f0f0; color: #666; }
        .share-result { margin-top: 14px; padding: 12px; background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 8px; display: none; word-break: break-all; font-size: 13px; }

        /* Progress */
        #progressContainer {
            margin-top: 15px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #00bfa5;
            width: 0%;
            transition: width 0.3s;
        }

        /* Login Prompt */
        .login-prompt {
            text-align: center;
            padding: 80px 20px;
        }

        .login-prompt .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .login-prompt h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .login-prompt p {
            color: #999;
            margin-bottom: 30px;
        }

        .login-prompt .login-btn {
            display: inline-block;
            padding: 12px 40px;
            background: #00bfa5;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .login-prompt .login-btn:hover {
            background: #00897b;
            transform: translateY(-2px);
    </style>

<body>
    <div class="chinese-style-wrapper">
        <!-- Decoration -->
        <div class="bg-decoration"></div>

        <!-- Nav -->
        <nav class="top-nav">
            <a href="index-chinese.html" class="logo" style="text-decoration: none;">Hakimi өДГЁЕАјЬ</a>
            <div class="nav-links">
                <a href="index-chinese.html" class="nav-link">?? ЦчТі</a>
                <a href="#" class="nav-link active">?? НшЕМ</a>
            </div>
        </nav>

        <!-- ОҙөЗВјМбКҫ -->
        <div class="drive-container" id="loginPrompt" style="display:none;">
            <div class="login-prompt">
                <div class="icon">??</div>
                <h2>ЗлПИөЗВј</h2>
                <p>ФЖ¶ЛНшЕМКЗДъөДЛҪИЛОДјюҝХјдЈ¬өЗВјәујҙҝЙЙПҙ«әН№ЬАнОДјю</p>
                <a href="index-chinese.html" class="login-btn">ИҘөЗВј</a>
            </div>
        </div>

        <!-- ТСөЗВјөДНшЕМҪзГж -->
        <div class="drive-container" id="driveMain" style="display:none;">
            <div class="drive-header">
                <div class="drive-title">?? ОТөДНшЕМ</div>
                <div class="drive-user-info">
                    <span>?? <span class="username" id="driveUsername"></span></span>
                    <span>ЎӨ</span>
                    <span><span id="fileCount">0</span> ёцОДјю</span>
                </div>
            </div>

            <div class="upload-area" id="dropZone">
                <div class="upload-icon">??</div>
                <h3>өг»ч»тНПЧ§ОДјюөҪХвАпЙПҙ«</h3>
                <p style="color:#999; font-size:0.9em;">Ц§іЦИОТвёсКҪЈ¬Чоҙу 50MB ЎӨ ОДјюҪцЧФјәҝЙјы</p>
                <input type="file" id="fileInput" hidden>

                <div id="progressContainer">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:0.85em;">
                        <span id="uploadStatus">ЙПҙ«ЦР...</span>
                        <span id="uploadPercent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>

            <ul class="file-list" id="fileList">
                <div style="text-align:center; padding:30px; color:#999;" id="loadingText">
                    ХэФЪБ¬ҪУФЖ¶Л...
                </div>
            </ul>
        </div>
    </div>

    <script type="module">
        import { API_BASE_URL } from './js/api-config.js?v=20260223b';

        // »сИЎөЗВјРЕПў
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        const loginPrompt = document.getElementById('loginPrompt');
        const driveMain = document.getElementById('driveMain');

        if (!token || !user) {
            // ОҙөЗВј
            loginPrompt.style.display = 'block';
        } else {
            // ТСөЗВј
            driveMain.style.display = 'block';
            document.getElementById('driveUsername').textContent = user.username || 'УГ»§';

            const fileListEl = document.getElementById('fileList');
            const fileCountEl = document.getElementById('fileCount');
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');

            // НЁУГЗлЗуН·
            const authHeaders = () => ({
                'Authorization': `Bearer ${token}`
            });

            // Initial Load
            loadFiles();

            /* ========== Event Listeners ========== */
            dropZone.addEventListener('click', (e) => {
                // ұЬГвөг»чҪш¶ИМхЗшУтТІҙҘ·ўОДјюСЎФс
                if (e.target.closest('#progressContainer')) return;
                fileInput.click();
            });
            fileInput.addEventListener('change', handleFileSelect);

            // Drag & Drop
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
            });
            function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

            dropZone.addEventListener('dragenter', () => dropZone.classList.add('dragging'));
            dropZone.addEventListener('dragover', () => dropZone.classList.add('dragging'));
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
            dropZone.addEventListener('drop', () => dropZone.classList.remove('dragging'));

            dropZone.addEventListener('drop', handleDrop);

            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                handleFiles(files);
            }

            function handleFileSelect(e) {
                const files = e.target.files;
                handleFiles(files);
            }

            function handleFiles(files) {
                if (files.length > 0) {
                    uploadFile(files[0]);
                }
            }

            /* ========== API Functions ========== */

            async function loadFiles() {
                try {
                    const res = await fetch(`${API_BASE_URL}/drive/list`, {
                        headers: authHeaders()
                    });

                    if (res.status === 401 || res.status === 403) {
                        // Token №эЖЪ»тОЮР§
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        loginPrompt.style.display = 'block';
                        driveMain.style.display = 'none';
                        return;
                    }

                    const data = await res.json();

                    if (res.ok) {
                        renderFiles(data.files || []);
                    } else {
                        fileListEl.innerHTML = `<div style="text-align:center;color:red;padding:20px;">ОЮ·ЁјУФШОДјюБРұн: ${data.message}</div>`;
                    }
                } catch (e) {
                    fileListEl.innerHTML = `<div style="text-align:center;color:#999;padding:20px;">Б¬ҪУ·юОсЖчК§°Ь</div>`;
                }
            }

            async function uploadFile(file) {
                // Show Progress
                document.getElementById('progressContainer').style.display = 'block';
                updateProgress(0);
                document.getElementById('uploadStatus').textContent = 'ЙПҙ«ЦР...';

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', `${API_BASE_URL}/drive/upload`, true);
                    xhr.setRequestHeader('Authorization', `Bearer ${token}`);

                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            const percent = Math.round((e.loaded / e.total) * 100);
                            updateProgress(percent);
                        }
                    };

                    xhr.onload = function () {
                        if (xhr.status === 200) {
                            updateProgress(100);
                            document.getElementById('uploadStatus').textContent = '? ЙПҙ«іЙ№Ұ!';
                            setTimeout(() => {
                                document.getElementById('progressContainer').style.display = 'none';
                                fileInput.value = ''; // ЦШЦГОДјюСЎФс
                                loadFiles();
                            }, 1000);
                        } else {
                            const resp = JSON.parse(xhr.responseText || '{}');
                            alert('ЙПҙ«К§°Ь: ' + (resp.message || xhr.statusText));
                            document.getElementById('progressContainer').style.display = 'none';
                        }
                    };

                    xhr.onerror = function () {
                        alert('НшВзҙнОу');
                        document.getElementById('progressContainer').style.display = 'none';
                    };

                    xhr.send(formData);

                } catch (e) {
                    console.error(e);
                    alert('ЙПҙ«іцҙн');
                }
            }

            function updateProgress(percent) {
                document.getElementById('progressFill').style.width = percent + '%';
                document.getElementById('uploadPercent').textContent = percent + '%';
            }

            async function downloadFile(key, name) {
                try {
                    const res = await fetch(`${API_BASE_URL}/drive/download?key=${encodeURIComponent(key)}`, {
                        headers: authHeaders()
                    });
                    const data = await res.json();

                    if (res.ok && data.url) {
                        const a = document.createElement('a');
                        a.href = data.url;
                        a.download = name;
                        a.target = '_blank';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    } else {
                        alert('ОЮ·Ё»сИЎПВФШБҙҪУ: ' + (data.message || 'ОҙЦӘҙнОу'));
                    }
                } catch (e) {
                    alert('ПВФШіцҙн');
                }
            }

            async function deleteFile(key, name) {
                if (!confirm(`И·¶ЁТӘЙҫіэЎё${name}Ў№ВрЈҝҙЛІЩЧчІ»ҝЙ»ЦёҙЎЈ`)) return;

                try {
                    const res = await fetch(`${API_BASE_URL}/drive/delete`, {
                        method: 'POST',
                        headers: {
                            ...authHeaders(),
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ key })
                    });
                    const data = await res.json();

                    if (res.ok) {
                        loadFiles(); // ЛўРВБРұн
                    } else {
                        alert('ЙҫіэК§°Ь: ' + (data.message || 'ОҙЦӘҙнОу'));
                    }
                } catch (e) {
                    alert('Йҫіэіцҙн');
                }
            }

            // Expose to window for onclick
            window.downloadFile = downloadFile;
            window.deleteFile = deleteFile;

            function renderFiles(files) {
                fileCountEl.textContent = files.length;
                fileListEl.innerHTML = '';

                if (files.length === 0) {
                    fileListEl.innerHTML = `<div style="text-align:center;padding:40px;color:#ccc;">ФЭОЮОДјюЈ¬ҝмАҙЙПҙ«Т»ёц°Й~</div>`;
                    return;
                }

                files.forEach(file => {
                    const isFolder = file.type === 'folder';
                    const icon = isFolder ? '??' : getFileIcon(file.name);
                    const sizeStr = isFolder ? '-' : formatSize(file.size);
                    const dateStr = file.lastModified ? new Date(file.lastModified).toLocaleString() : '';
                    // ЧӘТеОДјюГыЦРөДМШКвЧЦ·ыЈ¬·АЦ№ XSS
                    const safeName = escapeHtml(file.name);
                    const safeKey = escapeHtml(file.key);

                    const html = `
                    <li class="file-item">
                        <div class="file-icon">${icon}</div>
                        <div class="file-info">
                            <div class="file-name">${safeName}</div>
                            <div class="file-meta">${sizeStr} ЎӨ ${dateStr}</div>
                        </div>
                        <div class="file-actions">
                            <button class="action-btn btn-download" onclick="downloadFile('${safeKey.replace(/'/g, "\\'")}', '${safeName.replace(/'/g, "\\'")}')">? ПВФШ</button>
                            <button class="action-btn btn-share" onclick="openShareModal('${safeKey.replace(/'/g, "\\'")}', '${safeName.replace(/'/g, "\\'")}')">?? ·ЦПн</button>
                            <button class="action-btn btn-delete" onclick="deleteFile('${safeKey.replace(/'/g, "\\'")}', '${safeName.replace(/'/g, "\\'")}')">??? Йҫіэ</button>
                        </div>
                    </li>
                    `;
                    fileListEl.innerHTML += html;
                });
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function formatSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            }

            function getFileIcon(name) {
                const ext = (name || '').split('.').pop().toLowerCase();
                if (['jpg', 'png', 'gif', 'jpeg', 'webp', 'svg'].includes(ext)) return '???';
                if (['zip', 'rar', '7z', 'tar', 'gz'].includes(ext)) return '??';
                if (['mp3', 'wav', 'flac', 'aac'].includes(ext)) return '??';
                if (['mp4', 'mov', 'avi', 'mkv'].includes(ext)) return '??';
                if (['pdf'].includes(ext)) return '??';
                if (['doc', 'docx'].includes(ext)) return '??';
                if (['xls', 'xlsx'].includes(ext)) return '??';
                if (['ppt', 'pptx'].includes(ext)) return '??';
                if (['txt', 'md'].includes(ext)) return '??';
                if (['js', 'py', 'java', 'cpp', 'html', 'css'].includes(ext)) return '??';
                return '??';
            }

            // --- ·ЦПн№ҰДЬ ---
            let shareFileKey = '', shareFileName = '';

            window.openShareModal = function(key, name) {
                shareFileKey = key;
                shareFileName = name;
                document.getElementById('shareModalTitle').textContent = `·ЦПнЎё${name}Ў№`;
                document.getElementById('sharePassword').value = '';
                document.getElementById('shareExpires').value = '0';
                document.getElementById('shareMaxDownloads').value = '';
                document.getElementById('shareResult').style.display = 'none';
                const modal = document.getElementById('shareModal');
                modal.style.display = 'flex';
            };

            window.closeShareModal = function() {
                document.getElementById('shareModal').style.display = 'none';
            };

            window.confirmShare = async function() {
                const password = document.getElementById('sharePassword').value || undefined;
                const expiresHours = document.getElementById('shareExpires').value;
                const maxDownloads = document.getElementById('shareMaxDownloads').value || undefined;

                try {
                    const res = await fetch(`${API_BASE_URL}/drive/share`, {
                        method: 'POST',
                        headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fileKey: shareFileKey, fileName: shareFileName, password, expiresHours, maxDownloads })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        const fullUrl = location.origin + data.shareUrl;
                        const resultEl = document.getElementById('shareResult');
                        resultEl.innerHTML = `? ·ЦПнБҙҪУТСҙҙҪЁЈЎ<br><a href="${data.shareUrl}" target="_blank" style="color:#1890ff;">${fullUrl}</a><br><button onclick="navigator.clipboard.writeText('${fullUrl}');this.textContent='ТСёҙЦЖ!'" style="margin-top:8px;padding:4px 12px;border:1px solid #1890ff;background:white;color:#1890ff;border-radius:6px;cursor:pointer;">ёҙЦЖБҙҪУ</button>`;
                        resultEl.style.display = 'block';
                    } else {
                        alert(data.message || 'ҙҙҪЁК§°Ь');
                    }
                } catch (e) {
                    alert('НшВзҙнОу');
                }
            };
        }
    </script>

    <!-- ·ЦПнөҜҙ° -->
    <div class="share-modal-overlay" id="shareModal">
        <div class="share-modal">
            <h3 id="shareModalTitle">·ЦПнОДјю</h3>
            <label>МбИЎГЬВлЈЁҝЙСЎЈ©</label>
            <input type="text" id="sharePassword" placeholder="БфҝХФтОЮРиГЬВл" maxlength="32">
            <label>УРР§ЖЪ</label>
            <select id="shareExpires">
                <option value="0">УАҫГУРР§</option>
                <option value="1">1РЎКұ</option>
                <option value="24">1Мм</option>
                <option value="168">7Мм</option>
                <option value="720">30Мм</option>
            </select>
            <label>ЧоҙуПВФШҙОКэЈЁҝЙСЎЈ©</label>
            <input type="number" id="shareMaxDownloads" placeholder="БфҝХФтІ»ПЮ" min="1" max="9999">
            <div class="share-result" id="shareResult"></div>
            <div class="share-modal-btns">
                <button class="share-cancel-btn" onclick="closeShareModal()">ИЎПы</button>
                <button class="share-confirm-btn" onclick="confirmShare()">?? ҙҙҪЁ·ЦПн</button>
            </div>
        </div>
    </div>
    <script src="js/theme.js?v=1"></script>
</body>
