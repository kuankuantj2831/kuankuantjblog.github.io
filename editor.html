<!DOCTYPE html>

<head>

    <style>
        .editor-container {
            max-width: 800px;
            margin: 100px auto 50px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .editor-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .editor-title {
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            border-color: #667eea;
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-textarea {
            min-height: 400px;
            resize: vertical;
            font-family: 'Consolas', 'Monaco', monospace;
            line-height: 1.6;
        }

        .btn-publish {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-publish:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-publish:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .preview-btn {
            margin-top: 10px;
            background: transparent;
            border: 1px solid #667eea;
            color: #667eea;
            padding: 8px 16px;
            border-radius: 4px;
    </style>
    <link rel="stylesheet" href="/css/theme.css?v=3">
</head>

<body>
    <div class="chinese-style-wrapper">
        <div class="bg-decoration"></div>

        <!-- 顶部导航 -->
        <nav class="top-nav">
            <div class="logo">Hakimi 的猫爬架</div>
            <div class="nav-links">
                <a href="/index-chinese.html" class="nav-link">🏠 返回首页</a>
            </div>
        </nav>

        <div class="editor-container">
            <div class="editor-header">
                <h1 class="editor-title">? 发布新文章</h1>
            </div>

            <form id="articleForm">
                <div class="form-group">
                    <label class="form-label">文章标题</label>
                    <input type="text" class="form-input" id="articleTitle" placeholder="请输入引人注目的标题" required>
                </div>

                <div class="form-group">
                    <label class="form-label">分类</label>
                    <select class="form-select" id="articleCategory">
                        <option value="编程技术">💻 编程技术</option>
                        <option value="游戏资源">🎮 游戏资源</option>
                        <option value="设计素材">🎨 设计素材</option>
                        <option value="学习资料">📚 学习资料</option>
                        <option value="天机工具">🔧 天机工具</option>
                        <option value="生活随笔">📝 生活随笔</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">标签 (用逗号分隔)</label>
                    <input type="text" class="form-input" id="articleTags" placeholder="例如: Python, 教程, 入门">
                </div>

                <div class="form-group">
                    <label class="form-label">文章摘要</label>
                    <input type="text" class="form-input" id="articleSummary" placeholder="一句话描述文章内容（用于首页展示）" required>
                </div>

                <div class="form-group">
                    <label class="form-label">正文内容 (支持 Markdown)</label>
                    <textarea class="form-textarea" id="articleContent" placeholder="# 标题&#10;&#10;开始你的创作..."
                        required></textarea>
                </div>

                <button type="submit" class="btn-publish" id="publishBtn">🚀 发布文章</button>
            </form>
        </div>
    </div>

    <script type="module" src="/js/editor.js?v=20260311"></script>
    <script src="/js/theme.js?v=1"></script>

<!-- Win7 Emoji 兼容性处理 -->
<script>
(function() {
    // 检测是否为 Windows 7
    function isWindows7() {
        var ua = navigator.userAgent;
        return ua.indexOf('Windows NT 6.1') !== -1 || 
               ua.indexOf('Windows 7') !== -1;
    }
    
    // Emoji 替换映射表
    var emojiMap = {
        "🐱": "猫",
        "🏠": "首页",
        "🎮": "游戏",
        "☁️": "云",
        "☀️": "太阳",
        "❤️": "爱心",
        "🎯": "关于",
        "💬": "消息",
        "🔔": "通知",
        "👤": "用户",
        "📝": "编辑",
        "⬆️": "升级",
        "🖼️": "图片",
        "✍️": "写作",
        "⚙️": "设置",
        "🚪": "退出",
        "💡": "提示",
        "⚡": "经验",
        "🚀": "发布",
        "🎖️": "等级",
        "💪": "加油",
        "🔒": "锁定",
        "📜": "协议",
        "↑": "上",
        "↓": "下",
        "↩️": "撤销",
        "❓": "帮助",
        "🔄": "刷新",
        "▶️": "开始",
        "⏱️": "时间",
        "🎨": "创意",
        "💻": "电脑",
        "📚": "学习",
        "🛡️": "盾牌",
        "✈️": "飞机",
        "⭐": "星星",
        "🕹️": "手柄",
        "📧": "邮箱",
        "📱": "手机",
        "📑": "目录",
        "📦": "压缩",
        "📄": "文件",
        "📙": "PPT",
        "🔧": "工具",
        "🪙": "硬币",
        "💰": "金币",
        "✅": "完成",
        "🛠️": "工具",
        "💫": "星光",
        "🔍": "搜索",
        "📖": "书籍",
        "🏷️": "标签",
        "🗑️": "删除"
    };
    
    // 替换页面中的 emoji
    function replaceEmojis() {
        if (!isWindows7()) return;
        
        // 替换文本节点
        var walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );
        
        var node;
        while (node = walker.nextNode()) {
            var text = node.textContent;
            var hasEmoji = false;
            for (var emoji in emojiMap) {
                if (text.indexOf(emoji) !== -1) {
                    text = text.split(emoji).join(emojiMap[emoji]);
                    hasEmoji = true;
                }
            }
            if (hasEmoji) {
                node.textContent = text;
            }
        }
        
        // 替换属性中的 emoji（如 title, alt 等）
        var elements = document.querySelectorAll('*');
        var attrs = ['title', 'alt', 'placeholder', 'value'];
        for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            for (var j = 0; j < attrs.length; j++) {
                var attr = attrs[j];
                if (el.hasAttribute(attr)) {
                    var val = el.getAttribute(attr);
                    var hasEmoji = false;
                    for (var emoji in emojiMap) {
                        if (val.indexOf(emoji) !== -1) {
                            val = val.split(emoji).join(emojiMap[emoji]);
                            hasEmoji = true;
                        }
                    }
                    if (hasEmoji) {
                        el.setAttribute(attr, val);
                    }
                }
            }
        }
    }
    
    // DOM 加载完成后执行替换
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', replaceEmojis);
    } else {
        replaceEmojis();
    }
})();
</script>

</body>

</html>
