    <!-- Win7 Emoji е…је®№жҖ§еӨ„зҗ?-->
    <script>
    (function() {
        function isWindows7() {
            var ua = navigator.userAgent;
            return ua.indexOf('Windows NT 6.1') !== -1 || 
                   ua.indexOf('Windows 7') !== -1;
        }
        
        var emojiMap = {
            "рҹҗұ": "зҢ?,
            "рҹҸ ": "йҰ–йЎө",
            "рҹҺ®": "жёёжҲҸ",
            "вҳҒпёҸ": "дә?,
            "вҳҖпё?: "еӨӘйҳі",
            "вқӨпёҸ": "зҲұеҝғ",
            "рҹҺҜ": "е…ідәҺ",
            "рҹ’¬": "ж¶ҲжҒҜ",
            "рҹ””": "йҖҡзҹҘ",
            "рҹ‘Ө": "з”ЁжҲ·",
            "рҹ“қ": "зј–иҫ‘",
            "в¬ҶпёҸ": "еҚҮзә§",
            "рҹ–јпё?: "еӣҫзүҮ",
            "вңҚпёҸ": "еҶҷдҪң",
            "рҹҡҖ": "еҸ‘еёғ",
            "рҹ“Ӣ": "еҲ—иЎЁ",
            "рҹ’»": "з”өи„‘",
            "рҹҺЁ": "и®ҫи®Ў",
            "рҹ“ҡ": "д№Ұжң¬",
            "рҹ”§": "е·Ҙе…·",
            "вҡҷпёҸ": "и®ҫзҪ®",
            "рҹӨқ": "еҗҲдҪң"
        };
        
        if (isWindows7()) {
            function replaceEmoji() {
                var elements = document.querySelectorAll('.editor-title, .nav-link, .btn-publish, label, h3');
                elements.forEach(function(el) {
                    var text = el.textContent;
                    for (var emoji in emojiMap) {
                        text = text.split(emoji).join(emojiMap[emoji]);
                    }
                    el.textContent = text;
                });
            }
            
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', replaceEmoji);
            } else {
                replaceEmoji();
            }
        }
    })();
    </script>
