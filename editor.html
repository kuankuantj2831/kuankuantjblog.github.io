        if (isWindows7()) {
            function replaceEmoji() {
                var elements = document.querySelectorAll('.editor-title, .nav-link, .btn-publish, label, h3');
                elements.forEach(function(el) {
                    var text = el.textContent;
                    for (var emoji in emojiMap) {
