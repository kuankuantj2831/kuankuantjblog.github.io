            left: 0;

            border-radius: 24px;

        .slider:before {

            content: "";

            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;

    <!-- Win7 Emoji 鍏煎鎬у鐞?-->
    <script>
    (function() {
        function isWindows7() {
            var ua = navigator.userAgent;
            return ua.indexOf('Windows NT 6.1') !== -1 || 
                   ua.indexOf('Windows 7') !== -1;
        }
        
        var emojiMap = {
            "馃惐": "鐚?,
            "馃彔": "棣栭〉",
            "馃幃": "娓告垙",
            "鈽侊笍": "浜?,
            "鈽€锔?: "澶槼",
            "鉂わ笍": "鐖卞績",
            "馃幆": "鍏充簬",
            "馃挰": "娑堟伅",
            "馃敂": "閫氱煡",
            "馃懁": "鐢ㄦ埛",
            "馃摑": "缂栬緫",
            "猬嗭笍": "鍗囩骇",
            "馃柤锔?: "鍥剧墖",
            "鉁嶏笍": "鍐欎綔",
            "馃殌": "鍙戝竷",
            "馃搵": "鍒楄〃",
            "馃捇": "鐢佃剳",
            "馃帹": "璁捐",
            "馃摎": "涔︽湰",
            "馃敡": "宸ュ叿",
            "鈿欙笍": "璁剧疆",
            "馃": "鍚堜綔"
        };
        
        if (isWindows7()) {
            function replaceEmoji() {
                var elements = document.querySelectorAll('.editor-title, .nav-link, .btn-publish, label, h3');
                elements.forEach(function(el) {
                    var text = el.textContent;
                    for (var emoji in emojiMap) {
                        text = text.split(emoji).join(emojiMap[emoji]);
                    }
                    el.textContent = text;
                });
            }
            
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', replaceEmoji);
            } else {
                replaceEmoji();
            }
        }
    })();
    </script>
