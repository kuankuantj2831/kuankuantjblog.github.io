    <script>
        function switchView(view, btn) {
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('eventsGrid').style.display = view === 'grid' ? 'grid' : 'none';
            document.getElementById('timelineView').classList.toggle('active', view === 'timeline');
            
            if (view === 'calendar') {
                showToast('哄啨卞鑽ゆ喆堢殿喒撻柛娆愬灣?);
            }
        }
        
        function showCreateEventModal() {
            document.getElementById('createEventModal').style.display = 'flex';
        }
        
        function closeCreateEventModal() {
            document.getElementById('createEventModal').style.display = 'none';
        }
        
        function createEvent() {
            const title = document.getElementById('eventTitle').value;
            if (!title) {
                showToast('犲洨鏌夌欢顓㈠礂閵夛附銇熼柛鏂诲妽爬架锝嗭紣?);
                return;
            }
            showToast('炶尪ф慨鈺呭存繄顏撮瀛樺姇盯鏁?);
            closeCreateEventModal();
        }
        
        function registerEvent(id) {
            showToast('遍幃鏇㈠箣顫犻柨楁祰曨剟鎮▎鎰炶尪ф慨鈺呮焻樿京鍙');
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0,0,0,0.8);
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 0.9em;
                z-index: 10000;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
