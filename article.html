            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }

        @keyframes coinDrop {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }

    <script type="module" src="/js/article-display.js?v=20260309a"></script>
    <script>
        // 回到顶部
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            backToTop.classList.toggle('visible', window.scrollY > 300);
        });
        backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        // 文章加载完成后生成目录和高亮代码
        document.addEventListener('article-loaded', () => {
            // 代码高亮
            if (window.hljs) {
                document.querySelectorAll('.article-content pre code').forEach(el => hljs.highlightElement(el));
            }
            // 生成目录
            const headings = document.querySelectorAll('.article-content h1, .article-content h2, .article-content h3');
            const tocContent = document.getElementById('tocContent');
            const tocSidebar = document.getElementById('tocSidebar');
            if (headings.length > 2 && tocContent && tocSidebar) {
                tocSidebar.style.display = 'block';
                headings.forEach((h, i) => {
                    h.id = 'heading-' + i;
                    const a = document.createElement('a');
                    a.href = '#heading-' + i;
                    a.textContent = h.textContent;
                    if (h.tagName === 'H3') a.className = 'toc-h3';
                    a.addEventListener('click', (e) => { e.preventDefault(); h.scrollIntoView({ behavior: 'smooth' }); });
                    tocContent.appendChild(a);
                });
            }
        });
    </script>
