        (function initFontSize() {
            const FONT_SIZE_KEY = 'article_font_size';
            const artBody = document.getElementById('artBody');
            const toolbar = document.getElementById('fontSizeToolbar');

            // 寸姴绐卭calStorage犲洩цぐ鍥┾偓欍仦嶅勮剟宕戣箛鎾卞仺
            function getSavedFontSize() {
                try {
                    return localStorage.getItem(FONT_SIZE_KEY) || 'medium';
                } catch (e) {
                    return 'medium';
                }
            }

            // 洦绻傞悺銊р偓欍仦嶅勮剟宕戣箛鎾卞仺
            function saveFontSize(size) {
                try {
                    localStorage.setItem(FONT_SIZE_KEY, size);
                } catch (e) {
                    console.warn('洦绻傞悺銊р偓欍仦嶅勮剛鎷崜褏鏋傚鎯扮簿?', e);
                }
            }

            // 煎瓨姊婚弫団偓欍仦嶅勮?
            function applyFontSize(size) {
                if (!artBody) return;
                artBody.classList.remove('font-small', 'font-medium', 'font-large');
                artBody.classList.add('font-' + size);

                // 哄洤鐡ㄩ弻濠囧箰舵劖灏垮煐?
                toolbar.querySelectorAll('.font-size-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.size === size);
                });
            }

            // 告帗绻傞～鎰板礌?
            const savedSize = getSavedFontSize();

            // 烩晜鍨幆愬箰舵劖灏鎰嚀?
            toolbar.querySelectorAll('.font-size-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const size = btn.dataset.size;
                    applyFontSize(size);
                    saveFontSize(size);
                });
            });

            // 濡炪倗鏁诲浼村礉樼儤绁伴版湰ㄦ岸宕ユ惔锛畨活潿鍔嬬换扁偓欘焽堟垹鈧稒銇炵紞瀣緞瑜惃?
            document.addEventListener('article-loaded', () => {
                applyFontSize(savedSize);
            });
        })();
    </script>

    <script>
        // 稿繈鍔岄惈鍡涙⒓涢偊鍤㈡顖椻偓宕告梻鍠曢崗?
        (function initFullscreenMode() {
            const fullscreenToggleBtn = document.getElementById('fullscreenToggleBtn');
            const exitFullscreenBtn = document.getElementById('exitFullscreenBtn');
            const articleContainer = document.querySelector('.article-container');
            const fullscreenControls = document.getElementById('fullscreenControls');

            // 閺夆晜绋戦崣鍡涘礂閵娿儳娼岄梻鍐ㄦ嚀曟澘螣ュ磭纭
            function enterFullscreenMode() {
                document.body.classList.add('fullscreen-active');
                articleContainer.classList.add('fullscreen-read-mode');

                // 繐妫欓弸鍐博樺樊囬柛锝冨妿浜涢柛鏂诲妼╁異ody挸勬禍鎺楁焼喖甯抽悘鐐插绘鍥⒒曗偓?
                if (articleContainer.parentElement !== document.body) {
                    articleContainer.dataset.originalParent = '';
                    articleContainer._originalParent = articleContainer.parentElement;
                    document.body.appendChild(articleContainer);
                }

                // 犱焦樼紞宥咁煥橆袟达絽绉堕悿?
                sessionStorage.setItem('fullscreen_scroll', window.scrollY);
                window.scrollTo(0, 0);

                // 烇綀ф慨玈C闂佹鍣ｉ埀藉?
                document.addEventListener('keydown', handleEscKey);
            }

            // 闂偀撻柛鎴濇惈欏繒﹁箛欘潐犲洨绮啯?
            function exitFullscreenMode() {
                document.body.classList.remove('fullscreen-active');
                articleContainer.classList.remove('fullscreen-read-mode');

                // 诡厹鍨归ˇ鏌ュ储斿墎绉寸紓?
                if (articleContainer._originalParent) {
                    articleContainer._originalParent.appendChild(articleContainer);
                    delete articleContainer._originalParent;
                }

                // 诡厹鍨归ˇ鎻掝煥橆袟达絽绉堕悿?
                const savedScroll = sessionStorage.getItem('fullscreen_scroll');
                if (savedScroll) {
                    setTimeout(() => window.scrollTo(0, parseInt(savedScroll)), 10);
                    sessionStorage.removeItem('fullscreen_scroll');
                }

                document.removeEventListener('keydown', handleEscKey);
            }

            // ESC闂佹鍠栭ˇ鈺呮偠?
            function handleEscKey(e) {
                if (e.key === 'Escape' && document.body.classList.contains('fullscreen-active')) {
                    exitFullscreenMode();
                }
            }

            // 備焦鍨悾鐐ｂ晜顐?
            if (fullscreenToggleBtn) {
                fullscreenToggleBtn.addEventListener('click', enterFullscreenMode);
            }
            if (exitFullscreenBtn) {
                exitFullscreenBtn.addEventListener('click', exitFullscreenMode);
            }
            if (fullscreenControls) {
                fullscreenControls.addEventListener('click', (e) => {
                    if (e.target === fullscreenControls) {
                        exitFullscreenMode();
                    }
                });
            }
        })();
    </script>

    function replaceEmojis() {
        if (!isWindows7()) return;
        
        // 哄洦у畷鏌ュ棘ャ劍鎷遍柤鍝婚崑?
        var walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );
        
        var node;
        while (node = walker.nextNode()) {
            var text = node.textContent;
            var hasEmoji = false;
            for (var emoji in emojiMap) {
                if (text.indexOf(emoji) !== -1) {
                    text = text.split(emoji).join(emojiMap[emoji]);
                    hasEmoji = true;
                }
            }
            if (hasEmoji) {
                node.textContent = text;
            }
        }
        
        // 哄洦у畷鑼沪愮补撹垫垿鎯?emoji挎稑鐗嗛々?title, alt 佹稑顧?
        var elements = document.querySelectorAll('*');
        var attrs = ['title', 'alt', 'placeholder', 'value'];
        for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            for (var j = 0; j < attrs.length; j++) {
                var attr = attrs[j];
                if (el.hasAttribute(attr)) {
                    var val = el.getAttribute(attr);
                    var hasEmoji = false;
                    for (var emoji in emojiMap) {
                        if (val.indexOf(emoji) !== -1) {
                            val = val.split(emoji).join(emojiMap[emoji]);
                            hasEmoji = true;
                        }
                    }
                    if (hasEmoji) {
                        el.setAttribute(attr, val);
                    }
                }
            }
        }
    }
    
    // DOM 告梻ù鍥┾偓版湰ㄦ岸宕ユ惔銏犫挃炴稑鏈ù㈠箲?
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', replaceEmojis);
    } else {
        replaceEmojis();
    }
})();

                    targetId: articleId,
                    targetTitle: articleTitle
                });
            }
        });
    }
});
</script>
