<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>文章加载中... - Hakimi 的猫爬架</title>
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/chinese-style.css">
    <link rel="stylesheet" href="/css/tianjg-theme.css">
    <style>
        .article-container {
            max-width: 900px;
            margin: 100px auto 50px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .article-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        .article-title {
            font-size: 32px;
            color: #333;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .article-meta {
            color: #666;
            font-size: 14px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .article-content {
            font-size: 18px;
            line-height: 1.8;
            color: #2c3e50;
            white-space: pre-wrap;
            /* 保留换行 */
        }

        /* 简单的 Markdown 样式适配 */
        .article-content h1,
        .article-content h2,
        .article-content h3 {
            margin-top: 30px;
            margin-bottom: 15px;
            color: #333;
        }

        .article-content p {
            margin-bottom: 20px;
        }

        .article-content code {
            background: #f0f0f0;
            padding: 2px 5px;
            border-radius: 3px;
            font-family: monospace;
        }

        .article-content pre {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }

        /* 投币按钮 hover 效果 */
        #coinBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(247, 151, 30, 0.4);
        }

        #likeBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 77, 79, 0.3);
        }

        .coin-amount-btn:hover {
            background: #f7971e !important;
            color: white !important;
            transform: scale(1.1);
        }

        .coin-amount-btn.selected {
            background: linear-gradient(135deg, #f7971e, #ffd200) !important;
            color: white !important;
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(247, 151, 30, 0.4);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 投币成功动画 */
        @keyframes coinDrop {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(0) rotate(360deg); opacity: 1; }
        }

        .coin-success-anim {
            animation: coinDrop 0.6s ease-out;
        }
    </style>
</head>

<body>
    <div class="chinese-style-wrapper">
        <div class="bg-decoration"></div>

        <nav class="top-nav">
            <div class="logo">Hakimi 的猫爬架</div>
            <div class="nav-links">
                <a href="/index-chinese.html" class="nav-link">🏠 返回首页</a>
                <a href="/games.html" class="nav-link">🎮 游戏</a>
            </div>
        </nav>

        <div class="article-container">
            <div id="loading" style="text-align: center; padding: 50px;">
                <div class="loading-spinner"></div>
                <p>正在加载文章...</p>
            </div>

            <article id="articleContent" style="display: none;">
                <div class="article-header">
                    <h1 class="article-title" id="artTitle"></h1>
                    <div class="article-meta">
                        <span id="artCategory"></span>
                        <span id="artDate"></span>
                        <span id="artAuthor"></span>
                        <span id="deleteBtnContainer" style="display: none;">
                            <button id="deleteArticleBtn"
                                style="background: #ff4d4f; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-left: 10px;">撤回文章</button>
                        </span>
                    </div>
                </div>
                <div class="article-content" id="artBody"></div>
                <!-- Interactions Section -->
                <div class="interactions-section"
                    style="margin-top: 50px; border-top: 1px solid #eee; padding-top: 30px;">
                    <!-- Like & Coin Buttons -->
                    <div style="text-align: center; margin-bottom: 40px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; align-items: center;">
                        <button id="likeBtn"
                            style="background: white; border: 2px solid #ff4d4f; color: #ff4d4f; padding: 10px 30px; border-radius: 30px; cursor: pointer; font-size: 18px; transition: all 0.3s;">
                            <span id="likeIcon">🤍</span> 点赞 <span id="likeCount">0</span>
                        </button>
                        <button id="coinBtn"
                            style="background: linear-gradient(135deg, #f7971e, #ffd200); border: none; color: white; padding: 10px 30px; border-radius: 30px; cursor: pointer; font-size: 18px; transition: all 0.3s; box-shadow: 0 4px 15px rgba(247, 151, 30, 0.3);">
                            🪙 投币 <span id="coinCount">0</span>
                        </button>
                    </div>

                    <!-- Coin Modal -->
                    <div id="coinModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
                        <div style="background:white; border-radius:16px; padding:30px; max-width:360px; width:90%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3); animation: fadeInUp 0.3s ease;">
                            <div style="font-size:48px; margin-bottom:10px;">🪙</div>
                            <h3 style="margin-bottom:20px; color:#333;">给作者投币</h3>
                            <div style="display:flex; justify-content:center; gap:10px; margin-bottom:20px; flex-wrap:wrap;">
                                <button class="coin-amount-btn" data-amount="1" style="width:60px; height:60px; border-radius:50%; border:2px solid #f7971e; background:white; color:#f7971e; font-size:18px; font-weight:bold; cursor:pointer; transition:all 0.2s;">1</button>
                                <button class="coin-amount-btn" data-amount="2" style="width:60px; height:60px; border-radius:50%; border:2px solid #f7971e; background:white; color:#f7971e; font-size:18px; font-weight:bold; cursor:pointer; transition:all 0.2s;">2</button>
                                <button class="coin-amount-btn" data-amount="5" style="width:60px; height:60px; border-radius:50%; border:2px solid #f7971e; background:white; color:#f7971e; font-size:18px; font-weight:bold; cursor:pointer; transition:all 0.2s;">5</button>
                                <button class="coin-amount-btn" data-amount="10" style="width:60px; height:60px; border-radius:50%; border:2px solid #f7971e; background:white; color:#f7971e; font-size:18px; font-weight:bold; cursor:pointer; transition:all 0.2s;">10</button>
                            </div>
                            <p id="coinModalBalance" style="font-size:13px; color:#999; margin-bottom:15px;">我的余额：加载中...</p>
                            <div style="display:flex; gap:10px; justify-content:center;">
                                <button id="coinConfirmBtn" style="background:linear-gradient(135deg, #f7971e, #ffd200); color:white; border:none; padding:10px 30px; border-radius:25px; font-size:16px; cursor:pointer; font-weight:bold;">确认投币</button>
                                <button id="coinCancelBtn" style="background:#f0f0f0; color:#666; border:none; padding:10px 30px; border-radius:25px; font-size:16px; cursor:pointer;">取消</button>
                            </div>
                        </div>
                    </div>

                    <!-- Comments Section -->
                    <div class="comments-section">
                        <h3 style="margin-bottom: 20px;">评论区</h3>

                        <!-- Comment Form -->
                        <div id="commentFormContainer" style="margin-bottom: 30px;">
                            <textarea id="commentInput" placeholder="写下你的评论..."
                                style="width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; resize: vertical; margin-bottom: 10px;"></textarea>
                            <button id="submitCommentBtn"
                                style="background: #1890ff; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer;">发布评论</button>
                        </div>
                        <div id="loginToComment"
                            style="display: none; text-align: center; padding: 20px; background: #f9f9f9; border-radius: 8px; margin-bottom: 30px;">
                            <p>请 <a href="#"
                                    onclick="document.getElementById('loginModal').style.display='block'; return false;"
                                    style="color: #1890ff;">登录</a> 后发表评论</p>
                        </div>

                        <!-- Comments List -->
                        <div id="commentsList">
                            <!-- Comments will be loaded here -->
                        </div>
                    </div>
                </div>
            </article>
        </div>
    </div>

    <script type="module" src="/js/article-display.js?v=20260223c"></script>
</body>

</html>
