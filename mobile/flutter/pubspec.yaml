name: hakimi_blog
version: 1.0.0+1
publish_to: none
description: Hakimi Blog Flutter App

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # 状态管理
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # 网络请求
  dio: ^5.4.0
  retrofit: ^4.0.3
  
  # 本地存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 路由
  go_router: ^12.1.1
  
  # UI 组件
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4
  pull_to_refresh: ^2.0.0
  flutter_staggered_grid_view: ^0.7.0
  
  # WebView
  webview_flutter: ^4.4.2
  
  # 推送通知
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0
  
  # 社交分享
  share_plus: ^7.2.1
  
  # 图片选择
  image_picker: ^1.0.7
  
  # 设备信息
  device_info_plus: ^9.1.1
  package_info_plus: ^5.0.1
  
  # 工具
  logger: ^2.0.2+1
  intl: ^0.18.1
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  get_it: ^7.6.4
  injectable: ^2.3.2

  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints