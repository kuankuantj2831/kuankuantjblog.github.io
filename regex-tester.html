﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姝垯琛ㄨ揪忔祴曞櫒 - 更多功能兘</title>
    <link rel="stylesheet" href="css/chinese-style.css">
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
        }
        
        .regex-tester-container {
            max-width: 800px;
            margin: 50px auto;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .regex-inputs {
            margin-bottom: 20px;
        }
        
        .regex-input-container {
            margin-bottom: 15px;
        }
        
        .regex-input-container label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        .regex-input-container input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: 'Monaco', 'Menlo', monospace;
        }
        
        .regex-input-container textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            resize: vertical;
        }
        
        .regex-flags {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .regex-flags label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            color: #555;
        }
        
        .test-button {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .test-button button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .test-button button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .test-results {
            margin-top: 20px;
            padding: 15px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }
        
        .results-count {
            margin-bottom: 15px;
            padding: 10px;
            background-color: #fff;
            border-radius: 5px;
            font-size: 14px;
            color: #555;
        }
        
        .results-list {
            margin-top: 10px;
            padding: 10px;
            background-color: #fff;
            border-radius: 5px;
        }
        
        .match-item {
            margin-bottom: 10px;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 5px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
        }
        
        .match-text {
            background-color: #fff3cd;
            padding: 2px 5px;
            border-radius: 3px;
        }
        
        .match-groups {
            margin-top: 5px;
            font-size: 12px;
            color: #666;
        }
        
        .regex-error {
            background-color: #ffe6e6;
            color: #c53030;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        
        @media (max-width: 768px) {
            .regex-tester-container {
                margin: 20px;
                padding: 15px;
            }
            
            .regex-flags {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="regex-tester-container">
        <h1>馃攳 姝垯琛ㄨ揪忔祴曞櫒</h1>
        
        <div class="regex-inputs">
            <div class="regex-input-container">
                <label for="regexPattern">姝垯琛ㄨ揪忔ā?/label>
                <input type="text" id="regexPattern" placeholder="疯緭鍏ユ鍒欒〃杈紡紡...">
            </div>
            
            <div class="regex-input-container">
                <label for="testText">嬭瘯鏂湰</label>
                <textarea id="testText" placeholder="疯緭鍏ヨ嬭瘯鐨勬枃鏈?.."></textarea>
            </div>
            
            <div class="regex-flags">
                <label>
                    <input type="checkbox" id="flagG">
                    鍏眬鎼滅储 (g)
                </label>
                <label>
                    <input type="checkbox" id="flagI">
                    蹇界暐у皬鍐?(i)
                </label>
                <label>
                    <input type="checkbox" id="flagM">
                    氳紡 (m)
                </label>
                <label>
                    <input type="checkbox" id="flagU">
                    Unicode 鏀寔 (u)
                </label>
                <label>
                    <input type="checkbox" id="flagY">
                    绮樻у尮閰?(y)
                </label>
            </div>
        </div>
        
        <div class="test-button">
            <button id="testBtn">嬭瘯姝垯琛ㄨ揪?/button>
        </div>
        
        <div class="test-results">
            <div id="resultsContent"></div>
        </div>
    </div>
    
    <script>
        document.getElementById('testBtn').addEventListener('click', function() {
            const regexPattern = document.getElementById('regexPattern').value;
            const testText = document.getElementById('testText').value;
            
            if (!regexPattern) {
                alert('疯緭鍏ユ鍒欒〃杈紡紡');
                return;
            }
            
            const flags = [];
            if (document.getElementById('flagG').checked) flags.push('g');
            if (document.getElementById('flagI').checked) flags.push('i');
            if (document.getElementById('flagM').checked) flags.push('m');
            if (document.getElementById('flagU').checked) flags.push('u');
            if (document.getElementById('flagY').checked) flags.push('y');
            
            try {
                const regex = new RegExp(regexPattern, flags.join(''));
                const results = testText.match(regex);
                
                displayResults(regex, testText, results);
            } catch (error) {
                displayError(error);
            }
        });
        
        function displayResults(regex, testText, results) {
            const resultsContent = document.getElementById('resultsContent');
            resultsContent.innerHTML = '';
            
            if (!results) {
                resultsContent.innerHTML = '<p>娌湁鎵埌鍖归厤?/p>';
                return;
            }
            
            const countDiv = document.createElement('div');
            countDiv.className = 'results-count';
            countDiv.textContent = `鎵埌 ${results.length} 涓尮閰」`;
            resultsContent.appendChild(countDiv);
            
            const listDiv = document.createElement('div');
            listDiv.className = 'results-list';
            
            // 楂樹寒鏄剧ず鍖归厤?            let highlightedText = testText.replace(regex, function(match) {
                return `<span class="match-text">${match}</span>`;
            });
            
            const matchDiv = document.createElement('div');
            matchDiv.className = 'match-item';
            matchDiv.innerHTML = `
                <div>鍖归厤鏂湰: ${highlightedText}</div>
            `;
            listDiv.appendChild(matchDiv);
            
            // 鏄剧ず鍒嗙粍淇伅
            if (results.length > 1) {
                const groupsDiv = document.createElement('div');
                groupsDiv.className = 'match-groups';
                groupsDiv.innerHTML = '鍒嗙粍淇伅:<br>';
                
                for (let i = 1; i < results.length; i++) {
                    groupsDiv.innerHTML += `鍒嗙粍 ${i}: ${results[i]}<br>`;
                }
                
                listDiv.appendChild(groupsDiv);
            }
            
            resultsContent.appendChild(listDiv);
        }
        
        function displayError(error) {
            const resultsContent = document.getElementById('resultsContent');
            resultsContent.innerHTML = `<div class="regex-error">姝垯琛ㄨ揪忛敊? ${error.message}</div>`;
        }
    </script>
</body>
</html>
