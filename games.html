    <script>
    (function() {
        const API_BASE = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
            ? 'http://localhost:9000' : 'https://1321178544-65fvlfs2za.ap-beijing.tencentscf.com';

        const medals = ['妫喚娈?, '妫喚娈?, '妫喚娈?];
        let currentGame = 'snake';

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        async function loadLeaderboard(gameName) {
            const container = document.getElementById('leaderboardContent');
            container.innerHTML = '<div class="leaderboard-loading">告梻ù鍥ㄧ▔?..</div>';
            try {
                const res = await fetch(`${API_BASE}/games/leaderboard/${encodeURIComponent(gameName)}?limit=20`);
                if (!res.ok) throw new Error('犲洭鏀遍惇鐗堝緞堫袝');
                const rows = await res.json();

                if (!rows.length) {
                    container.innerHTML = '<div class="leaderboard-empty">哄棗瑰Λ媼閺夎法绉块柨樿嫰烩晠宕煎煑规潙绻懙鎴箣亣嬬婂厸斿瓨绋夐鍐憪帗绮庡▓鎴炵嫭岄柨?/div>';
                    return;
                }

                let html = '<table class="leaderboard-table"><thead><tr>' +
                    '<th>圭儤甯掗幃?/th><th>绘壕鏅涢?/th><th>告帒妫欓弳?/th><th>活潿鍔嶅?/th>' +
                    '</tr></thead><tbody>';

                rows.forEach((r, i) => {
                    const rank = i < 3
                        ? '<span class="rank-medal">' + medals[i] + '</span>'
                        : '<span class="rank-num">' + (i + 1) + '</span>';
                    const name = escapeHtml(r.username || '告牕鐏濋幃?);
                    html += '<tr>' +
                        '<td>' + rank + '</td>' +
                        '<td>' + name + '</td>' +
                        '<td><span class="score-val">' + r.score + '</span></td>' +
                        '<td><span class="time-val">' + (r.play_time || '-') + 's</span></td>' +
                        '</tr>';
                });

                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (e) {
                console.error('圭儤甯熼、鎴濐潡濠婂啫顫ｉ弶鐐舵閵垹鎷?, e);
                container.innerHTML = '<div class="leaderboard-empty" style="color:#ff6b6b;">告梻ù鍥緞堫袝挎稑鐭侀礆垮鐓闂佹彃绉烽惁?/div>';
            }
        }

        // Tab 告帒娲畷?
        document.querySelectorAll('.leaderboard-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelector('.leaderboard-tab.active').classList.remove('active');
                tab.classList.add('active');
                currentGame = tab.dataset.game;
                loadLeaderboard(currentGame);
            });
        });

        // 告帗绻傞～鎰板礉樼儤绁?
        loadLeaderboard(currentGame);

        // 衡偓栨稑鐦ù?URL hash 庤鐭紞鍛村礆楀牆绗撻悶樻湰?
        if (location.hash === '#leaderboard') {
            setTimeout(() => {
                document.getElementById('leaderboard').scrollIntoView({ behavior: 'smooth' });
            }, 300);
        }
    })();
    </script>
