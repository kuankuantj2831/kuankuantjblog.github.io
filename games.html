<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <!-- 性能优化：预连接 API 服务器 -->
    <link rel="dns-prefetch" href="//1321178544-65fvlfs2za.ap-beijing.tencentscf.com">
    <link rel="preconnect" href="https://1321178544-65fvlfs2za.ap-beijing.tencentscf.com" crossorigin>

    <link rel="shortcut icon" href="favicon.ico">
    <link rel="stylesheet" href="css/chinese-style.css">

    <style>
        .games-container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .game-thumbnail {
            height: 200px;
            background: linear-gradient(45deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        .game-info {
            padding: 20px;
        }

        .game-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .game-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .play-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            background: #5cceee;
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .play-btn:hover {
            background: #4ab8d8;
        }

        /* 排行榜区域 */
        .leaderboard-section {
            max-width: 800px;
            margin: 0 auto 60px;
            padding: 0 20px;
        }

        .leaderboard-section h2 {
            text-align: center;
            color: #faad14;
            font-size: 28px;
            margin-bottom: 24px;
        }

        .leaderboard-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .leaderboard-tab {
            padding: 8px 24px;
            border: 2px solid rgba(250, 173, 20, 0.3);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .leaderboard-tab:hover {
            border-color: rgba(250, 173, 20, 0.6);
            color: #faad14;
        }

        .leaderboard-tab.active {
            background: rgba(250, 173, 20, 0.15);
            border-color: #faad14;
            color: #faad14;
            font-weight: bold;
        }

        .leaderboard-card {
            background: rgba(26, 26, 46, 0.9);
            border: 1px solid rgba(250, 173, 20, 0.2);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }

        .leaderboard-table th {
            padding: 14px 16px;
            text-align: left;
            color: #faad14;
            font-size: 13px;
            border-bottom: 1px solid rgba(250, 173, 20, 0.2);
            background: rgba(250, 173, 20, 0.05);
        }

        .leaderboard-table th:nth-child(3),
        .leaderboard-table th:nth-child(4) {
            text-align: right;
        }

        .leaderboard-table td {
            padding: 12px 16px;
            color: #e0e0e0;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .leaderboard-table td:nth-child(3),
        .leaderboard-table td:nth-child(4) {
            text-align: right;
        }

        .leaderboard-table tr:hover td {
            background: rgba(250, 173, 20, 0.05);
        }

        .leaderboard-table .rank-medal {
            font-size: 18px;
        }

        .leaderboard-table .rank-num {
            color: #888;
            font-weight: bold;
        }

        .leaderboard-table .score-val {
            color: #faad14;
            font-weight: bold;
        }

        .leaderboard-table .time-val {
            color: #888;
        }

        .leaderboard-empty {
            text-align: center;
            padding: 40px 20px;
            color: #888;
            font-size: 15px;
        }

        .leaderboard-loading {
            text-align: center;
            padding: 40px 20px;
            color: #aaa;
        }
    </style>
    <link rel="stylesheet" href="css/theme.css?v=3">
</head>

<body>
    <div class="chinese-style-wrapper">
        <div class="bg-decoration"></div>

        <nav class="top-nav">
            <div class="logo">Hakimi 的猫爬架</div>
            <div class="nav-links">
                <a href="index-chinese.html" class="nav-link">🏠 主页</a>
                <a href="games.html" class="nav-link active">🎮 游戏</a>
                <a href="#" class="nav-link">☁️ 网盘</a>
                <a href="#" class="nav-link">🎯 关于我们</a>
            </div>
        </nav>

        <div class="games-container">
            <!-- Snake Game Card -->
            <a href="games/snake/index.html" class="game-card" target="_blank">
                <div class="game-thumbnail">
                    🐍
                </div>
                <div class="game-info">
                    <div class="game-title">贪吃蛇</div>
                    <div class="game-desc">经典的贪吃蛇游戏，支持存档、成就系统和移动端操作。挑战最高分吧！</div>
                    <span class="play-btn">开始游戏</span>
                </div>
            </a>

            <!-- Lights Out Game Card -->
            <a href="xidengyouxi/index.html" class="game-card" target="_blank">
                <div class="game-thumbnail" style="background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #0c0c1d 100%);">
                    ✨
                </div>
                <div class="game-info">
                    <div class="game-title">熄灯游戏</div>
                    <div class="game-desc">点击格子切换它和相邻格子的状态，将所有灯熄灭即可过关！支持多种棋盘大小和提示系统。</div>
                    <span class="play-btn">开始游戏</span>
                </div>
            </a>

            <!-- Huarong Dao Game Card -->
            <a href="games/huarongdao/index.html" class="game-card" target="_blank">
                <div class="game-thumbnail" style="background: linear-gradient(135deg, #1a0a00 0%, #3d1c00 50%, #1a0a00 100%);">
                    ♟️
                </div>
                <div class="game-info">
                    <div class="game-title">华容道</div>
                    <div class="game-desc">经典三国益智游戏，移动棋子让曹操从出口逃脱。多种布局可选，支持撤销和计时，挑战最少步数！</div>
                    <span class="play-btn">开始游戏</span>
                </div>
            </a>

            <!-- 2048 Game Card -->
            <a href="games/2048/index.html" class="game-card" target="_blank">
                <div class="game-thumbnail" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #667eea 100%);">
                    🔢
                </div>
                <div class="game-info">
                    <div class="game-title">2048</div>
                    <div class="game-desc">经典数字拼图游戏，合并相同数字，挑战合成2048！支持撤销和最高分记录。</div>
                    <span class="play-btn">开始游戏</span>
                </div>
            </a>

            <!-- More games placeholder -->
            <div class="game-card" style="opacity: 0.7; cursor: default;">
                <div class="game-thumbnail" style="background: #eee; color: #999;">
                    🚧
                </div>
                <div class="game-info">
                    <div class="game-title">敬请期待</div>
                    <div class="game-desc">更多精彩游戏正在开发中...</div>
                </div>
            </div>
        </div>

        <!-- 全局排行榜 -->
        <div class="leaderboard-section">
            <h2>🏆 游戏排行榜</h2>
            <div class="leaderboard-tabs">
                <button class="leaderboard-tab active" data-game="snake">🐍 贪吃蛇</button>
                <button class="leaderboard-tab" data-game="xidengyouxi">✨ 熄灯游戏</button>
                <button class="leaderboard-tab" data-game="huarongdao">♟️ 华容道</button>
            </div>
            <div class="leaderboard-card">
                <div id="leaderboardContent" class="leaderboard-loading">加载中...</div>
            </div>
        </div>
    </div>

    <script src="js/theme.js?v=1"></script>
    <script>
    (function() {
        const API_BASE = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
            ? 'http://localhost:9000' : 'https://1321178544-65fvlfs2za.ap-beijing.tencentscf.com';

        const medals = ['🥇', '🥈', '🥉'];
        let currentGame = 'snake';

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        async function loadLeaderboard(gameName) {
            const container = document.getElementById('leaderboardContent');
            container.innerHTML = '<div class="leaderboard-loading">加载中...</div>';
            try {
                const res = await fetch(`${API_BASE}/games/leaderboard/${encodeURIComponent(gameName)}?limit=20`);
                if (!res.ok) throw new Error('请求失败');
                const rows = await res.json();

                if (!rows.length) {
                    container.innerHTML = '<div class="leaderboard-empty">暂无记录，快去游戏中成为第一个上榜的人吧！</div>';
                    return;
                }

                let html = '<table class="leaderboard-table"><thead><tr>' +
                    '<th>排名</th><th>玩家</th><th>分数</th><th>用时</th>' +
                    '</tr></thead><tbody>';

                rows.forEach((r, i) => {
                    const rank = i < 3
                        ? '<span class="rank-medal">' + medals[i] + '</span>'
                        : '<span class="rank-num">' + (i + 1) + '</span>';
                    const name = escapeHtml(r.username || '匿名');
                    html += '<tr>' +
                        '<td>' + rank + '</td>' +
                        '<td>' + name + '</td>' +
                        '<td><span class="score-val">' + r.score + '</span></td>' +
                        '<td><span class="time-val">' + (r.play_time || '-') + 's</span></td>' +
                        '</tr>';
                });

                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (e) {
                console.error('排行榜加载失败:', e);
                container.innerHTML = '<div class="leaderboard-empty" style="color:#ff6b6b;">加载失败，请刷新重试</div>';
            }
        }

        // Tab 切换
        document.querySelectorAll('.leaderboard-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelector('.leaderboard-tab.active').classList.remove('active');
                tab.classList.add('active');
                currentGame = tab.dataset.game;
                loadLeaderboard(currentGame);
            });
        });

        // 初始加载
        loadLeaderboard(currentGame);
    })();
    </script>
</body>

</html>
