<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="description" content="个人中心 - kuankuantj的个人博客">

    <title>个人中心 - kuankuantj的个人博客</title>

    <!-- 性能优化：预连接 API 服务器 -->
    <link rel="dns-prefetch" href="//1321178544-65fvlfs2za.ap-beijing.tencentscf.com">
    <link rel="preconnect" href="https://1321178544-65fvlfs2za.ap-beijing.tencentscf.com" crossorigin>

    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/profile.css">

    <script src="/js/pace.min.js" async></script>
    <link rel="stylesheet" href="/css/theme.css?v=3">
</head>

<body>
    <!-- 返回首页按钮 -->
    <a href="/index-chinese.html" class="back-to-home" title="返回首页">
        🏠
    </a>

    <div class="profile-wrapper">
        <div class="profile-container">
            <!-- 用户头部 -->
            <div class="profile-header">
                <div class="profile-avatar-section">
                    <div class="profile-avatar" id="profileAvatar">
                        U
                    </div>
                    <button class="avatar-upload-btn" onclick="document.getElementById('avatarInput').click()">
                        📷
                    </button>
                    <input type="file" id="avatarInput" class="avatar-upload-input" accept="image/*">
                </div>
                <div class="profile-info">
                    <h1 class="profile-name" id="profileName">加载中...</h1>
                    <p class="profile-email" id="profileEmail">加载中...</p>
                    <p class="profile-date" id="profileDate">注册时间：加载中...</p>
                </div>
            </div>

            <!-- 个人信息卡片 -->
            <div class="profile-card">
                <h2 class="profile-card-title">个人信息</h2>

                <div class="profile-message success" id="infoSuccessMsg">
                    ? 信息更新成功！
                </div>
                <div class="profile-message error" id="infoErrorMsg">
                    ? 更新失败，请重试
                </div>

                <form id="profileInfoForm">
                    <div class="profile-form-group">
                        <label class="profile-form-label">用户名</label>
                        <input type="text" class="profile-form-input" id="displayName" placeholder="请输入用户名" required>
                    </div>

                    <div class="profile-form-group">
                        <label class="profile-form-label">邮箱地址</label>
                        <input type="email" class="profile-form-input" id="email" disabled>
                    </div>

                    <div class="profile-form-group">
                        <label class="profile-form-label">个人简介</label>
                        <textarea class="profile-form-textarea" id="bio" placeholder="介绍一下自己吧..."></textarea>
                    </div>

                    <button type="submit" class="profile-btn profile-btn-primary">
                        💾 保存信息
                    </button>
                </form>
            </div>

            <!-- 安全设置卡片 -->
            <div class="profile-card">
                <h2 class="profile-card-title">安全设置</h2>

                <div class="profile-message success" id="passwordSuccessMsg">
                    ? 密码修改成功！
                </div>
                <div class="profile-message error" id="passwordErrorMsg">
                    ? 密码修改失败
                </div>

                <form id="changePasswordForm">
                    <div class="profile-form-group">
                        <label class="profile-form-label">当前密码</label>
                        <input type="password" class="profile-form-input" id="currentPassword" placeholder="请输入当前密码"
                            required>
                    </div>

                    <div class="profile-form-group">
                        <label class="profile-form-label">新密码</label>
                        <input type="password" class="profile-form-input" id="newPassword" placeholder="请输入新密码（至少6个字符）"
                            required>
                    </div>

                    <div class="profile-form-group">
                        <label class="profile-form-label">确认新密码</label>
                        <input type="password" class="profile-form-input" id="confirmPassword" placeholder="请再次输入新密码"
                            required>
                    </div>

                    <button type="submit" class="profile-btn profile-btn-primary">
                        🔒 修改密码
                    </button>
                </form>
                </form>
            </div>

            <!-- 2FA 设置卡片 -->
            <div class="profile-card">
                <h2 class="profile-card-title">双重验证 (2FA)</h2>
                <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 15px;">
                    <div>
                        <p style="font-weight: bold; margin-bottom: 5px;">登录保护</p>
                        <p style="color: #666; font-size: 14px;">开启后，登录时需要输入邮箱验证码</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="toggle2fa">
                        <span class="slider round"></span>
                    </label>
                </div>
                <style>
                    /* Switch Toggle Styles */
                    .switch {
                        position: relative;
                        display: inline-block;
                        width: 50px;
                        height: 24px;
                    }

                    .switch input {
                        opacity: 0;
                        width: 0;
                        height: 0;
                    }

                    .slider {
                        position: absolute;
                        cursor: pointer;
                        top: 0;
                        left: 0;
                        right: 0;
                        bottom: 0;
                        background-color: #ccc;
                        transition: .4s;
                        border-radius: 24px;
                    }

                    .slider:before {
                        position: absolute;
                        content: "";
                        height: 16px;
                        width: 16px;
                        left: 4px;
                        bottom: 4px;
                        background-color: white;
                        transition: .4s;
                        border-radius: 50%;
                    }

                    input:checked+.slider {
                        background-color: #1890ff;
                    }

                    input:checked+.slider:before {
                        transform: translateX(26px);
                    }
                </style>
            </div>

            <!-- 账号统计 -->
            <div class="profile-card">
                <h2 class="profile-card-title">账号统计</h2>
                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="statDays">0</div>
                        <div class="stat-label">注册天数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statLogins">1</div>
                        <div class="stat-label">登录次数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statPosts">0</div>
                        <div class="stat-label">发布文章</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statFavorites">0</div>
                        <div class="stat-label">收藏文章</div>
                    </div>
                </div>
            </div>

            <!-- 我的收藏 -->
            <div class="profile-card">
                <h2 class="profile-card-title">? 我的收藏</h2>
                <div id="favoritesList" style="min-height: 60px;">
                    <p style="text-align:center;color:#999;">加载中...</p>
                </div>
                <div id="favoritesLoadMore" style="text-align:center;margin-top:15px;display:none;">
                    <button onclick="window.profileManager.loadMoreFavorites()" style="background:#1890ff;color:white;border:none;padding:8px 24px;border-radius:20px;cursor:pointer;font-size:14px;">加载更多</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/js/profile.js?v=20260311b"></script>
    <script src="/js/bg-loader.js"></script>
    <script src="/js/theme.js?v=1"></script>
</body>

</html>
