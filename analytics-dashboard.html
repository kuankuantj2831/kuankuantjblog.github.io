<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鏁版嵁鍒嗘瀽涓績 - Hakimi 鐨勭尗鐖灦</title>
    <link rel="stylesheet" href="css/chinese-style.css">
    <script src="https://unpkg.com/chart.js"></script>
    <style>
        .analytics-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .analytics-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 16px;
            margin-bottom: 30px;
        }
        
        .analytics-header h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
        }
        
        .analytics-header p {
            margin: 0;
            opacity: 0.9;
        }
        
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 24px;
        }
        
        .stat-icon.views {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .stat-icon.likes {
            background: #fce4ec;
            color: #c2185b;
        }
        
        .stat-icon.comments {
            background: #e8f5e9;
            color: #388e3c;
        }
        
        .stat-icon.favorites {
            background: #fff3e0;
            color: #f57c00;
        }
        
        .stat-icon.articles {
            background: #f3e5f5;
            color: #7b1fa2;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        
        .stat-change {
            font-size: 12px;
            margin-top: 4px;
        }
        
        .stat-change.up {
            color: #4caf50;
        }
        
        .stat-change.down {
            color: #f44336;
        }
        
        .chart-section {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 18px;
            margin: 0 0 20px 0;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        .articles-list {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .articles-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .articles-table th,
        .articles-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .articles-table th {
            font-weight: 600;
            color: #666;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .articles-table tr:hover {
            background: #f8f9fa;
        }
        
        .article-title {
            font-weight: 500;
            color: #333;
        }
        
        .article-title a {
            color: inherit;
            text-decoration: none;
        }
        
        .article-title a:hover {
            color: #667eea;
        }
        
        .metric-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .metric-badge.views {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .metric-badge.likes {
            background: #fce4ec;
            color: #c2185b;
        }
        
        .metric-badge.comments {
            background: #e8f5e9;
            color: #388e3c;
        }
        
        .date-filter {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .date-filter button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .date-filter button:hover {
            background: #f5f5f5;
        }
        
        .date-filter button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .loading-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .trend-indicator {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            font-size: 12px;
        }
        
        .trend-up {
            color: #4caf50;
        }
        
        .trend-down {
            color: #f44336;
        }
        
        @media (max-width: 768px) {
            .stats-overview {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .analytics-header {
                padding: 24px;
            }
            
            .articles-table {
                font-size: 14px;
            }
            
            .articles-table th:nth-child(3),
            .articles-table td:nth-child(3) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="chinese-style-wrapper">
        <nav class="top-nav">
            <div class="nav-links">
                <a href="index.html" class="nav-link">棣栭〉</a>
                <a href="profile.html" class="nav-link">涓汉涓績</a>
                <a href="analytics-dashboard.html" class="nav-link active">鏁版嵁鍒嗘瀽</a>
            </div>
        </nav>
        
        <div class="analytics-wrapper">
            <div class="analytics-header">
                <h1>馃搳 鏁版嵁鍒嗘瀽涓績</h1>
                <p>娲炲療鏂囩珷琛ㄧ幇锛屼紭鍖栧垱浣滅瓥锟?/p>
            </div>
            
            <!-- 鏁版嵁姒傝 -->
            <div class="stats-overview" id="statsOverview">
                <div class="stat-card">
                    <div class="stat-icon views">馃憗</div>
                    <div class="stat-value" id="totalViews">-</div>
                    <div class="stat-label">鎬婚槄璇婚噺</div>
                    <div class="stat-change up" id="viewsChange">+0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon likes">锟?/div>
                    <div class="stat-value" id="totalLikes">-</div>
                    <div class="stat-label">鎬荤偣璧炴暟</div>
                    <div class="stat-change up" id="likesChange">+0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon comments">馃挰</div>
                    <div class="stat-value" id="totalComments">-</div>
                    <div class="stat-label">鎬昏瘎璁烘暟</div>
                    <div class="stat-change up" id="commentsChange">+0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon favorites">锟?/div>
                    <div class="stat-value" id="totalFavorites">-</div>
                    <div class="stat-label">鎬绘敹钘忔暟</div>
                    <div class="stat-change up" id="favoritesChange">+0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon articles">馃摑</div>
                    <div class="stat-value" id="totalArticles">-</div>
                    <div class="stat-label">鏂囩珷鎬绘暟</div>
                </div>
            </div>
            
            <!-- 鏃堕棿绛涳拷?-->
            <div class="date-filter">
                <button class="active" data-range="7">锟?锟?/button>
                <button data-range="30">锟?0锟?/button>
                <button data-range="90">锟?0锟?/button>
                <button data-range="365">杩戜竴锟?/button>
            </div>
            
            <!-- 瓒嬪娍鍥捐〃 -->
            <div class="chart-section">
                <h2 class="section-title">
                    <span>馃搱</span>
                    闃呰瓒嬪娍
                </h2>
                <div class="chart-container">
                    <canvas id="viewsChart"></canvas>
                </div>
            </div>
            
            <div class="chart-section">
                <h2 class="section-title">
                    <span>馃幆</span>
                    浜掑姩鍒嗘瀽
                </h2>
                <div class="chart-container">
                    <canvas id="engagementChart"></canvas>
                </div>
            </div>
            
            <!-- 鐑棬鏂囩珷 -->
            <div class="articles-list">
                <h2 class="section-title">
                    <span>馃敟</span>
                    鐑棬鏂囩珷鎺掕
                </h2>
                <div id="articlesTableContainer">
                    <table class="articles-table">
                        <thead>
                            <tr>
                                <th>鎺掑悕</th>
                                <th>鏂囩珷鏍囬</th>
                                <th>鍙戝竷鏃堕棿</th>
                                <th>闃呰锟?/th>
                                <th>鐐硅禐</th>
                                <th>璇勮</th>
                            </tr>
                        </thead>
                        <tbody id="articlesTableBody">
                            <!-- 鍔ㄦ€佺敓锟?-->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { API_BASE_URL } from './js/api-config.js?v=20260418a';
        
        let viewsChart, engagementChart;
        let currentRange = 7;
        
        // 鑾峰彇鐢ㄦ埛Token
        function getToken() {
            return localStorage.getItem('access_token') || sessionStorage.getItem('access_token');
        }
        
        // 鑾峰彇褰撳墠鐢ㄦ埛
        function getCurrentUser() {
            const userJson = localStorage.getItem('current_user') || sessionStorage.getItem('current_user');
            return userJson ? JSON.parse(userJson) : null;
        }
        
        // 妫€鏌ョ櫥褰曠姸锟?
        function checkAuth() {
            const user = getCurrentUser();
            const token = getToken();
            
            if (!user || !token) {
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }
        
        // 鏍煎紡鍖栨暟锟?
        function formatNumber(num) {
            if (num >= 10000) {
                return (num / 10000).toFixed(1) + 'w';
            }
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'k';
            }
            return num.toString();
        }
        
        // 鍔犺浇缁熻鏁版嵁
        async function loadStats() {
            try {
                const token = getToken();
                const response = await fetch(`${API_BASE_URL}/analytics/author`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) throw new Error('鍔犺浇澶辫触');
                
                const data = await response.json();
                
                // 鏇存柊姒傝鏁版嵁
                document.getElementById('totalViews').textContent = formatNumber(data.total_views || 0);
                document.getElementById('totalLikes').textContent = formatNumber(data.total_likes || 0);
                document.getElementById('totalComments').textContent = formatNumber(data.total_comments || 0);
                document.getElementById('totalFavorites').textContent = formatNumber(data.total_favorites || 0);
                document.getElementById('totalArticles').textContent = data.total_articles || 0;
                
                // 鏇存柊瓒嬪娍
                updateTrendIndicator('viewsChange', data.views_change);
                updateTrendIndicator('likesChange', data.likes_change);
                updateTrendIndicator('commentsChange', data.comments_change);
                updateTrendIndicator('favoritesChange', data.favorites_change);
                
            } catch (error) {
                console.error('鍔犺浇缁熻鏁版嵁澶辫触:', error);
                showError('鍔犺浇缁熻鏁版嵁澶辫触');
            }
        }
        
        // 鏇存柊瓒嬪娍鎸囩ず锟?
        function updateTrendIndicator(id, value) {
            const el = document.getElementById(id);
            if (!el || value === undefined) return;
            
            const isUp = value >= 0;
            el.textContent = (isUp ? '+' : '') + value + '%';
            el.className = 'stat-change ' + (isUp ? 'up' : 'down');
        }
        
        // 鍔犺浇瓒嬪娍鏁版嵁
        async function loadTrends(days = 7) {
            try {
                const token = getToken();
                const endDate = new Date().toISOString().split('T')[0];
                const startDate = new Date(Date.now() - days * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                
                const response = await fetch(`${API_BASE_URL}/analytics/author/trends?start_date=${startDate}&end_date=${endDate}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) throw new Error('鍔犺浇澶辫触');
                
                const data = await response.json();
                
                updateViewsChart(data.dates, data.views);
                updateEngagementChart(data.dates, data.likes, data.comments, data.favorites);
                
            } catch (error) {
                console.error('鍔犺浇瓒嬪娍鏁版嵁澶辫触:', error);
            }
        }
        
        // 鏇存柊闃呰閲忓浘锟?
        function updateViewsChart(dates, views) {
            const ctx = document.getElementById('viewsChart').getContext('2d');
            
            if (viewsChart) {
                viewsChart.destroy();
            }
            
            viewsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates.map(d => d.slice(5)), // 鏄剧ず MM-DD
                    datasets: [{
                        label: '闃呰锟?,
                        data: views,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return formatNumber(value);
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // 鏇存柊浜掑姩鍥捐〃
        function updateEngagementChart(dates, likes, comments, favorites) {
            const ctx = document.getElementById('engagementChart').getContext('2d');
            
            if (engagementChart) {
                engagementChart.destroy();
            }
            
            engagementChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dates.map(d => d.slice(5)),
                    datasets: [
                        {
                            label: '鐐硅禐',
                            data: likes,
                            backgroundColor: '#c2185b'
                        },
                        {
                            label: '璇勮',
                            data: comments,
                            backgroundColor: '#388e3c'
                        },
                        {
                            label: '鏀惰棌',
                            data: favorites,
                            backgroundColor: '#f57c00'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            stacked: true
                        },
                        y: {
                            stacked: true,
                            beginAtZero: true
                        }
                    }
                }
            });
        }
        
        // 鍔犺浇鐑棬鏂囩珷
        async function loadPopularArticles() {
            try {
                const token = getToken();
                const response = await fetch(`${API_BASE_URL}/analytics/popular?limit=10`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) throw new Error('鍔犺浇澶辫触');
                
                const data = await response.json();
                const tbody = document.getElementById('articlesTableBody');
                
                if (!data.articles || data.articles.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" class="empty-state">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                </svg>
                                <p>鏆傛棤鏂囩珷鏁版嵁</p>
                            </td>
                        </tr>
                    `;
                    return;
                }
                
                tbody.innerHTML = data.articles.map((article, index) => `
                    <tr>
                        <td>${index + 1}</td>
                        <td class="article-title">
                            <a href="article.html?id=${article.id}">${article.title}</a>
                        </td>
                        <td>${new Date(article.created_at).toLocaleDateString('zh-CN')}</td>
                        <td>
                            <span class="metric-badge views">
                                馃憗 ${formatNumber(article.views)}
                            </span>
                        </td>
                        <td>
                            <span class="metric-badge likes">
                                锟?${formatNumber(article.likes)}
                            </span>
                        </td>
                        <td>
                            <span class="metric-badge comments">
                                馃挰 ${formatNumber(article.comments)}
                            </span>
                        </td>
                    </tr>
                `).join('');
                
            } catch (error) {
                console.error('鍔犺浇鐑棬鏂囩珷澶辫触:', error);
                document.getElementById('articlesTableBody').innerHTML = `
                    <tr>
                        <td colspan="6" class="empty-state">
                            <p>鍔犺浇澶辫触锛岃绋嶅悗閲嶈瘯</p>
                        </td>
                    </tr>
                `;
            }
        }
        
        // 鏄剧ず閿欒
        function showError(message) {
            // 绠€鍗曠殑閿欒鎻愮ず
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: #f44336;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                z-index: 3000;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // 鍒濆锟?
        function init() {
            if (!checkAuth()) return;
            
            loadStats();
            loadTrends(7);
            loadPopularArticles();
            
            // 缁戝畾鏃堕棿绛涢€夋寜锟?
            document.querySelectorAll('.date-filter button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.date-filter button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentRange = parseInt(btn.dataset.range);
                    loadTrends(currentRange);
                });
            });
        }
        
        init();
    </script>
</body>
</html>
