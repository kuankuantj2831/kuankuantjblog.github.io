<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轰澧楀畵宕氶崱尖偓鑺ョ▔偟濡?- Hakimi 的个人博客/title>
    <link rel="stylesheet" href="css/chinese-style.css">
    <script src="https://unpkg.com/chart.js"></script>
    <style>
        .analytics-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .analytics-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 16px;
            margin-bottom: 30px;
        }
        
        .analytics-header h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
        }
        
        .analytics-header p {
            margin: 0;
            opacity: 0.9;
        }
        
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 24px;
        }
        
        .stat-icon.views {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .stat-icon.likes {
            background: #fce4ec;
            color: #c2185b;
        }
        
        .stat-icon.comments {
            background: #e8f5e9;
            color: #388e3c;
        }
        
        .stat-icon.favorites {
            background: #fff3e0;
            color: #f57c00;
        }
        
        .stat-icon.articles {
            background: #f3e5f5;
            color: #7b1fa2;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        
        .stat-change {
            font-size: 12px;
            margin-top: 4px;
        }
        
        .stat-change.up {
            color: #4caf50;
        }
        
        .stat-change.down {
            color: #f44336;
        }
        
        .chart-section {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 18px;
            margin: 0 0 20px 0;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        .articles-list {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .articles-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .articles-table th,
        .articles-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .articles-table th {
            font-weight: 600;
            color: #666;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .articles-table tr:hover {
            background: #f8f9fa;
        }
        
        .article-title {
            font-weight: 500;
            color: #333;
        }
        
        .article-title a {
            color: inherit;
            text-decoration: none;
        }
        
        .article-title a:hover {
            color: #667eea;
        }
        
        .metric-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .metric-badge.views {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .metric-badge.likes {
            background: #fce4ec;
            color: #c2185b;
        }
        
        .metric-badge.comments {
            background: #e8f5e9;
            color: #388e3c;
        }
        
        .date-filter {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .date-filter button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .date-filter button:hover {
            background: #f5f5f5;
        }
        
        .date-filter button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .loading-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .trend-indicator {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            font-size: 12px;
        }
        
        .trend-up {
            color: #4caf50;
        }
        
        .trend-down {
            color: #f44336;
        }
        
        @media (max-width: 768px) {
            .stats-overview {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .analytics-header {
                padding: 24px;
            }
            
            .articles-table {
                font-size: 14px;
            }
            
            .articles-table th:nth-child(3),
            .articles-table td:nth-child(3) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="chinese-style-wrapper">
        <nav class="top-nav">
            <div class="nav-links">
                <a href="index.html" class="nav-link">濡鐗犻妴?/a>
                <a href="profile.html" class="nav-link">搩浜欏Ч嬬▔偟濡?/a>
                <a href="analytics-dashboard.html" class="nav-link active">轰澧楀畵宕氶崱尖偓?/a>
            </div>
        </nav>
        
        <div class="analytics-wrapper">
            <div class="analytics-header">
                <h1>妫啯鎯?轰澧楀畵宕氶崱尖偓鑺ョ▔偟濡?/h1>
                <p>炶尙涢惂鍌炲棘モ晝褰块悶栧妿楠炲洭鏁嶇仦鑲╁枠告牗鐗曢杈ㄦ媴濠婂懐鎽滈柨?/p>
            </div>
            
            <!-- 轰澧楀畵浣割潡屾繍娼?-->
            <div class="stats-overview" id="statsOverview">
                <div class="stat-card">
                    <div class="stat-icon views">妫啯?/div>
                    <div class="stat-value" id="totalViews">-</div>
                    <div class="stat-label">诡顭Σ鍕嫚犳艾娅?/div>
                    <div class="stat-change up" id="viewsChange">+0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon likes">?/div>
                    <div class="stat-value" id="totalLikes">-</div>
                    <div class="stat-label">诡剝宕崑锝導愬瓨娈?/div>
                    <div class="stat-change up" id="likesChange">+0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon comments">妫啯灏?/div>
                    <div class="stat-value" id="totalComments">-</div>
                    <div class="stat-label">诡剚妲掗惁ｆ媼ɑ娈?/div>
                    <div class="stat-change up" id="commentsChange">+0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon favorites">?/div>
                    <div class="stat-value" id="totalFavorites">-</div>
                    <div class="stat-label">诡剛绮弫褰掓寠韫梹娈?/div>
                    <div class="stat-change up" id="favoritesChange">+0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon articles">妫啯鎲?/div>
                    <div class="stat-value" id="totalArticles">-</div>
                    <div class="stat-label">哄倸娲ㄩ悵鐑藉箑佹ɑ娈?/div>
                </div>
            </div>
            
            <!-- 哄啫鐖煎Λ璺ㄧ驳戣櫕瀚?-->
            <div class="date-filter">
                <button class="active" data-range="7">??/button>
                <button data-range="30">?0?/button>
                <button data-range="90">?0?/button>
                <button data-range="365">閺夆晜鍨粩鎾晸?/button>
            </div>
            
            <!-- 帒呮繛宥夊炊规劑鈧?-->
            <div class="chart-section">
                <h2 class="section-title">
                    <span>妫啯鎯?/span>
                    闂傚啫鎳撻鎵惥ｎ亜鈼?
                </h2>
                <div class="chart-container">
                    <canvas id="viewsChart"></canvas>
                </div>
            </div>
            
            <div class="chart-section">
                <h2 class="section-title">
                    <span>妫啫绠?/span>
                    存粍甯掓慨鈺呭礆鈧?
                </h2>
                <div class="chart-container">
                    <canvas id="engagementChart"></canvas>
                </div>
            </div>
            
            <!-- 绘埈鍙冨Λ棘モ晝褰?-->
            <div class="articles-list">
                <h2 class="section-title">
                    <span>妫啯鏆?/span>
                    绘埈鍙冨Λ棘モ晝褰块鐑樺笩?
                </h2>
                <div id="articlesTableContainer">
                    <table class="articles-table">
                        <thead>
                            <tr>
                                <th>圭儤甯掗幃?/th>
                                <th>哄倸娲ㄩ悵鐑藉冀ヮ剦鏆?/th>
                                <th>告瑦鍨电粩鐑藉籍洘锛?/th>
                                <th>闂傚啫鎳撻浼存晸?/th>
                                <th>绘劗顢粋?/th>
                                <th>犲洤瀚?/th>
                            </tr>
                        </thead>
                        <tbody id="articlesTableBody">
                            <!-- 告鍔埀胯兌閺佹捇鏁?-->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { API_BASE_URL } from './js/api-config.js?v=20260418a';
        
        let viewsChart, engagementChart;
        let currentRange = 7;
        
        // 兼儳鍢茶ぐ鍥偨閵婏箑鐓昑oken
        function getToken() {
            return localStorage.getItem('access_token') || sessionStorage.getItem('access_token');
        }
        
        // 兼儳鍢茶ぐ鍥啿顤呴顫妽?
        function getCurrentUser() {
            const userJson = localStorage.getItem('current_user') || sessionStorage.getItem('current_user');
            return userJson ? JSON.parse(userJson) : null;
        }
        
        // ☆偀撻柡灞诲劤呫儴銇愰弴鐘残柨?
        function checkAuth() {
            const user = getCurrentUser();
            const token = getToken();
            
            if (!user || !token) {
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }
        
        // 哄秶鍘х锟犲礌閺嶃劍娈堕柨?
        function formatNumber(num) {
            if (num >= 10000) {
                return (num / 10000).toFixed(1) + 'w';
            }
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'k';
            }
            return num.toString();
        }
        
        // 告梻ù鍥磼旀椿鍚轰澧楀畵?
        async function loadStats() {
            try {
                const token = getToken();
                const response = await fetch(`${API_BASE_URL}/analytics/author`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) throw new Error('告梻ù鍥緞堫袝');
                
                const data = await response.json();
                
                // 哄洤鐡ㄩ弻濠傤潡屾繍娼旈柡浣哄瀹?
                document.getElementById('totalViews').textContent = formatNumber(data.total_views || 0);
                document.getElementById('totalLikes').textContent = formatNumber(data.total_likes || 0);
                document.getElementById('totalComments').textContent = formatNumber(data.total_comments || 0);
                document.getElementById('totalFavorites').textContent = formatNumber(data.total_favorites || 0);
                document.getElementById('totalArticles').textContent = data.total_articles || 0;
                
                // 哄洤鐡ㄩ弻濠勬惥ｎ亜鈼?
                updateTrendIndicator('viewsChange', data.views_change);
                updateTrendIndicator('likesChange', data.likes_change);
                updateTrendIndicator('commentsChange', data.comments_change);
                updateTrendIndicator('favoritesChange', data.favorites_change);
                
            } catch (error) {
                console.error('告梻ù鍥磼旀椿鍚轰澧楀畵浣瑰緞堫袝:', error);
                showError('告梻ù鍥磼旀椿鍚轰澧楀畵浣瑰緞堫袝');
            }
        }
        
        // 哄洤鐡ㄩ弻濠勬惥ｎ亜鈼绋挎川閵岸鏁?
        function updateTrendIndicator(id, value) {
            const el = document.getElementById(id);
            if (!el || value === undefined) return;
            
            const isUp = value >= 0;
            el.textContent = (isUp ? '+' : '') + value + '%';
            el.className = 'stat-change ' + (isUp ? 'up' : 'down');
        }
        
        // 告梻ù鍥╂惥ｎ亜鈼柡浣哄瀹?
        async function loadTrends(days = 7) {
            try {
                const token = getToken();
                const endDate = new Date().toISOString().split('T')[0];
                const startDate = new Date(Date.now() - days * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                
                const response = await fetch(`${API_BASE_URL}/analytics/author/trends?start_date=${startDate}&end_date=${endDate}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) throw new Error('告梻ù鍥緞堫袝');
                
                const data = await response.json();
                
                updateViewsChart(data.dates, data.views);
                updateEngagementChart(data.dates, data.likes, data.comments, data.favorites);
                
            } catch (error) {
                console.error('告梻ù鍥╂惥ｎ亜鈼柡浣哄瀹撲焦勬潏顐バ?', error);
            }
        }
        
        // 哄洤鐡ㄩ弻濠⒓涢偊鍤梺鎻掔箰存﹢鏁?
        function updateViewsChart(dates, views) {
            const ctx = document.getElementById('viewsChart').getContext('2d');
            
            if (viewsChart) {
                viewsChart.destroy();
            }
            
            viewsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates.map(d => d.slice(5)), // 哄澧介妵?MM-DD
                    datasets: [{
                        label: '闂傚啫鎳撻浼存晸?,
                        data: views,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return formatNumber(value);
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // 哄洤鐡ㄩ弻濠冪烘垵袟搞儲宕橀妴?
        function updateEngagementChart(dates, likes, comments, favorites) {
            const ctx = document.getElementById('engagementChart').getContext('2d');
            
            if (engagementChart) {
                engagementChart.destroy();
            }
            
            engagementChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dates.map(d => d.slice(5)),
                    datasets: [
                        {
                            label: '绘劗顢粋?,
                            data: likes,
                            backgroundColor: '#c2185b'
                        },
                        {
                            label: '犲洤瀚?,
                            data: comments,
                            backgroundColor: '#388e3c'
                        },
                        {
                            label: '衡偓増顥?,
                            data: favorites,
                            backgroundColor: '#f57c00'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            stacked: true
                        },
                        y: {
                            stacked: true,
                            beginAtZero: true
                        }
                    }
                }
            });
        }
        
        // 告梻ù鍥倻撱垺锛岄柡鍌氭川?
        async function loadPopularArticles() {
            try {
                const token = getToken();
                const response = await fetch(`${API_BASE_URL}/analytics/popular?limit=10`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) throw new Error('告梻ù鍥緞堫袝');
                
                const data = await response.json();
                const tbody = document.getElementById('articlesTableBody');
                
                if (!data.articles || data.articles.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" class="empty-state">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                </svg>
                                <p>哄棗瑰Λ夊棘モ晝褰块柡浣哄瀹?/p>
                            </td>
                        </tr>
                    `;
                    return;
                }
                
                tbody.innerHTML = data.articles.map((article, index) => `
                    <tr>
                        <td>${index + 1}</td>
                        <td class="article-title">
                            <a href="article.html?id=${article.id}">${article.title}</a>
                        </td>
                        <td>${new Date(article.created_at).toLocaleDateString('zh-CN')}</td>
                        <td>
                            <span class="metric-badge views">
                                妫啯?${formatNumber(article.views)}
                            </span>
                        </td>
                        <td>
                            <span class="metric-badge likes">
                                ?${formatNumber(article.likes)}
                            </span>
                        </td>
                        <td>
                            <span class="metric-badge comments">
                                妫啯灏?${formatNumber(article.comments)}
                            </span>
                        </td>
                    </tr>
                `).join('');
                
            } catch (error) {
                console.error('告梻ù鍥倻撱垺锛岄柡鍌氭川濋攱勬潏顐バ?', error);
                document.getElementById('articlesTableBody').innerHTML = `
                    <tr>
                        <td colspan="6" class="empty-state">
                            <p>告梻ù鍥緞堫袝挎稑鐭侀傜矙瀹ュ懏梺鎻掔Х?/p>
                        </td>
                    </tr>
                `;
            }
        }
        
        // 哄澧介妵舵煥帩鍤?
        function showError(message) {
            // 姭撻柛佹礈堟垿鏌▎鎺殩圭粯鍔妵?
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: #f44336;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                z-index: 3000;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // 告帗绻傞～鎰版晸?
        function init() {
            if (!checkAuth()) return;
            
            loadStats();
            loadTrends(7);
            loadPopularArticles();
            
            // 備焦鍨悾楣冨籍洘锛熺欑洴顦扮垫粓鏁?
            document.querySelectorAll('.date-filter button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.date-filter button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentRange = parseInt(btn.dataset.range);
                    loadTrends(currentRange);
                });
            });
        }
        
        init();
    </script>
</body>
</html>
