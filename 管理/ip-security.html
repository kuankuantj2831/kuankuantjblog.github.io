<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>IPе®үе…Ёз®ЎзҗҶ - еҗҺеҸ°з®ЎзҗҶ</title>
    <link rel="stylesheet" href="../css/chinese-style.css">
    <style>
        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }
        .admin-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-card.danger {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
        }
        .stat-card.warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .stat-card.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e8e8e8;
            padding-bottom: 12px;
        }
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .tab-btn:hover {
            background: #f5f5f5;
        }
        .tab-btn.active {
            background: #667eea;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .table th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #666;
            border-bottom: 2px solid #e8e8e8;
        }
        .table td {
            padding: 12px;
            border-bottom: 1px solid #e8e8e8;
        }
        .table tr:hover {
            background: #f8f9fa;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }
        .status-banned {
            background: #ffebee;
            color: #c62828;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-danger {
            background: #ff4d4f;
            color: white;
        }
        .btn-danger:hover {
            background: #ff7875;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #764ba2;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .btn-small {
            padding: 4px 12px;
            font-size: 12px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #333;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 12px;
            align-items: end;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .search-box {
            display: flex;
            gap: 8px;
        }
        .search-box input {
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            width: 200px;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .danger-zone {
            border: 1px solid #ff4d4f;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
        }
        .danger-zone-title {
            color: #ff4d4f;
            font-weight: 600;
            margin-bottom: 12px;
        }
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .table {
                font-size: 12px;
            }
            .table th, .table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <a href="index.html" class="back-link">вҶ?иҝ”еӣһеҗҺеҸ°з®ЎзҗҶ</a>
        
        <div class="card">
            <h2 style="margin:0 0 20px 0;">IPе®үе…Ёз®ЎзҗҶ</h2>
            
            <!-- з»ҹи®ЎеҚЎзүҮ -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalLogins">0</div>
                    <div class="stat-label">жҖ»зҷ»еҪ•ж¬Ўж•?/div>
                </div>
                <div class="stat-card success">
                    <div class="stat-value" id="successRate">0%</div>
                    <div class="stat-label">жҲҗеҠҹзҺ?/div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-value" id="bannedCount">0</div>
                    <div class="stat-label">е°ҒзҰҒIPж•?/div>
                </div>
                <div class="stat-card danger">
                    <div class="stat-value" id="suspiciousCount">0</div>
                    <div class="stat-label">еҸҜз–‘IPж•?/div>
                </div>
            </div>
        </div>

        <!-- TabеҜјиҲӘ -->
        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" data-tab="login-history">зҷ»еҪ•и®°еҪ•</button>
                <button class="tab-btn" data-tab="banned-ips">е°ҒзҰҒз®ЎзҗҶ</button>
                <button class="tab-btn" data-tab="security-settings">е®үе…Ёи®ҫзҪ®</button>
            </div>

            <!-- зҷ»еҪ•и®°еҪ• Tab -->
            <div id="tab-login-history" class="tab-content active">
                <div class="toolbar">
                    <div class="search-box">
                        <input type="text" id="ipSearchInput" placeholder="жҗңзҙўIPең°еқҖ..." oninput="filterLoginHistory()">
                        <input type="text" id="userSearchInput" placeholder="жҗңзҙўз”ЁжҲ·еҗ?.." oninput="filterLoginHistory()">
                    </div>
                    <div>
                        <button class="btn btn-secondary btn-small" onclick="exportLoginHistory()">еҜјеҮәи®°еҪ•</button>
                        <button class="btn btn-danger btn-small" onclick="clearAllHistory()">жё…з©әи®°еҪ•</button>
                    </div>
                </div>
                <div id="loginHistoryContainer">
                    <div class="empty-state">жҡӮж— зҷ»еҪ•и®°еҪ•</div>
                </div>
            </div>

            <!-- е°ҒзҰҒз®ЎзҗҶ Tab -->
            <div id="tab-banned-ips" class="tab-content">
                <div class="form-row" style="margin-bottom: 20px;">
                    <div class="form-group" style="margin:0;">
                        <label>IPең°еқҖ</label>
                        <input type="text" id="banIpInput" placeholder="иҫ“е…ҘиҰҒе°ҒзҰҒзҡ„IPең°еқҖ">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label>е°ҒзҰҒж—¶й•ҝ</label>
                        <select id="banDurationSelect">
                            <option value="3600000">1е°Ҹж—¶</option>
                            <option value="86400000">1еӨ?/option>
                            <option value="604800000">7еӨ?/option>
                            <option value="2592000000">30еӨ?/option>
                            <option value="31536000000">1е№?/option>
                            <option value="9999999999999">ж°ёд№…</option>
                        </select>
                    </div>
                    <button class="btn btn-danger" onclick="banIPManual()">е°ҒзҰҒIP</button>
                </div>
                <div id="bannedIPsContainer">
                    <div class="empty-state">жҡӮж— е°ҒзҰҒзҡ„IP</div>
                </div>
            </div>

            <!-- е®үе…Ёи®ҫзҪ® Tab -->
            <div id="tab-security-settings" class="tab-content">
                <div class="settings-grid">
                    <div>
                        <div class="form-group">
                            <label>жңҖеӨ§еӨұиҙҘе°қиҜ•ж¬Ўж•?/label>
                            <input type="number" id="maxAttemptsInput" value="5" min="1" max="20">
                        </div>
                        <div class="form-group">
                            <label>иҮӘеҠЁе°ҒзҰҒж—¶й•ҝ</label>
                            <select id="autoBanDuration">
                                <option value="3600000">1е°Ҹж—¶</option>
                                <option value="86400000" selected>1еӨ?/option>
                                <option value="604800000">7еӨ?/option>
                                <option value="2592000000">30еӨ?/option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="autoBanCheckbox" checked> еҗҜз”ЁиҮӘеҠЁе°ҒзҰҒ
                            </label>
                        </div>
                        <button class="btn btn-primary" onclick="saveSecuritySettings()">дҝқеӯҳи®ҫзҪ®</button>
                    </div>
                </div>
                
                <div class="danger-zone">
                    <div class="danger-zone-title">еҚұйҷ©ж“ҚдҪң</div>
                    <button class="btn btn-secondary btn-small" onclick="IPSecurity.exportData()">еҜјеҮәжүҖжңүе®үе…Ёж•°жҚ?/button>
                    <button class="btn btn-danger btn-small" onclick="clearAllSecurityData()" style="margin-left: 10px;">жё…з©әжүҖжңүе®үе…Ёж•°жҚ?/button>
                </div>
            </div>
        </div>
    </div>

    <!-- IPе®үе…Ёи„ҡжң¬ -->
    <script src="../js/ip-security.js"></script>
    
    <script>
        // еҲқе§ӢеҢ?
        document.addEventListener('DOMContentLoaded', function() {
            initTabs();
            updateStats();
            renderLoginHistory();
            renderBannedIPs();
            loadSettings();
        });

        // TabеҲҮжҚў
        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    
                    // еҲҮжҚўжҢүй’®зҠ¶жҖ?
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    // еҲҮжҚўеҶ…е®№
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    document.getElementById('tab-' + tab).classList.add('active');
                });
            });
        }

        // жӣҙж–°з»ҹи®Ў
        function updateStats() {
            const stats = IPSecurity.getStats();
            document.getElementById('totalLogins').textContent = stats.totalLogins;
            document.getElementById('successRate').textContent = stats.successRate + '%';
            document.getElementById('bannedCount').textContent = stats.bannedCount;
            document.getElementById('suspiciousCount').textContent = stats.suspiciousIPs;
        }

        // жёІжҹ“зҷ»еҪ•и®°еҪ•
        function renderLoginHistory() {
            const history = IPSecurity.getLoginHistory();
            const container = document.getElementById('loginHistoryContainer');
            
            if (history.length === 0) {
                container.innerHTML = '<div class="empty-state">жҡӮж— зҷ»еҪ•и®°еҪ•</div>';
                return;
            }

            let html = '<table class="table"><thead><tr>' +
                '<th>ж—¶й—ҙ</th><th>з”ЁжҲ·еҗ?/th><th>IPең°еқҖ</th><th>дҪҚзҪ®</th><th>жқҘжәҗ</th><th>зҠ¶жҖ?/th><th>ж“ҚдҪң</th>' +
                '</tr></thead><tbody>';
            
            history.forEach(record => {
                const time = new Date(record.timestamp).toLocaleString();
                const location = record.location ? 
                    `${record.location.country} ${record.location.city}` : 'жңӘзҹҘ';
                const statusClass = record.success ? 'status-success' : 'status-failed';
                const statusText = record.success ? 'жҲҗеҠҹ' : 'еӨұиҙҘ';
                const source = record.source === 'admin' ? 'еҗҺеҸ°' : 'йҰ–йЎө';
                
                html += `<tr>
                    <td>${time}</td>
                    <td>${record.username}</td>
                    <td>${record.ip}</td>
                    <td>${location}</td>
                    <td>${source}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>
                        <button class="btn btn-danger btn-small" onclick="banIPFromHistory('${record.ip}')">е°ҒзҰҒ</button>
                        <button class="btn btn-secondary btn-small" onclick="deleteHistoryRecord('${record.id}')">еҲ йҷӨ</button>
                    </td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // зӯӣйҖүзҷ»еҪ•и®°еҪ?
        function filterLoginHistory() {
            const ipFilter = document.getElementById('ipSearchInput').value.toLowerCase();
            const userFilter = document.getElementById('userSearchInput').value.toLowerCase();
            
            let history = IPSecurity.getLoginHistory();
            
            if (ipFilter) {
                history = history.filter(r => r.ip.toLowerCase().includes(ipFilter));
            }
            if (userFilter) {
                history = history.filter(r => r.username.toLowerCase().includes(userFilter));
            }
            
            // йҮҚж–°жёІжҹ“пјҲз®ҖеҢ–зүҲпј?
            renderLoginHistory();
        }

        // д»Һи®°еҪ•е°ҒзҰҒIP
        function banIPFromHistory(ip) {
            if (confirm(`зЎ®е®ҡиҰҒе°ҒзҰҒIP ${ip} еҗ—пјҹ`)) {
                IPSecurity.banIP(ip, 'д»Һзҷ»еҪ•и®°еҪ•жүӢеҠЁе°ҒзҰ?);
                renderBannedIPs();
                updateStats();
                alert('IPе·Іе°ҒзҰ?);
            }
        }

        // еҲ йҷӨеҚ•жқЎи®°еҪ•
        function deleteHistoryRecord(id) {
            if (confirm('зЎ®е®ҡеҲ йҷӨиҝҷжқЎи®°еҪ•еҗ—пјҹ')) {
                IPSecurity.deleteHistoryRecord(id);
                renderLoginHistory();
                updateStats();
            }
        }

        // жё…з©әжүҖжңүи®°еҪ?
        function clearAllHistory() {
            if (confirm('зЎ®е®ҡиҰҒжё…з©әжүҖжңүзҷ»еҪ•и®°еҪ•еҗ—пјҹжӯӨж“ҚдҪңдёҚеҸҜжҒўеӨҚгҖ?)) {
                IPSecurity.clearHistory();
                renderLoginHistory();
                updateStats();
            }
        }

        // еҜјеҮәзҷ»еҪ•и®°еҪ•
        function exportLoginHistory() {
            IPSecurity.exportData();
        }

        // жёІжҹ“е°ҒзҰҒеҲ—иЎЁ
        function renderBannedIPs() {
            const banned = IPSecurity.getBannedIPs();
            const container = document.getElementById('bannedIPsContainer');
            const ips = Object.keys(banned);
            
            if (ips.length === 0) {
                container.innerHTML = '<div class="empty-state">жҡӮж— е°ҒзҰҒзҡ„IP</div>';
                return;
            }

            let html = '<table class="table"><thead><tr>' +
                '<th>IPең°еқҖ</th><th>е°ҒзҰҒеҺҹеӣ </th><th>е°ҒзҰҒж—¶й—ҙ</th><th>иҝҮжңҹж—¶й—ҙ</th><th>еү©дҪҷж—¶й—ҙ</th><th>ж“ҚдҪң</th>' +
                '</tr></thead><tbody>';
            
            ips.forEach(ip => {
                const record = banned[ip];
                const bannedAt = new Date(record.bannedAt).toLocaleString();
                const expiresAt = new Date(record.expiresAt).toLocaleString();
                const remaining = formatDuration(record.expiresAt - Date.now());
                
                html += `<tr>
                    <td>${ip}</td>
                    <td>${record.reason || 'ж—?}</td>
                    <td>${bannedAt}</td>
                    <td>${expiresAt}</td>
                    <td>${remaining}</td>
                    <td>
                        <button class="btn btn-primary btn-small" onclick="unbanIP('${ip}')">и§Је°Ғ</button>
                    </td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // жүӢеҠЁе°ҒзҰҒIP
        function banIPManual() {
            const ip = document.getElementById('banIpInput').value.trim();
            const duration = parseInt(document.getElementById('banDurationSelect').value);
            
            if (!ip) {
                alert('иҜ·иҫ“е…ҘIPең°еқҖ');
                return;
            }
            
            IPSecurity.banIP(ip, 'жүӢеҠЁе°ҒзҰҒ', duration);
            renderBannedIPs();
            updateStats();
            document.getElementById('banIpInput').value = '';
            alert('IPе·Іе°ҒзҰ?);
        }

        // и§Је°ҒIP
        function unbanIP(ip) {
            if (confirm(`зЎ®е®ҡиҰҒи§Је°ҒIP ${ip} еҗ—пјҹ`)) {
                IPSecurity.unbanIP(ip);
                renderBannedIPs();
                updateStats();
            }
        }

        // ж јејҸеҢ–ж—¶й•?
        function formatDuration(ms) {
            if (ms < 0) return 'е·ІиҝҮжң?;
            
            const days = Math.floor(ms / (1000 * 60 * 60 * 24));
            const hours = Math.floor((ms % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            
            if (days > 0) return `${days}еӨ?{hours}е°Ҹж—¶`;
            if (hours > 0) return `${hours}е°Ҹж—¶`;
            return 'еҚіе°ҶиҝҮжңҹ';
        }

        // еҠ иҪҪи®ҫзҪ®
        function loadSettings() {
            const settings = IPSecurity.getSettings();
            document.getElementById('maxAttemptsInput').value = settings.maxFailedAttempts;
            document.getElementById('autoBanDuration').value = settings.banDuration;
            document.getElementById('autoBanCheckbox').checked = settings.autoBan;
        }

        // дҝқеӯҳи®ҫзҪ®
        function saveSecuritySettings() {
            const settings = {
                maxFailedAttempts: parseInt(document.getElementById('maxAttemptsInput').value),
                banDuration: parseInt(document.getElementById('autoBanDuration').value),
                autoBan: document.getElementById('autoBanCheckbox').checked
            };
            
            IPSecurity.saveSettings(settings);
            alert('и®ҫзҪ®е·Ідҝқеӯ?);
        }

        // жё…з©әжүҖжңүе®үе…Ёж•°жҚ?
        function clearAllSecurityData() {
            if (confirm('зЎ®е®ҡиҰҒжё…з©әжүҖжңүе®үе…Ёж•°жҚ®еҗ—пјҹеҢ…жӢ¬зҷ»еҪ•и®°еҪ•гҖҒе°ҒзҰҒеҲ—иЎЁзӯүгҖӮжӯӨж“ҚдҪңдёҚеҸҜжҒўеӨҚпј?)) {
                localStorage.removeItem(IPSecurity.STORAGE_KEYS.LOGIN_HISTORY);
                localStorage.removeItem(IPSecurity.STORAGE_KEYS.BANNED_IPS);
                localStorage.removeItem(IPSecurity.STORAGE_KEYS.IP_ATTEMPTS);
                localStorage.removeItem(IPSecurity.STORAGE_KEYS.SECURITY_SETTINGS);
                
                renderLoginHistory();
                renderBannedIPs();
                updateStats();
                loadSettings();
                
                alert('жүҖжңүе®үе…Ёж•°жҚ®е·Іжё…з©ә');
            }
        }
    </script>
</body>
</html>
