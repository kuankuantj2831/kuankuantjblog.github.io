<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - Hakimi 的猫爬架</title>
    <link rel="stylesheet" href="../css/chinese-style.css">
    <style>
        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
        }

        .admin-container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
            font-size: 13px;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-primary {
            background: #1890ff;
        }

        .btn-danger {
            background: #ff4d4f;
        }

        .btn-warning {
            background: #faad14;
            color: #333;
        }

        .btn-success {
            background: #52c41a;
        }

        .btn-coin {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #333;
            font-weight: bold;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .table th,
        .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .table th {
            background: #fafafa;
            font-weight: 600;
            color: #555;
        }

        .table tr:hover {
            background: #f5f5f5;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            width: 480px;
            max-width: 95%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        /* Tab 导航 */
        .tab-nav {
            display: flex;
            gap: 0;
            margin-bottom: 0;
            border-bottom: 2px solid #e8e8e8;
        }

        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: #999;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            color: #1890ff;
        }

        .tab-btn.active {
            color: #1890ff;
            border-bottom-color: #1890ff;
        }

        .tab-content {
            display: none;
            padding-top: 20px;
        }

        .tab-content.active {
            display: block;
        }

        /* 硬币相关样式 */
        .coin-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, #fff8e1, #fff3cd);
            border: 1px solid #ffd54f;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: bold;
            color: #f57f17;
            font-size: 13px;
        }

        .coin-stat-card {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .coin-stat-item {
            flex: 1;
            min-width: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
        }

        .coin-stat-item.earned {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .coin-stat-item.spent {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .coin-stat-item .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .coin-stat-item .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .transaction-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-amount {
            font-weight: bold;
            font-size: 14px;
        }

        .transaction-amount.positive {
            color: #52c41a;
        }

        .transaction-amount.negative {
            color: #ff4d4f;
        }

        .transaction-desc {
            font-size: 13px;
            color: #666;
        }

        .transaction-time {
            font-size: 11px;
            color: #999;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .empty-tip {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <!-- 登录区域 -->
    <div id="loginSection" class="admin-container" style="max-width: 400px; margin-top: 100px;">
        <div class="card">
            <h2 style="text-align:center; margin-bottom:20px;">🛡️ 管理员登录</h2>
            <div class="form-group">
                <label>账号</label>
                <input type="text" id="adminUsername" placeholder="请输入管理员账号">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="adminPassword" placeholder="请输入管理员密码">
            </div>
            <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="adminLogin()">登录</button>
        </div>
    </div>

    <!-- 管理面板 -->
    <div id="dashboardSection" class="admin-container" style="display: none;">
        <!-- 顶部栏 -->
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>🛡️ 后台管理</h2>
                <div>
                    <span style="margin-right:10px; font-weight:bold;">管理员</span>
                    <button class="btn btn-danger" onclick="logout()">退出</button>
                </div>
            </div>
        </div>

        <!-- Tab 导航 -->
        <div class="card" style="padding-bottom: 0;">
            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('users')">👥 用户管理</button>
                <button class="tab-btn" onclick="switchTab('coins')">🪙 硬币管理</button>
            </div>

            <!-- 用户管理 Tab -->
            <div id="tab-users" class="tab-content active">
                <div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
                    <button class="btn btn-primary" onclick="showAddUserModal()">+ 添加用户</button>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>角色</th>
                            <th>邮箱</th>
                            <th>手机</th>
                            <th>注册时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                    </tbody>
                </table>
            </div>

            <!-- 硬币管理 Tab -->
            <div id="tab-coins" class="tab-content">
                <div class="search-box">
                    <input type="text" id="coinSearchInput" placeholder="搜索用户名..." oninput="filterCoinUsers()">
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>余额</th>
                            <th>总获得</th>
                            <th>总花费</th>
                            <th>连续签到</th>
                            <th>最后签到</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="coinTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 添加用户弹窗 -->
    <div id="addUserModal" class="modal">
        <div class="modal-content">
            <h3>添加用户</h3>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="newUsername">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="text" id="newPassword">
            </div>
            <div class="form-group">
                <label>角色</label>
                <select id="newRole">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div style="text-align:right; margin-top:20px;">
                <button class="btn" style="background:#ccc; color:#333;" onclick="closeAllModals()">取消</button>
                <button class="btn btn-primary" onclick="addUser()">确定</button>
            </div>
        </div>
    </div>

    <!-- 硬币详情弹窗 -->
    <div id="coinDetailModal" class="modal">
        <div class="modal-content" style="width: 520px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <h3 style="margin:0;">🪙 <span id="detailUsername">用户</span> 的硬币详情</h3>
                <button onclick="closeAllModals()" style="background:none; border:none; font-size:20px; cursor:pointer; color:#999;">✕</button>
            </div>

            <!-- 统计卡片 -->
            <div class="coin-stat-card">
                <div class="coin-stat-item">
                    <div class="stat-value" id="detailBalance">0</div>
                    <div class="stat-label">当前余额</div>
                </div>
                <div class="coin-stat-item earned">
                    <div class="stat-value" id="detailEarned">0</div>
                    <div class="stat-label">总获得</div>
                </div>
                <div class="coin-stat-item spent">
                    <div class="stat-value" id="detailSpent">0</div>
                    <div class="stat-label">总花费</div>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h4 style="margin:0;">最近交易记录</h4>
                <button class="btn btn-coin" style="padding:5px 12px; font-size:12px;" onclick="showAdjustModal()">💰 调整硬币</button>
            </div>

            <div class="transaction-list" id="transactionList">
                <div class="empty-tip">暂无交易记录</div>
            </div>

            <div style="text-align:right; margin-top:16px;">
                <button class="btn" style="background:#ccc; color:#333;" onclick="closeAllModals()">关闭</button>
            </div>
        </div>
    </div>

    <!-- 调整硬币弹窗 -->
    <div id="adjustCoinModal" class="modal">
        <div class="modal-content" style="width: 380px;">
            <h3 style="margin-bottom:16px;">💰 调整硬币 - <span id="adjustUsername">用户</span></h3>
            <div style="text-align:center; margin-bottom:16px;">
                <span style="font-size:13px; color:#999;">当前余额</span>
                <div style="font-size:28px; font-weight:bold; color:#f7971e;" id="adjustCurrentBalance">0</div>
            </div>
            <div class="form-group">
                <label>调整数量 <span style="color:#999; font-size:12px;">（正数增加，负数扣除）</span></label>
                <input type="number" id="adjustAmount" placeholder="例如: 100 或 -50">
            </div>
            <div class="form-group">
                <label>调整原因 <span style="color:#999; font-size:12px;">（可选）</span></label>
                <textarea id="adjustReason" placeholder="例如: 活动奖励、违规扣除等"></textarea>
            </div>
            <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
                <button class="btn" style="background:#ccc; color:#333;" onclick="closeAdjustModal()">取消</button>
                <button class="btn btn-coin" onclick="submitAdjust()">确认调整</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { API_BASE_URL } from '../js/api-config.js?v=20260223b';

        let allCoinUsers = []; // 缓存硬币用户数据
        let currentDetailUserId = null; // 当前查看详情的用户 ID

        // ==================== 登录相关 ====================

        const adminToken = localStorage.getItem('adminToken');
        if (adminToken) {
            showDashboard();
        }

        window.adminLogin = async () => {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;

            if (!username || !password) return alert('请输入账号和密码');

            try {
                const res = await fetch(`${API_BASE_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('adminToken', data.token);
                    showDashboard();
                } else {
                    alert(data.message || '登录失败');
                }
            } catch (e) {
                console.error(e);
                alert('网络错误');
            }
        };

        function showDashboard() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            loadUsers();
        }

        window.logout = () => {
            localStorage.removeItem('adminToken');
            window.location.reload();
        };

        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
            };
        }

        function checkAuth(res) {
            if (res.status === 403 || res.status === 401) {
                alert('登录过期，请重新登录');
                window.logout();
                return false;
            }
            return true;
        }

        // ==================== Tab 切换 ====================

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');

            if (tab === 'coins') {
                loadCoinUsers();
            }
        };

        // ==================== 用户管理 ====================

        async function loadUsers() {
            const token = localStorage.getItem('adminToken');
            try {
                const res = await fetch(`${API_BASE_URL}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!checkAuth(res)) return;

                const users = await res.json();
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = '';

                users.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td><span style="background:${u.role === 'admin' ? '#ff4d4f' : '#1890ff'}; color:white; padding:2px 6px; border-radius:4px; font-size:12px;">${u.role}</span></td>
                    <td>${u.email || '-'}</td>
                    <td>${u.phone || '-'}</td>
                    <td>${new Date(u.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn btn-danger" style="padding:4px 8px; font-size:12px;" onclick="deleteUser(${u.id})">删除</button>
                    </td>
                `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error('Load users error:', e);
                alert('加载失败');
            }
        }

        window.showAddUserModal = () => {
            document.getElementById('addUserModal').classList.add('active');
            document.getElementById('addUserModal').style.display = 'flex';
        };

        window.closeAllModals = () => {
            document.querySelectorAll('.modal').forEach(m => {
                m.classList.remove('active');
                m.style.display = 'none';
            });
        };

        window.addUser = async () => {
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;
            const role = document.getElementById('newRole').value;

            if (!username || !password) return alert('请填写用户名和密码');

            try {
                const res = await fetch(`${API_BASE_URL}/admin/users`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ username, password, role })
                });

                const data = await res.json();
                if (res.ok) {
                    alert('添加成功');
                    closeAllModals();
                    loadUsers();
                } else {
                    alert(data.message || '添加失败');
                }
            } catch (e) {
                console.error(e);
                alert('网络错误');
            }
        };

        window.deleteUser = async (id) => {
            if (!confirm('确定删除该用户吗？')) return;
            try {
                const res = await fetch(`${API_BASE_URL}/admin/users/${id}`, {
                    method: 'DELETE',
                    headers: getHeaders()
                });
                if (res.ok) {
                    alert('删除成功');
                    loadUsers();
                } else {
                    alert('删除失败');
                }
            } catch (e) {
                console.error(e);
                alert('网络错误');
            }
        };

        // ==================== 硬币管理 ====================

        async function loadCoinUsers() {
            try {
                const res = await fetch(`${API_BASE_URL}/admin/coins`, {
                    headers: getHeaders()
                });

                if (!checkAuth(res)) return;

                allCoinUsers = await res.json();
                renderCoinTable(allCoinUsers);
            } catch (e) {
                console.error('Load coin users error:', e);
                alert('加载硬币数据失败');
            }
        }

        function renderCoinTable(users) {
            const tbody = document.getElementById('coinTableBody');
            tbody.innerHTML = '';

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#999; padding:30px;">暂无数据</td></tr>';
                return;
            }

            users.forEach(u => {
                const tr = document.createElement('tr');
                const lastCheckin = u.last_checkin
                    ? new Date(u.last_checkin).toLocaleDateString()
                    : '-';
                tr.innerHTML = `
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td><span class="coin-badge">🪙 ${u.balance}</span></td>
                    <td style="color:#52c41a; font-weight:500;">+${u.total_earned}</td>
                    <td style="color:#ff4d4f; font-weight:500;">-${u.total_spent}</td>
                    <td>${u.checkin_streak || 0} 天</td>
                    <td>${lastCheckin}</td>
                    <td>
                        <button class="btn btn-primary" style="padding:4px 8px; font-size:12px; margin-right:4px;" onclick="viewCoinDetail(${u.id})">详情</button>
                        <button class="btn btn-coin" style="padding:4px 8px; font-size:12px;" onclick="quickAdjust(${u.id}, '${u.username}', ${u.balance})">调整</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.filterCoinUsers = () => {
            const keyword = document.getElementById('coinSearchInput').value.trim().toLowerCase();
            if (!keyword) {
                renderCoinTable(allCoinUsers);
                return;
            }
            const filtered = allCoinUsers.filter(u =>
                u.username.toLowerCase().includes(keyword) ||
                (u.email && u.email.toLowerCase().includes(keyword))
            );
            renderCoinTable(filtered);
        };

        // 查看硬币详情
        window.viewCoinDetail = async (userId) => {
            currentDetailUserId = userId;
            try {
                const res = await fetch(`${API_BASE_URL}/admin/coins/${userId}`, {
                    headers: getHeaders()
                });

                if (!checkAuth(res)) return;

                const data = await res.json();
                const user = data.user;
                const transactions = data.transactions;

                document.getElementById('detailUsername').textContent = user.username;
                document.getElementById('detailBalance').textContent = user.balance;
                document.getElementById('detailEarned').textContent = user.total_earned;
                document.getElementById('detailSpent').textContent = user.total_spent;

                // 渲染交易记录
                const listEl = document.getElementById('transactionList');
                if (transactions.length === 0) {
                    listEl.innerHTML = '<div class="empty-tip">暂无交易记录</div>';
                } else {
                    listEl.innerHTML = transactions.map(t => {
                        const isPositive = t.amount > 0;
                        const time = new Date(t.created_at).toLocaleString();
                        return `
                            <div class="transaction-item">
                                <div>
                                    <div class="transaction-desc">${escapeHtml(t.description || t.type)}</div>
                                    <div class="transaction-time">${time}</div>
                                </div>
                                <div class="transaction-amount ${isPositive ? 'positive' : 'negative'}">
                                    ${isPositive ? '+' : ''}${t.amount}
                                </div>
                            </div>
                        `;
                    }).join('');
                }

                document.getElementById('coinDetailModal').style.display = 'flex';
            } catch (e) {
                console.error('Load coin detail error:', e);
                alert('加载详情失败');
            }
        };

        // 快速调整（从列表直接点击）
        window.quickAdjust = (userId, username, balance) => {
            currentDetailUserId = userId;
            document.getElementById('adjustUsername').textContent = username;
            document.getElementById('adjustCurrentBalance').textContent = balance;
            document.getElementById('adjustAmount').value = '';
            document.getElementById('adjustReason').value = '';
            document.getElementById('adjustCoinModal').style.display = 'flex';
        };

        // 从详情弹窗打开调整弹窗
        window.showAdjustModal = () => {
            const username = document.getElementById('detailUsername').textContent;
            const balance = document.getElementById('detailBalance').textContent;
            document.getElementById('adjustUsername').textContent = username;
            document.getElementById('adjustCurrentBalance').textContent = balance;
            document.getElementById('adjustAmount').value = '';
            document.getElementById('adjustReason').value = '';
            document.getElementById('coinDetailModal').style.display = 'none';
            document.getElementById('adjustCoinModal').style.display = 'flex';
        };

        window.closeAdjustModal = () => {
            document.getElementById('adjustCoinModal').style.display = 'none';
        };

        // 提交调整
        window.submitAdjust = async () => {
            const amount = document.getElementById('adjustAmount').value;
            const reason = document.getElementById('adjustReason').value.trim();

            if (!amount || parseInt(amount) === 0) {
                return alert('请输入非零的调整数量');
            }

            const adjustAmount = parseInt(amount);
            const username = document.getElementById('adjustUsername').textContent;
            const action = adjustAmount > 0 ? `增加 ${adjustAmount}` : `扣除 ${Math.abs(adjustAmount)}`;

            if (!confirm(`确定要为用户「${username}」${action} 枚硬币吗？`)) return;

            try {
                const res = await fetch(`${API_BASE_URL}/admin/coins/${currentDetailUserId}`, {
                    method: 'PUT',
                    headers: getHeaders(),
                    body: JSON.stringify({ amount: adjustAmount, reason })
                });

                const data = await res.json();

                if (res.ok) {
                    alert(`✅ 调整成功！${username} 当前余额: ${data.balance}`);
                    closeAllModals();
                    loadCoinUsers(); // 刷新列表
                } else {
                    alert(data.message || '调整失败');
                }
            } catch (e) {
                console.error('Adjust coins error:', e);
                alert('网络错误');
            }
        };

        // ==================== 工具函数 ====================

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }
    </script>
</body>

</html>
