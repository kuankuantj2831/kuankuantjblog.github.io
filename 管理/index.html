    <script>
        // 妫板鍘涚规矮绠熸稉鈧稉顏暔忋劎娈憇witchTab戣姤鏆?
        window.switchTab = function(tab) {
            // 倹鐏夋い鐢告桨瀹告彃炴潪钘夌暚存劧绱濇担璺ㄦ暏数据仦鐐粹偓鈧瀚ㄩ崳?
            if (document.readyState !== 'loading') {
                document.querySelectorAll('.tab-btn').forEach(function(btn) { btn.classList.remove('active'); });
                document.querySelectorAll('.tab-content').forEach(function(content) { content.classList.remove('active'); });
                
                var btn = document.querySelector('[data-tab="' + tab + '"]');
                if (btn) btn.classList.add('active');
                var content = document.getElementById('tab-' + tab);
                if (content) content.classList.add('active');
                
                // 欙箑褰傞悧扮暰Tab炴潪钘夊毐閺?
                if (tab === 'coins' && typeof loadCoinUsers === 'function') loadCoinUsers();
                if (tab === 'donations' && typeof loadDonations === 'function') loadDonations();
                if (tab === 'login-history' && typeof LoginHistory !== 'undefined') {
                    LoginHistory.renderHistoryTable('loginHistoryContainer');
                    var countEl = document.getElementById('loginHistoryCount');
                    if (countEl) countEl.textContent = '?' + LoginHistory.getHistory().length + ' 閺壜ゎ唶瑜?;
                }
            }
        };
        
        // ц缍鑺ユ殶楃姳缍呯?
        window.adminLogin = function() {
            var username = document.getElementById('adminUsername');
            var password = document.getElementById('adminPassword');
            if (!username || !password) return;
            
            // 鐏忔繆鐦拫鍐暏濡虫健擃厾娈圭偤妾鑺ユ殶
            if (typeof window._realAdminLogin === 'function') {
                window._realAdminLogin();
            } else {
                alert('ц缍嶇化鑽ょ埠掓繂顫愰崠鏍у擃叏绱濈拠椋庘棦氬酣鍣哥拠?);
            }
        };
        
        // DOM旂姾瑰本鍨氶崥拨规瓖ab稿虫禍瀣╂
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                bindTabEvents();
            });
        } else {
            bindTabEvents();
        }
        
        function bindTabEvents() {
            document.querySelectorAll('.tab-btn').forEach(function(btn) {
                var tabName = btn.getAttribute('data-tab');
                if (tabName) {
                    btn.addEventListener('click', function() {
                        window.switchTab(tabName);
                    });
                }
            });
        }
    </script>

                <button class="btn btn-primary" onclick="addUser()">绾喖鐣?/button>
            </div>
        </div>
    </div>

    <!-- 绾绔电拠锔藉剰鐛?-->
    <div id="coinDetailModal" class="modal">
        <div class="modal-content" style="width: 520px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <h3 style="margin:0;">?? <span id="detailUsername">鐢ㄦ埛閺?/span> 的猫鈥栫敮浣筋嚊?/h3>
                <button onclick="closeAllModals()" style="background:none; border:none; font-size:20px; cursor:pointer; color:#999;">?</button>
            </div>

            <!-- 喕顓崡锛 -->
            <div class="coin-stat-card">
                <div class="coin-stat-item">
                    <div class="stat-value" id="detailBalance">0</div>
                    <div class="stat-label">瑜版挸澧犳担娆擃杺</div>
                </div>
                <div class="coin-stat-item earned">
                    <div class="stat-value" id="detailEarned">0</div>
                    <div class="stat-label">槒骞?/div>
                </div>
                <div class="coin-stat-item spent">
                    <div class="stat-value" id="detailSpent">0</div>
                    <div class="stat-label">槒拹?/div>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h4 style="margin:0;">閺堚偓╂垳弰鎾诡唶瑜?/h4>
                <button class="btn btn-coin" style="padding:5px 12px; font-size:12px;" onclick="showAdjustModal()">?? 啯鏆涵绔?/button>
            </div>

            <div class="transaction-list" id="transactionList">
                <div class="empty-tip">閺倹妫ゆ禍佹澘缍?/div>
            </div>

            <div style="text-align:right; margin-top:16px;">
                <button class="btn" style="background:#ccc; color:#333;" onclick="closeAllModals()">忔娊妫?/button>
            </div>
        </div>
    </div>

    <!-- 啯鏆涵绔靛鍦崶 -->
    <div id="adjustCoinModal" class="modal">
        <div class="modal-content" style="width: 380px;">
            <h3 style="margin-bottom:16px;">?? 啯鏆涵绔?- <span id="adjustUsername">鐢ㄦ埛閺?/span></h3>
            <div style="text-align:center; margin-bottom:16px;">
                <span style="font-size:13px; color:#999;">瑜版挸澧犳担娆擃杺</span>
                <div style="font-size:28px; font-weight:bold; color:#f7971e;" id="adjustCurrentBalance">0</div>
            </div>
            <div class="form-group">
                <label>啯鏆ｉ弫浼村櫤 <span style="color:#999; font-size:12px;">閿涘牊滈弫款杻旂媴绱濈拹鐔告殶碉綁娅敍?/span></label>
                <input type="number" id="adjustAmount" placeholder="娓氬顩? 100 ?-50">
            </div>
            <div class="form-group">
                <label>啯鏆ｉ崢鐔锋礈 <span style="color:#999; font-size:12px;">閿涘牆褰查柅涚礆</span></label>
                <textarea id="adjustReason" placeholder="娓氬顩? 茶╂總鏍уС閵嗕浇绻氱憴鍕⒏闂勩倗鐡?></textarea>
            </div>
            <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
                <button class="btn" style="background:#ccc; color:#333;" onclick="closeAdjustModal()">欐牗绉?/button>
                <button class="btn btn-coin" onclick="submitAdjust()">绾喛顓拫鍐╂殻</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { API_BASE_URL } from '../js/api-config.js?v=20260418a';

        let allCoinUsers = []; // 傛挸鐡ㄧ涵绔电敤鎴烽弫鐗堟暟鎹?
        let allUsers = []; // 傛挸鐡ㄧ敤鎴烽弫鐗堟暟鎹?
        let currentDetailUserId = null; // 瑜版挸澧犻弻銉ф箙囷附忕殑鐚暏撮攱鏆?ID

        // ==================== ц缍惄绋垮彠 ====================

        const adminToken = localStorage.getItem('adminToken');
        if (adminToken) {
            showDashboard();
        }

        window.adminLogin = async () => {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;

            if (!username || !password) return alert('柉绶崗銉欏嘲鎷扮靛棛鐖?);

            try {
                const res = await fetch(`${API_BASE_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('adminToken', data.token);
                    
                    // 佹澘缍惂茬秿樺棗褰?
                    if (typeof LoginHistory !== 'undefined') {
                        await LoginHistory.recordLogin(true, username);
                    }
                    
                    showDashboard();
                } else {
                    // 佹澘缍嶆径杈Ец缍?
                    if (typeof LoginHistory !== 'undefined') {
                        await LoginHistory.recordLogin(false, username);
                    }
                    alert(data.message || 'ц缍嶆径杈Е');
                }
            } catch (e) {
                console.error(e);
                alert('冩垹绮堕柨娆掝嚖');
            }
        };

        function showDashboard() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            loadUsers();
        }

        window.logout = () => {
            localStorage.removeItem('adminToken');
            window.location.reload();
        };

        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
            };
        }

        function checkAuth(res) {
            if (res.status === 403 || res.status === 401) {
                alert('ц缍嶆潻鍥ㄦ埂閿涘矁宥煀ц缍?);
                window.logout();
                return false;
            }
            return true;
        }

        // ==================== Tab 掑洦宕?====================

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            const btn = document.querySelector(`[data-tab="${tab}"]`);
            if (btn) btn.classList.add('active');
            const content = document.getElementById(`tab-${tab}`);
            if (content) content.classList.add('active');

            if (tab === 'coins') {
                loadCoinUsers();
            }
            if (tab === 'donations') {
                loadDonations();
            }
            if (tab === 'login-history') {
                if (typeof LoginHistory !== 'undefined') {
                    LoginHistory.renderHistoryTable('loginHistoryContainer');
                    document.getElementById('loginHistoryCount').textContent = `?${LoginHistory.getHistory().length} 閺壜ゎ唶瑜版槫;
                }
            }
        };

        // ==================== 鐢ㄦ埛閺佹壆顓悶?====================

        async function loadUsers() {
            const token = localStorage.getItem('adminToken');
            try {
                const res = await fetch(`${API_BASE_URL}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!checkAuth(res)) return;

                allUsers = await res.json();
                document.getElementById('userCountLabel').textContent = `?${allUsers.length} 擃鏁ら幋閿嬫殶`;
                renderUserTable(allUsers);
            } catch (e) {
                console.error('Load users error:', e);
                alert('旂姾径杈Е');
            }
        }

        function renderUserTable(users) {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#999; padding:30px;">閺堫亝澹橀崚垮爱板秶娈敤鎴烽弫?/td></tr>';
                return;
            }

            users.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td><span style="background:${u.role === 'admin' ? '#ff4d4f' : '#1890ff'}; color:white; padding:2px 6px; border-radius:4px; font-size:12px;">${u.role}</span></td>
                    <td>${u.email || '-'}</td>
                    <td>${u.phone || '-'}</td>
                    <td><span style="background:${u.is_2fa_enabled ? '#52c41a' : '#999'}; color:white; padding:2px 6px; border-radius:4px; font-size:12px;">${u.is_2fa_enabled ? '瀹告彃鎯悽? : '閺堫亜鎯悽?}</span></td>
                    <td>${new Date(u.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn btn-danger" style="padding:4px 8px; font-size:12px;" onclick="deleteUser(${u.id})">掔娀娅?/button>
                        ${u.is_2fa_enabled ? `<button class="btn btn-warning" style="padding:4px 8px; font-size:12px; margin-left:4px;" onclick="toggle2FA(${u.id}, false)">備鏁?FA</button>` : ''}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.filterUsers = () => {
            const keyword = document.getElementById('userSearchInput').value.trim().toLowerCase();
            if (!keyword) {
                renderUserTable(allUsers);
                return;
            }
            const filtered = allUsers.filter(u =>
                u.username.toLowerCase().includes(keyword) ||
                (u.email && u.email.toLowerCase().includes(keyword)) ||
                (u.phone && u.phone.includes(keyword)) ||
                String(u.id) === keyword
            );
            renderUserTable(filtered);
        };

        window.showAddUserModal = () => {
            document.getElementById('addUserModal').classList.add('active');
            document.getElementById('addUserModal').style.display = 'flex';
        };

        window.closeAllModals = () => {
            document.querySelectorAll('.modal').forEach(m => {
                m.classList.remove('active');
                m.style.display = 'none';
            });
        };

        window.addUser = async () => {
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;
            const role = document.getElementById('newRole').value;

            if (!username || !password) return alert('囧嘲锝為崘娆暏撮攱鏆熼崥宥呮嫲靛棛鐖?);

            try {
                const res = await fetch(`${API_BASE_URL}/admin/users`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ username, password, role })
                });

                const data = await res.json();
                if (res.ok) {
                    alert('ｈ為幋鎰');
                    closeAllModals();
                    loadUsers();
                } else {
                    alert(data.message || 'ｈ炴径杈Е');
                }
            } catch (e) {
                console.error(e);
                alert('冩垹绮堕柨娆掝嚖');
            }
        };

        window.deleteUser = async (id) => {
            if (!confirm('绾喖鐣鹃崚鐘绘珟囥儳鏁ら幋閿嬫殶氭绱?)) return;
            try {
                const res = await fetch(`${API_BASE_URL}/admin/users/${id}`, {
                    method: 'DELETE',
                    headers: getHeaders()
                });
                if (res.ok) {
                    alert('掔娀娅幋鎰');
                    loadUsers();
                } else {
                    alert('掔娀娅庢径杈Е');
                }
            } catch (e) {
                console.error(e);
                alert('冩垹绮堕柨娆掝嚖');
            }
        };

        window.toggle2FA = async (id, enable) => {
            const action = enable ? '氼垳鏁? : '備鏁?;
            if (!confirm(`绾喖鐣剧憰?{action}囥儳鏁ら幋閿嬫殶嫪绨╁▎锟犵崣囦礁鎮敍鐒?) return;

            try {
                const res = await fetch(`${API_BASE_URL}/admin/users/${id}/2fa`, {
                    method: 'PUT',
                    headers: getHeaders(),
                    body: JSON.stringify({ enabled: enable })
                });

                const data = await res.json();
                if (res.ok) {
                    alert(data.message);
                    loadUsers();
                } else {
                    alert(data.message || '垮秳缍旀径杈Е');
                }
            } catch (e) {
                console.error(e);
                alert('冩垹绮堕柨娆掝嚖');
            }
        };

        // ==================== 绾绔电粻锛勬倞 ====================

        async function loadCoinUsers() {
            try {
                const res = await fetch(`${API_BASE_URL}/admin/coins`, {
                    headers: getHeaders()
                });

                if (!checkAuth(res)) return;

                allCoinUsers = await res.json();
                renderCoinTable(allCoinUsers);
            } catch (e) {
                console.error('Load coin users error:', e);
                alert('旂姾涵绔弫鐗堝祦惰精?);
            }
        }

        function renderCoinTable(users) {
            const tbody = document.getElementById('coinTableBody');
            tbody.innerHTML = '';

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#999; padding:30px;">閺倹妫ら弫鐗堝祦</td></tr>';
                return;
            }

            users.forEach(u => {
                const tr = document.createElement('tr');
                const lastCheckin = u.last_checkin
                    ? new Date(u.last_checkin).toLocaleDateString()
                    : '-';
                tr.innerHTML = `
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td><span class="coin-badge">?? ${u.balance}</span></td>
                    <td style="color:#52c41a; font-weight:500;">+${u.total_earned}</td>
                    <td style="color:#ff4d4f; font-weight:500;">-${u.total_spent}</td>
                    <td>${u.checkin_streak || 0} ?/td>
                    <td>${lastCheckin}</td>
                    <td>
                        <button class="btn btn-primary" style="padding:4px 8px; font-size:12px; margin-right:4px;" onclick="viewCoinDetail(${u.id})">囷附?/button>
                        <button class="btn btn-coin" style="padding:4px 8px; font-size:12px;" onclick="quickAdjust(${u.id}, '${u.username}', ${u.balance})">啯鏆?/button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.filterCoinUsers = () => {
            const keyword = document.getElementById('coinSearchInput').value.trim().toLowerCase();
            if (!keyword) {
                renderCoinTable(allCoinUsers);
                return;
            }
            const filtered = allCoinUsers.filter(u =>
                u.username.toLowerCase().includes(keyword) ||
                (u.email && u.email.toLowerCase().includes(keyword))
            );
            renderCoinTable(filtered);
        };

        // 閺屻儳婀呯涵绔电拠锔藉剰
        window.viewCoinDetail = async (userId) => {
            currentDetailUserId = userId;
            try {
                const res = await fetch(`${API_BASE_URL}/admin/coins/${userId}`, {
                    headers: getHeaders()
                });

                if (!checkAuth(res)) return;

                const data = await res.json();
                const user = data.user;
                const transactions = data.transactions;

                document.getElementById('detailUsername').textContent = user.username;
                document.getElementById('detailBalance').textContent = user.balance;
                document.getElementById('detailEarned').textContent = user.total_earned;
                document.getElementById('detailSpent').textContent = user.total_spent;

                // 弶鐓嬫禍佹澘缍?
                const listEl = document.getElementById('transactionList');
                if (transactions.length === 0) {
                    listEl.innerHTML = '<div class="empty-tip">閺倹妫ゆ禍佹澘缍?/div>';
                } else {
                    listEl.innerHTML = transactions.map(t => {
                        const isPositive = t.amount > 0;
                        const time = new Date(t.created_at).toLocaleString();
                        return `
                            <div class="transaction-item">
                                <div>
                                    <div class="transaction-desc">${escapeHtml(t.description || t.type)}</div>
                                    <div class="transaction-time">${time}</div>
                                </div>
                                <div class="transaction-amount ${isPositive ? 'positive' : 'negative'}">
                                    ${isPositive ? '+' : ''}${t.amount}
                                </div>
                            </div>
                        `;
                    }).join('');
                }

                document.getElementById('coinDetailModal').style.display = 'flex';
            } catch (e) {
                console.error('Load coin detail error:', e);
                alert('旂姾拠锔藉剰惰精?);
            }
        };

        // 韫囶偊鈧喕鐨熼弫杈剧礄犲骸鍨悰銊ф纯恒儳ｉ浼欑礆
        window.quickAdjust = (userId, username, balance) => {
            currentDetailUserId = userId;
            document.getElementById('adjustUsername').textContent = username;
            document.getElementById('adjustCurrentBalance').textContent = balance;
            document.getElementById('adjustAmount').value = '';
            document.getElementById('adjustReason').value = '';
            document.getElementById('adjustCoinModal').style.display = 'flex';
        };

        // 犲氦涢幆鍛剨愭澧鈧拫鍐╂殻鐛?
        window.showAdjustModal = () => {
            const username = document.getElementById('detailUsername').textContent;
            const balance = document.getElementById('detailBalance').textContent;
            document.getElementById('adjustUsername').textContent = username;
            document.getElementById('adjustCurrentBalance').textContent = balance;
            document.getElementById('adjustAmount').value = '';
            document.getElementById('adjustReason').value = '';
            document.getElementById('coinDetailModal').style.display = 'none';
            document.getElementById('adjustCoinModal').style.display = 'flex';
        };

        window.closeAdjustModal = () => {
            document.getElementById('adjustCoinModal').style.display = 'none';
        };

        // 绘劒︾拫鍐╂殻
        window.submitAdjust = async () => {
            const amount = document.getElementById('adjustAmount').value;
            const reason = document.getElementById('adjustReason').value.trim();

            if (!amount || parseInt(amount) === 0) {
                return alert('柉绶崗銉╂姜闂墎娈拫鍐╂殻閺佷即鍣?);
            }

            const adjustAmount = parseInt(amount);
            const username = document.getElementById('adjustUsername').textContent;
            const action = adjustAmount > 0 ? `х偛?${adjustAmount}` : `碉綁娅?${Math.abs(adjustAmount)}`;

            if (!confirm(`绾喖鐣剧憰浣疯礋鐢ㄦ埛閺佽埇鈧?{username}閵?{action} 閺嬫氨鈥栫敮浣告偋閿涚剫)) return;

            try {
                const res = await fetch(`${API_BASE_URL}/admin/coins/${currentDetailUserId}`, {
                    method: 'PUT',
                    headers: getHeaders(),
                    body: JSON.stringify({ amount: adjustAmount, reason })
                });

                const data = await res.json();

                if (res.ok) {
                    alert(`? 啯鏆ｉ幋鎰閿?{username} 瑜版挸澧犳担娆擃杺: ${data.balance}`);
                    closeAllModals();
                    loadCoinUsers(); // 掗攱鏌婇崚勩?
                } else {
                    alert(data.message || '啯鏆ｆ径杈Е');
                }
            } catch (e) {
                console.error('Adjust coins error:', e);
                alert('冩垹绮堕柨娆掝嚖');
            }
        };

        // ==================== 规劕粻锛勬倞 ====================

        let donatePage = 1;
        let donateUsers = []; // 傛挸鐡ㄧ敤鎴烽弫鎷岀斺晜鏁版嵁?

        async function loadDonations() {
            const token = localStorage.getItem('adminToken');
            try {
                // 旂姾囬幑鎰И佹澘缍?
                const params = new URLSearchParams({ page: donatePage, limit: 20 });
                const res = await fetch(`${API_BASE_URL}/donate/admin/list?${params}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (checkAuth(res)) {
                    const data = await res.json();
                    renderDonateTable(data.data, data.pagination);
                }

                // 旂姾敤鎴烽弫鎷岀斺晜甯悰?
                loadDonateUsers();
                loadDonateStats();
            } catch (e) {
                console.error('Load donations error:', e);
            }
        }

        async function loadDonateUsers() {
            const token = localStorage.getItem('adminToken');
            try {
                const res = await fetch(`${API_BASE_URL}/donate/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!checkAuth(res)) return;
                donateUsers = await res.json();
                renderDonateUserRank(donateUsers);
            } catch (e) {
                console.error('Load donate users error:', e);
            }
        }

        function renderDonateUserRank(users) {
            const tbody = document.getElementById('donateUserRankBody');
            const ranked = users.filter(u => parseFloat(u.total_donated) > 0)
                .sort((a, b) => parseFloat(b.total_donated) - parseFloat(a.total_donated));

            if (ranked.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#999; padding:20px;">閺倹妫ょ挧鐐插И鐢ㄦ埛閺?/td></tr>';
                return;
            }

            tbody.innerHTML = ranked.map(u => {
                const amount = parseFloat(u.total_donated);
                const titleStyle = u.title === 'MVP'
                    ? 'background:#fce4ec; color:#c62828;'
                    : u.title === 'VIP'
                        ? 'background:#fff8e1; color:#f57f17;'
                        : '';
                const titleText = u.title || '-';
                return `<tr>
                    <td>${u.id}</td>
                    <td>${escapeHtml(u.username)}</td>
                    <td style="font-weight:700; color:#ff6b6b;">閿?{amount.toFixed(2)}</td>
                    <td>${u.title ? `<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700;${titleStyle}">${titleText}</span>` : '-'}</td>
                </tr>`;
            }).join('');
        }

        function renderDonateTable(list, pagination) {
            const tbody = document.getElementById('donateTableBody');
            document.getElementById('donateCountLabel').textContent = `?${pagination.total} 閺壜ゎ唶瑜版槫;

            if (!list || list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#999;">閺倹妫ら幑鎰И佹澘缍?/td></tr>';
                return;
            }

            tbody.innerHTML = list.map(d => {
                const time = d.paid_at ? new Date(d.paid_at).toLocaleString('zh-CN') : new Date(d.created_at).toLocaleString('zh-CN');
                return `<tr>
                    <td style="font-size:0.8em; font-family:monospace;">${escapeHtml(d.order_no)}</td>
                    <td>${escapeHtml(d.donor_name)}${d.user_username ? ` <span style="color:#999; font-size:0.8em;">(${escapeHtml(d.user_username)})</span>` : ''}</td>
                    <td style="font-weight:700; color:#ff6b6b;">閿?{parseFloat(d.amount).toFixed(2)}</td>
                    <td style="max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${escapeHtml(d.message)}">${escapeHtml(d.message) || '-'}</td>
                    <td style="font-size:0.85em;">${time}</td>
                </tr>`;
            }).join('');

            // 掑棝銆?
            document.getElementById('donatePageInfo').textContent = `?${pagination.page} / ${pagination.totalPages} 妞ょぐ;
            document.getElementById('donatePrevBtn').style.display = pagination.page > 1 ? 'inline-block' : 'none';
            document.getElementById('donateNextBtn').style.display = pagination.page < pagination.totalPages ? 'inline-block' : 'none';
        }

        async function loadDonateStats() {
            try {
                const res = await fetch(`${API_BASE_URL}/donate/goal`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.stats) {
                        document.getElementById('adminTotalAmount').textContent = '閿? + parseFloat(data.stats.total_amount || 0).toFixed(2);
                        document.getElementById('adminPaidCount').textContent = data.stats.total_donors || 0;
                    }
                    if (data.goal) {
                        const current = parseFloat(data.goal.current_amount) || 0;
                        const target = parseFloat(data.goal.target_amount) || 1;
                        document.getElementById('adminGoalProgress').textContent = Math.min((current / target * 100), 100).toFixed(1) + '%';
                    }
                }
            } catch (e) { /* ignore */ }
        }

        // 閺墽銇氭晶鐐插х偛鍦崶
        window.showAddDonateModal = async () => {
            const token = localStorage.getItem('adminToken');
            const select = document.getElementById('donateUserSelect');

            // 旂姾敤鎴烽弫垮灙鐞?
            try {
                const res = await fetch(`${API_BASE_URL}/donate/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!checkAuth(res)) return;
                const users = await res.json();

                select.innerHTML = '<option value="">-- 鈧瀚ㄧ敤鎴烽弫?--</option>' +
                    users.map(u => {
                        const amount = parseFloat(u.total_donated) || 0;
                        const titleTag = u.title ? ` [${u.title}]` : '';
                        return `<option value="${u.id}" data-amount="${amount}" data-title="${u.title || ''}">${u.username} (閿?{amount.toFixed(2)}${titleTag})</option>`;
                    }).join('');
            } catch (e) {
                console.error('Load users error:', e);
            }

            // 佹垵鐣鹃柅滃娆?
            select.onchange = () => {
                const opt = select.selectedOptions[0];
                const infoDiv = document.getElementById('donateUserInfo');
                if (opt && opt.value) {
                    infoDiv.style.display = 'block';
                    document.getElementById('donateUserCurrentAmount').textContent = '閿? + (parseFloat(opt.dataset.amount) || 0).toFixed(2);
                    document.getElementById('donateUserCurrentTitle').textContent = opt.dataset.title || '閺?;
                } else {
                    infoDiv.style.display = 'none';
                }
            };

            document.getElementById('donateAmountInput').value = '';
            document.getElementById('donateMessageInput').value = '';
            document.getElementById('donateUserInfo').style.display = 'none';
            document.getElementById('addDonateModal').style.display = 'flex';
        };

        // 绘劒︽晶鐐插х偛?
        window.submitAddDonate = async () => {
            const token = localStorage.getItem('adminToken');
            const userId = document.getElementById('donateUserSelect').value;
            const amount = document.getElementById('donateAmountInput').value;
            const message = document.getElementById('donateMessageInput').value.trim();

            if (!userId) return alert('鈧瀚ㄧ敤鎴烽弫?);
            if (!amount || parseFloat(amount) <= 0) return alert('柉绶崗銉︽箒閺佸牓鍣炬０?);

            const username = document.getElementById('donateUserSelect').selectedOptions[0].textContent.split(' ')[0];
            if (!confirm(`绾喖鐣炬稉铏规暏撮攱鏆熼妴?{username}閵秴顤崝?閿?{parseFloat(amount).toFixed(2)} х偛鎴︻杺閿涚剫)) return;

            try {
                const res = await fetch(`${API_BASE_URL}/donate/admin/add`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ user_id: parseInt(userId), amount: parseFloat(amount), message })
                });
                const data = await res.json();
                if (res.ok) {
                    let msg = `? ${data.message}`;
                    if (data.title_message) msg += `\n${data.title_message}`;
                    alert(msg);
                    closeAllModals();
                    loadDonations();
                } else {
                    alert(data.message || '垮秳缍旀径杈Е');
                }
            } catch (e) {
                console.error('Add donate error:', e);
                alert('冩垹绮堕柨娆掝嚖');
            }
        };

        window.changDonatePage = (delta) => {
            donatePage += delta;
            if (donatePage < 1) donatePage = 1;
            loadDonations();
        };

        window.showGoalModal = () => {
            document.getElementById('goalModal').style.display = 'flex';
        };

        window.saveGoal = async () => {
            const token = localStorage.getItem('adminToken');
            const title = document.getElementById('goalTitleInput').value.trim();
            const description = document.getElementById('goalDescInput').value.trim();
            const target_amount = document.getElementById('goalAmountInput').value;

            if (!title || !target_amount) {
                alert('囧嘲锝為崘娆愮垼妫版ê鎷伴惄顔界垼叉垿顤?);
                return;
            }

            try {
                const res = await fetch(`${API_BASE_URL}/donate/admin/goal`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ title, description, target_amount })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('规劕惄顔界垼瀹稿弶娲块弬甯磼');
                    closeAllModals();
                    loadDonateStats();
                } else {
                    alert(data.message || '閺囧瓨鏌婃径杈Е');
                }
            } catch (e) {
                alert('冩垹绮堕柨娆掝嚖');
            }
        };

        // ==================== 瀹搞儱鍙块鑺ユ殶 ====================

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // ==================== 掓繂顫愰崠鏍у ====================
        
        // 佹垵鐣鹃惂茬秿稿虫禍瀣╂
        document.getElementById('loginBtn')?.addEventListener('click', window.adminLogin);
    </script>

    // 閺寧宕叉い鐢告桨擃厾娈?emoji
    function replaceEmojis() {
        if (!isWindows7()) return;
        
        // 閺寧宕查弬鍥ㄦ拱哄倻?
        var walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );
        
        var node;
        while (node = walker.nextNode()) {
            var text = node.textContent;
            var hasEmoji = false;
            for (var emoji in emojiMap) {
                if (text.indexOf(emoji) !== -1) {
                    text = text.split(emoji).join(emojiMap[emoji]);
                    hasEmoji = true;
                }
            }
            if (hasEmoji) {
                node.textContent = text;
            }
        }
        
        // 閺寧宕茬仦鐐粹偓褌鑵戦惃?emoji閿涘牆顩?title, alt 涘绱?
        var elements = document.querySelectorAll('*');
        var attrs = ['title', 'alt', 'placeholder', 'value'];
        for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            for (var j = 0; j < attrs.length; j++) {
                var attr = attrs[j];
                if (el.hasAttribute(attr)) {
                    var val = el.getAttribute(attr);
                    var hasEmoji = false;
                    for (var emoji in emojiMap) {
                        if (val.indexOf(emoji) !== -1) {
                            val = val.split(emoji).join(emojiMap[emoji]);
                            hasEmoji = true;
                        }
                    }
                    if (hasEmoji) {
                        el.setAttribute(attr, val);
                    }
                }
            }
        }
    }
    
    // DOM 旂姾瑰本鍨氶崥㈠⒔鐞涘本涢幑?
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', replaceEmojis);
    } else {
        replaceEmojis();
    }
})();
</script>
