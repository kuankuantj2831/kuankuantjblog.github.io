<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>иҙӘеҗғиӣ?/title>
    
    <!-- дјҳеҢ–пјҡйў„иҝһжҺҘеҲ°еӯ—дҪ“жңҚеҠЎеҷЁ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

<body>
    <canvas id="backgroundCanvas"></canvas>
    <div class="main-container">
        <div class="inner-frame">
            <h1>иҙӘеҗғиӣ?/h1>
            <div class="stats-container">
                <div class="score-container">
                    <span>еҲҶж•°: </span><span id="score">0</span>
                </div>
                <div class="time-container">
                    <span>ж—¶й—ҙ: </span><span id="time">0</span>s
                </div>
                <div class="highscore-container">
                    <span>жңҖй«? </span><span id="highScore">0</span>
                </div>
            </div>
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="save-load-container">
                <button id="saveButton">з”ҹжҲҗеӯҳжЎЈ</button>
                <input type="text" id="saveCodeInput" placeholder="еңЁжӯӨеӨ„зІҳиҙҙеӯҳжЎЈз Ғ...">
                <button id="loadButton">иҜ»еҸ–еӯҳжЎЈ</button>

                <button id="achievementsButton">жҲҗе°ұ</button>
            </div>
            <div id="gameOverScreen" class="hidden">
                <h2>No signal!</h2>
                <p>жңҖз»Ҳеҫ—еҲ? <span id="finalScore">0</span></p>
                <button id="restartButton">йҮҚж–°иҝһжҺҘ</button>
            </div>
        </div>
    </div>
    
    <!-- жҲҗе°ұеј№зӘ— -->
    <div id="achievements-modal" class="hidden">
        <div class="modal-content">
            <h2>жҲҗе°ұеҲ—иЎЁ</h2>
            <div id="achievements-list"></div>
            <button id="close-achievements">е…ій—ӯ</button>
        </div>
    </div>

    <!-- дјҳеҢ–пјҡе»¶иҝҹжү§иЎҢи„ҡжң?-->
    <script src="script.js" defer></script>
    
    <div id="achievement-container"></div>

    <!-- з§»еҠЁз«ҜиҷҡжӢҹжҢүй”?-->
    <div id="mobile-controls" class="hidden">
        <div class="d-pad">
            <button id="up-button" class="d-pad-button up">вҶ?/button>
            <button id="down-button" class="d-pad-button down">вҶ?/button>
            <button id="left-button" class="d-pad-button left">вҶ?/button>
            <button id="right-button" class="d-pad-button right">вҶ?/button>
        </div>
    </div>



</body>
</html>
