<!-- Win7 Emoji е…је®№жҖ§еӨ„зҗ?-->
<script>
(function() {
    // жЈҖжөӢжҳҜеҗҰдёә Windows 7
    function isWindows7() {
        var ua = navigator.userAgent;
        return ua.indexOf('Windows NT 6.1') !== -1 || 
               ua.indexOf('Windows 7') !== -1;
    }
    
    // Emoji жӣҝжҚўжҳ е°„иЎ?
    var emojiMap = {
        "рҹҗұ": "зҢ?,
        "рҹҸ ": "йҰ–йЎө",
        "рҹҺ®": "жёёжҲҸ",
        "вҳҒпёҸ": "дә?,
        "вҳҖпё?: "еӨӘйҳі",
        "вқӨпёҸ": "зҲұеҝғ",
        "рҹҺҜ": "е…ідәҺ",
        "рҹ’¬": "ж¶ҲжҒҜ",
        "рҹ””": "йҖҡзҹҘ",
        "рҹ‘Ө": "з”ЁжҲ·",
        "рҹ“қ": "зј–иҫ‘",
        "в¬ҶпёҸ": "еҚҮзә§",
        "рҹ–јпё?: "еӣҫзүҮ",
        "вңҚпёҸ": "еҶҷдҪң",
        "вҡҷпёҸ": "и®ҫзҪ®",
        "рҹҡӘ": "йҖҖеҮ?,
        "рҹ’Ў": "жҸҗзӨә",
        "вҡ?: "з»ҸйӘҢ",
        "рҹҡҖ": "еҸ‘еёғ",
        "рҹҺ–пё?: "зӯүзә§",
        "рҹ’Ә": "еҠ жІ№",
        "рҹ”’": "й”Ғе®ҡ",
        "рҹ“ң": "еҚҸи®®",
        "вҶ?: "дё?,
        "вҶ?: "дё?,
        "вҶ©пёҸ": "ж’Өй”Җ",
        "вқ?: "её®еҠ©",
        "рҹ”„": "еҲ·ж–°",
        "в–¶пёҸ": "ејҖе§?,
        "вҸұпёҸ": "ж—¶й—ҙ",
        "рҹҺЁ": "еҲӣж„Ҹ",
        "рҹ’»": "з”өи„‘",
        "рҹ“ҡ": "еӯҰд№ ",
        "рҹӣЎпё?: "зӣҫзүҢ",
        "вңҲпёҸ": "йЈһжңә",
        "вӯ?: "жҳҹжҳҹ",
        "рҹ•№пё?: "жүӢжҹ„",
        "рҹ“§": "йӮ®з®ұ",
        "рҹ“ұ": "жүӢжңә",
        "рҹ“‘": "зӣ®еҪ•",
        "рҹ“Ұ": "еҺӢзј©",
        "рҹ“„": "ж–Үд»¶",
        "рҹ“ҷ": "PPT",
        "рҹ”§": "е·Ҙе…·",
        "рҹӘҷ": "зЎ¬еёҒ",
        "рҹ’°": "йҮ‘еёҒ",
        "вң?: "е®ҢжҲҗ",
        "рҹӣ пё?: "е·Ҙе…·",
        "рҹ’«": "жҳҹе…ү",
        "рҹ”Қ": "жҗңзҙў",
        "рҹ“–": "д№ҰзұҚ",
        "рҹҸ·пё?: "ж Үзӯҫ",
        "рҹ—‘пё?: "еҲ йҷӨ"
    };
    
    // жӣҝжҚўйЎөйқўдёӯзҡ„ emoji
    function replaceEmojis() {
        if (!isWindows7()) return;
        
        // жӣҝжҚўж–Үжң¬иҠӮзӮ№
        var walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );
        
        var node;
        while (node = walker.nextNode()) {
            var text = node.textContent;
            var hasEmoji = false;
            for (var emoji in emojiMap) {
                if (text.indexOf(emoji) !== -1) {
                    text = text.split(emoji).join(emojiMap[emoji]);
                    hasEmoji = true;
                }
            }
            if (hasEmoji) {
                node.textContent = text;
            }
        }
        
        // жӣҝжҚўеұһжҖ§дёӯзҡ?emojiпјҲеҰӮ title, alt зӯүпјү
        var elements = document.querySelectorAll('*');
        var attrs = ['title', 'alt', 'placeholder', 'value'];
        for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            for (var j = 0; j < attrs.length; j++) {
                var attr = attrs[j];
                if (el.hasAttribute(attr)) {
                    var val = el.getAttribute(attr);
                    var hasEmoji = false;
                    for (var emoji in emojiMap) {
                        if (val.indexOf(emoji) !== -1) {
                            val = val.split(emoji).join(emojiMap[emoji]);
                            hasEmoji = true;
                        }
                    }
                    if (hasEmoji) {
                        el.setAttribute(attr, val);
                    }
                }
            }
        }
    }
    
    // DOM еҠ иҪҪе®ҢжҲҗеҗҺжү§иЎҢжӣҝжҚ?
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', replaceEmojis);
    } else {
        replaceEmojis();
    }
})();
</script>
