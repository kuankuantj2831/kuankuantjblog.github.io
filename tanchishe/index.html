<!-- Win7 Emoji 稿繒鍘鎰板箑瑜ˇ鈺呮偠?-->
<script>
(function() {
    // ☆偀撴繛戭儐濡叉悂宕敂鑳 Windows 7
    function isWindows7() {
        var ua = navigator.userAgent;
        return ua.indexOf('Windows NT 6.1') !== -1 || 
               ua.indexOf('Windows 7') !== -1;
    }
    
    // Emoji 哄洦у畷鏌ュ及樿尙娈悶?
    var emojiMap = {
        "妫啯?: "?,
        "妫啫缍?: "濡鐗犻妴?,
        "妫啫绠?: "炴挸鎲￠?,
        "虫垝绶ょ?: "?,
        "宠В撻柨?: "濠浜Σ?,
        "村倶х?: "绘牕宕缓?,
        "妫啫绠?: "稿繐鍘栫花?,
        "妫啯灏?: "炴垵鐗婃导?,
        "妫啯鏅?: "闂偅ㄩ悡?,
        "妫啯鍣?: "活潿鍔崺?,
        "妫啯鎲?: "傚倹鐗炵欢?,
        "氼妫寸?: "告娲ㄦ?,
        "妫啯鐓犻柨?: "搞儱澧芥晶?,
        "翠礁绋?: "告劖ょ紞?,
        "虫寧辩?: "犱礁澧介悿?,
        "妫啯鐦?: "闂偀撻柛?,
        "妫啯?: "圭粯鍔妵?,
        "?: "備礁绻橀悰?,
        "妫啯鐣?: "告瑦鍨电粩?,
        "妫啫绗柨?: "佹稑顦辨?,
        "妫啯灏?: "告梻电悰?,
        "妫啯鏅?: "闂佸じ侀悾?,
        "妫啯鎲?: "告绻?,
        "?: "?,
        "?: "?,
        "愁偀鏅?: "逛勘濋弨?,
        "?: "㈩垼鍠栨慨?,
        "妫啯鏁?: "告帡鏀遍弻?,
        "虫槒顔愮?: "殿喒┑?,
        "冲瓨鍞?: "哄啫鐖煎Λ?,
        "妫啫鑵?: "告帗绋掗崜?,
        "妫啯宕?: "活澀绲婚崜?,
        "妫啯鎲?: "庢冻氱弧?,
        "妫啯夐柨?: "烩晛澧芥晶?,
        "翠礁鐗炵?: "濡炲炲┃鈧?,
        "?: "哄鍠愬Σ?,
        "妫啯姣嗛柨?: "归潧嗛悞?,
        "妫啯鎲?: "闂収鍠氶?,
        "妫啯鎳?: "归潧┃鈧?,
        "妫啯鎯?: "烩晩鍠栫紞?,
        "妫啯鎲?: "告ê紓?,
        "妫啯鎯?: "哄倸娲▎?,
        "妫啯鎲?: "PPT",
        "妫啯鏆?: "规悶遍崣?,
        "妫啰宕?: "绢収鍓欑粩?,
        "妫啯灏?: "闂佸弶鍨电粩?,
        "?: "鏈?,
        "妫啯堥柨?: "规悶遍崣?,
        "妫啯灏?: "哄鍠崢?,
        "妫啯鏁?: "瑰吋绮?,
        "妫啯鎲?: "棑濡囬惈?,
        "妫啫囬柨?: "哄秴娲ㄩ?,
        "妫啯顥旈柨?: "告帞?
    };
    
    // 哄洦у畷鍙夈亜㈠憡妗冨幘?emoji
    function replaceEmojis() {
        if (!isWindows7()) return;
        
        // 哄洦у畷鏌ュ棘ャ劍鎷遍柤鍝婚崑?
        var walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );
        
        var node;
        while (node = walker.nextNode()) {
            var text = node.textContent;
            var hasEmoji = false;
            for (var emoji in emojiMap) {
                if (text.indexOf(emoji) !== -1) {
                    text = text.split(emoji).join(emojiMap[emoji]);
                    hasEmoji = true;
                }
            }
            if (hasEmoji) {
                node.textContent = text;
            }
        }
        
        // 哄洦у畷鑼沪愮补撹垫垿鎯?emoji挎稑鐗嗛々?title, alt 佹稑顧?
        var elements = document.querySelectorAll('*');
        var attrs = ['title', 'alt', 'placeholder', 'value'];
        for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            for (var j = 0; j < attrs.length; j++) {
                var attr = attrs[j];
                if (el.hasAttribute(attr)) {
                    var val = el.getAttribute(attr);
                    var hasEmoji = false;
                    for (var emoji in emojiMap) {
                        if (val.indexOf(emoji) !== -1) {
                            val = val.split(emoji).join(emojiMap[emoji]);
                            hasEmoji = true;
                        }
                    }
                    if (hasEmoji) {
                        el.setAttribute(attr, val);
                    }
                }
            }
        }
    }
    
    // DOM 告梻ù鍥┾偓版湰ㄦ岸宕ユ惔銏犫挃炴稑鏈ù㈠箲?
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', replaceEmojis);
    } else {
        replaceEmojis();
    }
})();
</script>

</body>
