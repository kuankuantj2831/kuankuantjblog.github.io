<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>з§ҜеҲҶе•ҶеҹҺ - Hakimi зҡ„зҢ«зҲ¬жһ¶</title>
    <link rel="stylesheet" href="css/chinese-style.css">
    <style>
        .shop-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }

        /* еӨҙйғЁдҝЎжҒҜ */
        .shop-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 20px;
            padding: 30px 40px;
            color: white;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .shop-title h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .shop-title p {
            opacity: 0.9;
        }

        .coin-balance {
            background: rgba(255,255,255,0.2);
            padding: 15px 30px;
            border-radius: 15px;
            text-align: center;
        }

        .coin-balance .amount {
            font-size: 2rem;
            font-weight: bold;
        }

        .coin-balance .label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* зӯӣйҖүж Ҹ */
        .shop-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: none;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* е•Ҷе“ҒзҪ‘ж ј */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .shop-item {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .shop-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .item-image {
            height: 180px;
            background: linear-gradient(135deg, #667eea20, #764ba220);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }

        .item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-info {
            padding: 20px;
        }

        .item-type {
            font-size: 0.75rem;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .item-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .item-desc {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-price {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #f5576c;
        }

        .item-price::before {
            content: 'рҹӘҷ';
            font-size: 1rem;
        }

        .btn-buy {
            padding: 8px 20px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-buy:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-buy:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-buy.owned {
            background: #4caf50;
        }

        /* жҲ‘зҡ„иҙӯд№°и®°еҪ• */
        .purchases-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .purchases-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .purchase-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .purchase-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea20, #764ba220);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 15px;
        }

        .purchase-info {
            flex: 1;
        }

        .purchase-info h4 {
            margin-bottom: 3px;
        }

        .purchase-info p {
            font-size: 0.8rem;
            color: #666;
        }

        .purchase-price {
            color: #f5576c;
            font-weight: bold;
        }

        /* з©әзҠ¶жҖ?*/
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        /* иҙӯд№°зЎ®и®Өеј№зӘ— */
        .purchase-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .purchase-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .purchase-modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .purchase-modal.active .purchase-modal-content {
            transform: scale(1);
        }

        .purchase-modal-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .purchase-modal h3 {
            margin-bottom: 10px;
        }

        .purchase-modal p {
            color: #666;
            margin-bottom: 20px;
        }

        .purchase-modal-actions {
            display: flex;
            gap: 10px;
        }

        .purchase-modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #666;
        }

        .btn-confirm {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* е“Қеә”еј?*/
        @media (max-width: 768px) {
            .shop-header {
                flex-direction: column;
                text-align: center;
                gap: 20px;
            }

            .shop-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="chinese-style-wrapper">
        <nav class="top-nav">
            <div class="nav-links">
                <a href="/" class="nav-link">йҰ–йЎө</a>
                <a href="/coins.html" class="nav-link">зЎ¬еёҒдёӯеҝғ</a>
                <span class="nav-link active">з§ҜеҲҶе•ҶеҹҺ</span>
            </div>
        </nav>

        <div class="shop-container">
            <!-- еӨҙйғЁ -->
            <div class="shop-header">
                <div class="shop-title">
                    <h1>рҹӣҚпё?з§ҜеҲҶе•ҶеҹҺ</h1>
                    <p>з”ЁзЎ¬еёҒе…‘жҚўдҪ е–ңж¬ўзҡ„йҒ“е…·е’Ңзү№жқғ</p>
                </div>
                <div class="coin-balance">
                    <div class="amount" id="coinBalance">--</div>
                    <div class="label">жҲ‘зҡ„зЎ¬еёҒ</div>
                </div>
            </div>

            <!-- зӯӣйҖ?-->
            <div class="shop-filters">
                <button class="filter-btn active" data-type="all">е…ЁйғЁ</button>
                <button class="filter-btn" data-type="theme">рҹҺЁ дё»йўҳ</button>
                <button class="filter-btn" data-type="badge">рҹҸ… еҫҪз« жЎ?/button>
                <button class="filter-btn" data-type="feature">вҡ?еҠҹиғҪ</button>
                <button class="filter-btn" data-type="virtual">рҹҺҒ иҷҡжӢҹзү©е“Ғ</button>
            </div>

            <!-- е•Ҷе“ҒеҲ—иЎЁ -->
            <div class="shop-grid" id="shopGrid">
                <div class="empty-state">
                    <div class="icon">рҹӣ’</div>
                    <p>жӯЈеңЁеҠ иҪҪе•Ҷе“Ғ...</p>
                </div>
            </div>

            <!-- иҙӯд№°и®°еҪ• -->
            <div class="purchases-section">
                <h2 class="section-title">рҹ“Ұ жҲ‘зҡ„иҙӯд№°и®°еҪ•</h2>
                <div class="purchases-list" id="purchasesList">
                    <div class="empty-state">
                        <div class="icon">рҹ“ӯ</div>
                        <p>иҝҳжІЎжңүиҙӯд№°и®°еҪ?/p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- иҙӯд№°зЎ®и®Өеј№зӘ— -->
    <div class="purchase-modal" id="purchaseModal">
        <div class="purchase-modal-content">
            <div class="purchase-modal-icon" id="modalIcon">рҹӣҚпё?/div>
            <h3 id="modalTitle">зЎ®и®Өиҙӯд№°</h3>
            <p id="modalDesc">зЎ®е®ҡиҰҒиҙӯд№°иҝҷдёӘе•Ҷе“Ғеҗ—пј?/p>
            <div class="purchase-modal-actions">
                <button class="btn-cancel" onclick="shop.closeModal()">еҸ–ж¶Ҳ</button>
                <button class="btn-confirm" onclick="shop.confirmPurchase()">зЎ®и®Өиҙӯд№°</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { API_BASE_URL } from './js/api-config.js?v=20260418a';

        class Shop {
            constructor() {
                this.token = localStorage.getItem('token');
                this.items = [];
                this.purchases = [];
                this.balance = 0;
                this.currentItem = null;
            }

            async init() {
                if (!this.token) {
                    window.location.href = '/?login=1';
                    return;
                }

                await this.loadBalance();
                await this.loadItems();
                await this.loadPurchases();
                this.bindEvents();
            }

            async loadBalance() {
                try {
                    const response = await fetch(`${API_BASE_URL}/coins/balance`, {
                        headers: { 'Authorization': `Bearer ${this.token}` }
                    });
                    if (!response.ok) throw new Error('еҠ иҪҪдҪҷйўқеӨұиҙҘ');
                    const data = await response.json();
                    this.balance = data.balance || 0;
                    document.getElementById('coinBalance').textContent = this.balance;
                } catch (error) {
                    console.error('еҠ иҪҪдҪҷйўқеӨұиҙҘ:', error);
                }
            }

            async loadItems() {
                try {
                    const response = await fetch(`${API_BASE_URL}/shop/items`);
                    if (!response.ok) throw new Error('еҠ иҪҪе•Ҷе“ҒеӨұиҙҘ');
                    const data = await response.json();
                    this.items = data.items || [];
                    this.renderItems();
                } catch (error) {
                    console.error('еҠ иҪҪе•Ҷе“ҒеӨұиҙҘ:', error);
                    document.getElementById('shopGrid').innerHTML = `
                        <div class="empty-state">
                            <div class="icon">рҹҳў</div>
                            <p>еҠ иҪҪеӨұиҙҘпјҢиҜ·еҲ·ж–°йҮҚиҜ•</p>
                        </div>
                    `;
                }
            }

            renderItems(type = 'all') {
                const grid = document.getElementById('shopGrid');
                const items = type === 'all' ? this.items : this.items.filter(i => i.item_type === type);

                if (items.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">рҹӣ’</div>
                            <p>жҡӮж— е•Ҷе“Ғ</p>
                        </div>
                    `;
                    return;
                }

                const purchasedIds = this.purchases.map(p => p.item_id);

                grid.innerHTML = items.map(item => {
                    const isOwned = purchasedIds.includes(item.id);
                    const canAfford = this.balance >= item.price;
                    const inStock = item.stock > 0;

                    return `
                        <div class="shop-item" data-type="${item.item_type}">
                            <div class="item-image">
                                ${item.image_url ? `<img src="${item.image_url}" alt="${item.name}">` : this.getItemIcon(item.item_type)}
                            </div>
                            <div class="item-info">
                                <div class="item-type">${this.getTypeLabel(item.item_type)}</div>
                                <h3 class="item-name">${item.name}</h3>
                                <p class="item-desc">${item.description}</p>
                                <div class="item-footer">
                                    <span class="item-price">${item.price}</span>
                                    <button class="btn-buy ${isOwned ? 'owned' : ''}" 
                                            ${isOwned || !canAfford || !inStock ? 'disabled' : ''}
                                            onclick="shop.openPurchaseModal(${item.id})">
                                        ${isOwned ? 'е·ІжӢҘжң? : !inStock ? 'зјәиҙ§' : !canAfford ? 'з§ҜеҲҶдёҚи¶і' : 'иҙӯд№°'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            async loadPurchases() {
                try {
                    const response = await fetch(`${API_BASE_URL}/shop/purchases`, {
                        headers: { 'Authorization': `Bearer ${this.token}` }
                    });
                    if (!response.ok) throw new Error('еҠ иҪҪиҙӯд№°и®°еҪ•еӨұиҙҘ');
                    const data = await response.json();
                    this.purchases = data.purchases || [];
                    this.renderPurchases();
                } catch (error) {
                    console.error('еҠ иҪҪиҙӯд№°и®°еҪ•еӨұиҙҘ:', error);
                }
            }

            renderPurchases() {
                const list = document.getElementById('purchasesList');
                if (this.purchases.length === 0) return;

                list.innerHTML = this.purchases.map(purchase => `
                    <div class="purchase-item">
                        <div class="purchase-icon">${this.getItemIcon(purchase.item_type)}</div>
                        <div class="purchase-info">
                            <h4>${purchase.item_name}</h4>
                            <p>иҙӯд№°дә?${new Date(purchase.purchased_at).toLocaleDateString('zh-CN')}</p>
                        </div>
                        <span class="purchase-price">-${purchase.price_paid} рҹӘҷ</span>
                    </div>
                `).join('');
            }

            getItemIcon(type) {
                const icons = {
                    theme: 'рҹҺЁ',
                    badge: 'рҹҸ…',
                    feature: 'вҡ?,
                    virtual: 'рҹҺҒ',
                    default: 'рҹҺҒ'
                };
                return icons[type] || icons.default;
            }

            getTypeLabel(type) {
                const labels = {
                    theme: 'дё»йўҳ',
                    badge: 'еҫҪз« жЎ?,
                    feature: 'еҠҹиғҪ',
                    virtual: 'иҷҡжӢҹзү©е“Ғ'
                };
                return labels[type] || type;
            }

            bindEvents() {
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.renderItems(btn.dataset.type);
                    });
                });
            }

            openPurchaseModal(itemId) {
                const item = this.items.find(i => i.id === itemId);
                if (!item) return;

                this.currentItem = item;
                document.getElementById('modalIcon').textContent = this.getItemIcon(item.item_type);
                document.getElementById('modalTitle').textContent = `иҙӯд№° ${item.name}`;
                document.getElementById('modalDesc').textContent = `иҠұиҙ№ ${item.price} зЎ¬еёҒиҙӯд№°гҖ?{item.name}гҖҚпјҹ\nиҙӯд№°еҗҺдёҚеҸҜйҖҖж¬ҫгҖӮ`;
                document.getElementById('purchaseModal').classList.add('active');
            }

            closeModal() {
                document.getElementById('purchaseModal').classList.remove('active');
                this.currentItem = null;
            }

            async confirmPurchase() {
                if (!this.currentItem) return;

                try {
                    const response = await fetch(`${API_BASE_URL}/shop/buy`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${this.token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ item_id: this.currentItem.id })
                    });

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.message || 'иҙӯд№°еӨұиҙҘ');
                    }

                    this.closeModal();
                    alert('иҙӯд№°жҲҗеҠҹпј?);
                    await Promise.all([
                        this.loadBalance(),
                        this.loadItems(),
                        this.loadPurchases()
                    ]);
                } catch (error) {
                    alert(error.message || 'иҙӯд№°еӨұиҙҘ');
                }
            }
        }

        const shop = new Shop();
        shop.init();
        window.shop = shop;
    </script>
</body>
</html>
