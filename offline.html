<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>绂荤嚎 - Hakimi 鐨勭尗鐖灦</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .offline-container { max-width: 400px; }
        .offline-icon { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 12px; }
        p { font-size: 16px; opacity: 0.85; margin-bottom: 30px; line-height: 1.6; }
        .retry-btn {
            display: inline-block;
            padding: 12px 36px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        .retry-btn:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">馃惐</div>
        <h1>鍠碉綖缃戠粶鏂紑浜?/h1>
        <p>鐚埇鏋舵殏鏃舵棤娉曡繛鎺ョ綉缁?br>璇锋鏌ヤ綘鐨勭綉缁滆繛鎺ュ悗閲嶈瘯</p>
        <a href="/" class="retry-btn" onclick="location.reload(); return false;">閲嶆柊杩炴帴</a>
    </div>

<!-- Win7 Emoji 鍏煎鎬у鐞?-->
<script>
(function() {
    // 妫€娴嬫槸鍚︿负 Windows 7
    function isWindows7() {
        var ua = navigator.userAgent;
        return ua.indexOf('Windows NT 6.1') !== -1 || 
               ua.indexOf('Windows 7') !== -1;
    }
    
    // Emoji 鏇挎崲鏄犲皠琛?
    var emojiMap = {
        "馃惐": "鐚?,
        "馃彔": "棣栭〉",
        "馃幃": "娓告垙",
        "鈽侊笍": "浜?,
        "鈽€锔?: "澶槼",
        "鉂わ笍": "鐖卞績",
        "馃幆": "鍏充簬",
        "馃挰": "娑堟伅",
        "馃敂": "閫氱煡",
        "馃懁": "鐢ㄦ埛",
        "馃摑": "缂栬緫",
        "猬嗭笍": "鍗囩骇",
        "馃柤锔?: "鍥剧墖",
        "鉁嶏笍": "鍐欎綔",
        "鈿欙笍": "璁剧疆",
        "馃毆": "閫€鍑?,
        "馃挕": "鎻愮ず",
        "鈿?: "缁忛獙",
        "馃殌": "鍙戝竷",
        "馃帠锔?: "绛夌骇",
        "馃挭": "鍔犳补",
        "馃敀": "閿佸畾",
        "馃摐": "鍗忚",
        "鈫?: "涓?,
        "鈫?: "涓?,
        "鈫╋笍": "鎾ら攢",
        "鉂?: "甯姪",
        "馃攧": "鍒锋柊",
        "鈻讹笍": "寮€濮?,
        "鈴憋笍": "鏃堕棿",
        "馃帹": "鍒涙剰",
        "馃捇": "鐢佃剳",
        "馃摎": "瀛︿範",
        "馃洝锔?: "鐩剧墝",
        "鉁堬笍": "椋炴満",
        "猸?: "鏄熸槦",
        "馃暪锔?: "鎵嬫焺",
        "馃摟": "閭",
        "馃摫": "鎵嬫満",
        "馃搼": "鐩綍",
        "馃摝": "鍘嬬缉",
        "馃搫": "鏂囦欢",
        "馃摍": "PPT",
        "馃敡": "宸ュ叿",
        "馃獧": "纭竵",
        "馃挵": "閲戝竵",
        "鉁?: "瀹屾垚",
        "馃洜锔?: "宸ュ叿",
        "馃挮": "鏄熷厜",
        "馃攳": "鎼滅储",
        "馃摉": "涔︾睄",
        "馃彿锔?: "鏍囩",
        "馃棏锔?: "鍒犻櫎"
    };
    
    // 鏇挎崲椤甸潰涓殑 emoji
    function replaceEmojis() {
        if (!isWindows7()) return;
        
        // 鏇挎崲鏂囨湰鑺傜偣
        var walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );
        
        var node;
        while (node = walker.nextNode()) {
            var text = node.textContent;
            var hasEmoji = false;
            for (var emoji in emojiMap) {
                if (text.indexOf(emoji) !== -1) {
                    text = text.split(emoji).join(emojiMap[emoji]);
                    hasEmoji = true;
                }
            }
            if (hasEmoji) {
                node.textContent = text;
            }
        }
        
        // 鏇挎崲灞炴€т腑鐨?emoji锛堝 title, alt 绛夛級
        var elements = document.querySelectorAll('*');
        var attrs = ['title', 'alt', 'placeholder', 'value'];
        for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            for (var j = 0; j < attrs.length; j++) {
                var attr = attrs[j];
                if (el.hasAttribute(attr)) {
                    var val = el.getAttribute(attr);
                    var hasEmoji = false;
                    for (var emoji in emojiMap) {
                        if (val.indexOf(emoji) !== -1) {
                            val = val.split(emoji).join(emojiMap[emoji]);
                            hasEmoji = true;
                        }
                    }
                    if (hasEmoji) {
                        el.setAttribute(attr, val);
                    }
                }
            }
        }
    }
    
    // DOM 鍔犺浇瀹屾垚鍚庢墽琛屾浛鎹?
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', replaceEmojis);
    } else {
        replaceEmojis();
    }
})();
</script>

</body>
</html>
