<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>离线 - Hakimi 的猫爬架</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .offline-container { max-width: 400px; }
        .offline-icon { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 12px; }
        p { font-size: 16px; opacity: 0.85; margin-bottom: 30px; line-height: 1.6; }
        .retry-btn {
            display: inline-block;
            padding: 12px 36px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        .retry-btn:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">🐱</div>
        <h1>喵～网络断开了</h1>
        <p>猫爬架暂时无法连接网络<br>请检查你的网络连接后重试</p>
        <a href="/" class="retry-btn" onclick="location.reload(); return false;">重新连接</a>
    </div>
</body>
</html>
