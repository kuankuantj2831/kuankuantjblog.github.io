<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>离线 - Hakimi 的猫爬架</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .offline-container { max-width: 400px; }
        .offline-icon { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 12px; }
        p { font-size: 16px; opacity: 0.85; margin-bottom: 30px; line-height: 1.6; }
        .retry-btn {
            display: inline-block;
            padding: 12px 36px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        .retry-btn:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">🐱</div>
        <h1>喵～网络断开了</h1>
        <p>猫爬架暂时无法连接网络<br>请检查你的网络连接后重试</p>
        <a href="/" class="retry-btn" onclick="location.reload(); return false;">重新连接</a>
    </div>

<!-- Win7 Emoji 兼容性处理 -->
<script>
(function() {
    // 检测是否为 Windows 7
    function isWindows7() {
        var ua = navigator.userAgent;
        return ua.indexOf('Windows NT 6.1') !== -1 || 
               ua.indexOf('Windows 7') !== -1;
    }
    
    // Emoji 替换映射表
    var emojiMap = {
        "🐱": "猫",
        "🏠": "首页",
        "🎮": "游戏",
        "☁️": "云",
        "☀️": "太阳",
        "❤️": "爱心",
        "🎯": "关于",
        "💬": "消息",
        "🔔": "通知",
        "👤": "用户",
        "📝": "编辑",
        "⬆️": "升级",
        "🖼️": "图片",
        "✍️": "写作",
        "⚙️": "设置",
        "🚪": "退出",
        "💡": "提示",
        "⚡": "经验",
        "🚀": "发布",
        "🎖️": "等级",
        "💪": "加油",
        "🔒": "锁定",
        "📜": "协议",
        "↑": "上",
        "↓": "下",
        "↩️": "撤销",
        "❓": "帮助",
        "🔄": "刷新",
        "▶️": "开始",
        "⏱️": "时间",
        "🎨": "创意",
        "💻": "电脑",
        "📚": "学习",
        "🛡️": "盾牌",
        "✈️": "飞机",
        "⭐": "星星",
        "🕹️": "手柄",
        "📧": "邮箱",
        "📱": "手机",
        "📑": "目录",
        "📦": "压缩",
        "📄": "文件",
        "📙": "PPT",
        "🔧": "工具",
        "🪙": "硬币",
        "💰": "金币",
        "✅": "完成",
        "🛠️": "工具",
        "💫": "星光",
        "🔍": "搜索",
        "📖": "书籍",
        "🏷️": "标签",
        "🗑️": "删除"
    };
    
    // 替换页面中的 emoji
    function replaceEmojis() {
        if (!isWindows7()) return;
        
        // 替换文本节点
        var walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );
        
        var node;
        while (node = walker.nextNode()) {
            var text = node.textContent;
            var hasEmoji = false;
            for (var emoji in emojiMap) {
                if (text.indexOf(emoji) !== -1) {
                    text = text.split(emoji).join(emojiMap[emoji]);
                    hasEmoji = true;
                }
            }
            if (hasEmoji) {
                node.textContent = text;
            }
        }
        
        // 替换属性中的 emoji（如 title, alt 等）
        var elements = document.querySelectorAll('*');
        var attrs = ['title', 'alt', 'placeholder', 'value'];
        for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            for (var j = 0; j < attrs.length; j++) {
                var attr = attrs[j];
                if (el.hasAttribute(attr)) {
                    var val = el.getAttribute(attr);
                    var hasEmoji = false;
                    for (var emoji in emojiMap) {
                        if (val.indexOf(emoji) !== -1) {
                            val = val.split(emoji).join(emojiMap[emoji]);
                            hasEmoji = true;
                        }
                    }
                    if (hasEmoji) {
                        el.setAttribute(attr, val);
                    }
                }
            }
        }
    }
    
    // DOM 加载完成后执行替换
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', replaceEmojis);
    } else {
        replaceEmojis();
    }
})();
</script>

</body>
</html>
