<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON厧绱￠崠鏍т紣?- 更多顦垮姛鑳藉厴</title>
    <link rel="stylesheet" href="css/chinese-style.css">
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
        }
        
        .json-formatter-container {
            max-width: 800px;
            margin: 50px auto;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .json-input {
            margin-bottom: 20px;
        }
        
        .json-input label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        .json-input textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            resize: vertical;
            font-family: 'Monaco', 'Menlo', monospace;
        }
        
        .json-buttons {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .json-buttons button {
            padding: 10px 20px;
            margin: 0 5px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .json-buttons button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .json-result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }
        
        .json-result label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        .json-result pre {
            background-color: #fff;
            border-radius: 5px;
            padding: 15px;
            overflow-x: auto;
            font-size: 14px;
            font-family: 'Monaco', 'Menlo', monospace;
        }
        
        .json-error {
            background-color: #ffe6e6;
            color: #c53030;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        
        .json-valid {
            background-color: #e6ffed;
            color: #237804;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        
        @media (max-width: 768px) {
            .json-formatter-container {
                margin: 20px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="json-formatter-container">
        <h1>📌冩惈 JSON厧绱￠崠鏍т紣?/h1>
        
        <div class="json-input">
            <label for="jsonInput">JSON堟挸鍙?/label>
            <textarea id="jsonInput" placeholder="柉绶崗銉洣格式化崠鏍畱J数据宓?.."></textarea>
        </div>
        
        <div class="json-buttons">
            <button id="formatBtn">格式化崠?/button>
            <button id="validateBtn">犲矁鐦?/button>
            <button id="minifyBtn">樺?/button>
            <button id="copyBtn">跺秴?/button>
        </div>
        
        <div class="json-result">
            <label for="jsonOutput">JSON堟挸鍤?/label>
            <pre id="jsonOutput"></pre>
        </div>
    </div>
    
    <script>
        document.getElementById('formatBtn').addEventListener('click', function() {
            const jsonInput = document.getElementById('jsonInput').value;
            
            try {
                const parsedJSON = JSON.parse(jsonInput);
                const formattedJSON = JSON.stringify(parsedJSON, null, 4);
                document.getElementById('jsonOutput').textContent = formattedJSON;
                document.getElementById('jsonOutput').className = '';
            } catch (error) {
                document.getElementById('jsonOutput').textContent = `JSON欙介柨娆掝嚖: ${error.message}`;
                document.getElementById('jsonOutput').className = 'json-error';
            }
        });
        
        document.getElementById('validateBtn').addEventListener('click', function() {
            const jsonInput = document.getElementById('jsonInput').value;
            
            try {
                JSON.parse(jsonInput);
                document.getElementById('jsonOutput').textContent = 'JSON厧绱￠張嬫櫏';
                document.getElementById('jsonOutput').className = 'json-valid';
            } catch (error) {
                document.getElementById('jsonOutput').textContent = `JSON厧绱￠弮鐘虫櫏: ${error.message}`;
                document.getElementById('jsonOutput').className = 'json-error';
            }
        });
        
        document.getElementById('minifyBtn').addEventListener('click', function() {
            const jsonInput = document.getElementById('jsonInput').value;
            
            try {
                const parsedJSON = JSON.parse(jsonInput);
                const minifiedJSON = JSON.stringify(parsedJSON);
                document.getElementById('jsonOutput').textContent = minifiedJSON;
                document.getElementById('jsonOutput').className = '';
            } catch (error) {
                document.getElementById('jsonOutput').textContent = `JSON欙介柨娆掝嚖: ${error.message}`;
                document.getElementById('jsonOutput').className = 'json-error';
            }
        });
        
        document.getElementById('copyBtn').addEventListener('click', function() {
            const jsonOutput = document.getElementById('jsonOutput').textContent;
            
            if (!jsonOutput) {
                alert('屸剝婀侀崘鍛啇欘垰顦查崚?);
                return;
            }
            
            navigator.clipboard.writeText(jsonOutput)
                .then(() => {
                    alert('瀹稿弶鍨氶崝鐔奉槻掕泛岄崜顏囧垱閺?);
                })
                .catch(err => {
                    alert('跺秴楁径杈Е: ' + err);
                });
        });
    </script>
</body>
</html>
