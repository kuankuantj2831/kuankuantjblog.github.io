<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>濠㈠灈鏅滈惃鐢稿蓟閵夘煈鍤?- 哄洦娼欓ˇ鍧楀礉旇鍘?/title>
    <link rel="stylesheet" href="css/chinese-style.css">
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
        }
        
        .weather-container {
            max-width: 800px;
            margin: 50px auto;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .weather-search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .weather-search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #e9ecef;
            border-radius: 5px;
            outline: none;
        }
        
        .weather-search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .weather-search-btn {
            padding: 10px 20px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .weather-search-btn:hover {
            background-color: #5a6fd6;
            transform: translateY(-2px);
        }
        
        .weather-search-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .weather-location-list {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .weather-location-btn {
            padding: 8px 15px;
            background-color: #e9ecef;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .weather-location-btn:hover {
            background-color: #dee2e6;
        }
        
        .weather-location-btn.active {
            background-color: #667eea;
            color: white;
        }
        
        .weather-display {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }
        
        .weather-display.active {
            display: block;
        }
        
        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .weather-city-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .weather-date {
            font-size: 14px;
            color: #6c757d;
        }
        
        .weather-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .weather-temperature {
            font-size: 60px;
            font-weight: bold;
            color: #333;
        }
        
        .weather-icon {
            width: 100px;
            height: 100px;
        }
        
        .weather-description {
            font-size: 18px;
            color: #6c757d;
            text-align: center;
            margin-top: 10px;
            text-transform: capitalize;
        }
        
        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .weather-detail-item {
            background-color: #fff;
            padding: 15px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .weather-detail-icon {
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
            border-radius: 50%;
        }
        
        .weather-detail-content {
            flex: 1;
        }
        
        .weather-detail-label {
            font-size: 12px;
            color: #6c757d;
        }
        
        .weather-detail-value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .weather-error {
            display: none;
            padding: 20px;
            background-color: #f8d7da;
            color: #721c24;
            border-radius: 5px;
            margin-top: 20px;
        }
        
        .weather-error.active {
            display: block;
        }
        
        .weather-loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        
        .weather-loading.active {
            display: block;
        }
        
        .weather-loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .back-btn {
            display: block;
            width: 200px;
            margin: 20px auto;
            padding: 10px;
            text-align: center;
            background-color: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background-color: #5a6fd6;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .weather-main {
                flex-direction: column;
                text-align: center;
            }
            
            .weather-temperature {
                font-size: 40px;
            }
            
            .weather-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="weather-container">
        <h1>妫啫鐨ㄩ柨?濠㈠灈鏅滈惃鐢稿蓟閵夘煈鍤?/h1>
        
        <div class="weather-search-section">
            <input type="text" id="weatherSearchInput" class="weather-search-input" placeholder="閺夊牊崣鍡涘春鎼达紕顏抽柛琚ㄩ瀛樼墵嬫牜绱?..">
            <button id="weatherSearchBtn" class="weather-search-btn">妫啯鏁?哄被撮佸緞哄倻姣?/button>
        </div>
        
        <div class="weather-location-list">
            <button class="weather-location-btn active" data-city="告牗銇為崥?>告牗銇為崥?/button>
            <button class="weather-location-btn" data-city="挸锕幑?>挸锕幑?/button>
            <button class="weather-location-btn" data-city="犵偛鐏濈粣?>犵偛鐏濈粣?/button>
            <button class="weather-location-btn" data-city="烇絽宕﹢?>烇絽宕﹢?/button>
            <button class="weather-location-btn" data-city="瑰瓨鍔欓崗?>瑰瓨鍔欓崗?/button>
            <button class="weather-location-btn" data-city="哄鍘肩粣?>哄鍘肩粣?/button>
        </div>
        
        <div id="weatherLoading" class="weather-loading">
            <div class="weather-loading-spinner"></div>
            <p>繐绲藉﹢顏堟嚔瀹勬澘绲垮鍨涙櫆ㄧ敻悧濈ウ...</p>
        </div>
        
        <div id="weatherError" class="weather-error"></div>
        
        <div id="weatherDisplay" class="weather-display">
            <div class="weather-header">
                <div>
                    <div id="weatherCityName" class="weather-city-name"></div>
                    <div id="weatherDate" class="weather-date"></div>
                </div>
                <button id="weatherRefreshBtn" class="weather-search-btn">妫啯鏁?告帡鏀遍弻?/button>
            </div>
            
            <div class="weather-main">
                <div>
                    <div id="weatherTemperature" class="weather-temperature"></div>
                    <div id="weatherDescription" class="weather-description"></div>
                </div>
                <img id="weatherIcon" class="weather-icon" src="" alt="濠㈠灈鏅滈惃鐢稿炊愵剛鍨?>
            </div>
            
            <div class="weather-details">
                <div class="weather-detail-item">
                    <div class="weather-detail-icon">妫啯灏?/div>
                    <div class="weather-detail-content">
                        <div class="weather-detail-label">濡炲閰ｉ埀?/div>
                        <div id="weatherWindSpeed" class="weather-detail-value"></div>
                    </div>
                </div>
                
                <div class="weather-detail-item">
                    <div class="weather-detail-icon">妫啯灏?/div>
                    <div class="weather-detail-content">
                        <div class="weather-detail-label">犫偓喖顔?/div>
                        <div id="weatherHumidity" class="weather-detail-value"></div>
                    </div>
                </div>
                
                <div class="weather-detail-item">
                    <div class="weather-detail-icon">妫啫鐨￠柨?/div>
                    <div class="weather-detail-content">
                        <div class="weather-detail-label">ɑ鏌ㄧ敮?/div>
                        <div id="weatherPressure" class="weather-detail-value"></div>
                    </div>
                </div>
                
                <div class="weather-detail-item">
                    <div class="weather-detail-icon">妫啯戦柨?/div>
                    <div class="weather-detail-content">
                        <div class="weather-detail-label">煎啿鈧噥娼岄幖?/div>
                        <div id="weatherVisibility" class="weather-detail-value"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <a href="features.html" class="back-btn">閺夆晜鏌ú鏍即閺夋埈柛鏃傚?/a>
    
    <script src="js/weather.js"></script>
</body>
</html>
