<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="description" content="支持 Hakimi 的猫爬架 - 您的每一份捐助都是对我们最大的鼓励">
    <title>捐助支持 - Hakimi 的猫爬架</title>
    <link rel="shortcut icon" href="favicon.ico">
    <script src="js/polyfill.js"></script>
    <link rel="stylesheet" href="css/chinese-style.css?v=3">
    <style>
        .donate-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 15px 40px;
        }

        .donate-hero {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(255,107,107,0.1), rgba(255,193,7,0.1));
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,107,107,0.15);
        }

        .donate-hero-icon {
            font-size: 56px;
            margin-bottom: 10px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
        }

        .donate-hero h1 {
            font-size: 1.6em;
            color: #333;
            margin: 0 0 8px;
        }

        .donate-hero p {
            color: #777;
            font-size: 0.95em;
            margin: 0;
        }

        /* 进度条 */
        .goal-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 25px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .goal-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
        }

        .goal-amount {
            font-size: 0.9em;
            color: #999;
        }

        .goal-amount span {
            color: #ff6b6b;
            font-weight: 700;
            font-size: 1.2em;
        }

        .progress-bar-outer {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffc107);
            border-radius: 10px;
            transition: width 1.5s ease;
            position: relative;
            min-width: 0;
        }

        .progress-bar-inner::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            text-align: center;
            margin-top: 8px;
            font-size: 0.85em;
            color: #999;
        }

        .goal-desc {
            margin-top: 10px;
            font-size: 0.88em;
            color: #888;
            line-height: 1.5;
        }

        .goal-stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }

        .goal-stat-item {
            text-align: center;
            flex: 1;
        }

        .goal-stat-item .num {
            font-size: 1.3em;
            font-weight: 700;
            color: #ff6b6b;
        }

        .goal-stat-item .label {
            font-size: 0.78em;
            color: #999;
            margin-top: 2px;
        }

        /* 收款码展示卡片 */
        .qr-card {
            background: white;
            border-radius: 16px;
            padding: 30px 24px;
            margin-bottom: 25px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
            text-align: center;
        }

        .qr-card h2 {
            font-size: 1.15em;
            color: #333;
            margin: 0 0 8px;
        }

        .qr-card .qr-subtitle {
            color: #888;
            font-size: 0.88em;
            margin-bottom: 20px;
        }

        .qr-code-display {
            width: 240px;
            height: 240px;
            margin: 0 auto 15px;
            border: 3px solid #07c160;
            border-radius: 16px;
            overflow: hidden;
            background: #fafafa;
        }

        .qr-code-display img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .qr-tips {
            font-size: 0.85em;
            color: #999;
            line-height: 1.8;
            margin-top: 15px;
        }

        .qr-tips strong {
            color: #ff6b6b;
        }

        .title-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }

        .title-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .title-badge.vip {
            background: linear-gradient(135deg, #fff8e1, #fff3cd);
            color: #f57f17;
            border: 1px solid #ffe082;
        }

        .title-badge.mvp {
            background: linear-gradient(135deg, #fce4ec, #f8bbd0);
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        /* 排行榜 & 最近记录 */
        .donate-panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .donate-panels {
                grid-template-columns: 1fr;
            }
            .title-info {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
        }

        .panel-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
        }

        .panel-card h3 {
            font-size: 1.05em;
            color: #333;
            margin: 0 0 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
            gap: 12px;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .lb-rank {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: 700;
            background: #f0f0f0;
            color: #999;
            flex-shrink: 0;
        }

        .lb-rank.top1 { background: linear-gradient(135deg, #ffd700, #ffb300); color: white; }
        .lb-rank.top2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: white; }
        .lb-rank.top3 { background: linear-gradient(135deg, #cd7f32, #b8690e); color: white; }

        .lb-info {
            flex: 1;
            min-width: 0;
        }

        .lb-name {
            font-weight: 600;
            color: #333;
            font-size: 0.9em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .lb-title {
            display: inline-block;
            font-size: 0.7em;
            padding: 1px 6px;
            border-radius: 4px;
            margin-left: 4px;
            font-weight: 700;
        }

        .lb-title.vip { background: #fff8e1; color: #f57f17; }
        .lb-title.mvp { background: #fce4ec; color: #c62828; }

        .lb-amount {
            font-weight: 700;
            color: #ff6b6b;
            font-size: 0.95em;
            flex-shrink: 0;
        }

        /* 最近记录 */
        .recent-item {
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .recent-item:last-child {
            border-bottom: none;
        }

        .recent-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .recent-name {
            font-weight: 600;
            color: #333;
            font-size: 0.9em;
        }

        .recent-amount {
            font-weight: 700;
            color: #ff6b6b;
            font-size: 0.9em;
        }

        .recent-msg {
            font-size: 0.82em;
            color: #888;
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .recent-time {
            font-size: 0.75em;
            color: #bbb;
        }

        .empty-tip {
            text-align: center;
            color: #ccc;
            padding: 30px 0;
            font-size: 0.9em;
        }

        /* 返回按钮 */
        .back-home {
            text-align: center;
            margin-top: 10px;
        }

        .back-home a {
            color: #999;
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.2s;
        }

<body>
    <div class="chinese-style-wrapper">
        <div class="bg-decoration"></div>

        <nav class="top-nav">
            <a href="/index-chinese.html" class="nav-logo">&#x1F431; 猫爬架</a>
            <div class="nav-links">
                <a href="/index-chinese.html">首页</a>
                <a href="/about.html">关于</a>
                <a href="/donate.html" style="color:#ff6b6b; font-weight:600;">&#x2764;&#xFE0F; 捐助</a>
            </div>
        </nav>

        <div class="donate-container">
            <!-- 顶部 Hero -->
            <div class="donate-hero">
                <div class="donate-hero-icon">&#x2764;&#xFE0F;</div>
                <h1>支持猫爬架</h1>
                <p>您的每一份支持，都是我们前进的动力 &#x2728;</p>
            </div>

            <!-- 捐助目标进度 -->
            <div class="goal-card" id="goalCard">
                <div class="goal-header">
                    <div class="goal-title" id="goalTitle">加载中...</div>
                    <div class="goal-amount">
                        <span id="goalCurrent">0</span> / <span id="goalTarget">0</span> 元
                    </div>
                </div>
                <div class="progress-bar-outer">
                    <div class="progress-bar-inner" id="progressBar" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
                <div class="goal-desc" id="goalDesc"></div>
                <div class="goal-stats">
                    <div class="goal-stat-item">
                        <div class="num" id="statDonors">0</div>
                        <div class="label">捐助人数</div>
                    </div>
                    <div class="goal-stat-item">
                        <div class="num" id="statTotal">&#xA5;0</div>
                        <div class="label">累计捐助</div>
                    </div>
                </div>
            </div>

            <!-- 收款码展示 -->
            <div class="qr-card">
                <h2>&#x1F4B0; 微信扫码赞助</h2>
                <div class="qr-subtitle">打开微信扫一扫，支持猫爬架的运营</div>
                <div class="qr-code-display">
                    <img src="/weixin_pay/skm.PNG" alt="微信收款码">
                </div>
                <div class="qr-tips">
                    &#x1F4CC; 扫码支付后，站长确认收款会为您累计赞助金额<br>
                    &#x1F3C5; 累计赞助 ≥ <strong>5元</strong> 获得 <strong>VIP</strong> 头衔<br>
                    &#x1F3C6; 累计赞助 ≥ <strong>10元</strong> 获得 <strong>MVP</strong> 头衔
                </div>
                <div class="title-info">
                    <div class="title-badge vip">&#x1F3C5; VIP 头衔 — 累计赞助 ≥ 5元</div>
                    <div class="title-badge mvp">&#x1F3C6; MVP 头衔 — 累计赞助 ≥ 10元</div>
                </div>
            </div>

            <!-- 排行榜 & 最近记录 -->
            <div class="donate-panels">
                <div class="panel-card">
                    <h3>&#x1F3C6; 捐助排行榜</h3>
                    <ul class="leaderboard-list" id="leaderboardList">
                        <li class="empty-tip">暂无捐助记录</li>
                    </ul>
                </div>
                <div class="panel-card">
                    <h3>&#x1F550; 最近捐助</h3>
                    <div id="recentList">
                        <div class="empty-tip">暂无捐助记录</div>
                    </div>
                </div>
            </div>

            <div class="back-home">
                <a href="/index-chinese.html">&#x2190; 返回首页</a>
            </div>
        </div>
    </div>

    <script type="module" src="js/donate.js"></script>
    <script src="js/theme.js?v=1"></script>
</body>
