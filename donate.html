<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="description" content="支持 Hakimi 的猫爬架 - 您的每一份捐助都是对我们最大的鼓励">
    <title>捐助支持 - Hakimi 的猫爬架</title>
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="stylesheet" href="css/chinese-style.css?v=3">
    <style>
        .donate-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 15px 40px;
        }

        .donate-hero {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(255,107,107,0.1), rgba(255,193,7,0.1));
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,107,107,0.15);
        }

        .donate-hero-icon {
            font-size: 56px;
            margin-bottom: 10px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
        }

        .donate-hero h1 {
            font-size: 1.6em;
            color: #333;
            margin: 0 0 8px;
        }

        .donate-hero p {
            color: #777;
            font-size: 0.95em;
            margin: 0;
        }

        /* 进度条 */
        .goal-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 25px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .goal-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
        }

        .goal-amount {
            font-size: 0.9em;
            color: #999;
        }

        .goal-amount span {
            color: #ff6b6b;
            font-weight: 700;
            font-size: 1.2em;
        }

        .progress-bar-outer {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffc107);
            border-radius: 10px;
            transition: width 1.5s ease;
            position: relative;
            min-width: 0;
        }

        .progress-bar-inner::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            text-align: center;
            margin-top: 8px;
            font-size: 0.85em;
            color: #999;
        }

        .goal-desc {
            margin-top: 10px;
            font-size: 0.88em;
            color: #888;
            line-height: 1.5;
        }

        .goal-stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }

        .goal-stat-item {
            text-align: center;
            flex: 1;
        }

        .goal-stat-item .num {
            font-size: 1.3em;
            font-weight: 700;
            color: #ff6b6b;
        }

        .goal-stat-item .label {
            font-size: 0.78em;
            color: #999;
            margin-top: 2px;
        }

        /* 捐助表单 */
        .donate-form-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 25px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
        }

        .donate-form-card h2 {
            font-size: 1.15em;
            color: #333;
            margin: 0 0 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .amount-presets {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .amount-btn {
            padding: 12px 8px;
            border: 2px solid #eee;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-size: 1em;
            font-weight: 600;
            color: #555;
        }

        .amount-btn:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
            transform: translateY(-2px);
        }

        .amount-btn.active {
            border-color: #ff6b6b;
            background: linear-gradient(135deg, #fff5f5, #fff);
            color: #ff6b6b;
        }

        .amount-btn .yuan {
            font-size: 0.7em;
            font-weight: 400;
            color: #999;
        }

        .custom-amount {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .custom-amount label {
            font-size: 0.9em;
            color: #666;
            white-space: nowrap;
        }

        .custom-amount input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.2s;
        }

        .custom-amount input:focus {
            border-color: #ff6b6b;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .form-row input, .form-row textarea {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 0.9em;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .form-row input:focus, .form-row textarea:focus {
            border-color: #ff6b6b;
        }

        .form-row textarea {
            resize: vertical;
            min-height: 60px;
        }

        .payment-methods {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .payment-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-size: 0.95em;
        }

        .payment-btn:hover {
            transform: translateY(-2px);
        }

        .payment-btn.active-wechat {
            border-color: #07c160;
            background: linear-gradient(135deg, #f0faf4, #fff);
            color: #07c160;
        }

        .payment-btn.active-alipay {
            border-color: #1677ff;
            background: linear-gradient(135deg, #f0f5ff, #fff);
            color: #1677ff;
        }

        .submit-donate-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .submit-donate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,107,107,0.4);
        }

        .submit-donate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 排行榜 & 最近记录 */
        .donate-panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .donate-panels {
                grid-template-columns: 1fr;
            }
            .amount-presets {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .panel-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
        }

        .panel-card h3 {
            font-size: 1.05em;
            color: #333;
            margin: 0 0 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
            gap: 12px;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .lb-rank {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: 700;
            background: #f0f0f0;
            color: #999;
            flex-shrink: 0;
        }

        .lb-rank.top1 { background: linear-gradient(135deg, #ffd700, #ffb300); color: white; }
        .lb-rank.top2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: white; }
        .lb-rank.top3 { background: linear-gradient(135deg, #cd7f32, #b8690e); color: white; }

        .lb-info {
            flex: 1;
            min-width: 0;
        }

        .lb-name {
            font-weight: 600;
            color: #333;
            font-size: 0.9em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .lb-count {
            font-size: 0.75em;
            color: #999;
        }

        .lb-amount {
            font-weight: 700;
            color: #ff6b6b;
            font-size: 0.95em;
            flex-shrink: 0;
        }

        /* 最近记录 */
        .recent-item {
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .recent-item:last-child {
            border-bottom: none;
        }

        .recent-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .recent-name {
            font-weight: 600;
            color: #333;
            font-size: 0.9em;
        }

        .recent-amount {
            font-weight: 700;
            color: #ff6b6b;
            font-size: 0.9em;
        }

        .recent-msg {
            font-size: 0.82em;
            color: #888;
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .recent-time {
            font-size: 0.75em;
            color: #bbb;
        }

        .empty-tip {
            text-align: center;
            color: #ccc;
            padding: 30px 0;
            font-size: 0.9em;
        }

        /* 感谢弹窗 */
        .thank-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .thank-modal-overlay.show {
            display: flex;
        }

        .thank-modal {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .thank-modal .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .thank-modal h2 {
            color: #333;
            margin: 0 0 10px;
        }

        .thank-modal p {
            color: #777;
            font-size: 0.9em;
            margin: 0 0 20px;
            line-height: 1.6;
        }

        .thank-modal button {
            padding: 10px 30px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            font-size: 1em;
            cursor: pointer;
        }

        /* 返回按钮 */
        .back-home {
            text-align: center;
            margin-top: 10px;
        }

        .back-home a {
            color: #999;
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.2s;
        }

        .back-home a:hover {
            color: #ff6b6b;
        }
    </style>
</head>

<body>
    <div class="chinese-style-wrapper">
        <div class="bg-decoration"></div>

        <nav class="top-nav">
            <a href="/index-chinese.html" class="nav-logo">🐱 猫爬架</a>
            <div class="nav-links">
                <a href="/index-chinese.html">首页</a>
                <a href="/about.html">关于</a>
                <a href="/donate.html" style="color:#ff6b6b; font-weight:600;">❤️ 捐助</a>
            </div>
        </nav>

        <div class="donate-container">
            <!-- 顶部 Hero -->
            <div class="donate-hero">
                <div class="donate-hero-icon">❤️</div>
                <h1>支持猫爬架</h1>
                <p>您的每一份支持，都是我们前进的动力 ✨</p>
            </div>

            <!-- 捐助目标进度 -->
            <div class="goal-card" id="goalCard">
                <div class="goal-header">
                    <div class="goal-title" id="goalTitle">加载中...</div>
                    <div class="goal-amount">
                        <span id="goalCurrent">0</span> / <span id="goalTarget">0</span> 元
                    </div>
                </div>
                <div class="progress-bar-outer">
                    <div class="progress-bar-inner" id="progressBar" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
                <div class="goal-desc" id="goalDesc"></div>
                <div class="goal-stats">
                    <div class="goal-stat-item">
                        <div class="num" id="statDonors">0</div>
                        <div class="label">捐助人次</div>
                    </div>
                    <div class="goal-stat-item">
                        <div class="num" id="statTotal">¥0</div>
                        <div class="label">累计捐助</div>
                    </div>
                </div>
            </div>

            <!-- 捐助表单 -->
            <div class="donate-form-card">
                <h2>💰 发起捐助</h2>

                <div class="amount-presets" id="amountPresets">
                    <button class="amount-btn" data-amount="5">5 <span class="yuan">元</span></button>
                    <button class="amount-btn" data-amount="10">10 <span class="yuan">元</span></button>
                    <button class="amount-btn active" data-amount="20">20 <span class="yuan">元</span></button>
                    <button class="amount-btn" data-amount="50">50 <span class="yuan">元</span></button>
                    <button class="amount-btn" data-amount="100">100 <span class="yuan">元</span></button>
                    <button class="amount-btn" data-amount="200">200 <span class="yuan">元</span></button>
                </div>

                <div class="custom-amount">
                    <label>自定义金额：</label>
                    <input type="number" id="customAmount" placeholder="输入金额（元）" min="0.01" max="5000" step="0.01">
                </div>

                <div class="form-row">
                    <input type="text" id="donorName" placeholder="您的昵称（选填，默认匿名）" maxlength="50">
                </div>

                <div class="form-row">
                    <textarea id="donorMessage" placeholder="留言鼓励一下吧~（选填）" maxlength="200"></textarea>
                </div>

                <div class="payment-methods">
                    <button class="payment-btn active-wechat" id="btnWechat" data-method="wechat">
                        💚 微信支付
                    </button>
                    <button class="payment-btn" id="btnAlipay" data-method="alipay">
                        💙 支付宝
                    </button>
                </div>

                <button class="submit-donate-btn" id="submitDonate">
                    ❤️ 立即捐助
                </button>
            </div>

            <!-- 排行榜 & 最近记录 -->
            <div class="donate-panels">
                <div class="panel-card">
                    <h3>🏆 捐助排行榜</h3>
                    <ul class="leaderboard-list" id="leaderboardList">
                        <li class="empty-tip">暂无捐助记录</li>
                    </ul>
                </div>
                <div class="panel-card">
                    <h3>🕐 最近捐助</h3>
                    <div id="recentList">
                        <div class="empty-tip">暂无捐助记录</div>
                    </div>
                </div>
            </div>

            <div class="back-home">
                <a href="/index-chinese.html">← 返回首页</a>
            </div>
        </div>
    </div>

    <!-- 感谢弹窗 -->
    <div class="thank-modal-overlay" id="thankModal">
        <div class="thank-modal">
            <div class="icon">🎉</div>
            <h2>感谢您的支持！</h2>
            <p>您的捐助将帮助猫爬架持续运营，<br>为更多人提供免费资源分享。</p>
            <button onclick="document.getElementById('thankModal').classList.remove('show')">好的</button>
        </div>
    </div>

    <script type="module" src="js/donate.js"></script>
</body>

</html>
