                    return;

                const response = await fetch(`${API_BASE_URL}/2fa/status`, {

                    method: 'POST',
                    headers: {

                        'Content-Type': 'application/json'

                    document.getElementById('qrCode').src = data.data.qrCode;
                    document.getElementById('secretKey').textContent = data.data.secret;

                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token: code })
                });

                    backupCodes = data.data.backupCodes;
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');

        window.cancelDisable = function() {
            document.getElementById('disableModal').classList.add('hidden');
        };

        // 闂佹彃绉弻濠偨旂鐏囧璺烘川閺併倝鎯?
        window.regenerateBackupCodes = async function() {
            const code = prompt('犲洨鏌夌欢顓㈠礂閵夈儳绉奸柛鎾?2FA 濡ょ姴鐭侀惁愭儘娓氬﹦绐?);
            if (!code) return;

            showLoading(true);
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE_URL}/2fa/backup-codes/regenerate`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token: code })
                });

                const data = await response.json();
                
                if (data.success) {
                    backupCodes = data.data.backupCodes;
                    alert('哄倹澹▓鎴炲緞モ晜鏆忛顔戯鎮介悢绋跨亣挎稑鐭侀佷繆閵夈儲栧ǎ鍥ㄧ箘撴悂鏁嶆稊姊焅n' + backupCodes.join('\n'));
                } else {
                    alert(data.message || '汇垻鍠愰緞堫袝');
                }
            } catch (error) {
                console.error('Regenerate error:', error);
                alert('汇垻鍠愰緞堫袝挎稑鐭侀勬煂瀹ュ牏妲?);
            }
            showLoading(false);
        };

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
        }

        // 告帗绻傞～鎰板礌?
        checkStatus();
    </script>
</body>
</html>
