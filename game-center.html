<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="description" content="游戏中心 - Hakimi 的猫爬架">
    <title>🎮 游戏中心 - Hakimi 的猫爬架</title>
    <link rel="shortcut icon" href="/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif; background: linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%); min-height: 100vh; color: #e0e0e0; }

        .gc-back { position: fixed; top: 15px; left: 15px; z-index: 100; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; transition: all 0.3s; }
        .gc-back:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }

        .gc-wrapper { max-width: 900px; margin: 0 auto; padding: 60px 16px 40px; }
        .gc-title { text-align: center; font-size: 28px; margin-bottom: 10px; color: #fff; text-shadow: 0 0 20px rgba(100,200,255,0.3); }
        .gc-balance-bar { text-align: center; padding: 10px 16px; background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border-radius: 12px; margin-bottom: 16px; font-size: 15px; }

        .gc-tabs { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
        .gc-tab { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: #ccc; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.3s; white-space: nowrap; }
        .gc-tab:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .gc-tab.active { background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; border-color: transparent; box-shadow: 0 4px 15px rgba(102,126,234,0.4); }

        .gc-content { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 16px; padding: 24px; min-height: 400px; }
        .gc-loading { text-align: center; padding: 60px 0; color: #888; font-size: 16px; }
        .gc-empty { text-align: center; color: #888; padding: 20px; }
        .gc-error { color: #ff6b6b; text-align: center; padding: 20px; }

        .gc-login-prompt { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
        .gc-login-box { text-align: center; padding: 40px; background: rgba(255,255,255,0.08); border-radius: 20px; }
        .gc-login-box h2 { margin-bottom: 16px; font-size: 32px; }
        .gc-login-box p { margin-bottom: 24px; color: #aaa; }

        .gc-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #ddd; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .gc-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .gc-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .gc-btn-primary { background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; border: none; }
        .gc-btn-primary:hover { opacity: 0.9; box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        .gc-btn-lg { padding: 14px 36px; font-size: 18px; border-radius: 12px; }
        .gc-btn-sm { background: rgba(255,255,255,0.1); border: none; color: #a0c4ff; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .gc-btn-sm:hover { background: rgba(255,255,255,0.2); }
        .gc-link-btn { background: none; border: none; color: #667eea; cursor: pointer; font-size: inherit; text-decoration: underline; }

        .gc-input { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #eee; padding: 10px 14px; border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.3s; }
        .gc-input:focus { border-color: #667eea; }
        .gc-input-lg { font-size: 18px; padding: 14px 18px; text-align: center; letter-spacing: 3px; }

        .gc-stats-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(120px,1fr)); gap: 12px; margin-bottom: 24px; }
        .gc-stat-card { background: rgba(255,255,255,0.06); border-radius: 14px; padding: 20px 12px; text-align: center; }
        .gc-stat-icon { font-size: 32px; margin-bottom: 8px; }
        .gc-stat-value { font-size: 24px; font-weight: 700; color: #fff; }
        .gc-stat-label { font-size: 12px; color: #888; margin-top: 4px; }

        .gc-quick-actions { margin-bottom: 24px; }
        .gc-quick-actions h3 { margin-bottom: 12px; }
        .gc-quick-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(140px,1fr)); gap: 10px; }
        .gc-quick-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; cursor: pointer; font-size: 15px; color: #ddd; transition: all 0.3s; text-align: center; }
        .gc-quick-btn:hover { background: rgba(102,126,234,0.2); border-color: #667eea; transform: translateY(-2px); }

        .gc-pet-preview, .gc-adopt-hint, .gc-daily-progress, .gc-equipped-title { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .gc-pet-display { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
        .gc-pet-emoji { font-size: 48px; }
        .gc-title-badge { background: linear-gradient(135deg,#ffd700,#ff8c00); color: #000; padding: 2px 10px; border-radius: 10px; font-weight: 700; font-size: 13px; }

        .gc-progress-bar { background: rgba(255,255,255,0.1); border-radius: 8px; height: 8px; overflow: hidden; flex: 1; }
        .gc-progress-fill { height: 100%; background: linear-gradient(90deg,#667eea,#764ba2); border-radius: 8px; transition: width 0.5s; }

        .gc-pet-main { text-align: center; }
        .gc-pet-avatar { font-size: 80px; margin: 16px 0; position: relative; display: inline-block; }
        .gc-pet-accessory { position: absolute; top: -10px; right: -10px; font-size: 24px; }
        .gc-pet-exp { max-width: 300px; margin: 8px auto; display: flex; align-items: center; gap: 8px; }
        .gc-pet-stats { max-width: 400px; margin: 16px auto; }
        .gc-pet-stat { margin: 8px 0; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .gc-bar { background: rgba(255,255,255,0.1); border-radius: 6px; height: 12px; flex: 1; overflow: hidden; }
        .gc-bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s; }
        .gc-pet-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 16px 0; }

        .gc-pet-items, .gc-shop-panel { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 16px; margin-top: 16px; }
        .gc-item-slot { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .gc-shop-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(130px,1fr)); gap: 10px; }
        .gc-shop-item { background: rgba(255,255,255,0.06); border-radius: 10px; padding: 12px; text-align: center; }
        .gc-shop-emoji { font-size: 28px; display: block; margin-bottom: 4px; }
        .gc-buy-btn { display: block; margin: 6px auto 0; }

        .gc-adopt { text-align: center; padding: 20px; }
        .gc-adopt-form { margin-top: 20px; display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
        .gc-species-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; max-width: 400px; margin: 16px auto; }
        .gc-species-btn { background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; cursor: pointer; font-size: 14px; color: #ddd; transition: all 0.3s; }
        .gc-species-btn:hover, .gc-species-btn.selected { border-color: #667eea; background: rgba(102,126,234,0.2); }

        .gc-lottery { text-align: center; }
        .gc-lottery-wheel { width: 220px; height: 220px; margin: 20px auto; border-radius: 50%; background: conic-gradient(#667eea 0deg,#764ba2 90deg,#f093fb 180deg,#f5576c 270deg,#667eea 360deg); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(102,126,234,0.3); animation: gc-glow 3s ease-in-out infinite; }
        @keyframes gc-glow { 0%,100% { box-shadow: 0 0 30px rgba(102,126,234,0.3); } 50% { box-shadow: 0 0 50px rgba(102,126,234,0.6); } }
        .gc-wheel-inner { width: 80px; height: 80px; border-radius: 50%; background: #1a1a2e; display: flex; align-items: center; justify-content: center; font-size: 36px; }
        .gc-lottery-info { margin: 16px 0; }
        .gc-prize-result { font-size: 24px; padding: 20px; background: rgba(102,126,234,0.15); border-radius: 12px; margin: 16px 0; }
        .gc-animate-pop { animation: gc-pop 0.5s ease; }
        @keyframes gc-pop { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
        .gc-wheel-prizes { display: none; }

        .gc-ach-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 10px; }
        .gc-ach-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; display: flex; gap: 12px; align-items: flex-start; }
        .gc-ach-card.locked { opacity: 0.5; }
        .gc-ach-icon { font-size: 28px; }
        .gc-ach-info { flex: 1; }
        .gc-ach-name { font-weight: 600; color: #fff; }
        .gc-ach-desc { font-size: 12px; color: #888; margin: 4px 0; }
        .gc-ach-locked-text { font-size: 11px; color: #666; }
        .gc-ach-stats { margin-bottom: 16px; font-size: 18px; }

        .gc-task-item { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 12px 16px; margin: 8px 0; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
        .gc-task-item.completed { opacity: 0.6; }
        .gc-task-reward { color: #ffd700; font-size: 13px; }
        .gc-claimed { color: #4cd137; font-size: 12px; }

        .gc-riddle-card { background: rgba(255,255,255,0.06); border-radius: 14px; padding: 24px; margin: 16px 0; }
        .gc-riddle-q { font-size: 22px; font-weight: 600; margin-bottom: 12px; color: #fff; }
        .gc-riddle-hint { color: #ffa502; margin-bottom: 8px; font-size: 14px; }
        .gc-riddle-meta { color: #888; font-size: 13px; margin-bottom: 16px; }
        .gc-riddle-form { display: flex; gap: 10px; }
        .gc-riddle-form .gc-input { flex: 1; }
        .gc-correct { color: #4cd137; padding: 12px; background: rgba(76,209,55,0.1); border-radius: 10px; margin-top: 12px; }
        .gc-wrong { color: #ff6b6b; padding: 12px; background: rgba(255,107,107,0.1); border-radius: 10px; margin-top: 12px; }

        .gc-pk h2 { text-align: center; }
        .gc-pk-types { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 16px 0; }
        .gc-pk-form { max-width: 400px; margin: 16px auto; display: flex; flex-direction: column; gap: 10px; }
        .gc-pk-form label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: #aaa; }
        .gc-pk-info { text-align: center; margin-top: 16px; }
        .gc-pk-sent { padding: 16px; background: rgba(102,126,234,0.15); border-radius: 10px; margin-top: 12px; text-align: center; }

        .gc-gifts h2 { text-align: center; }
        .gc-gift-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(100px,1fr)); gap: 8px; }
        .gc-gift-item { background: rgba(255,255,255,0.06); border: 2px solid transparent; border-radius: 10px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .gc-gift-item:hover { background: rgba(255,255,255,0.1); }
        .gc-gift-item.selected { border-color: #667eea; background: rgba(102,126,234,0.15); }
        .gc-gift-emoji { font-size: 28px; display: block; }
        .gc-gift-form { max-width: 400px; margin: 16px auto; display: flex; flex-direction: column; gap: 10px; }
        .gc-gift-form label { font-size: 13px; color: #aaa; }
        .gc-gift-record { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .gc-gift-received { margin-top: 24px; }

        .gc-leaderboard h2 { text-align: center; }
        .gc-lb-tabs { display: flex; gap: 6px; justify-content: center; margin: 16px 0; flex-wrap: wrap; }
        .gc-lb-item { display: flex; align-items: center; padding: 10px 12px; background: rgba(255,255,255,0.04); border-radius: 8px; margin: 4px 0; }
        .gc-lb-rank { width: 40px; font-size: 18px; text-align: center; }
        .gc-lb-name { flex: 1; font-weight: 500; }
        .gc-lb-value { font-weight: 600; color: #ffd700; }

        .gc-redeem { text-align: center; max-width: 500px; margin: 0 auto; }
        .gc-redeem-hint { color: #aaa; margin-bottom: 20px; }
        .gc-redeem-form { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .gc-redeem-tips { text-align: left; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 16px; margin-top: 24px; }
        .gc-redeem-tips ul { margin-top: 8px; padding-left: 20px; }
        .gc-redeem-tips li { margin: 6px 0; color: #aaa; font-size: 14px; }
        .gc-redeem-success { padding: 16px; background: rgba(76,209,55,0.1); border-radius: 10px; color: #4cd137; }
        .gc-redeem-fail { padding: 16px; background: rgba(255,107,107,0.1); border-radius: 10px; color: #ff6b6b; }

        .gc-join-btn { background: #2ed573; color: #fff; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; }

        .gc-chat-window { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; margin-top: 16px; }
        .gc-chat-messages { max-height: 300px; overflow-y: auto; margin-bottom: 10px; }
        .gc-chat-msg { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .gc-chat-msg strong { color: #667eea; }
        .gc-chat-input { display: flex; gap: 8px; }

        .gc-room-card { background: rgba(255,255,255,0.06); border-radius: 10px; padding: 12px; margin: 6px 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .gc-room-name { font-weight: 600; }

        .gc-clan-list, .gc-clan-item { margin-top: 12px; }
        .gc-clan-item { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 10px 12px; margin: 4px 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .gc-my-clan { background: rgba(102,126,234,0.1); border: 1px solid rgba(102,126,234,0.3); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .gc-clan-actions { margin-top: 10px; display: flex; gap: 8px; align-items: center; }

        .gc-forum-item { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 12px 16px; margin: 6px 0; cursor: pointer; transition: background 0.2s; }
        .gc-forum-item:hover { background: rgba(255,255,255,0.1); }
        .gc-forum-title { font-weight: 600; font-size: 15px; color: #fff; }
        .gc-forum-meta { font-size: 12px; color: #888; margin-top: 4px; }
        .gc-forum-content { padding: 16px 0; line-height: 1.7; white-space: pre-wrap; }
        .gc-reply-item { background: rgba(255,255,255,0.04); padding: 10px; border-radius: 8px; margin: 6px 0; }
        .gc-reply-form { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }

        .gc-cos-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(160px,1fr)); gap: 10px; margin: 12px 0; }
        .gc-cos-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; text-align: center; transition: all 0.3s; }
        .gc-cos-card:hover { background: rgba(255,255,255,0.1); }
        .gc-cos-card.gc-owned { opacity: 0.6; }
        .gc-cos-emoji { font-size: 32px; display: block; margin-bottom: 6px; }
        .gc-cos-name { font-weight: 600; display: block; }
        .gc-cos-rarity { font-size: 11px; color: #888; display: block; margin: 2px 0; }
        .gc-rarity-rare { border-left: 3px solid #3498db; }
        .gc-rarity-epic { border-left: 3px solid #9b59b6; }
        .gc-rarity-legendary { border-left: 3px solid #f39c12; }
        .gc-owned-badge { color: #2ed573; font-size: 12px; }
        .gc-cos-my { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

        .gc-event-card { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 16px; margin: 8px 0; border-left: 4px solid #667eea; }
        .gc-event-active { border-left-color: #2ed573; animation: gc-glow 2s ease-in-out infinite; }
        .gc-event-name { font-size: 18px; font-weight: 600; color: #fff; }
        .gc-event-desc { color: #aaa; margin: 6px 0; }
        .gc-event-type { font-weight: 500; }
        .gc-event-time { font-size: 12px; color: #888; margin-top: 4px; }

        .gc-stock-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 10px; margin: 12px 0; }
        .gc-stock-card { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; }
        .gc-stock-up { border-left: 3px solid #2ed573; }
        .gc-stock-down { border-left: 3px solid #ff4757; }
        .gc-stock-price { font-size: 20px; font-weight: 700; margin: 6px 0; }
        .gc-stock-change { font-size: 13px; font-weight: 400; }
        .gc-stock-up .gc-stock-change { color: #2ed573; }
        .gc-stock-down .gc-stock-change { color: #ff4757; }
        .gc-stock-actions { display: flex; gap: 6px; align-items: center; margin-top: 8px; }
        .gc-holding-item { background: rgba(255,255,255,0.04); padding: 8px 12px; border-radius: 8px; margin: 4px 0; font-size: 14px; }

        .gc-game-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(250px,1fr)); gap: 12px; margin: 16px 0; }
        .gc-game-card { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 12px; }
        .gc-game-icon { font-size: 40px; }
        .gc-game-info { flex: 1; }
        .gc-game-name { font-weight: 600; font-size: 16px; color: #fff; }
        .gc-game-desc { font-size: 12px; color: #888; }
        .gc-mini-game { text-align: center; padding: 20px 0; }

        .gc-memory-grid { display: grid; grid-template-columns: repeat(4,60px); gap: 8px; justify-content: center; margin: 16px 0; }
        .gc-mem-card { width: 60px; height: 60px; background: rgba(102,126,234,0.3); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: all 0.3s; }
        .gc-mem-card:hover { background: rgba(102,126,234,0.5); }
        .gc-mem-card.flipped, .gc-mem-card.matched { background: rgba(46,213,115,0.3); }
        .gc-mem-card.matched { opacity: 0.5; }

        .gc-click-grid { display: grid; grid-template-columns: repeat(3,80px); gap: 10px; justify-content: center; margin: 16px 0; }
        .gc-hole { width: 80px; height: 80px; background: rgba(255,255,255,0.08); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; transition: all 0.2s; }
        .gc-hole.mole { background: rgba(245,87,108,0.4); font-size: 36px; }
        .gc-hole.mole::after { content: '🐹'; }

        .gc-guess-form { display: flex; gap: 8px; justify-content: center; margin: 16px 0; }

        .gc-2048-grid { display: grid; grid-template-columns: repeat(4,70px); gap: 6px; justify-content: center; margin: 16px 0; }
        .gc-2048-cell { width: 70px; height: 70px; background: rgba(255,255,255,0.08); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; transition: all 0.15s; }
        .gc-2048-cell[data-v="2"] { background: rgba(102,126,234,0.3); }
        .gc-2048-cell[data-v="4"] { background: rgba(118,75,162,0.3); }
        .gc-2048-cell[data-v="8"] { background: rgba(245,87,108,0.3); color: #fff; }
        .gc-2048-cell[data-v="16"] { background: rgba(255,165,2,0.4); color: #fff; }
        .gc-2048-cell[data-v="32"] { background: rgba(255,107,107,0.4); color: #fff; }
        .gc-2048-cell[data-v="64"] { background: rgba(255,71,87,0.5); color: #fff; }
        .gc-2048-cell[data-v="128"] { background: rgba(255,215,0,0.4); font-size: 16px; }
        .gc-2048-cell[data-v="256"] { background: rgba(255,215,0,0.5); font-size: 16px; }
        .gc-2048-cell[data-v="512"] { background: rgba(255,215,0,0.6); font-size: 16px; }
        .gc-2048-cell[data-v="1024"] { background: rgba(255,215,0,0.7); font-size: 14px; }
        .gc-2048-cell[data-v="2048"] { background: rgba(255,215,0,0.9); font-size: 14px; }

        .gc-math-problem { font-size: 36px; font-weight: 700; margin: 20px 0; color: #fff; }
        .gc-math-form { display: flex; gap: 8px; justify-content: center; }
        .gc-math-form .gc-input { width: 120px; font-size: 24px; text-align: center; }

        .gc-fish-water { font-size: 48px; padding: 30px; animation: gc-bob 2s ease-in-out infinite; }
        @keyframes gc-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .gc-casting { animation: gc-cast 1s ease-out; }
        @keyframes gc-cast { 0% { transform: scale(0.5) rotate(-30deg); opacity:0; } 100% { transform: scale(1) rotate(0); opacity:1; } }
        .gc-fish-catch { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; margin: 12px 0; text-align: center; }
