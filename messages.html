<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="description" content="消息中心 - kuankuantj的个人博客">
    <title>消息中心 - kuankuantj的个人博客</title>

    <link rel="dns-prefetch" href="//1321178544-65fvlfs2za.ap-beijing.tencentscf.com">
    <link rel="preconnect" href="https://1321178544-65fvlfs2za.ap-beijing.tencentscf.com" crossorigin>
    <link rel="shortcut icon" href="/favicon.ico">
    <script src="/js/polyfill.js"></script>
    <link rel="stylesheet" href="/css/messages.css">
    <link rel="stylesheet" href="/css/theme.css?v=3">
</head>

<body>
    <a href="/index-chinese.html" class="back-to-home" title="返回首页">🏠</a>

    <div class="messages-wrapper">
        <div class="messages-container">
            <!-- 标签栏 -->
            <div class="messages-tabs">
                <button class="messages-tab active" data-tab="chat" onclick="switchTab('chat')">
                    💬 私信 <span class="tab-badge" id="chatBadge"></span>
                </button>
                <button class="messages-tab" data-tab="notifications" onclick="switchTab('notifications')">
                    🔔 通知 <span class="tab-badge" id="notifBadge"></span>
                </button>
            </div>

            <div class="messages-content">
                <!-- 私信面板 -->
                <div class="tab-panel active" id="chatPanel">
                    <!-- 搜索新用户 -->
                    <div class="new-chat-bar">
                        <input type="text" class="new-chat-input" id="searchUserInput"
                            placeholder="🔍 搜索用户发起新对话..." autocomplete="off">
                    </div>
                    <div class="search-results" id="searchResults"></div>

                    <!-- 会话列表 -->
                    <div class="conversation-list" id="conversationList">
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <div class="empty-state-text">加载中...</div>
                        </div>
                    </div>

                    <!-- 聊天视图（点击会话后显示） -->
                    <div class="chat-view" id="chatView">
                        <div class="chat-header">
                            <button class="chat-back" onclick="closeChatView()">←</button>
                            <span class="chat-title" id="chatTitle">对话</span>
                        </div>
                        <div class="chat-messages" id="chatMessages"></div>
                        <div class="chat-input-area">
                            <input type="text" class="chat-input" id="chatInput"
                                placeholder="输入消息..." maxlength="2000" autocomplete="off">
                            <button class="chat-send-btn" id="chatSendBtn" onclick="sendMessage()">发送</button>
                        </div>
                    </div>
                </div>

                <!-- 通知面板 -->
                <div class="tab-panel" id="notificationsPanel">
                    <div class="notifications-toolbar">
                        <button class="mark-all-read-btn" onclick="markAllRead()">全部已读</button>
                    </div>
                    <div class="notification-list" id="notificationList">
                        <div class="empty-state">
                            <div class="empty-state-icon">🔔</div>
                            <div class="empty-state-text">加载中...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/js/messages.js"></script>
    <script src="/js/theme.js?v=1"></script>

<!-- Win7 Emoji 兼容性处理 -->
<script>
(function() {
    // 检测是否为 Windows 7
    function isWindows7() {
        var ua = navigator.userAgent;
        return ua.indexOf('Windows NT 6.1') !== -1 || 
               ua.indexOf('Windows 7') !== -1;
    }
    
    // Emoji 替换映射表
    var emojiMap = {
        "🐱": "猫",
        "🏠": "首页",
        "🎮": "游戏",
        "☁️": "云",
        "☀️": "太阳",
        "❤️": "爱心",
        "🎯": "关于",
        "💬": "消息",
        "🔔": "通知",
        "👤": "用户",
        "📝": "编辑",
        "⬆️": "升级",
        "🖼️": "图片",
        "✍️": "写作",
        "⚙️": "设置",
        "🚪": "退出",
        "💡": "提示",
        "⚡": "经验",
        "🚀": "发布",
        "🎖️": "等级",
        "💪": "加油",
        "🔒": "锁定",
        "📜": "协议",
        "↑": "上",
        "↓": "下",
        "↩️": "撤销",
        "❓": "帮助",
        "🔄": "刷新",
        "▶️": "开始",
        "⏱️": "时间",
        "🎨": "创意",
        "💻": "电脑",
        "📚": "学习",
        "🛡️": "盾牌",
        "✈️": "飞机",
        "⭐": "星星",
        "🕹️": "手柄",
        "📧": "邮箱",
        "📱": "手机",
        "📑": "目录",
        "📦": "压缩",
        "📄": "文件",
        "📙": "PPT",
        "🔧": "工具",
        "🪙": "硬币",
        "💰": "金币",
        "✅": "完成",
        "🛠️": "工具",
        "💫": "星光",
        "🔍": "搜索",
        "📖": "书籍",
        "🏷️": "标签",
        "🗑️": "删除"
    };
    
    // 替换页面中的 emoji
    function replaceEmojis() {
        if (!isWindows7()) return;
        
        // 替换文本节点
        var walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );
        
        var node;
        while (node = walker.nextNode()) {
            var text = node.textContent;
            var hasEmoji = false;
            for (var emoji in emojiMap) {
                if (text.indexOf(emoji) !== -1) {
                    text = text.split(emoji).join(emojiMap[emoji]);
                    hasEmoji = true;
                }
            }
            if (hasEmoji) {
                node.textContent = text;
            }
        }
        
        // 替换属性中的 emoji（如 title, alt 等）
        var elements = document.querySelectorAll('*');
        var attrs = ['title', 'alt', 'placeholder', 'value'];
        for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            for (var j = 0; j < attrs.length; j++) {
                var attr = attrs[j];
                if (el.hasAttribute(attr)) {
                    var val = el.getAttribute(attr);
                    var hasEmoji = false;
                    for (var emoji in emojiMap) {
                        if (val.indexOf(emoji) !== -1) {
                            val = val.split(emoji).join(emojiMap[emoji]);
                            hasEmoji = true;
                        }
                    }
                    if (hasEmoji) {
                        el.setAttribute(attr, val);
                    }
                }
            }
        }
    }
    
    // DOM 加载完成后执行替换
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', replaceEmojis);
    } else {
        replaceEmojis();
    }
})();
</script>

</body>

</html>
