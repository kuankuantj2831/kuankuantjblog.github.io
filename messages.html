<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息中心 - Hakimi 的猫爬架</title>
    <link rel="stylesheet" href="css/chinese-style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/tianjg-theme.css">
    <link rel="stylesheet" href="css/messages.css">
    <link rel="icon" href="favicon.ico">
    <style>
        .messages-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px 40px;
            height: calc(100vh - 80px);
        }

        .messages-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            height: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .messages-container {
                grid-template-columns: 1fr;
            }
            
            .conversations-panel {
                display: none;
            }
            
            .conversations-panel.show {
                display: block;
            }
            
            .chat-panel {
                display: none;
            }
            
            .chat-panel.show {
                display: flex;
            }
        }

        /* 左侧会话列表 */
        .conversations-panel {
            background: rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .panel-title {
            font-size: 1.3em;
            color: #fff;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-new-message {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: #fff;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-new-message:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .search-box {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95em;
            box-sizing: border-box;
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 5px;
        }

        .conversation-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .conversation-item.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
        }

        .conversation-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2em;
            font-weight: bold;
            position: relative;
            flex-shrink: 0;
        }

        .conversation-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #4caf50;
            border: 2px solid #1a1a2e;
            border-radius: 50%;
        }

        .conversation-info {
            flex: 1;
            min-width: 0;
        }

        .conversation-name {
            color: #fff;
            font-weight: 500;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .conversation-time {
            font-size: 0.75em;
            color: rgba(255,255,255,0.5);
            font-weight: normal;
        }

        .conversation-preview {
            color: rgba(255,255,255,0.6);
            font-size: 0.9em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-item.unread .conversation-preview {
            color: rgba(255,255,255,0.9);
            font-weight: 500;
        }

        .unread-badge {
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            background: #f5576c;
            border-radius: 10px;
            color: #fff;
            font-size: 0.75em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 右侧聊天区域 */
        .chat-panel {
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
        }

        .chat-user-details h4 {
            color: #fff;
            margin-bottom: 3px;
        }

        .chat-user-details span {
            font-size: 0.85em;
            color: rgba(255,255,255,0.5);
        }

        .chat-actions {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: rgba(255,255,255,0.2);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-group {
            display: flex;
            gap: 10px;
            max-width: 70%;
        }

        .message-group.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.9em;
            flex-shrink: 0;
        }

        .message-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message-group.received .message-bubble {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-bottom-left-radius: 4px;
        }

        .message-group.sent .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 0.75em;
            color: rgba(255,255,255,0.5);
            align-self: flex-end;
        }

        .message-group.sent .message-time {
            align-self: flex-start;
        }

        .message-date-divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .message-date-divider::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }

        .message-date-divider span {
            background: #1a1a2e;
            padding: 0 15px;
            color: rgba(255,255,255,0.5);
            font-size: 0.85em;
            position: relative;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 5px;
            padding: 10px 15px;
            color: rgba(255,255,255,0.6);
            font-size: 0.9em;
        }

        .typing-indicator.show {
            display: flex;
        }

        .typing-dots {
            display: flex;
            gap: 3px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .input-area {
            padding: 15px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .message-input-wrapper {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 0.95em;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .message-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .message-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .btn-emoji {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 1.2em;
            cursor: pointer;
            padding: 5px;
        }

        .btn-emoji:hover {
            color: #fff;
        }

        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .btn-send:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 空状态 */
        .empty-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255,255,255,0.5);
            text-align: center;
            padding: 40px;
        }

        .empty-chat-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-chat h3 {
            color: #fff;
            margin-bottom: 10px;
        }

        /* 新消息模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #fff;
        }

        .user-search-results {
            max-height: 250px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .user-result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-result-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .user-result-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
        }

        .user-result-info {
            flex: 1;
        }

        .user-result-name {
            color: #fff;
            font-weight: 500;
        }

        .user-result-bio {
            font-size: 0.85em;
            color: rgba(255,255,255,0.5);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-cancel {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }

        .btn-primary {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(30, 30, 40, 0.95);
            color: #fff;
            padding: 12px 25px;
            border-radius: 25px;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="chinese-style-wrapper">
        <nav class="top-nav">
            <div class="nav-links">
                <a href="/" class="nav-link">首页</a>
                <a href="/profile.html" class="nav-link">个人中心</a>
                <a href="/collections.html" class="nav-link">收藏夹</a>
                <a href="/drive.html" class="nav-link">网盘</a>
            </div>
        </nav>

        <div class="messages-wrapper">
            <div class="messages-container">
                <!-- 左侧会话列表 -->
                <div class="conversations-panel" id="conversationsPanel">
                    <div class="panel-header">
                        <div class="panel-title">
                            <span>消息</span>
                            <button class="btn-new-message" onclick="openNewMessageModal()" title="新消息">+</button>
                        </div>
                        <div class="search-box">
                            <span class="search-icon">🔍</span>
                            <input type="text" class="search-input" placeholder="搜索对话..." id="searchConversations">
                        </div>
                    </div>
                    <div class="conversations-list" id="conversationsList">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 右侧聊天区域 -->
                <div class="chat-panel" id="chatPanel">
                    <div class="empty-chat" id="emptyChat">
                        <div class="empty-chat-icon">💬</div>
                        <h3>开始聊天</h3>
                        <p>选择一个对话或开始新的对话</p>
                    </div>
                    
                    <div class="chat-content" id="chatContent" style="display: none; flex-direction: column; height: 100%;">
                        <div class="chat-header">
                            <div class="chat-user-info">
                                <div class="chat-user-avatar" id="chatUserAvatar">?</div>
                                <div class="chat-user-details">
                                    <h4 id="chatUserName">用户</h4>
                                    <span id="chatUserStatus">在线</span>
                                </div>
                            </div>
                            <div class="chat-actions">
                                <button class="btn-icon" title="查看资料" onclick="viewUserProfile()">👤</button>
                                <button class="btn-icon" title="更多">⋮</button>
                            </div>
                        </div>

                        <div class="messages-area" id="messagesArea">
                            <!-- 动态生成 -->
                        </div>

                        <div class="typing-indicator" id="typingIndicator">
                            <span>对方正在输入</span>
                            <div class="typing-dots">
                                <span class="typing-dot"></span>
                                <span class="typing-dot"></span>
                                <span class="typing-dot"></span>
                            </div>
                        </div>

                        <div class="input-area">
                            <div class="message-input-wrapper">
                                <textarea class="message-input" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
                                <button class="btn-emoji" onclick="toggleEmojiPicker()">😊</button>
                            </div>
                            <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新消息模态框 -->
    <div class="modal-overlay" id="newMessageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>发送新消息</h3>
            </div>
            <div class="search-box" style="margin-bottom: 15px;">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="搜索用户..." id="searchUsers" oninput="searchUsers(this.value)">
            </div>
            <div class="user-search-results" id="userSearchResults">
                <!-- 动态生成 -->
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeNewMessageModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="js/supabase-auth.js"></script>
    <script type="module">
        import { API_BASE_URL } from './js/api-config.js?v=20260223b';

        // 全局状态
        let currentUser = null;
        let conversations = [];
        let currentConversation = null;
        let messages = [];
        let pollInterval = null;

        // 初始化
        async function init() {
            const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
            if (!user) {
                window.location.href = '/?login=1';
                return;
            }
            currentUser = user;
            
            await loadConversations();
            startPolling();
            setupEventListeners();
        }

        // 加载会话列表
        async function loadConversations() {
            try {
                const response = await fetch(`${API_BASE_URL}/social/conversations`, {
                    headers: {
                        'Authorization': `Bearer ${currentUser.token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    conversations = data.conversations || [];
                    renderConversations();
                }
            } catch (error) {
                console.error('Error loading conversations:', error);
            }
        }

        // 渲染会话列表
        function renderConversations() {
            const container = document.getElementById('conversationsList');
            
            if (conversations.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.5);">暂无消息</div>';
                return;
            }
            
            container.innerHTML = conversations.map(conv => `
                <div class="conversation-item ${conv.unread_count > 0 ? 'unread' : ''} ${currentConversation?.user_id === conv.user_id ? 'active' : ''}" 
                     onclick="openConversation(${conv.user_id}, '${conv.username}')">
                    <div class="conversation-avatar">
                        ${conv.avatar ? `<img src="${conv.avatar}" alt="">` : conv.username.charAt(0).toUpperCase()}
                        ${conv.is_online ? '<span class="online-indicator"></span>' : ''}
                    </div>
                    <div class="conversation-info">
                        <div class="conversation-name">
                            ${conv.username}
                            <span class="conversation-time">${formatTime(conv.last_message_time)}</span>
                        </div>
                        <div class="conversation-preview">${conv.last_message || '暂无消息'}</div>
                    </div>
                    ${conv.unread_count > 0 ? `<span class="unread-badge">${conv.unread_count}</span>` : ''}
                </div>
            `).join('');
        }

        // 打开会话
        async function openConversation(userId, username) {
            currentConversation = { user_id: userId, username };
            renderConversations();
            
            document.getElementById('emptyChat').style.display = 'none';
            document.getElementById('chatContent').style.display = 'flex';
            
            document.getElementById('chatUserName').textContent = username;
            document.getElementById('chatUserAvatar').textContent = username.charAt(0).toUpperCase();
            
            await loadMessages(userId);
        }

        // 加载消息
        async function loadMessages(userId) {
            try {
                const response = await fetch(`${API_BASE_URL}/social/messages/${userId}`, {
                    headers: {
                        'Authorization': `Bearer ${currentUser.token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    messages = data.messages || [];
                    renderMessages();
                    
                    // 标记已读
                    markAsRead(userId);
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        // 渲染消息
        function renderMessages() {
            const container = document.getElementById('messagesArea');
            
            if (messages.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.5);">开始聊天吧</div>';
                return;
            }
            
            let lastDate = null;
            let html = '';
            
            messages.forEach(msg => {
                const msgDate = new Date(msg.created_at).toDateString();
                if (msgDate !== lastDate) {
                    html += `<div class="message-date-divider"><span>${formatDate(msg.created_at)}</span></div>`;
                    lastDate = msgDate;
                }
                
                const isSent = msg.sender_id === currentUser.id;
                html += `
                    <div class="message-group ${isSent ? 'sent' : 'received'}">
                        <div class="message-avatar">
                            ${isSent ? '我' : msg.sender_name?.charAt(0).toUpperCase() || '?'}
                        </div>
                        <div class="message-content">
                            <div class="message-bubble">${escapeHtml(msg.content)}</div>
                            <div class="message-time">${formatTime(msg.created_at)} ${msg.is_read && isSent ? '✓' : ''}</div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content || !currentConversation) return;
            
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE_URL}/social/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentUser.token}`
                    },
                    body: JSON.stringify({
                        receiver_id: currentConversation.user_id,
                        content: content
                    })
                });
                
                if (response.ok) {
                    input.value = '';
                    input.style.height = 'auto';
                    await loadMessages(currentConversation.user_id);
                    await loadConversations();
                } else {
                    showToast('发送失败');
                }
            } catch (error) {
                console.error('Error sending message:', error);
                showToast('发送失败');
            } finally {
                sendBtn.disabled = false;
            }
        }

        // 标记已读
        async function markAsRead(userId) {
            try {
                await fetch(`${API_BASE_URL}/social/messages/${userId}/read`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${currentUser.token}`
                    }
                });
                
                // 更新未读数
                const conv = conversations.find(c => c.user_id === userId);
                if (conv) {
                    conv.unread_count = 0;
                    renderConversations();
                }
            } catch (error) {
                console.error('Error marking as read:', error);
            }
        }

        // 搜索用户
        async function searchUsers(query) {
            const container = document.getElementById('userSearchResults');
            
            if (!query || query.length < 2) {
                container.innerHTML = '';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/profiles/search?q=${encodeURIComponent(query)}`, {
                    headers: {
                        'Authorization': `Bearer ${currentUser.token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const users = data.users || [];
                    
                    container.innerHTML = users.map(user => `
                        <div class="user-result-item" onclick="startConversation(${user.id}, '${user.username}')">
                            <div class="user-result-avatar">
                                ${user.avatar ? `<img src="${user.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : user.username.charAt(0).toUpperCase()}
                            </div>
                            <div class="user-result-info">
                                <div class="user-result-name">${user.username}</div>
                                <div class="user-result-bio">${user.bio || '暂无简介'}</div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error searching users:', error);
            }
        }

        // 开始新对话
        async function startConversation(userId, username) {
            closeNewMessageModal();
            await openConversation(userId, username);
        }

        // 轮询新消息
        function startPolling() {
            pollInterval = setInterval(async () => {
                if (currentConversation) {
                    await loadMessages(currentConversation.user_id);
                }
                await loadConversations();
            }, 5000);
        }

        // 设置事件监听
        function setupEventListeners() {
            // 输入框自动增高
            const input = document.getElementById('messageInput');
            input.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
            
            // 回车发送
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // 搜索会话
            document.getElementById('searchConversations').addEventListener('input', function(e) {
                const query = e.target.value.toLowerCase();
                document.querySelectorAll('.conversation-item').forEach(item => {
                    const name = item.querySelector('.conversation-name').textContent.toLowerCase();
                    item.style.display = name.includes(query) ? 'flex' : 'none';
                });
            });
        }

        // 查看用户资料
        function viewUserProfile() {
            if (currentConversation) {
                window.open(`/profile.html?id=${currentConversation.user_id}`, '_blank');
            }
        }

        // 工具函数
        function formatTime(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
            
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (date.toDateString() === today.toDateString()) return '今天';
            if (date.toDateString() === yesterday.toDateString()) return '昨天';
            
            return date.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 暴露全局函数
        window.openConversation = openConversation;
        window.sendMessage = sendMessage;
        window.openNewMessageModal = function() {
            document.getElementById('newMessageModal').classList.add('show');
            document.getElementById('searchUsers').focus();
        };
        window.closeNewMessageModal = function() {
            document.getElementById('newMessageModal').classList.remove('show');
            document.getElementById('searchUsers').value = '';
            document.getElementById('userSearchResults').innerHTML = '';
        };
        window.searchUsers = searchUsers;
        window.startConversation = startConversation;
        window.viewUserProfile = viewUserProfile;
        window.toggleEmojiPicker = function() {
            showToast('表情功能开发中...');
        };

        // Toast
        window.showToast = function(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        // 页面卸载时清理
        window.addEventListener('beforeunload', () => {
            if (pollInterval) clearInterval(pollInterval);
        });

        // 启动
        init();
    </script>
</body>
</html>
