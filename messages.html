<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炴垵鐗婃导鍛▔偟濡?- Hakimi 的个人博客/title>
    <link rel="stylesheet" href="css/chinese-style.css">
    <link rel="stylesheet" href="css/messages.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* 炴垵鐗婃导鍛▔偟濡囬柡宥呭槻?*/
        .messages-container {
            max-width: 1200px;
            margin: 80px auto 40px;
            padding: 20px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            min-height: calc(100vh - 140px);
        }
        
        .conversations-sidebar {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .sidebar-header h2 {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
        }
        
        .new-message-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }
        
        .new-message-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .conversations-list {
            flex: 1;
            overflow-y: auto;
            max-height: calc(100vh - 220px);
        }
        
        .conversation-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .conversation-item:hover,
        .conversation-item.active {
            background: #f8f9ff;
        }
        
        .conversation-item.active {
            border-left: 3px solid #667eea;
        }
        
        .conversation-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .conversation-info {
            flex: 1;
            min-width: 0;
        }
        
        .conversation-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .conversation-preview {
            font-size: 0.85em;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .conversation-meta {
            text-align: right;
        }
        
        .conversation-time {
            font-size: 0.75em;
            color: #aaa;
            margin-bottom: 4px;
        }
        
        .unread-badge {
            display: inline-block;
            min-width: 18px;
            height: 18px;
            line-height: 18px;
            text-align: center;
            background: #ff4757;
            color: white;
            border-radius: 9px;
            font-size: 0.7em;
            padding: 0 6px;
        }
        
        /* 煎崬锕ら妵愬礌鍘?*/
        .chat-area {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .chat-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .chat-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .chat-user-name {
            font-weight: 600;
            color: #333;
        }
        
        .chat-user-status {
            font-size: 0.8em;
            color: #4cd964;
        }
        
        .chat-actions {
            display: flex;
            gap: 10px;
        }
        
        .chat-action-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-action-btn:hover {
            background: #e8e8e8;
        }
        
        .messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }
        
        .message {
            display: flex;
            margin-bottom: 20px;
            animation: messageSlide 0.3s ease;
        }
        
        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.own {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 10px;
        }
        
        .message-content {
            max-width: 70%;
        }
        
        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95em;
            line-height: 1.5;
        }
        
        .message:not(.own) .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .message.own .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message-time {
            font-size: 0.75em;
            color: #aaa;
            margin-top: 4px;
            text-align: right;
        }
        
        .message.own .message-time {
            text-align: left;
        }
        
        .chat-input-area {
            padding: 15px 20px;
            border-top: 1px solid #f0f0f0;
            background: white;
        }
        
        .input-toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .toolbar-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
        }
        
        .toolbar-btn:hover {
            background: #f0f0f0;
        }
        
        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            resize: none;
            font-family: inherit;
            font-size: 0.95em;
            max-height: 120px;
            min-height: 44px;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .send-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 佸矁娅ｆ慨鎼佸箑?*/
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-state-text {
            font-size: 1.1em;
        }
        
        /* 告繂绉寸花鎻掝嚕?*/
        @media (max-width: 768px) {
            .messages-container {
                grid-template-columns: 1fr;
                margin-top: 60px;
            }
            
            .conversations-sidebar {
                display: none;
            }
            
            .conversations-sidebar.show {
                display: flex;
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 100;
            }
        }
        
        /* 圭粯鍔曞鐑藉冀瀹勬壆纭 */
        .mention {
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
        }
        
        .mention:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="chinese-style-wrapper">
        <nav class="top-nav">
            <a href="/" class="nav-logo">Hakimi 的个人博客/a>
            <div class="nav-links">
                <a href="/" class="nav-link">濡鐗犻妴?/a>
                <a href="/articles.html" class="nav-link">哄倸娲ㄩ悵?/a>
                <a href="/groups.html" class="nav-link">傚洢楃划?/a>
                <a href="/events.html" class="nav-link">炶尪ф慨?/a>
                <a href="/messages.html" class="nav-link active">炴垵鐗婃导?/a>
            </div>
        </nav>

        <div class="messages-container">
            <!-- 村吋淇洪惁礆濡ゅ嫨鈧?-->
            <div class="conversations-sidebar">
                <div class="sidebar-header">
                    <h2>妫啯灏?炴垵鐗婃导鍛▔偟濡?/h2>
                    <button class="new-message-btn" onclick="startNewConversation()">
                        翠礁顧?哄倹樼紓鎾剁矓ｈ渹绻?
                    </button>
                </div>
                <div class="conversations-list" id="conversationList">
                    <!-- 村吋淇洪惁礆濡ゅ嫨鈧啰浜崱袟诡兛佹慨鐐存姜?-->
                </div>
            </div>

            <!-- 煎崬锕ら妵愬礌鍘?-->
            <div class="chat-area">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">妫啯灏?/div>
                    <p class="empty-state-text">闂顦扮氥劍绋夐埀▔啰绐鍥ㄧ箓辨垶鎱ㄧｎ厺鍠婂?/p>
                </div>
                
                <div class="chat-header" id="chatHeader" style="display: none;">
                    <div class="chat-user-info">
                        <img src="" alt="" class="chat-user-avatar" id="chatUserAvatar">
                        <div>
                            <div class="chat-user-name" id="chatUserName"></div>
                            <div class="chat-user-status" id="chatUserStatus">革负鍔崵?/div>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="chat-action-btn" title="犲浂鍙悡曟焻樺磭? onclick="startVoiceCall()">妫啯鎲?/button>
                        <button class="chat-action-btn" title="熸瑥妫濋。曟焻樺磭? onclick="startVideoCall()">妫啯鎳?/button>
                        <button class="chat-action-btn" title="哄洦娼欓ˇ? onclick="showChatMenu()">?/button>
                    </div>
                </div>

                <div class="messages-list" id="messagesList" style="display: none;">
                    <!-- 炴垵鐗婃导鍛焊袟诡兛佹慨鐐存姜?-->
                </div>

                <div class="chat-input-area" id="chatInputArea" style="display: none;">
                    <div class="input-toolbar">
                        <button class="toolbar-btn" title="炴稏鍔崕? onclick="showEmojiPicker()">妫啯顫?/button>
                        <button class="toolbar-btn" title="搞儱澧芥晶? onclick="selectImage()">妫啯鐓犻柨?/button>
                        <button class="toolbar-btn" title="哄倸娲▎? onclick="selectFile()">妫啯鎯?/button>
                        <button class="toolbar-btn" title="@圭粯鍔曞? onclick="showMentionPicker()">@</button>
                    </div>
                    <div class="chat-input-wrapper">
                        <textarea class="chat-input" id="messageInput" placeholder="閺夊牊崣鍡椻槈喍绱?.." rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">?/button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 哄倹樼紓鎾剁矓ｈ渹绻顖楀墲兛鐒、?-->
    <div class="modal" id="newMessageModal" style="display: none;">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3>告瑦鍨块埀胯兌棙绌?/h3>
                <button class="close-btn" onclick="closeNewMessageModal()">?/button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>瑰吋绮銊╂偨閵婏箑鐓?/label>
                    <input type="text" id="userSearchInput" placeholder="閺夊牊崣鍡涙偨閵婏箑鐓曢柛?.." oninput="searchUsers(this.value)">
                </div>
                <div id="userSearchResults" style="max-height: 200px; overflow-y: auto;">
                    <!-- 瑰吋绮銊х磼浜?-->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/messages.js"></script>
    <script>
        // 稿繈鍔岄惇礄恒儲娈?
        function startNewConversation() {
            document.getElementById('newMessageModal').style.display = 'flex';
        }
        
        function closeNewMessageModal() {
            document.getElementById('newMessageModal').style.display = 'none';
        }
        
        function showEmojiPicker() {
            // 庡熼獮鍥╂偘閵婏箑鍓伴梺顐㈩槹氥劑宕?
            console.log('Show emoji picker');
        }
        
        function selectImage() {
            // 庡熼獮鍥炊撗冾暬闂顦扮?
            console.log('Select image');
        }
        
        function selectFile() {
            // 庡熼獮鍥棘ワ附顐介梺顐㈩槹?
            console.log('Select file');
        }
        
        function showMentionPicker() {
            // 庡熼獮鍢嗛樺姇鏌呮径瀣仴
            const input = document.getElementById('messageInput');
            input.value += '@';
            input.focus();
        }
        
        function startVoiceCall() {
            showToast('犲浂鍙悡曟焻樺磭堥柛鏃傚忔êｉ埀存粏鍘?);
        }
        
        function startVideoCall() {
            showToast('熸瑥妫濋。曟焻樺磭堥柛鏃傚忔êｉ埀存粏鍘?);
        }
        
        function showChatMenu() {
            // 哄澧介妵舵嚂犲倶浜柤矊瀹?
            console.log('Show chat menu');
        }
        
        function searchUsers(query) {
            // 瑰吋绮銊╂偨閵婏箑鐓?
            console.log('Search users:', query);
        }
        
        function showToast(message) {
            // 姭撻柛佹礈堟唸oast圭粯鍔妵?
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0,0,0,0.8);
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 0.9em;
                z-index: 10000;
                animation: fadeIn 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // ☆垪鍓濈氭瑩宕ｉ幋锔瑰啸?
        let currentConversationId = null;
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content) return;
            
            // 烇綀ф慨鐐哄礆楀牏啸诡収鍨伴顏偘?
            const messagesList = document.getElementById('messagesList');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message own';
            messageDiv.innerHTML = `
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(content)}</div>
                    <div class="message-time">告帗鑹鹃?/div>
                </div>
            `;
            messagesList.appendChild(messageDiv);
            messagesList.scrollTop = messagesList.scrollHeight;
            
            input.value = '';
            input.style.height = 'auto';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 閺夊牊崣鍡楊浖艾娈伴柛鏂诲姀ㄧ喖幘顔蒋?
        document.getElementById('messageInput')?.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        
        // 搞儳犲┃鍛村达腹?
        document.getElementById('messageInput')?.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
