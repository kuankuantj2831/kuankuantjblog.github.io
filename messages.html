<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息中心 - Hakimi 的猫爬架</title>
    <link rel="stylesheet" href="css/chinese-style.css">
    <link rel="stylesheet" href="css/messages.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* 消息中心样式 */
        .messages-container {
            max-width: 1200px;
            margin: 80px auto 40px;
            padding: 20px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            min-height: calc(100vh - 140px);
        }
        
        .conversations-sidebar {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .sidebar-header h2 {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
        }
        
        .new-message-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }
        
        .new-message-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .conversations-list {
            flex: 1;
            overflow-y: auto;
            max-height: calc(100vh - 220px);
        }
        
        .conversation-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .conversation-item:hover,
        .conversation-item.active {
            background: #f8f9ff;
        }
        
        .conversation-item.active {
            border-left: 3px solid #667eea;
        }
        
        .conversation-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .conversation-info {
            flex: 1;
            min-width: 0;
        }
        
        .conversation-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .conversation-preview {
            font-size: 0.85em;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .conversation-meta {
            text-align: right;
        }
        
        .conversation-time {
            font-size: 0.75em;
            color: #aaa;
            margin-bottom: 4px;
        }
        
        .unread-badge {
            display: inline-block;
            min-width: 18px;
            height: 18px;
            line-height: 18px;
            text-align: center;
            background: #ff4757;
            color: white;
            border-radius: 9px;
            font-size: 0.7em;
            padding: 0 6px;
        }
        
        /* 聊天区域 */
        .chat-area {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .chat-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .chat-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .chat-user-name {
            font-weight: 600;
            color: #333;
        }
        
        .chat-user-status {
            font-size: 0.8em;
            color: #4cd964;
        }
        
        .chat-actions {
            display: flex;
            gap: 10px;
        }
        
        .chat-action-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-action-btn:hover {
            background: #e8e8e8;
        }
        
        .messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }
        
        .message {
            display: flex;
            margin-bottom: 20px;
            animation: messageSlide 0.3s ease;
        }
        
        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.own {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 10px;
        }
        
        .message-content {
            max-width: 70%;
        }
        
        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95em;
            line-height: 1.5;
        }
        
        .message:not(.own) .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .message.own .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message-time {
            font-size: 0.75em;
            color: #aaa;
            margin-top: 4px;
            text-align: right;
        }
        
        .message.own .message-time {
            text-align: left;
        }
        
        .chat-input-area {
            padding: 15px 20px;
            border-top: 1px solid #f0f0f0;
            background: white;
        }
        
        .input-toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .toolbar-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
        }
        
        .toolbar-btn:hover {
            background: #f0f0f0;
        }
        
        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            resize: none;
            font-family: inherit;
            font-size: 0.95em;
            max-height: 120px;
            min-height: 44px;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .send-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 空状态 */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-state-text {
            font-size: 1.1em;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .messages-container {
                grid-template-columns: 1fr;
                margin-top: 60px;
            }
            
            .conversations-sidebar {
                display: none;
            }
            
            .conversations-sidebar.show {
                display: flex;
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 100;
            }
        }
        
        /* 提及样式 */
        .mention {
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
        }
        
        .mention:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="chinese-style-wrapper">
        <nav class="top-nav">
            <a href="/" class="nav-logo">Hakimi 的猫爬架</a>
            <div class="nav-links">
                <a href="/" class="nav-link">首页</a>
                <a href="/articles.html" class="nav-link">文章</a>
                <a href="/groups.html" class="nav-link">群组</a>
                <a href="/events.html" class="nav-link">活动</a>
                <a href="/messages.html" class="nav-link active">消息</a>
            </div>
        </nav>

        <div class="messages-container">
            <!-- 会话列表 -->
            <div class="conversations-sidebar">
                <div class="sidebar-header">
                    <h2>💬 消息中心</h2>
                    <button class="new-message-btn" onclick="startNewConversation()">
                        ✉️ 新建私信
                    </button>
                </div>
                <div class="conversations-list" id="conversationList">
                    <!-- 会话列表将动态加载 -->
                </div>
            </div>

            <!-- 聊天区域 -->
            <div class="chat-area">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">💬</div>
                    <p class="empty-state-text">选择一个会话开始聊天</p>
                </div>
                
                <div class="chat-header" id="chatHeader" style="display: none;">
                    <div class="chat-user-info">
                        <img src="" alt="" class="chat-user-avatar" id="chatUserAvatar">
                        <div>
                            <div class="chat-user-name" id="chatUserName"></div>
                            <div class="chat-user-status" id="chatUserStatus">在线</div>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="chat-action-btn" title="语音通话" onclick="startVoiceCall()">📞</button>
                        <button class="chat-action-btn" title="视频通话" onclick="startVideoCall()">📹</button>
                        <button class="chat-action-btn" title="更多" onclick="showChatMenu()">⋮</button>
                    </div>
                </div>

                <div class="messages-list" id="messagesList" style="display: none;">
                    <!-- 消息将动态加载 -->
                </div>

                <div class="chat-input-area" id="chatInputArea" style="display: none;">
                    <div class="input-toolbar">
                        <button class="toolbar-btn" title="表情" onclick="showEmojiPicker()">😊</button>
                        <button class="toolbar-btn" title="图片" onclick="selectImage()">🖼️</button>
                        <button class="toolbar-btn" title="文件" onclick="selectFile()">📎</button>
                        <button class="toolbar-btn" title="@提及" onclick="showMentionPicker()">@</button>
                    </div>
                    <div class="chat-input-wrapper">
                        <textarea class="chat-input" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新建私信模态框 -->
    <div class="modal" id="newMessageModal" style="display: none;">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3>发送私信</h3>
                <button class="close-btn" onclick="closeNewMessageModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>搜索用户</label>
                    <input type="text" id="userSearchInput" placeholder="输入用户名..." oninput="searchUsers(this.value)">
                </div>
                <div id="userSearchResults" style="max-height: 200px; overflow-y: auto;">
                    <!-- 搜索结果 -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/messages.js"></script>
    <script>
        // 全局函数
        function startNewConversation() {
            document.getElementById('newMessageModal').style.display = 'flex';
        }
        
        function closeNewMessageModal() {
            document.getElementById('newMessageModal').style.display = 'none';
        }
        
        function showEmojiPicker() {
            // 实现表情选择器
            console.log('Show emoji picker');
        }
        
        function selectImage() {
            // 实现图片选择
            console.log('Select image');
        }
        
        function selectFile() {
            // 实现文件选择
            console.log('Select file');
        }
        
        function showMentionPicker() {
            // 实现@提及选择
            const input = document.getElementById('messageInput');
            input.value += '@';
            input.focus();
        }
        
        function startVoiceCall() {
            showToast('语音通话功能开发中');
        }
        
        function startVideoCall() {
            showToast('视频通话功能开发中');
        }
        
        function showChatMenu() {
            // 显示聊天菜单
            console.log('Show chat menu');
        }
        
        function searchUsers(query) {
            // 搜索用户
            console.log('Search users:', query);
        }
        
        function showToast(message) {
            // 简单的toast提示
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0,0,0,0.8);
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 0.9em;
                z-index: 10000;
                animation: fadeIn 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // 模拟发送消息
        let currentConversationId = null;
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content) return;
            
            // 添加到消息列表
            const messagesList = document.getElementById('messagesList');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message own';
            messageDiv.innerHTML = `
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(content)}</div>
                    <div class="message-time">刚刚</div>
                </div>
            `;
            messagesList.appendChild(messageDiv);
            messagesList.scrollTop = messagesList.scrollHeight;
            
            input.value = '';
            input.style.height = 'auto';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 输入框自动调整高度
        document.getElementById('messageInput')?.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        
        // 回车发送
        document.getElementById('messageInput')?.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
