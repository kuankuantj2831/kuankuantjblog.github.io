<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>哄倸娲▎銏ゅ礆洟鐓?- kuankuantj前端开发?/title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .share-card { background: white; border-radius: 20px; padding: 40px; max-width: 440px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; }
        .share-icon { font-size: 56px; margin-bottom: 16px; }
        .share-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 8px; word-break: break-all; }
        .share-meta { font-size: 13px; color: #999; margin-bottom: 20px; }
        .share-meta span { margin: 0 8px; }
        .password-input { width: 100%; padding: 12px 16px; border: 2px solid #e8e8e8; border-radius: 12px; font-size: 15px; outline: none; margin-bottom: 14px; text-align: center; letter-spacing: 4px; }
        .password-input:focus { border-color: #667eea; }
        .download-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .download-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(102,126,234,0.4); }
        .download-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .error-msg { color: #ff4d4f; font-size: 14px; margin-bottom: 12px; display: none; }
        .expired { color: #ff4d4f; font-size: 16px; margin-top: 12px; }
        .back-link { display: inline-block; margin-top: 20px; color: #667eea; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="share-card" id="shareCard">
        <div class="share-icon">妫啯鎯?/div>
        <div class="share-title" id="fileName">告梻ù鍥ㄧ▔?..</div>
        <div class="share-meta" id="shareMeta"></div>
        <div class="error-msg" id="errorMsg"></div>
        <input type="password" class="password-input" id="passwordInput" placeholder="閺夊牊崣鍡涘箵绲块闈涙爬架? style="display:none;" maxlength="32">
        <button class="download-btn" id="downloadBtn" style="display:none;" onclick="downloadFile()">妫啯鎲?挸堝ù鍥棘ワ附顐?/button>
        <a href="/index-chinese.html" class="back-link">?閺夆晜鏌ú鏍純閺嶎厹鈧?/a>
    </div>

    <script>
        const API_BASE = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
            ? 'http://localhost:9000' : 'https://1321178544-65fvlfs2za.ap-beijing.tencentscf.com';

        const shareCode = new URLSearchParams(location.search).get('code');

        async function loadShareInfo() {
            if (!shareCode) {
                document.getElementById('fileName').textContent = '哄啰弲銉╂儍曨诲ù庡亰藉ジ骞?;
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/drive/share/${shareCode}`);
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    document.getElementById('fileName').textContent = err.message || '告帒妫旈棅鈺傜▔瀹ュ懐鎽犻柛?;
                    document.querySelector('.share-icon').textContent = '?;
                    return;
                }
                const data = await res.json();
                document.getElementById('fileName').textContent = data.fileName;

                let meta = `告帒妫旈棅鈺呮嚀? ${data.sharerName}`;
                if (data.expiresAt) meta += ` | 閺夆晛娲﹢? ${new Date(data.expiresAt).toLocaleString('zh-CN')}`;
                if (data.maxDownloads) meta += ` | 挸堝ù? ${data.downloadCount}/${data.maxDownloads}`;
                document.getElementById('shareMeta').textContent = meta;

                if (data.hasPassword) {
                    document.getElementById('passwordInput').style.display = '';
                }
                document.getElementById('downloadBtn').style.display = '';
            } catch (e) {
                document.getElementById('fileName').textContent = '告梻ù鍥緞堫袝挎稑鐭侀勬煂瀹ュ牏妲?;
            }
        }

        async function downloadFile() {
            const btn = document.getElementById('downloadBtn');
            const errEl = document.getElementById('errorMsg');
            errEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = '兼儳鍢茶ぐ鍥ㄧ▔?..';

            try {
                const password = document.getElementById('passwordInput').value || undefined;
                const res = await fetch(`${API_BASE}/drive/share/${shareCode}/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    errEl.textContent = err.message || '挸堝ù鍥緞堫袝';
                    errEl.style.display = '';
                    return;
                }

                const data = await res.json();
                const a = document.createElement('a');
                a.href = data.url;
                a.download = data.fileName;
                a.target = '_blank';
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch (e) {
                errEl.textContent = '傚啯鍨圭划曟煥帩鍤栭柨樼焷曨剟鏌屽㈡Ц';
                errEl.style.display = '';
            } finally {
                btn.disabled = false;
                btn.textContent = '妫啯鎲?挸堝ù鍥棘ワ附顐?;
            }
        }

        loadShareInfo();
    </script>
</body>
</html>
