<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问答悬赏 - Hakimi的猫爬架</title>
    <link rel="stylesheet" href="css/chinese-style.css">
    <link rel="stylesheet" href="css/tianjg-theme.css">
    <style>
        /* 问答系统样式 */
        .qna-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .qna-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            color: white;
            text-align: center;
        }

        .qna-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .qna-header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .qna-stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .qna-stat {
            text-align: center;
        }

        .qna-stat-num {
            font-size: 2em;
            font-weight: bold;
        }

        .qna-stat-label {
            opacity: 0.8;
            font-size: 0.9em;
        }

        /* 筛选栏 */
        .qna-filters {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-label {
            color: #666;
            font-size: 0.9em;
        }

        .qna-filter-btn {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .qna-filter-btn:hover,
        .qna-filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .qna-search {
            flex: 1;
            min-width: 200px;
            max-width: 300px;
        }

        .qna-search input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        .qna-search input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-create {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(240, 147, 251, 0.4);
        }

        /* 问题列表 */
        .qna-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .qna-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            gap: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .qna-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }

        .qna-card.resolved {
            border-left: 4px solid #4CAF50;
        }

        .qna-card-stats {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 80px;
        }

        .stat-item {
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .stat-item.bounty {
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            color: white;
        }

        .stat-num {
            display: block;
            font-size: 1.5em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.8em;
            color: #666;
        }

        .stat-item.bounty .stat-label {
            color: rgba(255,255,255,0.9);
        }

        .qna-card-content {
            flex: 1;
        }

        .qna-title {
            margin-bottom: 10px;
        }

        .qna-title a {
            color: #333;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: 600;
            transition: color 0.3s;
        }

        .qna-title a:hover {
            color: #667eea;
        }

        .resolved-badge,
        .bounty-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            margin-left: 10px;
        }

        .resolved-badge {
            background: #4CAF50;
            color: white;
        }

        .bounty-badge {
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            color: white;
        }

        .qna-excerpt {
            color: #666;
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .qna-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .qna-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .qna-tag {
            padding: 4px 12px;
            background: #f0f0f0;
            border-radius: 15px;
            font-size: 0.8em;
            color: #666;
        }

        .qna-author {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: #888;
        }

        .author-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        /* 空状态 */
        .qna-empty {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 16px;
        }

        .qna-empty-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .qna-empty p {
            color: #666;
            margin-bottom: 20px;
        }

        /* 分页 */
        .qna-pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover:not(.disabled):not(.active) {
            border-color: #667eea;
            color: #667eea;
        }

        .page-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .page-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-ellipsis {
            padding: 8px;
            color: #999;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
        }

        .modal-close:hover {
            color: #333;
        }

        /* 表单样式 */
        .qna-form {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .bounty-input-wrapper {
            position: relative;
        }

        .bounty-input-wrapper input {
            padding-right: 40px;
        }

        .bounty-input-wrapper .coin-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .checkbox-label input {
            width: auto;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: opacity 0.3s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .required {
            color: #f5576c;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 12px 24px;
            border-radius: 25px;
            color: white;
            font-size: 0.95em;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast-success { background: #4CAF50; }
        .toast-error { background: #f44336; }
        .toast-warning { background: #ff9800; }
        .toast-info { background: #2196F3; }

        /* 响应式 */
        @media (max-width: 768px) {
            .qna-header {
                padding: 25px;
            }

            .qna-header h1 {
                font-size: 1.8em;
            }

            .qna-filters {
                flex-direction: column;
                align-items: stretch;
            }

            .qna-search {
                max-width: 100%;
            }

            .qna-card {
                flex-direction: column;
            }

            .qna-card-stats {
                flex-direction: row;
                justify-content: center;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
            }

            .form-actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="chinese-style-wrapper">
        <nav class="top-nav">
            <div class="nav-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="qna.html" class="nav-link active">问答</a>
                <a href="groups.html" class="nav-link">圈子</a>
                <a href="about.html" class="nav-link">关于</a>
            </div>
        </nav>

        <div class="qna-page">
            <div class="qna-header">
                <h1>💰 问答悬赏</h1>
                <p>提出问题，悬赏金币，获得专业解答</p>
                <div class="qna-stats-bar">
                    <div class="qna-stat">
                        <span class="qna-stat-num" id="totalQuestions">0</span>
                        <span class="qna-stat-label">问题总数</span>
                    </div>
                    <div class="qna-stat">
                        <span class="qna-stat-num" id="totalBounty">0</span>
                        <span class="qna-stat-label">悬赏总额</span>
                    </div>
                    <div class="qna-stat">
                        <span class="qna-stat-num" id="resolvedRate">0%</span>
                        <span class="qna-stat-label">解决率</span>
                    </div>
                </div>
            </div>

            <div class="qna-filters">
                <div class="filter-group">
                    <span class="filter-label">状态：</span>
                    <button class="qna-filter-btn active" data-filter="status" data-value="open">进行中</button>
                    <button class="qna-filter-btn" data-filter="status" data-value="resolved">已解决</button>
                    <button class="qna-filter-btn" data-filter="status" data-value="all">全部</button>
                </div>
                <div class="filter-group">
                    <span class="filter-label">排序：</span>
                    <button class="qna-filter-btn active" data-filter="sort" data-value="newest">最新</button>
                    <button class="qna-filter-btn" data-filter="sort" data-value="bounty">悬赏最高</button>
                    <button class="qna-filter-btn" data-filter="sort" data-value="popular">最热</button>
                </div>
                <div class="qna-search">
                    <input type="text" id="qnaSearch" placeholder="搜索问题...">
                </div>
                <button class="btn-create" id="createQuestionBtn">+ 发布问题</button>
            </div>

            <div class="qna-list" id="qnaList">
                <!-- 问题列表将在这里渲染 -->
                <div class="qna-empty">
                    <div class="qna-empty-icon">⏳</div>
                    <p>正在加载问题...</p>
                </div>
            </div>

            <div class="qna-pagination" id="qnaPagination">
                <!-- 分页将在这里渲染 -->
            </div>
        </div>
    </div>

    <script type="module" src="js/qna-system.js"></script>
</body>
</html>
