<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>жҲ‘зҡ„е…іжіЁ - Hakimi зҡ„зҢ«зҲ¬жһ¶</title>
    <link rel="stylesheet" href="css/chinese-style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/tianjg-theme.css">
    <link rel="icon" href="favicon.ico">
    <style>
        .following-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: 80px 20px 40px;
        }

        .following-header {
            margin-bottom: 30px;
        }

        .following-title {
            font-size: 2em;
            color: #fff;
            margin-bottom: 20px;
        }

        .following-tabs {
            display: flex;
            gap: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .following-tab {
            padding: 15px 5px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
            font-size: 1.05em;
        }

        .following-tab:hover {
            color: #fff;
        }

        .following-tab.active {
            color: #fff;
        }

        .following-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px 3px 0 0;
        }

        .following-tab span {
            margin-left: 5px;
            font-size: 0.85em;
            color: rgba(255,255,255,0.5);
        }

        .following-tab.active span {
            color: #667eea;
        }

        /* жҗңзҙўж ?*/
        .search-bar {
            margin: 25px 0;
        }

        .search-input-wrapper {
            position: relative;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 0.95em;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255,255,255,0.15);
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 1.1em;
        }

        /* з”ЁжҲ·еҲ—иЎЁ */
        .users-list {
            display: grid;
            gap: 15px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            transition: all 0.3s;
        }

        .user-card:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.8em;
            font-weight: bold;
            flex-shrink: 0;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            color: #fff;
            font-size: 1.15em;
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-bio {
            color: rgba(255,255,255,0.6);
            font-size: 0.95em;
            line-height: 1.5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .user-stat {
            font-size: 0.85em;
            color: rgba(255,255,255,0.5);
        }

        .user-stat strong {
            color: #fff;
            margin-right: 3px;
        }

        .user-actions {
            display: flex;
            gap: 10px;
        }

        .btn-follow {
            padding: 10px 24px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-follow.following {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-follow.following:hover {
            background: rgba(244, 67, 54, 0.2);
            border-color: rgba(244, 67, 54, 0.3);
        }

        .btn-follow.not-following {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .btn-follow.not-following:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-message {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        .btn-message:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        /* з©әзҠ¶жҖ?*/
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon {
            font-size: 5em;
            margin-bottom: 25px;
            opacity: 0.4;
        }

        .empty-title {
            color: #fff;
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        .empty-desc {
            color: rgba(255,255,255,0.5);
            margin-bottom: 25px;
        }

        .btn-explore {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-explore:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        /* жҺЁиҚҗе…іжіЁ */
        .suggestions-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .suggestions-title {
            color: #fff;
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .suggestions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .suggestion-card {
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }

        .suggestion-card:hover {
            background: rgba(255,255,255,0.1);
        }

        .suggestion-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.3em;
            font-weight: bold;
            flex-shrink: 0;
        }

        .suggestion-info {
            flex: 1;
        }

        .suggestion-name {
            color: #fff;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .suggestion-reason {
            font-size: 0.85em;
            color: rgba(255,255,255,0.5);
        }

        .btn-follow-sm {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 15px;
            color: #fff;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-follow-sm:hover {
            transform: scale(1.05);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(30, 30, 40, 0.95);
            color: #fff;
            padding: 12px 25px;
            border-radius: 25px;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="chinese-style-wrapper">
        <nav class="top-nav">
            <div class="nav-links">
                <a href="/" class="nav-link">йҰ–йЎө</a>
                <a href="/profile.html" class="nav-link">дёӘдәәдёӯеҝғ</a>
                <a href="/collections.html" class="nav-link">ж”¶и—ҸеӨ?/a>
                <a href="/messages.html" class="nav-link">ж¶ҲжҒҜ</a>
            </div>
        </nav>

        <div class="following-wrapper">
            <div class="following-header">
                <h1 class="following-title">зӨҫдәӨе…ізі»</h1>
                <div class="following-tabs">
                    <div class="following-tab active" onclick="switchTab('following')">
                        е…іжіЁдё?span id="followingCount">0</span>
                    </div>
                    <div class="following-tab" onclick="switchTab('followers')">
                        зІүдёқ<span id="followersCount">0</span>
                    </div>
                    <div class="following-tab" onclick="switchTab('mutual')">
                        дә’зӣёе…іжіЁ<span id="mutualCount">0</span>
                    </div>
                </div>
            </div>

            <div class="search-bar">
                <div class="search-input-wrapper">
                    <span class="search-icon">рҹ”Қ</span>
                    <input type="text" class="search-input" placeholder="жҗңзҙўз”ЁжҲ·..." id="searchInput" oninput="searchUsers(this.value)">
                </div>
            </div>

            <div class="users-list" id="usersList">
                <!-- еҠЁжҖҒз”ҹжҲ?-->
            </div>

            <!-- жҺЁиҚҗе…іжіЁ -->
            <div class="suggestions-section" id="suggestionsSection" style="display: none;">
                <h3 class="suggestions-title">жҺЁиҚҗе…іжіЁ</h3>
                <div class="suggestions-grid" id="suggestionsGrid">
                    <!-- еҠЁжҖҒз”ҹжҲ?-->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="js/supabase-auth.js"></script>
    <script type="module">
        import { API_BASE_URL } from './js/api-config.js?v=20260418a';

        // е…ЁеұҖзҠ¶жҖ?
        let currentUser = null;
        let currentTab = 'following';
        let users = [];
        let followingIds = new Set();

        // еҲқе§ӢеҢ?
        async function init() {
            const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
            if (!user) {
                window.location.href = '/?login=1';
                return;
            }
            currentUser = user;
            
            await loadStats();
            await loadUsers();
        }

        // еҠ иҪҪз»ҹи®Ў
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE_URL}/social/follow/stats`, {
                    headers: {
                        'Authorization': `Bearer ${currentUser.token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('followingCount').textContent = data.following || 0;
                    document.getElementById('followersCount').textContent = data.followers || 0;
                    document.getElementById('mutualCount').textContent = data.mutual || 0;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // еҠ иҪҪз”ЁжҲ·еҲ—иЎЁ
        async function loadUsers() {
            const container = document.getElementById('usersList');
            container.innerHTML = '<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.5);">еҠ иҪҪдё?..</div>';
            
            try {
                let url;
                if (currentTab === 'following') {
                    url = `${API_BASE_URL}/social/following/${currentUser.id}`;
                } else if (currentTab === 'followers') {
                    url = `${API_BASE_URL}/social/followers/${currentUser.id}`;
                } else {
                    url = `${API_BASE_URL}/social/mutual`;
                }
                
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${currentUser.token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    users = data.users || [];
                    
                    // и®°еҪ•е·Іе…іжіЁзҡ„з”ЁжҲ·
                    followingIds = new Set(users.map(u => u.id));
                    
                    if (users.length === 0) {
                        renderEmptyState();
                        if (currentTab === 'following') {
                            loadSuggestions();
                        }
                    } else {
                        renderUsers();
                        document.getElementById('suggestionsSection').style.display = 'none';
                    }
                }
            } catch (error) {
                console.error('Error loading users:', error);
                container.innerHTML = '<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.5);">еҠ иҪҪеӨұиҙҘ</div>';
            }
        }

        // жёІжҹ“з”ЁжҲ·еҲ—иЎЁ
        function renderUsers(filteredUsers = null) {
            const container = document.getElementById('usersList');
            const displayUsers = filteredUsers || users;
            
            if (displayUsers.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.5);">жІЎжңүжүҫеҲ°з”ЁжҲ·</div>';
                return;
            }
            
            container.innerHTML = displayUsers.map(user => `
                <div class="user-card">
                    <div class="user-avatar">
                        ${user.avatar ? `<img src="${user.avatar}" alt="">` : user.username.charAt(0).toUpperCase()}
                    </div>
                    <div class="user-info">
                        <div class="user-name">
                            <a href="/profile.html?id=${user.id}" style="color:#fff;text-decoration:none;">${user.username}</a>
                            ${user.is_verified ? '<span style="color:#667eea;">вң?/span>' : ''}
                        </div>
                        <div class="user-bio">${user.bio || 'иҝҷдёӘдәәеҫҲжҮ’пјҢд»Җд№ҲйғҪжІЎеҶҷ~'}</div>
                        <div class="user-stats">
                            <span class="user-stat"><strong>${user.articles_count || 0}</strong> ж–Үз« </span>
                            <span class="user-stat"><strong>${user.followers_count || 0}</strong> зІүдёқ</span>
                            <span class="user-stat"><strong>${user.following_count || 0}</strong> е…іжіЁ</span>
                        </div>
                    </div>
                    <div class="user-actions">
                        <button class="btn-message" onclick="sendMessage(${user.id}, '${user.username}')" title="еҸ‘ж¶ҲжҒ?>вңүпёҸ</button>
                        ${user.id !== currentUser.id ? `
                            <button class="btn-follow ${followingIds.has(user.id) ? 'following' : 'not-following'}" 
                                    onclick="toggleFollow(${user.id}, this)">
                                ${followingIds.has(user.id) ? 'е·Іе…іжі? : '+ е…іжіЁ'}
                            </button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // жёІжҹ“з©әзҠ¶жҖ?
        function renderEmptyState() {
            const container = document.getElementById('usersList');
            
            const emptyMessages = {
                following: {
                    icon: 'рҹ‘Ҙ',
                    title: 'иҝҳжІЎжңүе…іжіЁд»»дҪ•дәә',
                    desc: 'е…іжіЁж„ҹе…ҙи¶Јзҡ„з”ЁжҲ·пјҢз¬¬дёҖж—¶й—ҙзңӢеҲ°д»–д»¬зҡ„еҠЁжҖ?
                },
                followers: {
                    icon: 'рҹҢҹ',
                    title: 'иҝҳжІЎжңүзІүдё?,
                    desc: 'еӨҡеҸ‘еёғдјҳиҙЁеҶ…е®№пјҢеҗёеј•жӣҙеӨҡе…іжіЁ'
                },
                mutual: {
                    icon: 'рҹӨқ',
                    title: 'иҝҳжІЎжңүдә’зӣёе…іжіЁзҡ„еҘҪеҸӢ',
                    desc: 'е’ҢдҪ е…іжіЁзҡ„дәәд№ҹе…іжіЁдҪ пјҢе°ұиғҪжҲҗдёәеҘҪеҸ?
                }
            };
            
            const msg = emptyMessages[currentTab];
            
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">${msg.icon}</div>
                    <h3 class="empty-title">${msg.title}</h3>
                    <p class="empty-desc">${msg.desc}</p>
                    ${currentTab === 'following' ? '<a href="/" class="btn-explore">еҺ»еҸ‘зҺ?/a>' : ''}
                </div>
            `;
        }

        // еҠ иҪҪжҺЁиҚҗе…іжіЁ
        async function loadSuggestions() {
            try {
                const response = await fetch(`${API_BASE_URL}/articles?limit=20`);
                if (response.ok) {
                    const data = await response.json();
                    const articles = data.articles || [];
                    
                    // жҸҗеҸ–дҪңиҖ?
                    const authors = [];
                    const seen = new Set();
                    
                    articles.forEach(article => {
                        if (article.author_id && !seen.has(article.author_id) && article.author_id !== currentUser.id) {
                            seen.add(article.author_id);
                            authors.push({
                                id: article.author_id,
                                username: article.author_name || article.author || 'еҢҝеҗҚ',
                                reason: 'еҸ‘еёғдәҶзғӯй—Ёж–Үз«?
                            });
                        }
                    });
                    
                    if (authors.length > 0) {
                        document.getElementById('suggestionsSection').style.display = 'block';
                        renderSuggestions(authors.slice(0, 6));
                    }
                }
            } catch (error) {
                console.error('Error loading suggestions:', error);
            }
        }

        // жёІжҹ“жҺЁиҚҗ
        function renderSuggestions(suggestions) {
            const container = document.getElementById('suggestionsGrid');
            container.innerHTML = suggestions.map(user => `
                <div class="suggestion-card">
                    <div class="suggestion-avatar">${user.username.charAt(0).toUpperCase()}</div>
                    <div class="suggestion-info">
                        <div class="suggestion-name">${user.username}</div>
                        <div class="suggestion-reason">${user.reason}</div>
                    </div>
                    <button class="btn-follow-sm" onclick="toggleFollow(${user.id}, this); this.textContent = 'е·Іе…іжі?; this.disabled = true;">+ е…іжіЁ</button>
                </div>
            `).join('');
        }

        // еҲҮжҚўж Үзӯҫ
        function switchTab(tab) {
            currentTab = tab;
            
            document.querySelectorAll('.following-tab').forEach(t => t.classList.remove('active'));
            event.target.closest('.following-tab').classList.add('active');
            
            document.getElementById('searchInput').value = '';
            loadUsers();
        }

        // жҗңзҙўз”ЁжҲ·
        function searchUsers(query) {
            if (!query) {
                renderUsers();
                return;
            }
            
            const filtered = users.filter(user => 
                user.username.toLowerCase().includes(query.toLowerCase()) ||
                (user.bio && user.bio.toLowerCase().includes(query.toLowerCase()))
            );
            
            renderUsers(filtered);
        }

        // еҲҮжҚўе…іжіЁ
        async function toggleFollow(userId, btn) {
            const isFollowing = btn.classList.contains('following');
            
            try {
                const url = `${API_BASE_URL}/social/follow`;
                const response = await fetch(url, {
                    method: isFollowing ? 'DELETE' : 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentUser.token}`
                    },
                    body: JSON.stringify({ following_id: userId })
                });
                
                if (response.ok) {
                    if (isFollowing) {
                        btn.classList.remove('following');
                        btn.classList.add('not-following');
                        btn.textContent = '+ е…іжіЁ';
                        followingIds.delete(userId);
                        showToast('е·ІеҸ–ж¶Ҳе…іжі?);
                    } else {
                        btn.classList.remove('not-following');
                        btn.classList.add('following');
                        btn.textContent = 'е·Іе…іжі?;
                        followingIds.add(userId);
                        showToast('е…іжіЁжҲҗеҠҹ');
                    }
                    
                    await loadStats();
                } else {
                    showToast('ж“ҚдҪңеӨұиҙҘ');
                }
            } catch (error) {
                console.error('Error toggling follow:', error);
                showToast('ж“ҚдҪңеӨұиҙҘ');
            }
        }

        // еҸ‘йҖҒж¶ҲжҒ?
        function sendMessage(userId, username) {
            window.location.href = `/messages.html?user=${userId}&name=${encodeURIComponent(username)}`;
        }

        // Toast
        window.showToast = function(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        // жҡҙйңІе…ЁеұҖеҮҪж•°
        window.switchTab = switchTab;
        window.searchUsers = searchUsers;
        window.toggleFollow = toggleFollow;
        window.sendMessage = sendMessage;

        // еҗҜеҠЁ
        init();
    </script>
</body>
</html>
