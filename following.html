<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑰瓨鍨瑰▓鎴礂閾忣偅鏆?- Hakimi 的个人博客/title>
    <link rel="stylesheet" href="css/chinese-style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/tianjg-theme.css">
    <link rel="icon" href="favicon.ico">
    <style>
        .following-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: 80px 20px 40px;
        }

        .following-header {
            margin-bottom: 30px;
        }

        .following-title {
            font-size: 2em;
            color: #fff;
            margin-bottom: 20px;
        }

        .following-tabs {
            display: flex;
            gap: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .following-tab {
            padding: 15px 5px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
            font-size: 1.05em;
        }

        .following-tab:hover {
            color: #fff;
        }

        .following-tab.active {
            color: #fff;
        }

        .following-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px 3px 0 0;
        }

        .following-tab span {
            margin-left: 5px;
            font-size: 0.85em;
            color: rgba(255,255,255,0.5);
        }

        .following-tab.active span {
            color: #667eea;
        }

        /* 瑰吋绮銊╁冀?*/
        .search-bar {
            margin: 25px 0;
        }

        .search-input-wrapper {
            position: relative;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 0.95em;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255,255,255,0.15);
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 1.1em;
        }

        /* 活潿鍔崺㈠礆濡ゅ嫨鈧?*/
        .users-list {
            display: grid;
            gap: 15px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            transition: all 0.3s;
        }

        .user-card:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        .user-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.8em;
            font-weight: bold;
            flex-shrink: 0;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            color: #fff;
            font-size: 1.15em;
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-bio {
            color: rgba(255,255,255,0.6);
            font-size: 0.95em;
            line-height: 1.5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .user-stat {
            font-size: 0.85em;
            color: rgba(255,255,255,0.5);
        }

        .user-stat strong {
            color: #fff;
            margin-right: 3px;
        }

        .user-actions {
            display: flex;
            gap: 10px;
        }

        .btn-follow {
            padding: 10px 24px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-follow.following {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-follow.following:hover {
            background: rgba(244, 67, 54, 0.2);
            border-color: rgba(244, 67, 54, 0.3);
        }

        .btn-follow.not-following {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .btn-follow.not-following:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-message {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        .btn-message:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        /* 佸矁娅ｆ慨鎼佸箑?*/
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon {
            font-size: 5em;
            margin-bottom: 25px;
            opacity: 0.4;
        }

        .empty-title {
            color: #fff;
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        .empty-desc {
            color: rgba(255,255,255,0.5);
            margin-bottom: 25px;
        }

        .btn-explore {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-explore:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        /* 规亽鍔畷姗宕搹顐ｆ殘 */
        .suggestions-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .suggestions-title {
            color: #fff;
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .suggestions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .suggestion-card {
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }

        .suggestion-card:hover {
            background: rgba(255,255,255,0.1);
        }

        .suggestion-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.3em;
            font-weight: bold;
            flex-shrink: 0;
        }

        .suggestion-info {
            flex: 1;
        }

        .suggestion-name {
            color: #fff;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .suggestion-reason {
            font-size: 0.85em;
            color: rgba(255,255,255,0.5);
        }

        .btn-follow-sm {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 15px;
            color: #fff;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-follow-sm:hover {
            transform: scale(1.05);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(30, 30, 40, 0.95);
            color: #fff;
            padding: 12px 25px;
            border-radius: 25px;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="chinese-style-wrapper">
        <nav class="top-nav">
            <div class="nav-links">
                <a href="/" class="nav-link">濡鐗犻妴?/a>
                <a href="/profile.html" class="nav-link">搩浜欏Ч嬬▔偟濡?/a>
                <a href="/collections.html" class="nav-link">衡偓増顥戝?/a>
                <a href="/messages.html" class="nav-link">炴垵鐗婃导?/a>
            </div>
        </nav>

        <div class="following-wrapper">
            <div class="following-header">
                <h1 class="following-title">佲偓欍儲鍞夐柛蹇－?/h1>
                <div class="following-tabs">
                    <div class="following-tab active" onclick="switchTab('following')">
                        稿繗娅曢弫鐐寸▔?span id="followingCount">0</span>
                    </div>
                    <div class="following-tab" onclick="switchTab('followers')">
                        喖顦?span id="followersCount">0</span>
                    </div>
                    <div class="following-tab" onclick="switchTab('mutual')">
                        存粍甯炲ù愬礂閾忣偅鏆?span id="mutualCount">0</span>
                    </div>
                </div>
            </div>

            <div class="search-bar">
                <div class="search-input-wrapper">
                    <span class="search-icon">妫啯鏁?/span>
                    <input type="text" class="search-input" placeholder="瑰吋绮銊╂偨閵婏箑鐓?.." id="searchInput" oninput="searchUsers(this.value)">
                </div>
            </div>

            <div class="users-list" id="usersList">
                <!-- 告鍔埀胯兌閺佹捇骞?-->
            </div>

            <!-- 规亽鍔畷姗宕搹顐ｆ殘 -->
            <div class="suggestions-section" id="suggestionsSection" style="display: none;">
                <h3 class="suggestions-title">规亽鍔畷姗宕搹顐ｆ殘</h3>
                <div class="suggestions-grid" id="suggestionsGrid">
                    <!-- 告鍔埀胯兌閺佹捇骞?-->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="js/supabase-auth.js"></script>
    <script type="module">
        import { API_BASE_URL } from './js/api-config.js?v=20260418a';

        // 稿繈鍔岄惇勬偐哥?
        let currentUser = null;
        let currentTab = 'following';
        let users = [];
        let followingIds = new Set();

        // 告帗绻傞～鎰板礌?
        async function init() {
            const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
            if (!user) {
                window.location.href = '/?login=1';
                return;
            }
            currentUser = user;
            
            await loadStats();
            await loadUsers();
        }

        // 告梻ù鍥磼旀椿鍚
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE_URL}/social/follow/stats`, {
                    headers: {
                        'Authorization': `Bearer ${currentUser.token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('followingCount').textContent = data.following || 0;
                    document.getElementById('followersCount').textContent = data.followers || 0;
                    document.getElementById('mutualCount').textContent = data.mutual || 0;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // 告梻ù鍥偨閵婏箑鐓曢柛鎺擃殙閵?
        async function loadUsers() {
            const container = document.getElementById('usersList');
            container.innerHTML = '<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.5);">告梻ù鍥ㄧ▔?..</div>';
            
            try {
                let url;
                if (currentTab === 'following') {
                    url = `${API_BASE_URL}/social/following/${currentUser.id}`;
                } else if (currentTab === 'followers') {
                    url = `${API_BASE_URL}/social/followers/${currentUser.id}`;
                } else {
                    url = `${API_BASE_URL}/social/mutual`;
                }
                
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${currentUser.token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    users = data.users || [];
                    
                    // 犱焦樼紞宥咁啅绘帒褰犳繛堝妿堟垿鎮介妸锕鐓?
                    followingIds = new Set(users.map(u => u.id));
                    
                    if (users.length === 0) {
                        renderEmptyState();
                        if (currentTab === 'following') {
                            loadSuggestions();
                        }
                    } else {
                        renderUsers();
                        document.getElementById('suggestionsSection').style.display = 'none';
                    }
                }
            } catch (error) {
                console.error('Error loading users:', error);
                container.innerHTML = '<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.5);">告梻ù鍥緞堫袝</div>';
            }
        }

        // 炴挸堕悡瀣偨閵婏箑鐓曢柛鎺擃殙閵?
        function renderUsers(filteredUsers = null) {
            const container = document.getElementById('usersList');
            const displayUsers = filteredUsers || users;
            
            if (displayUsers.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.5);">炲备鍓﹢骞幆褍鐓傞顫妽?/div>';
                return;
            }
            
            container.innerHTML = displayUsers.map(user => `
                <div class="user-card">
                    <div class="user-avatar">
                        ${user.avatar ? `<img src="${user.avatar}" alt="">` : user.username.charAt(0).toUpperCase()}
                    </div>
                    <div class="user-info">
                        <div class="user-name">
                            <a href="/profile.html?id=${user.id}" style="color:#fff;text-decoration:none;">${user.username}</a>
                            ${user.is_verified ? '<span style="color:#667eea;">?/span>' : ''}
                        </div>
                        <div class="user-bio">${user.bio || '閺夆晜ら鍙戦铏釜辨繃掗埀▕儱鍘存繛灞糕偓鍐叉櫢~'}</div>
                        <div class="user-stats">
                            <span class="user-stat"><strong>${user.articles_count || 0}</strong> 哄倸娲ㄩ悵?/span>
                            <span class="user-stat"><strong>${user.followers_count || 0}</strong> 喖顦?/span>
                            <span class="user-stat"><strong>${user.following_count || 0}</strong> 稿繗娅曢弫?/span>
                        </div>
                    </div>
                    <div class="user-actions">
                        <button class="btn-message" onclick="sendMessage(${user.id}, '${user.username}')" title="告瑦鍨剁粔鐑藉箒?>翠礁顧?/button>
                        ${user.id !== currentUser.id ? `
                            <button class="btn-follow ${followingIds.has(user.id) ? 'following' : 'not-following'}" 
                                    onclick="toggleFollow(${user.id}, this)">
                                ${followingIds.has(user.id) ? '瑰憡褰崣褍鈻? : '+ 稿繗娅曢弫?}
                            </button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // 炴挸堕悡瀣矚閾忕?
        function renderEmptyState() {
            const container = document.getElementById('usersList');
            
            const emptyMessages = {
                following: {
                    icon: '妫啯鍣?,
                    title: '閺夆晜蓱ュ懘垫径濠傚綘炲鍔幑銏媴閺碍鐪?,
                    desc: '稿繗娅曢弫鐐哄箛斿嘲褰洪悺鎺炵悼堟垿鎮介妸锕鐓曢柨樼灱戝洦绋夐埀籍洘锛熼顏勵儏╁本掗弽锔界拨汇瀚慨鈺呭箑?
                },
                followers: {
                    icon: '妫啫鐨?,
                    title: '閺夆晜蓱ュ懘垫径鐒藉?,
                    desc: '濠㈣埖鑹捐ぐ鍌滄暜愌呭枠犳劑鍔岄崬糕偓鍦辨繈宕ョ粙璺ㄧ┛哄洦娼欓ˇ鍧楀礂閾忣偅鏆?
                },
                mutual: {
                    icon: '妫喚妾?,
                    title: '閺夆晜蓱ュ懘垫径岄瀺烩晝顭堥崣褍鈻旈妸褎鐣卞┑鍌濇?,
                    desc: '告粌濂旂紞姗宕搹顐ｆ殘汇瀚Ч嬬▕斿嘲褰犳繛堝妺嶆﹢鏁嶇仦鑺ョ殤煎疇ら▔嫨ㄩ柛?
                }
            };
            
            const msg = emptyMessages[currentTab];
            
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">${msg.icon}</div>
                    <h3 class="empty-title">${msg.title}</h3>
                    <p class="empty-desc">${msg.desc}</p>
                    ${currentTab === 'following' ? '<a href="/" class="btn-explore">告цぐ鍌炴偝?/a>' : ''}
                </div>
            `;
        }

        // 告梻ù鍥箳閵娿柛蹇氭珪閺?
        async function loadSuggestions() {
            try {
                const response = await fetch(`${API_BASE_URL}/articles?limit=20`);
                if (response.ok) {
                    const data = await response.json();
                    const articles = data.articles || [];
                    
                    // 圭粯鍔曡ぐ鍥ㄦ媴濠婂棌?
                    const authors = [];
                    const seen = new Set();
                    
                    articles.forEach(article => {
                        if (article.author_id && !seen.has(article.author_id) && article.author_id !== currentUser.id) {
                            seen.add(article.author_id);
                            authors.push({
                                id: article.author_id,
                                username: article.author_name || article.author || '告牕鐏濋幃?,
                                reason: '告瑦鍨电粩閿嬬瑥鍔伴梻鍌樺妽閺啰绮?
                            });
                        }
                    });
                    
                    if (authors.length > 0) {
                        document.getElementById('suggestionsSection').style.display = 'block';
                        renderSuggestions(authors.slice(0, 6));
                    }
                }
            } catch (error) {
                console.error('Error loading suggestions:', error);
            }
        }

        // 炴挸堕悡瀣箳閵娿?
        function renderSuggestions(suggestions) {
            const container = document.getElementById('suggestionsGrid');
            container.innerHTML = suggestions.map(user => `
                <div class="suggestion-card">
                    <div class="suggestion-avatar">${user.username.charAt(0).toUpperCase()}</div>
                    <div class="suggestion-info">
                        <div class="suggestion-name">${user.username}</div>
                        <div class="suggestion-reason">${user.reason}</div>
                    </div>
                    <button class="btn-follow-sm" onclick="toggleFollow(${user.id}, this); this.textContent = '瑰憡褰崣褍鈻?; this.disabled = true;">+ 稿繗娅曢弫?/button>
                </div>
            `).join('');
        }

        // 告帒娲畷鏌ュ冀モ晩鍔?
        function switchTab(tab) {
            currentTab = tab;
            
            document.querySelectorAll('.following-tab').forEach(t => t.classList.remove('active'));
            event.target.closest('.following-tab').classList.add('active');
            
            document.getElementById('searchInput').value = '';
            loadUsers();
        }

        // 瑰吋绮銊╂偨閵婏箑鐓?
        function searchUsers(query) {
            if (!query) {
                renderUsers();
                return;
            }
            
            const filtered = users.filter(user => 
                user.username.toLowerCase().includes(query.toLowerCase()) ||
                (user.bio && user.bio.toLowerCase().includes(query.toLowerCase()))
            );
            
            renderUsers(filtered);
        }

        // 告帒娲畷鏌ュ礂閾忣偅鏆?
        async function toggleFollow(userId, btn) {
            const isFollowing = btn.classList.contains('following');
            
            try {
                const url = `${API_BASE_URL}/social/follow`;
                const response = await fetch(url, {
                    method: isFollowing ? 'DELETE' : 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentUser.token}`
                    },
                    body: JSON.stringify({ following_id: userId })
                });
                
                if (response.ok) {
                    if (isFollowing) {
                        btn.classList.remove('following');
                        btn.classList.add('not-following');
                        btn.textContent = '+ 稿繗娅曢弫?;
                        followingIds.delete(userId);
                        showToast('瑰憡褰冭ぐ鍥р槈繂褰犳繛?);
                    } else {
                        btn.classList.remove('not-following');
                        btn.classList.add('following');
                        btn.textContent = '瑰憡褰崣褍鈻?;
                        followingIds.add(userId);
                        showToast('稿繗娅曢弫鐐哄箣顫?);
                    }
                    
                    await loadStats();
                } else {
                    showToast('瑰灝绉紞鏃勬潏顐バ?);
                }
            } catch (error) {
                console.error('Error toggling follow:', error);
                showToast('瑰灝绉紞鏃勬潏顐バ?);
            }
        }

        // 告瑦鍨块埀跨劍夌骞?
        function sendMessage(userId, username) {
            window.location.href = `/messages.html?user=${userId}&name=${encodeURIComponent(username)}`;
        }

        // Toast
        window.showToast = function(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        // 哄棙冲﹢曞礂閵娿儳婀伴柛鎴Г閺?
        window.switchTab = switchTab;
        window.searchUsers = searchUsers;
        window.toggleFollow = toggleFollow;
        window.sendMessage = sendMessage;

        // 告凹鍨版慨?
        init();
    </script>
</body>
</html>
